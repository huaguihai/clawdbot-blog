name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore file mtimes from git history
        run: |
          git ls-files -z content/posts/ | while IFS= read -r -d '' f; do
            t=$(git log -1 --format=%aI -- "$f")
            [ -n "$t" ] && touch -d "$t" "$f"
          done

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=clawdbot-blog

      - name: Submit URLs to IndexNow
        run: node scripts/indexnow.mjs
