<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- 背景层 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>

  <!-- 纸张颗粒散点纹理 -->
  <g fill="#D6A456" opacity="0.06">
    <circle cx="30" cy="40" r="1.2"/><circle cx="95" cy="70" r="0.8"/><circle cx="160" cy="35" r="1.5"/><circle cx="220" cy="80" r="1.0"/><circle cx="310" cy="50" r="1.3"/><circle cx="380" cy="90" r="0.9"/><circle cx="450" cy="45" r="1.1"/><circle cx="520" cy="75" r="1.4"/><circle cx="600" cy="55" r="0.7"/><circle cx="640" cy="95" r="1.2"/>
    <circle cx="50" cy="120" r="1.0"/><circle cx="130" cy="150" r="1.3"/><circle cx="200" cy="110" r="0.8"/><circle cx="270" cy="160" r="1.5"/><circle cx="350" cy="130" r="1.1"/><circle cx="420" cy="170" r="0.9"/><circle cx="490" cy="125" r="1.4"/><circle cx="560" cy="165" r="1.0"/><circle cx="620" cy="140" r="1.2"/><circle cx="70" cy="200" r="0.7"/>
    <circle cx="140" cy="230" r="1.3"/><circle cx="210" cy="195" r="1.0"/><circle cx="280" cy="240" r="1.4"/><circle cx="360" cy="210" r="0.8"/><circle cx="430" cy="250" r="1.1"/><circle cx="500" cy="205" r="1.5"/><circle cx="580" cy="235" r="0.9"/><circle cx="630" cy="215" r="1.2"/>
    <circle cx="40" cy="270" r="1.1"/><circle cx="110" cy="260" r="0.8"/><circle cx="190" cy="280" r="1.3"/><circle cx="250" cy="265" r="1.0"/><circle cx="320" cy="285" r="1.4"/><circle cx="390" cy="270" r="0.9"/><circle cx="460" cy="290" r="1.2"/><circle cx="540" cy="275" r="1.1"/><circle cx="610" cy="285" r="0.7"/>
  </g>

  <!-- 左侧强调线 -->
  <line x1="50" y1="60" x2="50" y2="286" stroke="url(#accentGrad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- 文字层：标题 -->
  <text x="70" y="75" fill="#FEFCE8" font-size="22" font-weight="bold" font-family="sans-serif">
    <tspan x="70" dy="0">别打字了，对AI</tspan>
    <tspan x="70" dy="28">「碎碎念」：Karpathy</tspan>
    <tspan x="70" dy="28">的提效协作法</tspan>
  </text>

  <!-- 文字层：副标题 -->
  <text x="70" y="143" fill="#D6A456" font-size="13" font-family="sans-serif">
    <tspan x="70" dy="0">Karpathy 提出的语音漫谈法，其实是给 LLM 换了一种「输入协议」：你用</tspan>
  </text>

  <!-- 文字层：标签胶囊 -->
  <g>
    <!-- 语音协作 -->
    <rect x="70" y="248" width="80" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="110" y="264" fill="#FDE68A" font-size="11" text-anchor="middle" font-family="sans-serif">语音协作</text>

    <!-- LLM工作流 -->
    <rect x="162" y="248" width="92" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="208" y="264" fill="#FDE68A" font-size="11" text-anchor="middle" font-family="sans-serif">LLM工作流</text>

    <!-- AI提效 -->
    <rect x="266" y="248" width="78" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="305" y="264" fill="#FDE68A" font-size="11" text-anchor="middle" font-family="sans-serif">AI提效</text>
  </g>

  <!-- 装饰元素：右下角麦克风图标（语音漫谈主题） -->
  <g transform="translate(520, 205)" opacity="0.22" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 麦克风头部 -->
    <circle cx="20" cy="12" r="10"/>
    <!-- 麦克风支架竖线 -->
    <line x1="20" y1="22" x2="20" y2="36"/>
    <!-- 底座弧线 -->
    <path d="M 10 36 Q 20 44 30 36"/>
    <!-- 声波线条 -->
    <path d="M 34 6 Q 40 12 34 18" opacity="0.7"/>
    <path d="M 38 3 Q 46 12 38 21" opacity="0.5"/>
  </g>

  <!-- 底部色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>