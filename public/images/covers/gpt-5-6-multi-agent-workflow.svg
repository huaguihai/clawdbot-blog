<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="300">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0" y1="0" x2="660" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>
  <rect width="660" height="300" fill="url(#bgGradient)"/>

  <!-- Grain texture -->
  <g opacity="0.06" fill="#D6D3D1">
    <circle cx="40" cy="30" r="2"/>
    <circle cx="120" cy="18" r="1.5"/>
    <circle cx="210" cy="40" r="1.8"/>
    <circle cx="320" cy="22" r="1.2"/>
    <circle cx="410" cy="36" r="1.6"/>
    <circle cx="520" cy="28" r="1.4"/>
    <circle cx="610" cy="20" r="1.7"/>

    <circle cx="70" cy="90" r="1.4"/>
    <circle cx="160" cy="110" r="2"/>
    <circle cx="250" cy="95" r="1.3"/>
    <circle cx="340" cy="115" r="1.9"/>
    <circle cx="430" cy="100" r="1.5"/>
    <circle cx="540" cy="120" r="1.8"/>
    <circle cx="620" cy="105" r="1.2"/>

    <circle cx="60" cy="160" r="1.6"/>
    <circle cx="150" cy="185" r="1.3"/>
    <circle cx="240" cy="170" r="2"/>
    <circle cx="330" cy="190" r="1.4"/>
    <circle cx="420" cy="175" r="1.7"/>
    <circle cx="530" cy="185" r="1.5"/>
    <circle cx="615" cy="170" r="1.9"/>

    <circle cx="80" cy="230" r="1.5"/>
    <circle cx="170" cy="250" r="1.2"/>
    <circle cx="260" cy="235" r="1.8"/>
    <circle cx="350" cy="255" r="1.3"/>
    <circle cx="440" cy="240" r="1.6"/>
    <circle cx="550" cy="250" r="1.4"/>
    <circle cx="630" cy="235" r="1.7"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="40" width="4.5" height="200" fill="url(#accentGradient)"/>

  <!-- Title -->
  <text x="70" y="70" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#FAFAF9">
    <tspan x="70" dy="0">从「一个聊天框」到「AI 小团队」：</tspan>
    <tspan x="70" dy="28">用 GPT-5.6 案例反推适合个人开发者的</tspan>
    <tspan x="70" dy="28">多 Agent 工作流骨架</tspan>
  </text>

  <!-- Subtitle -->
  <text x="70" y="150" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13" fill="#A8A29E">
    GPT-5.6 用 700 字 Prompt 驾驭 64 个子 Agent，在一
  </text>

  <!-- Tags (capsules) -->
  <!-- Tag 1 -->
  <g transform="translate(70,242)">
    <rect width="90" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="45" y="16" text-anchor="middle"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#D6D3D1">
      多 Agent 工作流
    </text>
  </g>

  <!-- Tag 2 -->
  <g transform="translate(170,242)">
    <rect width="78" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="39" y="16" text-anchor="middle"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#D6D3D1">
      GPT-5.6 案例
    </text>
  </g>

  <!-- Tag 3 -->
  <g transform="translate(260,242)">
    <rect width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="41" y="16" text-anchor="middle"
          font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="12" fill="#D6D3D1">
      个人开发者
    </text>
  </g>

  <!-- Decorative elements (right-bottom corner, non-overlapping) -->
  <!-- Network nodes icon -->
  <g transform="translate(500,200)" stroke="#EA580C" fill="none" opacity="0.22" stroke-width="1.4">
    <circle cx="20" cy="20" r="10"/>
    <circle cx="60" cy="20" r="10"/>
    <circle cx="40" cy="50" r="10"/>
    <line x1="30" y1="20" x2="50" y2="20"/>
    <line x1="25" y1="28" x2="36" y2="42"/>
    <line x1="55" y1="28" x2="44" y2="42"/>
  </g>

  <!-- Flow skeleton icon -->
  <g transform="translate(540,220)" stroke="#A8A29E" fill="none" opacity="0.2" stroke-width="1.3">
    <rect x="0" y="0" width="36" height="18" rx="3"/>
    <rect x="0" y="26" width="16" height="14" rx="3"/>
    <rect x="20" y="26" width="16" height="14" rx="3"/>
    <line x1="18" y1="9" x2="18" y2="26"/>
    <polyline points="4,9 10,9 10,9"/>
    <polyline points="26,9 32,9 32,9"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGradient)"/>
</svg>