<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Paper grain texture -->
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="18" r="1.2" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="34" cy="52" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="58" cy="26" r="1.4" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="82" cy="46" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="104" cy="22" r="1.0" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="20" cy="92" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="44" cy="80" r="1.3" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="66" cy="96" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="90" cy="86" r="1.4" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="110" cy="98" r="1.0" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="8" cy="64" r="0.9" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="96" cy="66" r="0.9" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="70" cy="64" r="0.8" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="52" cy="12" r="0.8" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="116" cy="58" r="0.8" fill="#D6D3D1" opacity="0.06"/>
    </pattern>

    <style>
      .title { font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 22px; font-weight: 800; fill: #FAFAF9; }
      .subtitle { font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 13px; font-weight: 500; fill: #A8A29E; }
      .tagText { font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; font-size: 12px; font-weight: 600; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>

  <!-- Text block (x from 70, can span to x=600) -->
  <text class="title" x="70" y="86">
    <tspan x="70" dy="0">AI Agent 安全默认：</tspan>
    <tspan x="70" dy="28">别让它一键乱改生产</tspan>
  </text>

  <text class="subtitle" x="70" y="152">
    AI Agent 安全默认，不是给模型多写几句提示词，而是把最小权限、可审计调用
  </text>

  <!-- Tag capsules (bottom area y≈240-260) -->
  <g>
    <rect x="70" y="240" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="113" y="256" text-anchor="middle">最小权限</text>

    <rect x="168" y="240" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="211" y="256" text-anchor="middle">可审计</text>

    <rect x="266" y="240" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="309" y="256" text-anchor="middle">dry-run</text>
  </g>

  <!-- Decorative elements (ONLY bottom-right, x≥480 y≥180; to the right of tags; no overlap with any text) -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.24">
    <!-- Git branch icon -->
    <g stroke="#A8A29E" stroke-width="2.2">
      <circle cx="505" cy="230" r="6"/>
      <circle cx="505" cy="270" r="6"/>
      <circle cx="548" cy="252" r="6"/>
      <path d="M505 236 L505 264"/>
      <path d="M511 230 C535 230, 532 252, 542 252"/>
    </g>

    <!-- Shield + check icon -->
    <g stroke="#EA580C" stroke-width="2.4">
      <path d="M592 192 L622 204 V233 C622 255 608 273 592 279 C576 273 562 255 562 233 V204 Z"/>
      <path d="M576 236 L587 248 L609 224"/>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>