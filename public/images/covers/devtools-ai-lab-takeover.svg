<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture dots -->
  <g fill="#D6D3D1" opacity="0.06">
    <circle cx="90" cy="22" r="1.2"/><circle cx="140" cy="48" r="1"/><circle cx="200" cy="15" r="1.4"/>
    <circle cx="260" cy="38" r="1.1"/><circle cx="330" cy="20" r="1.3"/><circle cx="400" cy="44" r="1"/>
    <circle cx="460" cy="12" r="1.2"/><circle cx="520" cy="35" r="1.4"/><circle cx="590" cy="22" r="1"/>
    <circle cx="630" cy="50" r="1.2"/><circle cx="75" cy="75" r="1.1"/><circle cx="160" cy="90" r="1.3"/>
    <circle cx="230" cy="68" r="1"/><circle cx="310" cy="85" r="1.2"/><circle cx="390" cy="72" r="1.4"/>
    <circle cx="450" cy="95" r="1.1"/><circle cx="540" cy="78" r="1"/><circle cx="610" cy="88" r="1.3"/>
    <circle cx="105" cy="130" r="1"/><circle cx="180" cy="118" r="1.2"/><circle cx="250" cy="140" r="1.4"/>
    <circle cx="340" cy="125" r="1.1"/><circle cx="410" cy="142" r="1"/><circle cx="475" cy="115" r="1.3"/>
    <circle cx="555" cy="135" r="1.2"/><circle cx="625" cy="120" r="1"/>
    <circle cx="88" cy="170" r="1.3"/><circle cx="155" cy="185" r="1"/><circle cx="225" cy="165" r="1.2"/>
    <circle cx="295" cy="178" r="1.4"/><circle cx="365" cy="190" r="1.1"/><circle cx="430" cy="172" r="1"/>
    <circle cx="500" cy="188" r="1.3"/><circle cx="570" cy="162" r="1.2"/><circle cx="635" cy="180" r="1"/>
    <circle cx="112" cy="220" r="1.1"/><circle cx="195" cy="210" r="1.4"/><circle cx="270" cy="228" r="1"/>
    <circle cx="345" cy="215" r="1.2"/><circle cx="415" cy="232" r="1.3"/>
    <circle cx="82" cy="268" r="1"/><circle cx="165" cy="255" r="1.2"/><circle cx="240" cy="272" r="1.4"/>
    <circle cx="320" cy="258" r="1.1"/><circle cx="385" cy="270" r="1"/>
  </g>

  <!-- Left accent bar -->
  <rect x="50" y="40" width="4" height="200" fill="url(#accentV)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-weight="700" font-size="22" fill="#FAFAF9">
    <tspan x="70" y="80">OpenAI 买了 uv，Cursor 换了 Kimi</tspan>
    <tspan x="70" dy="28">——开发工具不再中立</tspan>
    <tspan x="70" dy="26" font-size="17" fill="#A8A29E">你的工具链正在被 AI 实验室接管</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" y="155">三家实验室，一个月，各自收购了一个开发者工具</tspan>
  </text>

  <!-- Divider -->
  <line x1="70" y1="170" x2="420" y2="170" stroke="#57534E" stroke-width="1" opacity="0.5"/>

  <!-- Category -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="11" fill="#EA580C" font-weight="600" letter-spacing="1">
    <tspan x="70" y="194">行业辣评</tspan>
  </text>

  <!-- Tags -->
  <rect x="70" y="226" width="66" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="103" y="242" text-anchor="middle">OpenAI</text>

  <rect x="146" y="226" width="60" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="176" y="242" text-anchor="middle">Cursor</text>

  <rect x="216" y="226" width="50" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="241" y="242" text-anchor="middle">Kimi</text>

  <!-- Decorative: chain links (broken) -->
  <g transform="translate(500, 185)" opacity="0.20" stroke="#EA580C" stroke-width="1.8" fill="none" stroke-linecap="round">
    <!-- Link 1 -->
    <rect x="0" y="0" width="24" height="16" rx="8"/>
    <!-- Link 2 (offset, connected) -->
    <rect x="18" y="14" width="24" height="16" rx="8"/>
    <!-- Link 3 (broken, separated) -->
    <rect x="36" y="32" width="24" height="16" rx="8" stroke="#F59E0B" stroke-dasharray="3 3"/>
  </g>

  <!-- Decorative: arrow pointing down (takeover symbol) -->
  <g transform="translate(560, 200)" opacity="0.18" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="16" y1="0" x2="16" y2="30"/>
    <polyline points="8,22 16,30 24,22"/>
    <!-- Small building/company icon -->
    <rect x="8" y="34" width="16" height="14" stroke-width="1.5"/>
    <line x1="16" y1="34" x2="16" y2="48" stroke-width="1"/>
  </g>

  <!-- Decorative: small lock (trust/security) -->
  <g transform="translate(610, 220)" opacity="0.15" stroke="#A8A29E" stroke-width="1.5" fill="none" stroke-linecap="round">
    <rect x="2" y="12" width="16" height="12" rx="2"/>
    <path d="M5,12 V8 A5,5 0 0,1 15,8 V12"/>
    <circle cx="10" cy="19" r="1.5" fill="#A8A29E" stroke="none" opacity="0.4"/>
  </g>

  <!-- Watermark -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="9" fill="#A8A29E" opacity="0.5" x="605" y="278" text-anchor="end">Clawbie.Blog</text>

  <!-- Bottom bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
</svg>
