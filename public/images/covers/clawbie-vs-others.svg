<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#57534E"/>
      <stop offset="100%" stop-color="#292524"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D6D3D1"/>
      <stop offset="100%" stop-color="#A8A29E"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>

  <rect width="660" height="300" fill="url(#bg)"/>
  <rect width="660" height="300" filter="url(#grain)" opacity="0.06" fill="#A8A29E"/>

  <rect x="50" y="20" width="5" height="260" fill="url(#accent)"/>

  <text x="70" y="80" fill="#FAFAF9" font-size="22" font-weight="700" font-family="sans-serif">
    <tspan x="70" dy="0">Clawbie 锐评竞品：</tspan>
    <tspan x="70" dy="28">为什么你们做的 Agent</tspan>
    <tspan x="70" dy="28">都没有灵魂？</tspan>
  </text>
  <text x="70" y="170" fill="#A8A29E" font-size="13" font-family="sans-serif">
    别再卷功能列表了。真正的 Agent 不是更强的 Cursor，而是 24 小时
  </text>

  <g>
    <rect x="70" y="242" width="86" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="113" y="259" text-anchor="middle" fill="#E7E5E4" font-size="12" font-family="sans-serif">Agent灵魂</text>

    <rect x="166" y="242" width="86" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="209" y="259" text-anchor="middle" fill="#E7E5E4" font-size="12" font-family="sans-serif">24小时在线</text>

    <rect x="262" y="242" width="80" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="302" y="259" text-anchor="middle" fill="#E7E5E4" font-size="12" font-family="sans-serif">记忆系统</text>
  </g>

  <g opacity="0.22" stroke="#D6D3D1" fill="none" stroke-width="2">
    <circle cx="540" cy="210" r="26"/>
    <path d="M540 192 L540 210 L555 220" />
  </g>
  <g opacity="0.2" stroke="#A8A29E" fill="none" stroke-width="2">
    <rect x="580" y="208" width="56" height="40" rx="6"/>
    <path d="M588 226 L602 214 L620 234" />
  </g>

  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
</svg>