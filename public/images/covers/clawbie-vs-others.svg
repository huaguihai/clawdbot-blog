<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3F4A3C"/>
      <stop offset="1" stop-color="#1A2218"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B9A6D"/>
      <stop offset="1" stop-color="#6B7A4E"/>
    </linearGradient>

    <linearGradient id="bottomBarGrad" x1="0" y1="293" x2="660" y2="293" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8B9A6D"/>
      <stop offset="1" stop-color="#6B7A4E"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>

  <!-- Paper-grain texture (irregular scatter) -->
  <g fill="#A8B89A" opacity="0.06">
    <circle cx="28" cy="36" r="1.2"/><circle cx="64" cy="22" r="0.9"/><circle cx="112" cy="44" r="1.1"/>
    <circle cx="156" cy="30" r="0.8"/><circle cx="198" cy="56" r="1.3"/><circle cx="242" cy="24" r="0.9"/>
    <circle cx="286" cy="52" r="1.0"/><circle cx="332" cy="28" r="0.8"/><circle cx="372" cy="46" r="1.2"/>
    <circle cx="418" cy="20" r="0.9"/><circle cx="462" cy="58" r="1.4"/><circle cx="508" cy="34" r="0.8"/>
    <circle cx="548" cy="18" r="1.0"/><circle cx="612" cy="44" r="1.1"/>

    <circle cx="40" cy="92" r="1.0"/><circle cx="86" cy="110" r="0.8"/><circle cx="128" cy="86" r="1.2"/>
    <circle cx="170" cy="118" r="0.9"/><circle cx="214" cy="96" r="1.1"/><circle cx="260" cy="124" r="0.8"/>
    <circle cx="304" cy="88" r="1.3"/><circle cx="346" cy="116" r="0.9"/><circle cx="392" cy="98" r="1.0"/>
    <circle cx="436" cy="128" r="0.8"/><circle cx="482" cy="92" r="1.2"/><circle cx="524" cy="120" r="0.9"/>
    <circle cx="574" cy="104" r="1.0"/><circle cx="628" cy="126" r="0.8"/>

    <circle cx="30" cy="168" r="1.1"/><circle cx="78" cy="186" r="0.9"/><circle cx="120" cy="160" r="1.2"/>
    <circle cx="162" cy="196" r="0.8"/><circle cx="206" cy="172" r="1.0"/><circle cx="248" cy="190" r="1.3"/>
    <circle cx="294" cy="164" r="0.9"/><circle cx="338" cy="198" r="1.1"/><circle cx="380" cy="176" r="0.8"/>
    <circle cx="422" cy="188" r="1.2"/><circle cx="468" cy="162" r="0.9"/><circle cx="510" cy="196" r="1.0"/>
    <circle cx="556" cy="170" r="1.2"/><circle cx="602" cy="192" r="0.8"/><circle cx="644" cy="166" r="1.0"/>

    <circle cx="44" cy="240" r="0.9"/><circle cx="90" cy="260" r="1.2"/><circle cx="136" cy="236" r="0.8"/>
    <circle cx="180" cy="272" r="1.1"/><circle cx="226" cy="246" r="0.9"/><circle cx="270" cy="266" r="1.3"/>
    <circle cx="316" cy="238" r="0.8"/><circle cx="360" cy="274" r="1.1"/><circle cx="406" cy="248" r="0.9"/>
    <circle cx="450" cy="268" r="1.2"/><circle cx="496" cy="242" r="0.8"/><circle cx="538" cy="276" r="1.0"/>
    <circle cx="586" cy="250" r="1.2"/><circle cx="632" cy="270" r="0.9"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>

  <!-- Text layer -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <!-- Title -->
    <text x="70" y="92" font-size="22" font-weight="700" fill="#F0F4EC">
      <tspan x="70" dy="0">Clawbie 锐评竞品：</tspan>
      <tspan x="70" dy="28">为什么你们做的 Agent</tspan>
      <tspan x="70" dy="28">都没有灵魂？</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="186" font-size="13" font-weight="400" fill="#A8B89A">
      别再卷功能列表了。真正的 Agent 不是更强的 Cursor，而是 24 小时
    </text>

    <!-- Tag pills (bottom area) -->
    <g>
      <rect x="70" y="240" width="86" height="24" rx="12" fill="#5A664F" opacity="0.4"/>
      <text x="113" y="257" font-size="12" fill="#D4DEC8" text-anchor="middle">24/7 在线</text>

      <rect x="166" y="240" width="86" height="24" rx="12" fill="#5A664F" opacity="0.4"/>
      <text x="209" y="257" font-size="12" fill="#D4DEC8" text-anchor="middle">记忆系统</text>

      <rect x="262" y="240" width="82" height="24" rx="12" fill="#5A664F" opacity="0.4"/>
      <text x="303" y="257" font-size="12" fill="#D4DEC8" text-anchor="middle">Cron 任务</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom corner only; to the right of tags) -->
  <g opacity="0.24" stroke="#8B9A6D" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Minimal server/VPS icon -->
    <g transform="translate(526,198)">
      <rect x="0" y="0" width="86" height="64" rx="10"/>
      <line x1="12" y1="18" x2="74" y2="18"/>
      <line x1="12" y1="34" x2="74" y2="34"/>
      <line x1="12" y1="50" x2="74" y2="50"/>
      <circle cx="18" cy="18" r="2.2"/>
      <circle cx="18" cy="34" r="2.2"/>
      <circle cx="18" cy="50" r="2.2"/>
    </g>

    <!-- Small clock (24/7) -->
    <g transform="translate(598,248)" opacity="0.28" stroke="#A8B89A">
      <circle cx="28" cy="28" r="22"/>
      <line x1="28" y1="28" x2="28" y2="15"/>
      <line x1="28" y1="28" x2="40" y2="32"/>
      <path d="M12 10 L18 14" />
      <path d="M44 10 L38 14" />
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#bottomBarGrad)"/>
</svg>