<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#78350F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#451A03;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <circle cx="120" cy="45" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="280" cy="90" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="180" cy="140" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="340" cy="180" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="90" cy="200" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="240" cy="240" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="150" cy="270" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="320" cy="60" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="200" cy="110" r="1.5" fill="#D6A456" opacity="0.06"/>
  <circle cx="380" cy="150" r="1.5" fill="#D6A456" opacity="0.06"/>
  
  <rect x="50" y="60" width="4" height="40" fill="url(#accentGrad)" rx="2"/>
  
  <text x="70" y="85" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#FEFCE8">
    从搜索到代码只需 10 分钟？
  </text>
  <text x="70" y="110" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#FEFCE8">
    试试 Google 新出的 Canvas 工作流
  </text>
  
  <text x="70" y="140" font-family="Arial, sans-serif" font-size="16" fill="#D6A456">
    Google 搜索里内置了一个代码画板，可以直接从搜索结果生成、修改、运行代码
  </text>
  
  <rect x="70" y="165" width="110" height="28" rx="14" fill="#92400E" opacity="0.4"/>
  <text x="125" y="184" font-family="Arial, sans-serif" font-size="14" fill="#FDE68A" text-anchor="middle">Canvas</text>
  
  <rect x="190" y="165" width="110" height="28" rx="14" fill="#92400E" opacity="0.4"/>
  <text x="245" y="184" font-family="Arial, sans-serif" font-size="14" fill="#FDE68A" text-anchor="middle">效率提升</text>
  
  <rect x="310" y="165" width="90" height="28" rx="14" fill="#92400E" opacity="0.4"/>
  <text x="355" y="184" font-family="Arial, sans-serif" font-size="14" fill="#FDE68A" text-anchor="middle">AI 工具</text>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="none" stroke="#D6A456" stroke-width="2.5"/>
    
    <rect x="15" y="15" width="170" height="25" rx="4" fill="#1F2937" opacity="0.8"/>
    <text x="25" y="32" font-family="monospace" font-size="12" fill="#22C55E">$ python weather.py</text>
    
    <line x1="15" y1="55" x2="185" y2="55" stroke="#F59E0B" stroke-width="2"/>
    <line x1="15" y1="70" x2="160" y2="70" stroke="#D97706" stroke-width="2"/>
    <line x1="15" y1="85" x2="140" y2="85" stroke="#F59E0B" stroke-width="2"/>
    
    <circle cx="100" cy="115" r="12" fill="none" stroke="#22C55E" stroke-width="2.5"/>
    <path d="M 93 115 L 98 120 L 107 108" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
    
    <path d="M 30 50 L 40 60 M 40 50 L 30 60" stroke="#D6A456" stroke-width="1.5" opacity="0.4"/>
    <path d="M 170 95 L 180 105 M 180 95 L 170 105" stroke="#D6A456" stroke-width="1.5" opacity="0.4"/>
    
    <text x="130" y="120" font-family="Arial, sans-serif" font-size="11" fill="#FEFCE8" opacity="0.7">RUN</text>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
