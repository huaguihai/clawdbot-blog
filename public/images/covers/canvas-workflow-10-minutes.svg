<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1917;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <circle cx="120" cy="45" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="280" cy="80" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="180" cy="120" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="90" cy="160" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="240" cy="200" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="150" cy="240" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="320" cy="140" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="200" cy="180" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="110" cy="220" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="260" cy="260" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="480" cy="60" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="540" cy="100" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="420" cy="140" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="580" cy="180" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="460" cy="220" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  <circle cx="520" cy="260" r="1.5" fill="#D6D3D1" opacity="0.06"/>
  
  <rect x="50" y="50" width="4" height="60" fill="url(#accentGrad)" rx="2"/>
  
  <text x="70" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    从搜索到代码只需 10 分钟？
  </text>
  <text x="70" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    试试 Google 新出的 Canvas 工作流
  </text>
  
  <text x="70" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A8A29E">
    Google 搜索里内置了一个代码画板，可以直接从搜索结果生成、修改、运行代码。
  </text>
  
  <rect x="70" y="155" width="80" height="28" rx="14" fill="#57534E" opacity="0.4"/>
  <text x="110" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#D6D3D1" text-anchor="middle">Canvas</text>
  
  <rect x="160" y="155" width="100" height="28" rx="14" fill="#57534E" opacity="0.4"/>
  <text x="210" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#D6D3D1" text-anchor="middle">代码生成</text>
  
  <rect x="270" y="155" width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
  <text x="315" y="174" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#D6D3D1" text-anchor="middle">工作流</text>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="30" rx="15" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <circle cx="20" cy="15" r="6" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <line x1="23" y1="12" x2="28" y2="18" stroke="#F59E0B" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="19" font-family="monospace" font-size="12" fill="#A8A29E">搜索 API 文档</text>
  </g>
  
  <line x1="520" y1="95" x2="520" y2="110" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#F59E0B"/>
    </marker>
  </defs>
  
  <g transform="translate(420, 115)">
    <rect x="0" y="0" width="200" height="90" rx="8" fill="none" stroke="#22C55E" stroke-width="2"/>
    <rect x="8" y="8" width="184" height="20" rx="4" fill="#57534E" opacity="0.3"/>
    <text x="14" y="22" font-family="monospace" font-size="11" fill="#22C55E">Canvas</text>
    
    <line x1="12" y1="40" x2="80" y2="40" stroke="#D6D3D1" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="50" x2="120" y2="50" stroke="#D6D3D1" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="60" x2="95" y2="60" stroke="#D6D3D1" stroke-width="1.5" opacity="0.6"/>
    <line x1="12" y1="70" x2="110" y2="70" stroke="#D6D3D1" stroke-width="1.5" opacity="0.6"/>
    
    <circle cx="170" cy="75" r="10" fill="#22C55E"/>
    <polygon points="166,75 169,78 175,72" fill="#1C1917" stroke="none"/>
  </g>
  
  <text x="445" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#F59E0B" font-weight="600">
    生成 → 修改 → 运行
  </text>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
