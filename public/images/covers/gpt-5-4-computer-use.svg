<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  <rect width="660" height="300" fill="url(#bgGrad)" filter="url(#noise)"/>
  
  <!-- 左侧内容区域 -->
  <line x1="50" y1="70" x2="50" y2="220" stroke="url(#accentGrad)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- 标题 -->
  <text x="70" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#FAFAF9" width="320" style="font-family: 'Microsoft YaHei', sans-serif;">
    <tspan x="70" dy="0">GPT-5.4 会用电脑了，</tspan>
    <tspan x="70" dy="32">但 OpenAI 控制不了</tspan>
    <tspan x="70" dy="32">它的思维链</tspan>
  </text>
  
  <!-- 副标题 -->
  <text x="70" y="225" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A8A29E" width="320">
    <tspan x="70" dy="0">推理、编程、电脑操作、深度搜索、</tspan>
    <tspan x="70" dy="22">百万 Token 上下文，全部焊死在一个模型里。</tspan>
  </text>
  
  <!-- 标签胶囊 -->
  <g transform="translate(70, 250)">
    <rect x="0" y="0" width="85" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
    <text x="42.5" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle" style="font-family: 'Microsoft YaHei', sans-serif;">电脑操作</text>
    
    <rect x="95" y="0" width="65" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
    <text x="127.5" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle" style="font-family: 'Microsoft YaHei', sans-serif;">推理模型</text>
    
    <rect x="170" y="0" width="55" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
    <text x="197.5" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle" style="font-family: 'Microsoft YaHei', sans-serif;">Agent</text>
  </g>
  
  <!-- 右侧插图：AI操作电脑 -->
  <g transform="translate(400, 50)">
    <!-- 电脑屏幕边框 -->
    <rect x="0" y="20" width="220" height="150" rx="8" fill="none" stroke="#57534E" stroke-width="2"/>
    <!-- 屏幕内边框 -->
    <rect x="8" y="28" width="204" height="134" rx="4" fill="#1C1917" fill-opacity="0.6"/>
    
    <!-- 浏览器/窗口标题栏 -->
    <rect x="8" y="28" width="204" height="20" rx="4" fill="#44403C"/>
    <circle cx="18" cy="38" r="4" fill="#EF4444"/>
    <circle cx="32" cy="38" r="4" fill="#F59E0B"/>
    <circle cx="46" cy="38" r="4" fill="#22C55E"/>
    <text x="60" y="42" font-family="monospace" font-size="10" fill="#A8A29E">GPT-5.4 Task</text>
    
    <!-- 屏幕内的代码/任务界面 -->
    <g transform="translate(15, 55)">
      <!-- 任务列表 -->
      <rect x="0" y="0" width="190" height="20" rx="3" fill="#44403C" fill-opacity="0.5"/>
      <rect x="8" y="7" width="8" height="8" rx="1" fill="#22C55E"/>
      <text x="24" y="14" font-family="monospace" font-size="9" fill="#FAFAF9">Generate game resources</text>
      
      <rect x="0" y="28" width="190" height="20" rx="3" fill="#44403C" fill-opacity="0.5"/>
      <rect x="8" y="35" width="8" height="8" rx="1" fill="#22C55E"/>
      <text x="24" y="42" font-family="monospace" font-size="9" fill="#FAFAF9">Build game scenes</text>
      
      <rect x="0" y="56" width="160" height="20" rx="3" fill="#44403C" fill-opacity="0.5"/>
      <rect x="8" y="63" width="8" height="8" rx="1" fill="#F59E0B"/>
      <text x="24" y="70" font-family="monospace" font-size="9" fill="#FAFAF9">Run browser tests...</text>
      
      <rect x="0" y="84" width="120" height="20" rx="3" fill="#44403C" fill-opacity="0.3"/>
      <rect x="8" y="91" width="8" height="8" rx="1" fill="#57534E"/>
      <text x="24" y="98" font-family="monospace" font-size="9" fill="#A8A29E">Iterate &amp; fix</text>
    </g>
    
    <!-- AI操作指示器 -->
    <g transform="translate(170, 135)">
      <circle cx="0" cy="0" r="12" fill="none" stroke="#EA580C" stroke-width="2">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="3s" repeatCount="indefinite"/>
      </circle>
      <text x="0" y="4" font-family="monospace" font-size="8" fill="#EA580C" text-anchor="middle">AI</text>
    </g>
    
    <!-- 鼠标指针 -->
    <g transform="translate(120, 100)">
      <path d="M0,0 L0,18 L4,14 L8,22 L10,21 L6,13 L12,13 Z" fill="#FAFAF9" stroke="#1C1917" stroke-width="1"/>
    </g>
    
    <!-- 键盘区域 -->
    <rect x="30" y="175" width="160" height="30" rx="4" fill="#44403C" fill-opacity="0.6"/>
    <g transform="translate(40, 182)">
      <rect x="0" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="16" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="32" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="48" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="64" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="80" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="96" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <rect x="112" y="0" width="12" height="8" rx="2" fill="#57534E"/>
      <!-- 空格键 -->
      <rect x="30" y="12" width="50" height="8" rx="2" fill="#57534E"/>
    </g>
  </g>
  
  <!-- 底部强调色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>