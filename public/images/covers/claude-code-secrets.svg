<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1" fill="#D6D3D1"/>
    <circle cx="180" cy="150" r="1.2" fill="#D6D3D1"/>
    <circle cx="90" cy="200" r="1" fill="#D6D3D1"/>
    <circle cx="320" cy="180" r="1.5" fill="#D6D3D1"/>
    <circle cx="220" cy="250" r="1" fill="#D6D3D1"/>
    <circle cx="150" cy="100" r="1.3" fill="#D6D3D1"/>
    <circle cx="380" cy="130" r="1" fill="#D6D3D1"/>
    <circle cx="480" cy="200" r="1.2" fill="#D6D3D1"/>
    <circle cx="550" cy="80" r="1" fill="#D6D3D1"/>
    <circle cx="420" cy="260" r="1.5" fill="#D6D3D1"/>
    <circle cx="580" cy="150" r="1" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="60" width="5" height="60" fill="url(#accentGrad)" rx="2.5"/>
  
  <text x="70" y="85" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">为什么你的 Claude Code</tspan>
    <tspan x="70" dy="32">只是个陪聊？</tspan>
  </text>
  
  <text x="70" y="155" font-family="Arial, sans-serif" font-size="16" fill="#A8A29E">
    <tspan x="70" dy="0">当我们在用 Claude Code 写 Hello World 的时候，</tspan>
    <tspan x="70" dy="22">官方团队已经在用它指挥多线程工作流了</tspan>
  </text>
  
  <g transform="translate(70, 210)">
    <rect width="100" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="50" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">并行工作流</text>
  </g>
  
  <g transform="translate(180, 210)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">Plan Mode</text>
  </g>
  
  <g transform="translate(280, 210)">
    <rect width="80" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="40" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">技能固化</text>
  </g>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="none" stroke="#EA580C" stroke-width="2.5" opacity="0.3"/>
    
    <rect x="15" y="15" width="170" height="25" rx="4" fill="#1C1917" stroke="#22C55E" stroke-width="2"/>
    <text x="25" y="33" font-family="monospace" font-size="13" fill="#22C55E">$ claude --parallel</text>
    
    <g transform="translate(15, 50)">
      <rect width="50" height="35" rx="4" fill="#57534E" opacity="0.6"/>
      <text x="25" y="23" font-family="Arial, sans-serif" font-size="11" fill="#FAFAF9" text-anchor="middle">窗口A</text>
      <circle cx="25" cy="8" r="2" fill="#22C55E"/>
    </g>
    
    <g transform="translate(75, 50)">
      <rect width="50" height="35" rx="4" fill="#57534E" opacity="0.6"/>
      <text x="25" y="23" font-family="Arial, sans-serif" font-size="11" fill="#FAFAF9" text-anchor="middle">窗口B</text>
      <circle cx="25" cy="8" r="2" fill="#22C55E"/>
    </g>
    
    <g transform="translate(135, 50)">
      <rect width="50" height="35" rx="4" fill="#57534E" opacity="0.6"/>
      <text x="25" y="23" font-family="Arial, sans-serif" font-size="11" fill="#FAFAF9" text-anchor="middle">窗口C</text>
      <circle cx="25" cy="8" r="2" fill="#22C55E"/>
    </g>
    
    <path d="M 100 95 L 100 110 M 85 110 L 115 110" stroke="#F59E0B" stroke-width="2" fill="none"/>
    <circle cx="100" cy="120" r="8" fill="#EA580C"/>
    <text x="100" y="125" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle" font-weight="bold">YOU</text>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>