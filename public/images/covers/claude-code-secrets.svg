  </text>
  <text x="70" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    "核武器"级秘籍
  </text>
  
  <text x="70" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#A8A29E">
    当我们在用 Claude Code 写 Hello World 的时候...
  </text>
  
  <rect x="70" y="200" width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="82" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1">
    AI 工作流
  </text>
  
  <rect x="165" y="200" width="75" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="177" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1">
    效率提升
  </text>
  
  <rect x="250" y="200" width="80" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="262" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1">
    高级技巧
  </text>
  
  <g transform="translate(430, 50)">
    <rect x="10" y="10" width="180" height="140" rx="8" fill="none" stroke="#EA580C" stroke-width="2.5" opacity="0.3"/>
    
    <rect x="30" y="30" width="140" height="20" rx="4" fill="#57534E" opacity="0.6"/>
    <text x="38" y="45" font-family="monospace" font-size="11" fill="#22C55E">$ claude --parallel</text>
    
    <rect x="30" y="60" width="140" height="20" rx="4" fill="#57534E" opacity="0.6"/>
    <text x="38" y="75" font-family="monospace" font-size="11" fill="#22C55E">$ claude --plan</text>
    
    <rect x="30" y="90" width="140" height="20" rx="4" fill="#57534E" opacity="0.6"/>
    <text x="38" y="105" font-family="monospace" font-size="11" fill="#22C55E">$ claude fix-bug</text>
    
    <circle cx="100" cy="135" r="8" fill="url(#accentGrad)"/>
    <path d="M 95 135 L 98 138 L 105 131" stroke="#FAFAF9" stroke-width="2" fill="none" stroke-linecap="round"/>
    
    <text x="50" y="160" font-family="system-ui, sans-serif" font-size="10" fill="#A8A29E" text-anchor="middle">
