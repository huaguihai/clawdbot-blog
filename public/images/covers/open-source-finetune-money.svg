<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#78350F"/>
      <stop offset="1" stop-color="#451A03"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <pattern id="grain" width="80" height="80" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="14" r="1.4" fill="#D6A456" opacity="0.06"/>
      <circle cx="26" cy="22" r="1.1" fill="#D6A456" opacity="0.06"/>
      <circle cx="42" cy="10" r="1.6" fill="#D6A456" opacity="0.06"/>
      <circle cx="58" cy="28" r="1.2" fill="#D6A456" opacity="0.06"/>
      <circle cx="70" cy="16" r="1.0" fill="#D6A456" opacity="0.06"/>

      <circle cx="14" cy="44" r="1.2" fill="#D6A456" opacity="0.06"/>
      <circle cx="30" cy="58" r="1.5" fill="#D6A456" opacity="0.06"/>
      <circle cx="48" cy="46" r="1.1" fill="#D6A456" opacity="0.06"/>
      <circle cx="64" cy="60" r="1.6" fill="#D6A456" opacity="0.06"/>
      <circle cx="74" cy="48" r="1.2" fill="#D6A456" opacity="0.06"/>

      <circle cx="8" cy="70" r="1.0" fill="#D6A456" opacity="0.06"/>
      <circle cx="22" cy="74" r="1.3" fill="#D6A456" opacity="0.06"/>
      <circle cx="44" cy="72" r="1.1" fill="#D6A456" opacity="0.06"/>
      <circle cx="60" cy="76" r="1.4" fill="#D6A456" opacity="0.06"/>
      <circle cx="76" cy="70" r="1.1" fill="#D6A456" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="26" width="5" height="248" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Text layer -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, sans-serif">
    <text x="70" y="92" fill="#FEFCE8" font-size="22" font-weight="700">
      <tspan x="70" dy="0">开源微调怎么赚到钱？</tspan>
      <tspan x="70" dy="28">Cursor换模给了答案</tspan>
    </text>

    <text x="70" y="155" fill="#D6A456" font-size="13" font-weight="400">
      开源微调不只是省 API 费，把通用模型变成你行业的专属厨师。
    </text>

    <!-- Tag capsules (bottom area) -->
    <g font-size="12" font-weight="600" fill="#FDE68A">
      <g>
        <rect x="70" y="238" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
        <text x="113" y="254" text-anchor="middle">开源微调</text>
      </g>
      <g>
        <rect x="166" y="238" width="82" height="24" rx="12" fill="#92400E" opacity="0.4"/>
        <text x="207" y="254" text-anchor="middle">垂直AI</text>
      </g>
      <g>
        <rect x="258" y="238" width="90" height="24" rx="12" fill="#92400E" opacity="0.4"/>
        <text x="303" y="254" text-anchor="middle">成本可控</text>
      </g>
    </g>
  </g>

  <!-- Decorations (right-bottom only; to the right of tags; no overlap with text) -->
  <g opacity="0.22" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Minimal "AI chip" icon -->
    <rect x="506" y="196" width="66" height="56" rx="10"/>
    <rect x="526" y="214" width="26" height="20" rx="6" opacity="0.85"/>
    <!-- pins -->
    <line x1="516" y1="190" x2="516" y2="196"/>
    <line x1="532" y1="190" x2="532" y2="196"/>
    <line x1="548" y1="190" x2="548" y2="196"/>
    <line x1="564" y1="190" x2="564" y2="196"/>

    <line x1="516" y1="252" x2="516" y2="258"/>
    <line x1="532" y1="252" x2="532" y2="258"/>
    <line x1="548" y1="252" x2="548" y2="258"/>
    <line x1="564" y1="252" x2="564" y2="258"/>

    <line x1="500" y1="208" x2="506" y2="208"/>
    <line x1="500" y1="224" x2="506" y2="224"/>
    <line x1="500" y1="240" x2="506" y2="240"/>

    <line x1="572" y1="208" x2="578" y2="208"/>
    <line x1="572" y1="224" x2="578" y2="224"/>
    <line x1="572" y1="240" x2="578" y2="240"/>

    <!-- Minimal "coin" icon -->
    <ellipse cx="612" cy="236" rx="28" ry="16"/>
    <ellipse cx="612" cy="230" rx="28" ry="16" opacity="0.85"/>
    <path d="M596 230c0 9 32 9 32 0" opacity="0.8"/>
    <path d="M604 233h16" opacity="0.75"/>
    <path d="M612 224v12" opacity="0.75"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>