<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <title>行业助手总落地难？灾害四模块三天出MVP - 封面</title>
  <desc>全宽文字+右下角简笔装饰布局，暖橙棕配色，含标签与底部色条。</desc>
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <linearGradient id="accGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
  </defs>

  <!-- 背景层 -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <!-- 纸张颗粒散点纹理 -->
  <g fill="#D6A456" opacity="0.06">
    <circle cx="30" cy="24" r="1.2"/><circle cx="90" cy="36" r="1.0"/><circle cx="140" cy="18" r="1.6"/>
    <circle cx="200" cy="40" r="1.1"/><circle cx="260" cy="22" r="0.9"/><circle cx="320" cy="34" r="1.3"/>
    <circle cx="380" cy="28" r="0.8"/><circle cx="440" cy="20" r="1.4"/><circle cx="500" cy="38" r="1.0"/>
    <circle cx="560" cy="26" r="1.2"/><circle cx="620" cy="32" r="0.9"/>

    <circle cx="48" cy="86" r="1.0"/><circle cx="112" cy="96" r="1.4"/><circle cx="176" cy="84" r="0.9"/>
    <circle cx="236" cy="92" r="1.2"/><circle cx="298" cy="80" r="1.0"/><circle cx="362" cy="88" r="1.5"/>
    <circle cx="422" cy="96" r="0.8"/><circle cx="486" cy="82" r="1.2"/><circle cx="548" cy="90" r="1.0"/>
    <circle cx="610" cy="84" r="1.3"/>

    <circle cx="40" cy="150" r="1.2"/><circle cx="100" cy="162" r="1.0"/><circle cx="160" cy="146" r="1.5"/>
    <circle cx="220" cy="158" r="0.9"/><circle cx="280" cy="150" r="1.3"/><circle cx="340" cy="164" r="1.1"/>
    <circle cx="400" cy="152" r="0.8"/><circle cx="460" cy="160" r="1.2"/><circle cx="520" cy="148" r="1.0"/>
    <circle cx="580" cy="160" r="1.4"/><circle cx="640" cy="152" r="0.9"/>

    <circle cx="32" cy="212" r="1.0"/><circle cx="96" cy="224" r="1.2"/><circle cx="158" cy="206" r="1.1"/>
    <circle cx="220" cy="220" r="0.9"/><circle cx="282" cy="208" r="1.3"/><circle cx="344" cy="224" r="1.0"/>
    <circle cx="406" cy="210" r="1.4"/><circle cx="468" cy="222" r="0.8"/><circle cx="530" cy="206" r="1.2"/>
    <circle cx="592" cy="220" r="1.0"/><circle cx="632" cy="210" r="1.3"/>

    <circle cx="60" cy="268" r="1.1"/><circle cx="120" cy="280" r="0.9"/><circle cx="180" cy="268" r="1.3"/>
    <circle cx="240" cy="276" r="1.0"/><circle cx="300" cy="268" r="1.2"/><circle cx="360" cy="280" r="0.9"/>
    <circle cx="420" cy="270" r="1.4"/><circle cx="480" cy="282" r="1.0"/><circle cx="540" cy="270" r="1.2"/>
    <circle cx="600" cy="280" r="0.9"/>
  </g>

  <!-- 左侧强调线 -->
  <rect x="50" y="0" width="4" height="300" fill="url(#accGrad)"/>

  <!-- 文字层 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <!-- 标题 -->
    <text x="70" y="92" fill="#FEFCE8" font-size="22" font-weight="700">
      <tspan x="70" dy="0">行业助手总落地难？灾害四模块</tspan>
      <tspan x="70" dy="28">三天出MVP</tspan>
    </text>
    <!-- 副标题 -->
    <text x="70" y="152" fill="#D6A456" font-size="13">行业助手做成万能问答，最常见的结局是：演示很炫，试点没法评估。用灾害响应的四模块</text>
  </g>

  <!-- 标签胶囊 -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12">
    <g>
      <rect x="70" y="246" width="88" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="114" y="262" fill="#FDE68A" text-anchor="middle">灾害响应</text>
    </g>
    <g>
      <rect x="170" y="246" width="82" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="211" y="262" fill="#FDE68A" text-anchor="middle">四模块</text>
    </g>
    <g>
      <rect x="262" y="246" width="70" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="297" y="262" fill="#FDE68A" text-anchor="middle">MVP</text>
    </g>
  </g>

  <!-- 右下角装饰元素（简笔线条风格） -->
  <g stroke="#F59E0B" stroke-width="1.6" fill="none" opacity="0.22" stroke-linecap="round" stroke-linejoin="round">
    <!-- 简笔喇叭：对外通告 -->
    <g transform="translate(500,210)">
      <path d="M0 18 L28 0 L28 36 L0 22 Z"/>
      <path d="M0 18 L-8 26 L-2 30"/>
      <line x1="32" y1="10" x2="48" y2="10"/>
      <line x1="33" y1="24" x2="50" y2="24"/>
    </g>
    <!-- 四模块面板：2x2 小格 -->
    <g transform="translate(592,204)">
      <rect x="0" y="0" width="60" height="60" rx="8"/>
      <rect x="4" y="4" width="24" height="24" rx="4"/>
      <rect x="32" y="4" width="24" height="24" rx="4"/>
      <rect x="4" y="32" width="24" height="24" rx="4"/>
      <rect x="32" y="32" width="24" height="24" rx="4"/>
    </g>
  </g>

  <!-- 底部色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accGrad)"/>
</svg>