<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1" fill="#D6D3D1"/>
    <circle cx="180" cy="150" r="1.2" fill="#D6D3D1"/>
    <circle cx="90" cy="200" r="1" fill="#D6D3D1"/>
    <circle cx="240" cy="180" r="1.5" fill="#D6D3D1"/>
    <circle cx="320" cy="120" r="1" fill="#D6D3D1"/>
    <circle cx="150" cy="250" r="1.2" fill="#D6D3D1"/>
    <circle cx="500" cy="80" r="1" fill="#D6D3D1"/>
    <circle cx="580" cy="140" r="1.5" fill="#D6D3D1"/>
    <circle cx="450" cy="200" r="1" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="60" width="4" height="40" fill="url(#accentGrad)" rx="2"/>
  
  <text x="70" y="85" font-family="Arial, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">OpenAI 和 Anthropic 都在</tspan>
    <tspan x="70" dy="32">给开源维护者发钱</tspan>
  </text>
  
  <text x="70" y="155" font-family="Arial, sans-serif" font-size="16" fill="#A8A29E">
    <tspan x="70" dy="0">两家 AI 公司同时推出免费计划，表面上都是</tspan>
    <tspan x="70" dy="20">6 个月 $200/月，但申请门槛...</tspan>
  </text>
  
  <g transform="translate(70, 205)">
    <rect width="100" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="50" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">开源支持</text>
  </g>
  
  <g transform="translate(180, 205)">
    <rect width="80" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="40" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">AI 工具</text>
  </g>
  
  <g transform="translate(270, 205)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="Arial, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">申请门槛</text>
  </g>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="none" stroke="#EA580C" stroke-width="2.5"/>
    
    <rect x="15" y="15" width="80" height="50" rx="4" fill="#57534E" opacity="0.3"/>
    <text x="55" y="35" font-family="monospace" font-size="11" fill="#FAFAF9" text-anchor="middle">OpenAI</text>
    <text x="55" y="50" font-family="monospace" font-size="10" fill="#22C55E" text-anchor="middle">$200/mo</text>
    
    <rect x="105" y="15" width="80" height="50" rx="4" fill="#57534E" opacity="0.3"/>
    <text x="145" y="35" font-family="monospace" font-size="11" fill="#FAFAF9" text-anchor="middle">Anthropic</text>
    <text x="145" y="50" font-family="monospace" font-size="10" fill="#22C55E" text-anchor="middle">$200/mo</text>
    
    <line x1="55" y1="75" x2="55" y2="95" stroke="#F59E0B" stroke-width="2"/>
    <line x1="145" y1="75" x2="145" y2="95" stroke="#F59E0B" stroke-width="2"/>
    
    <circle cx="55" cy="105" r="8" fill="none" stroke="#22C55E" stroke-width="2"/>
    <text x="55" y="109" font-family="Arial, sans-serif" font-size="10" fill="#22C55E" text-anchor="middle">?</text>
    
    <circle cx="145" cy="105" r="8" fill="none" stroke="#EF4444" stroke-width="2"/>
    <text x="145" y="110" font-family="Arial, sans-serif" font-size="12" fill="#EF4444" text-anchor="middle">!</text>
    
    <text x="100" y="130" font-family="Arial, sans-serif" font-size="9" fill="#A8A29E" text-anchor="middle">门槛差异</text>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>