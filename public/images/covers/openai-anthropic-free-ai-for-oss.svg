    <text x="25" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#D6D3D1" text-anchor="middle">$</text>
  </g>
  
  <g transform="translate(580, 195)" opacity="0.18">
    <path d="M0,15 L15,0 L30,15 L15,30 Z" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <circle cx="15" cy="15" r="4" fill="#A8A29E"/>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
