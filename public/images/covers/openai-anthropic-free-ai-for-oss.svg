<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#57534E"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D6D3D1"/>
      <stop offset="100%" style="stop-color:#A8A29E"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="2" fill="#A8A29E"/>
    <circle cx="280" cy="90" r="1.5" fill="#A8A29E"/>
    <circle cx="450" cy="65" r="2" fill="#A8A29E"/>
    <circle cx="180" cy="140" r="1.5" fill="#A8A29E"/>
    <circle cx="380" cy="180" r="2" fill="#A8A29E"/>
    <circle cx="520" cy="120" r="1.5" fill="#A8A29E"/>
    <circle cx="90" cy="200" r="2" fill="#A8A29E"/>
    <circle cx="310" cy="240" r="1.5" fill="#A8A29E"/>
  </g>
  
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>
  
  <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">OpenAI 和 Anthropic 都在给</tspan>
    <tspan x="70" dy="28">开源维护者发钱,但你可能</tspan>
    <tspan x="70" dy="28">申请错了</tspan>
  </text>
  
  <text x="70" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A8A29E">
    两家 AI 公司同时推出免费计划,表面上都是 6 个月 $200/月,但申请门槛
  </text>
  
  <g transform="translate(70, 245)">
    <rect width="85" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="42.5" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E7E5E4" text-anchor="middle">开源支持</text>
  </g>
  
  <g transform="translate(165, 245)">
    <rect width="75" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="37.5" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E7E5E4" text-anchor="middle">AI 工具</text>
  </g>
  
  <g transform="translate(250, 245)">
    <rect width="90" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="45" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#E7E5E4" text-anchor="middle">行业辣评</text>
  </g>
  
  <g transform="translate(520, 210)" opacity="0.2">
