<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#57534E"/>
      <stop offset="100%" style="stop-color:#292524"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#D6D3D1"/>
      <stop offset="100%" style="stop-color:#A8A29E"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="80" r="1.5" fill="#A8A29E"/>
    <circle cx="280" cy="140" r="1.5" fill="#A8A29E"/>
    <circle cx="180" cy="200" r="1.5" fill="#A8A29E"/>
    <circle cx="320" cy="90" r="1.5" fill="#A8A29E"/>
    <circle cx="90" cy="180" r="1.5" fill="#A8A29E"/>
    <circle cx="240" cy="240" r="1.5" fill="#A8A29E"/>
    <circle cx="500" cy="120" r="1.5" fill="#A8A29E"/>
    <circle cx="580" cy="200" r="1.5" fill="#A8A29E"/>
    <circle cx="460" cy="180" r="1.5" fill="#A8A29E"/>
  </g>
  
  <rect x="50" y="50" width="5" height="180" fill="url(#accentGrad)"/>
  
  <text x="70" y="75" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">OpenAI 和</tspan>
    <tspan x="70" dy="28">Anthropic 都在</tspan>
    <tspan x="70" dy="28">给开源维护者</tspan>
    <tspan x="70" dy="28">发钱</tspan>
  </text>
  
  <text x="70" y="180" font-family="Arial, sans-serif" font-size="14" fill="#A8A29E">
    两家 AI 公司同时推出免费计划，表面上都是...
  </text>
  
  <g transform="translate(70, 210)">
    <rect width="85" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="42.5" y="16" font-family="Arial, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">申请门槛</text>
  </g>
  
  <g transform="translate(165, 210)">
    <rect width="75" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="37.5" y="16" font-family="Arial, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">免费额度</text>
  </g>
  
  <g transform="translate(250, 210)">
    <rect width="70" height="24" rx="12" fill="#78716C" opacity="0.4"/>
    <text x="35" y="16" font-family="Arial, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">AI工具</text>
  </g>
  
  <g transform="translate(430, 60)">
    <rect x="0" y="0" width="90" height="70" rx="6" fill="none" stroke="#D6D3D1" stroke-width="2.5"/>
    <text x="45" y="20" font-family="monospace" font-size="11" fill="#FAFAF9" text-anchor="middle">OpenAI</text>
    <text x="45" y="40" font-family="monospace" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="bold">$200</text>
    <text x="45" y="58" font-family="monospace" font-size="10" fill="#A8A29E" text-anchor="middle">6个月</text>
  </g>
  
  <g transform="translate(530, 60)">
    <rect x="0" y="0" width="90" height="70" rx="6" fill="none" stroke="#D6D3D1" stroke-width="2.5"/>
    <text x="45" y="20" font-family="monospace" font-size="10" fill="#FAFAF9" text-anchor="middle">Anthropic</text>
    <text x="45" y="40" font-family="monospace" font-size="16" fill="#22C55E" text-anchor="middle" font-weight="bold">$200</text>
    <text x="45" y="58" font-family="monospace" font-size="10" fill="#A8A29E" text-anchor="middle">6个月</text>
  </g>
  
  <line x1="485" y1="140" x2="485" y2="170" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  <line x1="575" y1="140" x2="575" y2="170" stroke="#EF4444" stroke-width="2" stroke-dasharray="4,3"/>
  
  <text x="530" y="190" font-family="Arial, sans-serif" font-size="11" fill="#A8A29E" text-anchor="middle">但申请难度不同</text>
  
  <circle cx="460" cy="155" r="3" fill="#EF4444"/>
  <text x="470" y="158" font-family="monospace" font-size="9" fill="#FAFAF9">讲故事</text>
  
  <circle cx="560" cy="155" r="3" fill="#EF4444"/>
  <text x="570" y="158" font-family="monospace" font-size="9" fill="#FAFAF9">看数据</text>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>