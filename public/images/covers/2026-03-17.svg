    <circle cx="610" cy="142" r="1.4"/>
    <circle cx="650" cy="110" r="1.1"/>
    <circle cx="40" cy="175" r="1.2"/>
    <circle cx="100" cy="190" r="1.4"/>
    <circle cx="165" cy="168" r="1"/>
    <circle cx="230" cy="185" r="1.3"/>
    <circle cx="295" cy="172" r="1.2"/>
    <circle cx="360" cy="195" r="1"/>
    <circle cx="420" cy="178" r="1.4"/>
    <circle cx="485" cy="192" r="1.1"/>
    <circle cx="550" cy="165" r="1.3"/>
    <circle cx="615" cy="188" r="1"/>
    <circle cx="645" cy="175" r="1.2"/>
    <circle cx="25" cy="225" r="1.1"/>
    <circle cx="85" cy="240" r="1.3"/>
    <circle cx="150" cy="218" r="1"/>
    <circle cx="210" cy="235" r="1.4"/>
    <circle cx="275" cy="222" r="1.2"/>
    <circle cx="500" cy="215" r="1"/>
    <circle cx="565" cy="238" r="1.3"/>
    <circle cx="630" cy="225" r="1.1"/>
    <circle cx="655" cy="245" r="1.4"/>
    <circle cx="35" cy="270" r="1.2"/>
    <circle cx="95" cy="280" r="1"/>
    <circle cx="160" cy="265" r="1.3"/>
    <circle cx="225" cy="275" r="1.4"/>
    <circle cx="290" cy="260" r="1.1"/>
