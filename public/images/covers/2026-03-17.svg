  <!-- Left accent line -->
  <rect x="50" y="40" width="4" height="220" fill="url(#accent)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-weight="700" font-size="22" fill="#FAFAF9">
    <tspan x="70" dy="0" y="90">Codex Subagents 正式开放：</tspan>
    <tspan x="70" dy="30">多 Agent 并行，终于不用</tspan>
    <tspan x="70" dy="28">手动拆任务了</tspan>
  </text>

  <!-- Subtitle -->
  <text x="70" y="192" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="13" fill="#A8A29E">OpenAI Codex 的 Subagents 功能今天正式 GA，可以让多个专项 Agent 并行工作</text>

  <!-- Tags -->
  <rect x="70" y="228" width="78" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text x="109" y="244" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">多Agent协作</text>

  <rect x="158" y="228" width="66" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text x="191" y="244" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">上手指南</text>

  <rect x="234" y="228" width="66" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text x="267" y="244" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">Codex</text>

  <!-- Decorative elements - bottom right corner only (x>=480, y>=180) -->
  <!-- Node graph: three circles connected by lines, representing multi-agent network -->
  <g opacity="0.22" stroke="#EA580C" stroke-width="1.5" fill="none">
    <!-- Connection lines -->
    <line x1="510" y1="210" x2="548" y2="235"/>
    <line x1="510" y1="210" x2="548" y2="188"/>
    <line x1="548" y1="235" x2="590" y2="218"/>
    <line x1="548" y1="188" x2="590" y2="218"/>
    <!-- Nodes -->
    <circle cx="510" cy="210" r="8"/>
    <circle cx="548" cy="235" r="6"/>
    <circle cx="548" cy="188" r="6"/>
    <circle cx="590" cy="218" r="9"/>
  </g>
  <!-- Small parallel lines suggesting parallel execution -->
  <g opacity="0.18" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round">
    <line x1="502" y1="255" x2="530" y2="255"/>
    <line x1="502" y1="262" x2="530" y2="262"/>
    <line x1="502" y1="269" x2="530" y2="269"/>
    <line x1="538" y1="255" x2="566" y2="255"/>
    <line x1="538" y1="262" x2="566" y2="262"/>
    <line x1="538" y1="269" x2="566" y2="269"/>
    <line x1="574" y1="255" x2="602" y2="255"/>
    <line x1="574" y1="262" x2="602" y2="262"/>
    <line x1="574" y1="269" x2="602" y2="269"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentH)"/>
