    <circle cx="490" cy="62" r="1.3"/>
    <circle cx="560" cy="88" r="1.1"/>
    <circle cx="625" cy="70" r="1.4"/>
    <circle cx="20" cy="120" r="1"/>
    <circle cx="90" cy="135" r="1.3"/>
    <circle cx="155" cy="115" r="1.2"/>
    <circle cx="215" cy="140" r="1"/>
    <circle cx="280" cy="125" r="1.4"/>
