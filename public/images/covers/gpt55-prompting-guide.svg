<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="accentGradH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="transparent"/>
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="10" cy="18" r="1.2"/>
        <circle cx="26" cy="44" r="0.9"/>
        <circle cx="48" cy="20" r="1.0"/>
        <circle cx="70" cy="34" r="0.8"/>
        <circle cx="96" cy="16" r="1.1"/>
        <circle cx="112" cy="42" r="0.9"/>
        <circle cx="18" cy="78" r="0.8"/>
        <circle cx="40" cy="92" r="1.1"/>
        <circle cx="64" cy="74" r="0.9"/>
        <circle cx="88" cy="96" r="1.0"/>
        <circle cx="108" cy="84" r="0.8"/>
        <circle cx="14" cy="108" r="1.0"/>
        <circle cx="34" cy="12" r="0.7"/>
        <circle cx="58" cy="52" r="0.7"/>
        <circle cx="82" cy="60" r="0.7"/>
        <circle cx="104" cy="10" r="0.7"/>
        <circle cx="8" cy="54" r="0.7"/>
        <circle cx="118" cy="108" r="1.0"/>
        <circle cx="92" cy="112" r="0.8"/>
        <circle cx="52" cy="112" r="0.8"/>
      </g>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="20" width="5" height="260" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text layer -->
  <g font-family="Inter, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="70" y="92" fill="#FAFAF9" font-size="22" font-weight="700">
      <tspan x="70" y="92">GPT-5.5 提示词怎么写，</tspan>
      <tspan x="70" dy="28">才不再反复返工</tspan>
    </text>

    <text x="70" y="150" fill="#A8A29E" font-size="13" font-weight="500">
      GPT-5.5 提示词怎么写，决定你是一次出活，还是来回返工。同样花 API 钱
    </text>

    <!-- Tag capsules -->
    <g>
      <rect x="70" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="113" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">目标</text>

      <rect x="166" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="209" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">边界</text>

      <rect x="262" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="305" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">验收标准</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom only; to the right of tags; no overlap with text) -->
  <g transform="translate(520,190)" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.22">
    <!-- Document/checklist icon -->
    <path d="M12 8 h34 a6 6 0 0 1 6 6 v42 a6 6 0 0 1-6 6 H12 a6 6 0 0 1-6-6 V14 a6 6 0 0 1 6-6 z"
          stroke="#EA580C" stroke-width="2.2"/>
    <path d="M18 22 h24" stroke="#A8A29E" stroke-width="2"/>
    <path d="M18 34 h24" stroke="#A8A29E" stroke-width="2"/>
    <path d="M18 46 h24" stroke="#A8A29E" stroke-width="2"/>
    <path d="M14.5 22.5 l2.6 2.6 l5.2-6.2" stroke="#EA580C" stroke-width="2"/>
    <path d="M14.5 34.5 l2.6 2.6 l5.2-6.2" stroke="#EA580C" stroke-width="2"/>
    <path d="M14.5 46.5 l2.6 2.6 l5.2-6.2" stroke="#EA580C" stroke-width="2"/>

    <!-- Small braces to hint "prompt/spec" -->
    <path d="M66 18 c-8 0-8 8-8 8 v6 c0 6-6 6-6 6 s6 0 6 6 v6 s0 8 8 8"
          stroke="#A8A29E" stroke-width="2"/>
    <path d="M92 18 c8 0 8 8 8 8 v6 c0 6 6 6 6 6 s-6 0-6 6 v6 s0 8-8 8"
          stroke="#A8A29E" stroke-width="2"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGradH)"/>
</svg>