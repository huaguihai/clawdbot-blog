<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <rect width="140" height="140" fill="none"/>
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="18" cy="22" r="1.3"/>
        <circle cx="44" cy="18" r="1.0"/>
        <circle cx="71" cy="26" r="1.2"/>
        <circle cx="112" cy="20" r="1.1"/>
        <circle cx="128" cy="34" r="1.4"/>
        <circle cx="22" cy="56" r="1.1"/>
        <circle cx="58" cy="62" r="1.5"/>
        <circle cx="92" cy="54" r="1.0"/>
        <circle cx="120" cy="66" r="1.2"/>
        <circle cx="14" cy="92" r="1.4"/>
        <circle cx="36" cy="104" r="1.1"/>
        <circle cx="76" cy="92" r="1.3"/>
        <circle cx="106" cy="110" r="1.0"/>
        <circle cx="132" cy="104" r="1.2"/>
        <circle cx="24" cy="126" r="1.1"/>
        <circle cx="60" cy="128" r="1.3"/>
        <circle cx="98" cy="130" r="1.1"/>
        <circle cx="126" cy="128" r="1.4"/>

        <circle cx="10" cy="10" r="0.9"/>
        <circle cx="52" cy="40" r="0.9"/>
        <circle cx="86" cy="70" r="0.9"/>
        <circle cx="30" cy="78" r="0.9"/>
        <circle cx="118" cy="86" r="0.9"/>
        <circle cx="66" cy="112" r="0.9"/>
      </g>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="26" width="5" height="248" rx="2.5" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Text layer -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Noto Sans CJK SC','Microsoft YaHei',Arial,sans-serif">
    <!-- Title -->
    <text x="70" y="78" fill="#FAFAF9" font-size="22" font-weight="700">
      <tspan x="70" dy="0">PII 扫描：把日志丢给 LLM</tspan>
      <tspan x="70" dy="28">前先过这道门</tspan>
    </text>

    <!-- Subtitle (one line) -->
    <text x="70" y="140" fill="#A8A29E" font-size="13">
      PII 扫描不做，你发给 LLM 的「报错片段」里可能夹着邮箱、手机号、Cook
    </text>

    <!-- Tags -->
    <g>
      <rect x="70" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="113" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12">PII 扫描</text>

      <rect x="166" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="209" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12">日志脱敏</text>

      <rect x="262" y="238" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="305" y="255" text-anchor="middle" fill="#D6D3D1" font-size="12">LLM 安全</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom only; must be right of tags and not overlap text) -->
  <g opacity="0.24" fill="none" stroke="#EA580C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield -->
    <path d="M560 194 L590 206 L590 232 C590 252 576 266 560 272 C544 266 530 252 530 232 L530 206 Z"/>
    <path d="M548 234 L557 244 L575 224"/>

    <!-- Small magnifier -->
    <circle cx="612" cy="238" r="16"/>
    <path d="M624 250 L636 262"/>
    <path d="M604 238 L620 238"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>