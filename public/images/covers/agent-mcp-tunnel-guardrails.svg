<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- subtle paper grain -->
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1.2" fill="#D6D3D1"/>
      <circle cx="34" cy="22" r="0.9" fill="#D6D3D1"/>
      <circle cx="58" cy="14" r="1.1" fill="#D6D3D1"/>
      <circle cx="86" cy="26" r="0.8" fill="#D6D3D1"/>
      <circle cx="104" cy="18" r="1.0" fill="#D6D3D1"/>

      <circle cx="18" cy="48" r="0.9" fill="#D6D3D1"/>
      <circle cx="44" cy="56" r="1.2" fill="#D6D3D1"/>
      <circle cx="70" cy="44" r="0.8" fill="#D6D3D1"/>
      <circle cx="96" cy="64" r="1.1" fill="#D6D3D1"/>
      <circle cx="110" cy="52" r="0.7" fill="#D6D3D1"/>

      <circle cx="10" cy="86" r="1.0" fill="#D6D3D1"/>
      <circle cx="30" cy="100" r="0.8" fill="#D6D3D1"/>
      <circle cx="56" cy="92" r="1.2" fill="#D6D3D1"/>
      <circle cx="78" cy="108" r="0.9" fill="#D6D3D1"/>
      <circle cx="102" cy="96" r="1.1" fill="#D6D3D1"/>
    </pattern>

    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei", Arial, sans-serif; font-weight: 700; font-size: 22px; fill: #FAFAF9; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei", Arial, sans-serif; font-weight: 400; font-size: 13px; fill: #A8A29E; }
      .tagText { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft YaHei", Arial, sans-serif; font-weight: 600; font-size: 12px; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)" opacity="0.06"/>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Text block (x from 70 to ~600) -->
  <text class="title" x="70" y="88">
    <tspan x="70" dy="0">Agent 连生产怕翻车？</tspan>
    <tspan x="70" dy="28">用 MCP tunnel 收紧通道</tspan>
  </text>

  <text class="subtitle" x="70" y="152">
    Agent 连生产系统最怕的不是不够聪明，而是网络、权限、凭证一旦出界就很难收拾
  </text>

  <!-- Tag capsules (bottom area y≈240-260) -->
  <g>
    <rect x="70" y="242" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="113" y="258" text-anchor="middle">MCP tunnel</text>

    <rect x="166" y="242" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="209" y="258" text-anchor="middle">最小权限</text>

    <rect x="262" y="242" width="88" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="306" y="258" text-anchor="middle">自托管沙箱</text>
  </g>

  <!-- Decorative elements (right-bottom corner only; to the right of tags; x≥480,y≥180) -->
  <g opacity="0.22" fill="none" stroke="#EA580C" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- "tunnel" icon -->
    <path d="M500 268 C500 226, 536 196, 576 196 C616 196, 648 226, 648 268" />
    <path d="M516 268 C516 238, 542 218, 576 218 C610 218, 632 238, 632 268" />
    <path d="M560 268 L560 236" />
    <path d="M592 268 L592 236" />
  </g>

  <g opacity="0.22" fill="none" stroke="#A8A29E" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">
    <!-- small lock icon -->
    <rect x="582" y="205" width="48" height="40" rx="8"/>
    <path d="M596 205 v-10 c0-10 8-18 18-18 s18 8 18 18 v10"/>
    <path d="M606 226 h0"/>
    <path d="M606 226 c0 6 10 6 10 0 c0-6-10-6-10 0"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>