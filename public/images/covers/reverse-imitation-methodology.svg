<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3F4A3C"/>
      <stop offset="100%" style="stop-color:#1A2218"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B9A6D"/>
      <stop offset="100%" style="stop-color:#6B7A4E"/>
    </linearGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <!-- 纹理 -->
  <rect width="660" height="300" filter="url(#grain)" fill="#A8B89A"/>
  
  <!-- 左侧强调线 -->
  <rect x="50" y="40" width="5" height="220" fill="url(#accentGrad)" opacity="0.8"/>
  
  <!-- 标题 -->
  <text x="70" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#F0F4EC" letter-spacing="0.5">
    <tspan x="70" dy="0">别抄好产品了：</tspan>
    <tspan x="70" dy="28">反向模仿烂产品</tspan>
    <tspan x="70" dy="28">才是独立开发者的蓝海</tspan>
  </text>
  
  <!-- 副标题 -->
  <text x="70" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A8B89A">
    <tspan>人人都在抄 Notion、抄 Linear，但有人靠模仿</tspan>
    <tspan x="70" dy="16">「老年养生号」的风格反向劝导父母，火遍全网</tspan>
  </text>
  
  <!-- 标签胶囊 -->
  <g transform="translate(70, 245)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#5A664F" opacity="0.4"/>
    <text x="40" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D4DEC8" text-anchor="middle">独立开发</text>
  </g>
  
  <g transform="translate(160, 245)">
    <rect x="0" y="0" width="70" height="24" rx="4" fill="#5A664F" opacity="0.4"/>
    <text x="35" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D4DEC8" text-anchor="middle">反向思维</text>
  </g>
  
  <g transform="translate(240, 245)">
    <rect x="0" y="0" width="80" height="24" rx="4" fill="#5A664F" opacity="0.4"/>
    <text x="40" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D4DEC8" text-anchor="middle">产品策略</text>
  </g>
  
  <!-- 右下角装饰元素：反向箭头与创新思维 -->
  <g transform="translate(520, 180)" opacity="0.2">
    <!-- 圆环 -->
    <circle cx="35" cy="35" r="30" fill="none" stroke="#8B9A6D" stroke-width="3"/>
    <!-- 反向箭头 -->
    <path d="M50 20 L25 35 L50 50" fill="none" stroke="#8B9A6D" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 小圆点 -->
    <circle cx="20" cy="35" r="4" fill="#F0F4EC"/>
  </g>
  
  <g transform="translate(580, 200)" opacity="0.12">
    <!-- 创新闪电 -->
    <path d="M25 5 L10 25 L20 25 L15 45 L40 20 L28 20 L35 5 Z" fill="#F0F4EC"/>
  </g>
  
  <!-- 底部色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>