<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#57534E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#292524;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D6D3D1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8A29E;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="2" fill="#A8A29E"/>
    <circle cx="280" cy="90" r="1.5" fill="#A8A29E"/>
    <circle cx="450" cy="65" r="2" fill="#A8A29E"/>
    <circle cx="190" cy="140" r="1.5" fill="#A8A29E"/>
    <circle cx="380" cy="180" r="2" fill="#A8A29E"/>
    <circle cx="520" cy="120" r="1.5" fill="#A8A29E"/>
    <circle cx="150" cy="220" r="2" fill="#A8A29E"/>
    <circle cx="340" cy="250" r="1.5" fill="#A8A29E"/>
  </g>
  
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>
  
  <text x="70" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">别抄好产品了：反向模仿烂产品，</tspan>
    <tspan x="70" dy="28">才是独立开发者的蓝海</tspan>
  </text>
  
  <text x="70" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A8A29E">
    人人都在抄 Notion、抄 Linear，但有人靠模仿「老年养生号」的风格反向
  </text>
  
  <rect x="70" y="245" width="85" height="24" rx="12" fill="#78716C" opacity="0.4"/>
  <text x="112.5" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">反向思维</text>
  
  <rect x="165" y="245" width="75" height="24" rx="12" fill="#78716C" opacity="0.4"/>
  <text x="202.5" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">蓝海策略</text>
  
  <rect x="250" y="245" width="75" height="24" rx="12" fill="#78716C" opacity="0.4"/>
  <text x="287.5" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">产品创新</text>
  
  <g opacity="0.2">
    <path d="M 530 210 L 560 210 L 545 240 Z" fill="none" stroke="#D6D3D1" stroke-width="2"/>
    <circle cx="545" cy="260" r="15" fill="none" stroke="#A8A29E" stroke-width="2"/>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>