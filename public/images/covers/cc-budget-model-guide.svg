<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture dots -->
  <g fill="#D6D3D1" opacity="0.06">
    <circle cx="90" cy="22" r="1.2"/><circle cx="140" cy="48" r="1"/><circle cx="200" cy="15" r="1.4"/>
    <circle cx="260" cy="38" r="1.1"/><circle cx="330" cy="20" r="1.3"/><circle cx="400" cy="44" r="1"/>
    <circle cx="460" cy="12" r="1.2"/><circle cx="520" cy="35" r="1.4"/><circle cx="590" cy="22" r="1"/>
    <circle cx="630" cy="50" r="1.2"/><circle cx="75" cy="75" r="1.1"/><circle cx="160" cy="90" r="1.3"/>
    <circle cx="230" cy="68" r="1"/><circle cx="310" cy="85" r="1.2"/><circle cx="390" cy="72" r="1.4"/>
    <circle cx="450" cy="95" r="1.1"/><circle cx="540" cy="78" r="1"/><circle cx="610" cy="88" r="1.3"/>
    <circle cx="105" cy="130" r="1"/><circle cx="180" cy="118" r="1.2"/><circle cx="250" cy="140" r="1.4"/>
    <circle cx="340" cy="125" r="1.1"/><circle cx="410" cy="142" r="1"/><circle cx="475" cy="115" r="1.3"/>
    <circle cx="555" cy="135" r="1.2"/><circle cx="625" cy="120" r="1"/>
    <circle cx="88" cy="170" r="1.3"/><circle cx="155" cy="185" r="1"/><circle cx="225" cy="165" r="1.2"/>
    <circle cx="295" cy="178" r="1.4"/><circle cx="365" cy="190" r="1.1"/><circle cx="430" cy="172" r="1"/>
    <circle cx="500" cy="188" r="1.3"/><circle cx="570" cy="162" r="1.2"/><circle cx="635" cy="180" r="1"/>
    <circle cx="112" cy="220" r="1.1"/><circle cx="195" cy="210" r="1.4"/><circle cx="270" cy="228" r="1"/>
    <circle cx="345" cy="215" r="1.2"/><circle cx="415" cy="232" r="1.3"/>
    <circle cx="82" cy="268" r="1"/><circle cx="165" cy="255" r="1.2"/><circle cx="240" cy="272" r="1.4"/>
    <circle cx="320" cy="258" r="1.1"/><circle cx="385" cy="270" r="1"/>
  </g>

  <!-- Left accent bar -->
  <rect x="50" y="40" width="4" height="200" fill="url(#accentV)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-weight="700" font-size="22" fill="#FAFAF9">
    <tspan x="70" y="80">Claude Code 太烧钱，</tspan>
    <tspan x="70" dy="30">直到我学会往里塞别家模型</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" y="145">三个模型槽位的配置方法和搭配策略，账单砍大半</tspan>
  </text>

  <!-- Divider -->
  <line x1="70" y1="162" x2="420" y2="162" stroke="#57534E" stroke-width="1" opacity="0.5"/>

  <!-- Category -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="11" fill="#EA580C" font-weight="600" letter-spacing="1">
    <tspan x="70" y="186">上手指南</tspan>
  </text>

  <!-- Tags -->
  <rect x="70" y="218" width="90" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="115" y="234" text-anchor="middle">Claude Code</text>

  <rect x="170" y="218" width="72" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="206" y="234" text-anchor="middle">DeepSeek</text>

  <rect x="252" y="218" width="72" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="288" y="234" text-anchor="middle">模型搭配</text>

  <!-- Decorative: Engine/Gear icon -->
  <g transform="translate(510, 160)" opacity="0.20" stroke="#EA580C" stroke-width="1.5" fill="none">
    <!-- Outer gear -->
    <circle cx="30" cy="30" r="18"/>
    <line x1="30" y1="8" x2="30" y2="14" stroke-width="3" stroke-linecap="round"/>
    <line x1="30" y1="46" x2="30" y2="52" stroke-width="3" stroke-linecap="round"/>
    <line x1="8" y1="30" x2="14" y2="30" stroke-width="3" stroke-linecap="round"/>
    <line x1="46" y1="30" x2="52" y2="30" stroke-width="3" stroke-linecap="round"/>
    <line x1="14.4" y1="14.4" x2="18.6" y2="18.6" stroke-width="3" stroke-linecap="round"/>
    <line x1="41.4" y1="41.4" x2="45.6" y2="45.6" stroke-width="3" stroke-linecap="round"/>
    <line x1="41.4" y1="14.4" x2="45.6" y2="18.6" stroke-width="3" stroke-linecap="round" transform="rotate(90 43.5 16.5)"/>
    <line x1="14.4" y1="41.4" x2="18.6" y2="45.6" stroke-width="3" stroke-linecap="round" transform="rotate(90 16.5 43.5)"/>
    <!-- Inner circle -->
    <circle cx="30" cy="30" r="8" stroke="#F59E0B"/>
  </g>

  <!-- Decorative: small swap arrows -->
  <g transform="translate(580, 195)" opacity="0.18" stroke="#F59E0B" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0,10 L20,10"/>
    <polyline points="15,5 20,10 15,15"/>
    <path d="M25,22 L5,22"/>
    <polyline points="10,17 5,22 10,27"/>
  </g>

  <!-- Decorative: three dots representing slots -->
  <g transform="translate(600, 240)" opacity="0.15">
    <circle cx="0" cy="0" r="4" fill="#EA580C"/>
    <circle cx="16" cy="0" r="4" fill="#F59E0B"/>
    <circle cx="32" cy="0" r="4" fill="#A8A29E"/>
  </g>

  <!-- Watermark -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="9" fill="#A8A29E" opacity="0.5" x="605" y="278" text-anchor="end">Clawbie.Blog</text>

  <!-- Bottom bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
