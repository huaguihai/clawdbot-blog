<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="预发布获客：AI 产品没上线先攒名单 封面">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78350F"/>
      <stop offset="1" stop-color="#451A03"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>

  <!-- Paper-like texture (opacity 0.06) -->
  <g fill="#D6A456" opacity="0.06">
    <circle cx="34" cy="44" r="1.2"/><circle cx="78" cy="28" r="1.0"/><circle cx="120" cy="56" r="1.4"/>
    <circle cx="170" cy="36" r="1.1"/><circle cx="214" cy="68" r="1.3"/><circle cx="256" cy="30" r="1.0"/>
    <circle cx="298" cy="72" r="1.5"/><circle cx="342" cy="40" r="1.1"/><circle cx="390" cy="60" r="1.2"/>
    <circle cx="438" cy="34" r="1.0"/><circle cx="482" cy="66" r="1.4"/><circle cx="526" cy="38" r="1.1"/>
    <circle cx="570" cy="74" r="1.6"/><circle cx="618" cy="48" r="1.2"/>

    <circle cx="52" cy="112" r="1.4"/><circle cx="96" cy="96" r="1.0"/><circle cx="138" cy="128" r="1.3"/>
    <circle cx="186" cy="104" r="1.1"/><circle cx="232" cy="136" r="1.5"/><circle cx="276" cy="110" r="1.1"/>
    <circle cx="320" cy="142" r="1.4"/><circle cx="366" cy="100" r="1.0"/><circle cx="412" cy="132" r="1.3"/>
    <circle cx="456" cy="108" r="1.1"/><circle cx="502" cy="144" r="1.6"/><circle cx="548" cy="116" r="1.1"/>
    <circle cx="596" cy="140" r="1.4"/><circle cx="634" cy="104" r="1.0"/>

    <circle cx="40" cy="188" r="1.2"/><circle cx="84" cy="172" r="1.0"/><circle cx="126" cy="204" r="1.4"/>
    <circle cx="172" cy="178" r="1.1"/><circle cx="218" cy="210" r="1.5"/><circle cx="262" cy="182" r="1.0"/>
    <circle cx="306" cy="216" r="1.6"/><circle cx="352" cy="174" r="1.1"/><circle cx="396" cy="206" r="1.3"/>
    <circle cx="442" cy="184" r="1.0"/><circle cx="486" cy="220" r="1.6"/><circle cx="532" cy="190" r="1.1"/>
    <circle cx="578" cy="214" r="1.4"/><circle cx="626" cy="186" r="1.0"/>

    <circle cx="64" cy="258" r="1.5"/><circle cx="108" cy="244" r="1.1"/><circle cx="150" cy="270" r="1.3"/>
    <circle cx="198" cy="248" r="1.0"/><circle cx="244" cy="276" r="1.4"/><circle cx="288" cy="250" r="1.1"/>
    <circle cx="334" cy="282" r="1.6"/><circle cx="378" cy="246" r="1.0"/><circle cx="424" cy="270" r="1.2"/>
    <circle cx="468" cy="252" r="1.0"/><circle cx="512" cy="284" r="1.5"/><circle cx="556" cy="260" r="1.1"/>
    <circle cx="602" cy="276" r="1.3"/><circle cx="640" cy="244" r="1.0"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>

  <!-- Text layer (x from 70, can span to 600) -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Microsoft YaHei', sans-serif">
    <!-- Title -->
    <text x="70" y="92" fill="#FEFCE8" font-size="22" font-weight="700">
      <tspan x="70" dy="0">预发布获客：AI 产品</tspan>
      <tspan x="70" dy="28">没上线先攒名单</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="154" fill="#D6A456" font-size="13" font-weight="500">
      预发布获客不是发推求转发，而是把想法做成「可交付承诺 + 排队机制」。这篇给你一
    </text>

    <!-- Tags (bottom area y≈240-260) -->
    <g>
      <rect x="70" y="238" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="113" y="255" text-anchor="middle" fill="#FDE68A" font-size="12" font-weight="600">预发布</text>

      <rect x="166" y="238" width="88" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="210" y="255" text-anchor="middle" fill="#FDE68A" font-size="12" font-weight="600">等待名单</text>

      <rect x="264" y="238" width="74" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="301" y="255" text-anchor="middle" fill="#FDE68A" font-size="12" font-weight="600">漏斗</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom corner only, x>=480,y>=180; must be to the right of tags) -->
  <g opacity="0.22" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clipboard icon -->
    <path d="M520 192 h70 a8 8 0 0 1 8 8 v74 a8 8 0 0 1-8 8 h-70 a8 8 0 0 1-8-8 v-74 a8 8 0 0 1 8-8 z" opacity="0.18"/>
    <path d="M540 192 v-8 a8 8 0 0 1 8-8 h14 a8 8 0 0 1 8 8 v8" />
    <path d="M532 220 h54" />
    <path d="M532 238 h40" />
    <path d="M532 256 h46" />

    <!-- Queue / funnel arrow -->
    <path d="M602 232 c18 0 18 24 0 24 h-18" />
    <path d="M588 248 l-10 8 l10 8" />
  </g>

  <g opacity="0.18" stroke="#D6A456" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#soft)">
    <!-- Minimal funnel glyph -->
    <path d="M604 188 h40" />
    <path d="M608 188 l14 18 v18 l12 10 v18" />
    <path d="M640 188 l-14 18" />
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>