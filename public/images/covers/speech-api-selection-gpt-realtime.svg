<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="语音 API 选型：别急着做 AI 助手">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Subtle paper texture -->
    <pattern id="grain" width="140" height="140" patternUnits="userSpaceOnUse">
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="18" cy="22" r="1.2"/>
        <circle cx="46" cy="18" r="1.0"/>
        <circle cx="74" cy="28" r="1.4"/>
        <circle cx="112" cy="20" r="1.1"/>
        <circle cx="130" cy="34" r="0.9"/>

        <circle cx="22" cy="62" r="1.1"/>
        <circle cx="54" cy="74" r="0.9"/>
        <circle cx="86" cy="58" r="1.3"/>
        <circle cx="118" cy="72" r="1.0"/>
        <circle cx="136" cy="86" r="1.2"/>

        <circle cx="14" cy="108" r="1.0"/>
        <circle cx="40" cy="120" r="1.4"/>
        <circle cx="78" cy="110" r="0.9"/>
        <circle cx="104" cy="126" r="1.1"/>
        <circle cx="132" cy="118" r="1.0"/>
      </g>
    </pattern>

    <style>
      .title { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif; font-weight: 700; font-size: 22px; fill: #FAFAF9; }
      .subtitle { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif; font-weight: 500; font-size: 13px; fill: #A8A29E; }
      .tagText { font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif; font-weight: 600; font-size: 12px; fill: #D6D3D1; letter-spacing: 0.2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="26" width="5" height="248" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text block (x >= 70; no graphics in this region) -->
  <g transform="translate(70,78)">
    <text class="title">
      <tspan x="0" y="0">语音 API 选型：</tspan>
      <tspan x="0" dy="28">别急着做 AI 助手</tspan>
    </text>

    <text class="subtitle" x="0" y="56">
      语音 API 选型最怕一上来就堆「实时对话」，结果账单飞起还不稳定。本文用 GP
    </text>
  </g>

  <!-- Tags (bottom area, kept left so decorations stay to the right) -->
  <g>
    <g transform="translate(70,242)">
      <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="43" y="16" text-anchor="middle">GPT‑Realtime</text>
    </g>

    <g transform="translate(166,242)">
      <rect x="0" y="0" width="74" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="37" y="16" text-anchor="middle">Whisper</text>
    </g>

    <g transform="translate(250,242)">
      <rect x="0" y="0" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="41" y="16" text-anchor="middle">成本边界</text>
    </g>
  </g>

  <!-- Decorations (RIGHT-BOTTOM ONLY, x>=480 & y>=180; right of tags; no overlap with any text) -->
  <g opacity="0.22" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Simple microphone icon -->
    <g transform="translate(500,190)" stroke="#A8A29E" stroke-width="2.2">
      <rect x="22" y="8" width="20" height="34" rx="10"/>
      <path d="M16 28c0 12 32 12 32 0"/>
      <path d="M32 40v12"/>
      <path d="M22 52h20"/>
      <path d="M32 8v0"/>
    </g>

    <!-- Minimal waveform tile -->
    <g transform="translate(574,204)" stroke="#EA580C" stroke-width="2.2">
      <path d="M0 34v-10"/>
      <path d="M10 34v-18"/>
      <path d="M20 34v-26"/>
      <path d="M30 34v-14"/>
      <path d="M40 34v-22"/>
      <path d="M50 34v-12"/>
      <rect x="-10" y="8" width="78" height="44" rx="10" stroke="#A8A29E" opacity="0.9"/>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>