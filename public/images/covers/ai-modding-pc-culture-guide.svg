<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44403C" />
      <stop offset="100%" stop-color="#1C1917" />
    </linearGradient>
    <linearGradient id="acc_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EA580C" />
      <stop offset="100%" stop-color="#F59E0B" />
    </linearGradient>
    <pattern id="grain" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#D6D3D1" opacity="0.06" />
      <circle cx="15" cy="10" r="1.2" fill="#D6D3D1" opacity="0.06" />
      <circle cx="25" cy="30" r="0.8" fill="#D6D3D1" opacity="0.06" />
      <circle cx="35" cy="15" r="1" fill="#D6D3D1" opacity="0.06" />
    </pattern>
  </defs>

  <!-- 背景层 -->
  <rect width="660" height="300" fill="url(#bg_grad)" />
  <rect width="660" height="300" fill="url(#grain)" />

  <!-- 左侧强调线 -->
  <rect x="50" y="60" width="4" height="150" rx="2" fill="url(#acc_grad)" />

  <!-- 文字层 -->
  <text x="70" y="90" font-family="Source Han Sans SC, Inter, system-ui, sans-serif" font-weight="bold" font-size="22" fill="#FAFAF9">
    <tspan x="70" dy="0">AI 调优正在「装机猿化」：</tspan>
    <tspan x="70" dy="32">与其追求模型智商，不如折腾这套物理外挂</tspan>
  </text>
  
  <text x="70" y="170" font-family="Source Han Sans SC, Inter, sans-serif" font-size="13" fill="#A8A29E">
    大模型性能撞墙后，AI 玩家开始复刻 20 年前的 PC DIY 狂热。本地运行
  </text>

  <!-- 标签胶囊 -->
  <g transform="translate(70, 240)">
    <rect width="75" height="24" rx="12" fill="#57534E" opacity="0.4" />
    <text x="37.5" y="16" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">AI 调优</text>
    
    <rect x="85" width="85" height="24" rx="12" fill="#57534E" opacity="0.4" />
    <text x="127.5" y="16" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">硬件 DIY</text>
    
    <rect x="180" width="85" height="24" rx="12" fill="#57534E" opacity="0.4" />
    <text x="222.5" y="16" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">本地模型</text>
  </g>

  <!-- 装饰元素（右下角） -->
  <g transform="translate(540, 200)" opacity="0.2">
    <!-- 模拟芯片/电路装饰 -->
    <rect x="0" y="0" width="50" height="50" fill="none" stroke="#EA580C" stroke-width="1.5" />
    <path d="M10 0 V-10 M25 0 V-10 M40 0 V-10 M50 10 H60 M50 25 H60 M50 40 H60" stroke="#EA580C" stroke-width="1.5" />
    <circle cx="25" cy="25" r="10" stroke="#A8A29E" stroke-width="1" fill="none" />
    <path d="M15 25 H35 M25 15 V35" stroke="#A8A29E" stroke-width="1" />
  </g>

  <!-- 底部色条 -->
  <rect y="293" width="660" height="7" fill="url(#acc_grad)" />
</svg>