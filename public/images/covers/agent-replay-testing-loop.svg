<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- subtle paper-grain texture -->
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="12" cy="18" r="1.2"/>
        <circle cx="34" cy="22" r="0.9"/>
        <circle cx="58" cy="14" r="1.0"/>
        <circle cx="83" cy="28" r="1.3"/>
        <circle cx="102" cy="18" r="0.8"/>
        <circle cx="18" cy="46" r="0.8"/>
        <circle cx="44" cy="54" r="1.2"/>
        <circle cx="70" cy="48" r="0.9"/>
        <circle cx="94" cy="58" r="1.1"/>
        <circle cx="110" cy="44" r="0.9"/>
        <circle cx="10" cy="78" r="1.0"/>
        <circle cx="28" cy="92" r="0.8"/>
        <circle cx="52" cy="86" r="1.3"/>
        <circle cx="76" cy="98" r="0.9"/>
        <circle cx="98" cy="88" r="1.2"/>
        <circle cx="114" cy="104" r="0.8"/>
        <circle cx="22" cy="112" r="0.9"/>
        <circle cx="60" cy="114" r="0.8"/>
        <circle cx="88" cy="112" r="1.1"/>
      </g>
    </pattern>

    <style>
      .title { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif; font-weight: 800; font-size: 22px; fill: #FAFAF9; }
      .sub   { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif; font-weight: 500; font-size: 13px; fill: #A8A29E; }
      .tagText { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Hiragino Sans GB","Microsoft YaHei", Arial, sans-serif; font-weight: 600; font-size: 12px; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="34" width="5" height="232" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text layer (x from 70 to 600) -->
  <g>
    <text class="title" x="70" y="92">
      <tspan x="70" dy="0">Agent 线上怎么测？</tspan>
      <tspan x="70" dy="28">用回放集把不可控</tspan>
      <tspan x="70" dy="28">变可控</tspan>
    </text>

    <text class="sub" x="70" y="188">
      Agent线上怎么测，才能不靠祈祷上线？与其追求「永不出错」，不如用回放+评分+
    </text>
  </g>

  <!-- Tag pills (bottom area y ≈ 240-260), kept left so decorations can sit to the right -->
  <g>
    <g transform="translate(70,238)">
      <rect x="0" y="0" width="84" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="42" y="16" text-anchor="middle">回放集</text>
    </g>

    <g transform="translate(164,238)">
      <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="43" y="16" text-anchor="middle">LLM评分</text>
    </g>

    <g transform="translate(260,238)">
      <rect x="0" y="0" width="90" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="45" y="16" text-anchor="middle">影子灰度</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom only, and to the right of tags; no overlap with any text) -->
  <g opacity="0.22" stroke="#EA580C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Replay icon -->
    <g transform="translate(505,188)">
      <path d="M26 16a16 16 0 1 1-4 30"/>
      <path d="M9 38l13 8-3-15"/>
      <path d="M14 16h12"/>
    </g>

    <!-- Check-in-a-box icon -->
    <g transform="translate(565,200)" opacity="0.26" stroke="#A8A29E">
      <rect x="0" y="0" width="56" height="56" rx="10"/>
      <path d="M16 29l8 8 18-20"/>
      <path d="M14 14h18"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>