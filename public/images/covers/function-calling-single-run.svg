<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture dots -->
  <g fill="#D6D3D1" opacity="0.06">
    <circle cx="30" cy="20" r="1.5"/>
    <circle cx="80" cy="45" r="1"/>
    <circle cx="140" cy="15" r="1.5"/>
    <circle cx="200" cy="60" r="1"/>
    <circle cx="260" cy="30" r="1.5"/>
    <circle cx="320" cy="10" r="1"/>
    <circle cx="380" cy="50" r="1.5"/>
    <circle cx="440" cy="25" r="1"/>
    <circle cx="500" cy="55" r="1.5"/>
    <circle cx="560" cy="18" r="1"/>
    <circle cx="620" cy="40" r="1.5"/>
    <circle cx="50" cy="90" r="1"/>
    <circle cx="110" cy="110" r="1.5"/>
    <circle cx="170" cy="80" r="1"/>
    <circle cx="230" cy="120" r="1.5"/>
    <circle cx="290" cy="95" r="1"/>
    <circle cx="350" cy="75" r="1.5"/>
    <circle cx="410" cy="105" r="1"/>
    <circle cx="470" cy="85" r="1.5"/>
    <circle cx="530" cy="115" r="1"/>
    <circle cx="590" cy="70" r="1.5"/>
    <circle cx="640" cy="100" r="1"/>
    <circle cx="20" cy="150" r="1.5"/>
    <circle cx="90" cy="170" r="1"/>
    <circle cx="160" cy="145" r="1.5"/>
    <circle cx="220" cy="180" r="1"/>
    <circle cx="300" cy="155" r="1.5"/>
    <circle cx="360" cy="175" r="1"/>
    <circle cx="430" cy="160" r="1.5"/>
    <circle cx="490" cy="185" r="1"/>
    <circle cx="550" cy="140" r="1.5"/>
    <circle cx="610" cy="165" r="1"/>
    <circle cx="655" cy="200" r="1.5"/>
    <circle cx="70" cy="220" r="1"/>
    <circle cx="130" cy="240" r="1.5"/>
    <circle cx="190" cy="210" r="1"/>
    <circle cx="250" cy="250" r="1.5"/>
    <circle cx="310" cy="225" r="1"/>
    <circle cx="370" cy="245" r="1.5"/>
    <circle cx="600" cy="230" r="1"/>
    <circle cx="635" cy="255" r="1.5"/>
    <circle cx="45" cy="275" r="1"/>
    <circle cx="120" cy="285" r="1.5"/>
    <circle cx="200" cy="270" r="1"/>
    <circle cx="330" cy="280" r="1.5"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="40" width="4" height="220" fill="url(#accentV)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-weight="bold" font-size="22" fill="#FAFAF9">
    <tspan x="70" dy="0" y="90">Function Calling 别堆工具：</tspan>
    <tspan x="70" dy="32">一个 run 命令更稳</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" y="168">工具越堆越难用，用单一 run 命令 + CLI 管道重做 Agent 工具层</tspan>
  </text>

  <!-- Category label -->
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="11" fill="#EA580C" font-weight="bold">
    <tspan x="70" y="200">上手指南</tspan>
  </text>

  <!-- Tags -->
  <rect x="70" y="228" width="88" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">
    <tspan x="114" y="244">Function Calling</tspan>
  </text>

  <rect x="168" y="228" width="72" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">
    <tspan x="204" y="244">Agent 工程</tspan>
  </text>

  <rect x="250" y="228" width="60" height="24" rx="12" fill="#57534E" fill-opacity="0.4"/>
  <text font-family="'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">
    <tspan x="280" y="244">CLI 工具</tspan>
  </text>

  <!-- Decorative elements: right-bottom corner only (x>=480, y>=180) -->
  <!-- Terminal window outline -->
  <g opacity="0.22" transform="translate(490, 185)">
    <rect x="0" y="0" width="72" height="52" rx="5" fill="none" stroke="#EA580C" stroke-width="1.8"/>
    <line x1="0" y1="14" x2="72" y2="14" stroke="#EA580C" stroke-width="1.4"/>
    <circle cx="10" cy="7" r="3" fill="none" stroke="#EA580C" stroke-width="1.4"/>
    <circle cx="22" cy="7" r="3" fill="none" stroke="#EA580C" stroke-width="1.4"/>
    <circle cx="34" cy="7" r="3" fill="none" stroke="#EA580C" stroke-width="1.4"/>
    <!-- prompt lines -->
    <line x1="8" y1="26" x2="14" y2="26" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="17" y1="26" x2="50" y2="26" stroke="#EA580C" stroke-width="1.2"/>
    <line x1="8" y1="36" x2="14" y2="36" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="17" y1="36" x2="44" y2="36" stroke="#EA580C" stroke-width="1.2"/>
    <line x1="8" y1="46" x2="14" y2="46" stroke="#F59E0B" stroke-width="1.5"/>
    <line x1="17" y1="46" x2="38" y2="46" stroke="#EA580C" stroke-width="1.2"/>
  </g>

  <!-- Pipe symbol decoration -->
  <g opacity="0.18" transform="translate(580, 200)">
    <text font-family="'Courier New', monospace" font-size="38" fill="#F59E0B" font-weight="bold">|</text>
  </g>

  <!-- Small gear/cog hint: circle with ticks -->
  <g opacity="0.15" transform="translate(612, 218)">
    <circle cx="16" cy="16" r="10" fill="none" stroke="#A8A29E" stroke-width="1.6"/>
    <circle cx="16" cy="16" r="4" fill="none" stroke="#A8A29E" stroke-width="1.4"/>
    <line x1="16" y1="4" x2="16" y2="8" stroke="#A8A29E" stroke-width="1.6"/>
    <line x1="16" y1="24" x2="16" y2="28" stroke="#A8A29E" stroke-width="1.6"/>
    <line x1="4" y1="16" x2="8" y2="16" stroke="#A8A29E" stroke-width="1.6"/>
    <line x1="24" y1="16" x2="28" y2="16" stroke="#A8A29E" stroke-width="1.6"/>
    <line x1="7.5" y1="7.5" x2="10.3" y2="10.3" stroke="#A8A29E" stroke-width="1.4"/>
    <line x1="21.7" y1="21.7" x2="24.5" y2="24.5" stroke="#A8A29E" stroke-width="1.4"/>
    <line x1="24.5" y1="7.5" x2="21.7" y2="10.3" stroke="#A8A29E" stroke-width="1.4"/>
    <line x1="10.3" y1="21.7" x2="7.5" y2="24.5" stroke="#A8A29E" stroke-width="1.4"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)" rx="0"/>
</svg>