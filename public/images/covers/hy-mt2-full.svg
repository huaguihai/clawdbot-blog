<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>

    <!-- Accent gradient (left line + bottom bar) -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Paper-like grain texture -->
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="12" cy="18" r="1.2"/>
        <circle cx="28" cy="42" r="0.9"/>
        <circle cx="54" cy="26" r="1.0"/>
        <circle cx="78" cy="14" r="0.8"/>
        <circle cx="102" cy="34" r="1.1"/>
        <circle cx="18" cy="72" r="0.8"/>
        <circle cx="40" cy="88" r="1.1"/>
        <circle cx="66" cy="74" r="0.9"/>
        <circle cx="92" cy="96" r="1.2"/>
        <circle cx="110" cy="78" r="0.8"/>
        <circle cx="8" cy="106" r="1.0"/>
        <circle cx="34" cy="112" r="0.8"/>
        <circle cx="58" cy="106" r="1.1"/>
        <circle cx="86" cy="114" r="0.9"/>
        <circle cx="112" cy="110" r="1.0"/>
        <circle cx="20" cy="10" r="0.7"/>
        <circle cx="48" cy="50" r="0.7"/>
        <circle cx="70" cy="44" r="0.7"/>
        <circle cx="96" cy="58" r="0.7"/>
        <circle cx="24" cy="94" r="0.7"/>
        <circle cx="74" cy="92" r="0.7"/>
        <circle cx="104" cy="16" r="0.7"/>
        <circle cx="6" cy="56" r="0.7"/>
      </g>
    </pattern>

    <style>
      .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-weight: 700; font-size: 22px; fill: #FAFAF9; }
      .subtitle { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-weight: 500; font-size: 13px; fill: #A8A29E; }
      .tagText { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans CJK SC",Arial,sans-serif; font-weight: 600; font-size: 12px; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="18" width="5" height="260" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text block (x from 70 to 600) -->
  <text x="70" y="78" class="title">
    <tspan x="70" dy="0">Hy-MT2 把翻译 API</tspan>
    <tspan x="70" dy="28">账单打下来了</tspan>
  </text>

  <text x="70" y="136" class="subtitle">
    Hy-MT2 把翻译 API 成本这道坎，第一次压到独立开发者也能认真考虑「本地
  </text>

  <!-- Tags (bottom area y≈240-260) -->
  <g>
    <rect x="70" y="240" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="111" y="257" text-anchor="middle" class="tagText">本地翻译</text>

    <rect x="162" y="240" width="78" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="201" y="257" text-anchor="middle" class="tagText">API 成本</text>

    <rect x="250" y="240" width="78" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="289" y="257" text-anchor="middle" class="tagText">440MB</text>
  </g>

  <!-- Decorative elements (right-bottom corner only; must be to the right of tags) -->
  <!-- Keep decorations at x>=480 and y>=180; tags end at x=328, so safe -->
  <g opacity="0.22" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Simple "document + translate" icon -->
    <rect x="500" y="188" width="78" height="96" rx="10"/>
    <path d="M522 212h34M522 232h44M522 252h38" stroke="#A8A29E" opacity="0.9"/>
    <!-- small globe/arrow mark -->
    <circle cx="606" cy="252" r="24"/>
    <path d="M590 252h32M606 236v32M595 244c8 6 14 12 22 16M595 260c8-6 14-12 22-16"/>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>