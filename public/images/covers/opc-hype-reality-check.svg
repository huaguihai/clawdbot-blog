<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <!-- 背景渐变 -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    
    <!-- 强调线渐变 -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    
    <!-- 底部色条渐变 -->
    <linearGradient id="bottomGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    
    <!-- 插图渐变 -->
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F1F33"/>
    </linearGradient>
    
    <!-- 纸张纹理散点 -->
    <pattern id="texture" patternUnits="userSpaceOnUse" width="40" height="40">
      <circle cx="5" cy="5" r="1" fill="#D6A456" opacity="0.15"/>
      <circle cx="25" cy="12" r="0.8" fill="#D6A456" opacity="0.1"/>
      <circle cx="15" cy="30" r="1.2" fill="#D6A456" opacity="0.12"/>
      <circle cx="35" cy="25" r="0.6" fill="#D6A456" opacity="0.08"/>
      <circle cx="8" cy="35" r="0.9" fill="#D6A456" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  <rect width="660" height="300" fill="url(#texture)"/>

  <!-- 左侧内容组 -->
  <g transform="translate(50, 60)">
    <!-- 橙色强调线 -->
    <rect x="0" y="0" width="4" height="36" rx="2" fill="url(#accentGrad)"/>
    
    <!-- 标题 -->
    <text x="20" y="28" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FEFCE8" letter-spacing="-0.5">
      一人公司席卷 15 城
    </text>
    
    <!-- 副标题 -->
    <text x="20" y="58" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#D6A456">
      上一波「全民创业」的人，现在还好吗？
    </text>
    
    <!-- 标签胶囊 -->
    <g transform="translate(20, 80)">
      <!-- 标签1 -->
      <rect x="0" y="0" width="70" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="35" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FDE68A" text-anchor="middle">一人公司</text>
      
      <!-- 标签2 -->
      <rect x="80" y="0" width="54" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="107" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FDE68A" text-anchor="middle">创业</text>
      
      <!-- 标签3 -->
      <rect x="144" y="0" width="70" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="179" y="17" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#FDE68A" text-anchor="middle">造富神话</text>
    </g>
  </g>

  <!-- 右侧插图：一人公司 + 创业热潮 -->
  <g transform="translate(400, 50)">
    <!-- 背景框 -->
    <rect x="0" y="0" width="220" height="180" rx="8" fill="#451A03" opacity="0.5"/>
    
    <!-- 人物剪影（创业者） -->
    <circle cx="40" cy="120" r="18" fill="#FEFCE8" opacity="0.9"/>
    <path d="M15 180 L15 155 Q15 145 25 145 L55 145 Q65 145 65 155 L65 180" fill="#FEFCE8" opacity="0.9"/>
    
    <!-- 电脑桌 -->
    <rect x="80" y="130" width="120" height="8" rx="2" fill="#92400E"/>
    
    <!-- 电脑显示器 -->
    <rect x="100" y="70" width="80" height="55" rx="4" fill="url(#screenGrad)"/>
    <rect x="95" y="128" width="90" height="6" rx="2" fill="#5D4E37"/>
    <!-- 屏幕内容：增长曲线（造富神话） -->
    <polyline points="110,110 125,95 140,100 155,80 170,65" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="170" cy="65" r="3" fill="#22C55E"/>
    
    <!-- 屏幕上的文字标注 -->
    <text x="115" y="88" font-family="monospace" font-size="8" fill="#94A3B8">$200万</text>
    
    <!-- 金钱符号装饰 -->
    <text x="180" y="45" font-family="serif" font-size="24" fill="#F59E0B" opacity="0.8">$</text>
    
    <!-- 政策文件/补贴标识 -->
    <g transform="translate(145, 30)">
      <rect x="0" y="0" width="55" height="35" rx="3" fill="#FDE68A" opacity="0.9"/>
      <text x="27" y="15" font-family="sans-serif" font-size="7" fill="#78350F" text-anchor="middle" font-weight="bold">补贴</text>
      <text x="27" y="28" font-family="sans-serif" font-size="8" fill="#92400E" text-anchor="middle">100万</text>
    </g>
    
    <!-- 15城标签 -->
    <g transform="translate(10, 25)">
      <rect x="0" y="0" width="60" height="20" rx="10" fill="#F59E0B" opacity="0.8"/>
      <text x="30" y="14" font-family="sans-serif" font-size="10" fill="#451A03" text-anchor="middle" font-weight="bold">15城抢人</text>
    </g>
    
    <!-- AI助手图标（代表一人公司概念） -->
    <g transform="translate(160, 100)">
      <circle cx="12" cy="12" r="12" fill="#F59E0B" opacity="0.2"/>
      <circle cx="12" cy="12" r="6" fill="#F59E0B"/>
      <circle cx="4" cy="8" r="2" fill="#F59E0B"/>
      <circle cx="20" cy="8" r="2" fill="#F59E0B"/>
      <circle cx="4" cy="16" r="2" fill="#F59E0B"/>
      <circle cx="20" cy="16" r="2" fill="#F59E0B"/>
    </g>
    
    <!-- 底部装饰线 -->
    <line x1="10" y1="165" x2="210" y2="165" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,4" opacity="0.5"/>
  </g>

  <!-- 底部强调色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#bottomGrad)"/>
</svg>