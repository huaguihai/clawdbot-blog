<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" seed="2"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <!-- 纸张颗粒纹理 -->
  <rect width="660" height="300" filter="url(#noise)" opacity="0.06" fill="#D6A456"/>
  
  <!-- 左侧强调线 -->
  <rect x="50" y="50" width="4" height="200" rx="2" fill="url(#accentLine)"/>
  
  <!-- 标题 -->
  <text x="70" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="#FEFCE8">
    <tspan x="70" dy="0">语音 MVP 别靠 API：</tspan>
    <tspan x="70" dy="28">独立开发者的本地语音识别降本路径</tspan>
  </text>
  
  <!-- 副标题 -->
  <text x="70" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6A456">
    本地语音识别别再依赖云端 API 了。transcribe.cpp 基于 ggml，60+ 模型全平台支持
  </text>
  
  <!-- 标签胶囊 -->
  <g transform="translate(70, 240)">
    <rect x="0" y="0" width="68" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="34" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle">本地 ASR</text>
    
    <rect x="78" y="0" width="82" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="119" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle">transcribe.cpp</text>
    
    <rect x="170" y="0" width="76" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text x="208" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#FDE68A" text-anchor="middle">降本增效</text>
  </g>
  
  <!-- 右下角装饰：简笔声波图标 -->
  <g transform="translate(520, 190)" opacity="0.2">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
    <path d="M 14 20 Q 17 12 20 20 Q 23 28 26 20" fill="none" stroke="#F59E0B" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 8 20 Q 11 8 20 20 Q 29 32 32 20" fill="none" stroke="#D6A456" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 2 20 Q 5 2 20 20 Q 35 38 38 20" fill="none" stroke="#D6A456" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>
  
  <!-- 底部色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentLine)"/>
</svg>