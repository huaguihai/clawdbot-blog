<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="10" cy="18" r="1.2"/>
        <circle cx="26" cy="34" r="0.9"/>
        <circle cx="44" cy="22" r="1.0"/>
        <circle cx="62" cy="40" r="1.1"/>
        <circle cx="78" cy="16" r="0.8"/>
        <circle cx="96" cy="28" r="1.0"/>
        <circle cx="112" cy="20" r="0.9"/>

        <circle cx="14" cy="64" r="1.0"/>
        <circle cx="30" cy="78" r="0.8"/>
        <circle cx="50" cy="70" r="1.2"/>
        <circle cx="68" cy="88" r="0.9"/>
        <circle cx="86" cy="62" r="1.1"/>
        <circle cx="104" cy="82" r="0.8"/>

        <circle cx="8" cy="104" r="0.9"/>
        <circle cx="24" cy="110" r="1.1"/>
        <circle cx="42" cy="98" r="0.8"/>
        <circle cx="60" cy="112" r="1.0"/>
        <circle cx="76" cy="102" r="0.9"/>
        <circle cx="94" cy="108" r="1.2"/>
        <circle cx="112" cy="100" r="0.8"/>
      </g>
    </pattern>

    <style>
      .title { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #FAFAF9; }
      .sub { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #A8A29E; }
      .tagText { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 12.5px; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="28" width="5" height="244" fill="url(#accentGrad)"/>

  <!-- Text block (x from 70 to 600) -->
  <g>
    <text class="title" x="70" y="78">
      <tspan x="70" dy="0">Claude Prompt 不值钱，</tspan>
      <tspan x="70" dy="28">值钱的是行为说明书</tspan>
    </text>

    <text class="sub" x="70" y="148">
      Claude Prompt 为什么总是抄来抄去却做不出稳定产品？问题通常不在模型
    </text>
  </g>

  <!-- Tags (bottom area, y ≈ 240-260) -->
  <g>
    <g transform="translate(70, 240)">
      <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="43" y="16" text-anchor="middle">行为说明书</text>
    </g>

    <g transform="translate(166, 240)">
      <rect x="0" y="0" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="41" y="16" text-anchor="middle">Model Spec</text>
    </g>

    <g transform="translate(258, 240)">
      <rect x="0" y="0" width="78" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text class="tagText" x="39" y="16" text-anchor="middle">稳定产品</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom only, x ≥ 480, y ≥ 180; to the right of tags) -->
  <g opacity="0.22" stroke="#EA580C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Clipboard / SOP icon -->
    <g transform="translate(512, 184)">
      <rect x="0" y="8" width="78" height="96" rx="10"/>
      <path d="M24 8c0-6 4-8 15-8s15 2 15 8" />
      <rect x="22" y="0" width="34" height="18" rx="7"/>
      <path d="M18 34h44"/>
      <path d="M18 50h44"/>
      <path d="M18 66h44"/>
      <path d="M22 34l5 5 10-12"/>
      <path d="M22 50l5 5 10-12"/>
    </g>

    <!-- Small flow/rollback arrow (exception handling) -->
    <g transform="translate(604, 222)">
      <path d="M40 16c-4-10-14-16-26-14C2 4-4 16 2 26c6 10 18 12 28 6"/>
      <path d="M26 10l-10-8 0 12"/>
      <path d="M28 30l12 0 0-12"/>
    </g>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>