<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="22" r="1.8" fill="#D6D3D1"/>
      <circle cx="48" cy="8" r="1.2" fill="#D6D3D1"/>
      <circle cx="85" cy="65" r="2.1" fill="#D6D3D1"/>
      <circle cx="32" cy="98" r="1.4" fill="#D6D3D1"/>
      <circle cx="72" cy="38" r="0.9" fill="#D6D3D1"/>
      <circle cx="105" cy="75" r="1.6" fill="#D6D3D1"/>
      <circle cx="55" cy="112" r="1.1" fill="#D6D3D1"/>
      <circle cx="20" cy="55" r="1.3" fill="#D6D3D1"/>
      <circle cx="95" cy="25" r="1.0" fill="#D6D3D1"/>
      <circle cx="60" cy="50" r="1.5" fill="#D6D3D1"/>
    </pattern>
  </defs>

  <rect width="660" height="300" fill="url(#bgGrad)"/>
  <rect width="660" height="300" fill="url(#grain)" opacity="0.06"/>

  <rect x="50" y="0" width="5" height="300" fill="url(#lineGrad)"/>

  <g transform="translate(70, 95)">
    <text fill="#FAFAF9" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-weight="bold" font-size="22">
      <tspan x="0" dy="0">AI Agent 总报错？一套</tspan>
      <tspan x="0" dy="28">「门控+自愈」流水线</tspan>
      <tspan x="0" dy="28">搞定交付</tspan>
    </text>
    <text y="112" fill="#A8A29E" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13">
      结构化契约与自动修复回路，让 AI 流水线敢交付
    </text>
  </g>

  <g transform="translate(0, 240)">
    <rect x="70" y="0" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="111" y="16" fill="#D6D3D1" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">门控机制</text>

    <rect x="168" y="0" width="88" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="212" y="16" fill="#D6D3D1" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">自愈流水线</text>

    <rect x="272" y="0" width="92" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="318" y="16" fill="#D6D3D1" font-family="system-ui, sans-serif" font-size="12" text-anchor="middle">结构化契约</text>
  </g>

  <g transform="translate(510, 225)" opacity="0.22" stroke="#EA580C" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="0" cy="0" r="20" stroke-dasharray="7 5"/>
    <circle cx="0" cy="0" r="7"/>
    <path d="M0 -26 L0 -14 M0 14 L0 26 M-26 0 L-14 0 M14 0 L26 0"/>
    <g transform="translate(52, 12)">
      <path d="M -18 0 A 18 18 0 0 1 18 0" stroke-dasharray="4 4"/>
      <polygon points="14,-5 22,0 14,5" fill="#EA580C" stroke="none"/>
      <line x1="-18" y1="0" x2="-12" y2="0"/>
    </g>
  </g>

  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>