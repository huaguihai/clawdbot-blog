    <tspan x="70" dy="28">AI 找不到你：</tspan>
    <tspan x="70" dy="28">Agent 时代的</tspan>
    <tspan x="70" dy="28">SEO 生存指南</tspan>
  </text>
  
  <text x="70" y="175" font-family="Arial, sans-serif" font-size="14" fill="#A8A29E">你的网站对 Google 友好，但对 ChatGPT...</text>
  
  <rect x="70" y="195" width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="82" y="211" font-family="Arial, sans-serif" font-size="12" fill="#D6D3D1">AI Agent</text>
  
  <rect x="165" y="195" width="60" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="177" y="211" font-family="Arial, sans-serif" font-size="12" fill="#D6D3D1">SEO</text>
  
  <rect x="235" y="195" width="90" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="247" y="211" font-family="Arial, sans-serif" font-size="12" fill="#D6D3D1">llms.txt</text>
  
  <g transform="translate(430, 50)">
    <rect x="10" y="10" width="180" height="140" rx="8" fill="none" stroke="#A8A29E" stroke-width="2" stroke-dasharray="5,5"/>
    
    <circle cx="50" cy="50" r="20" fill="none" stroke="#EA580C" stroke-width="3"/>
    <text x="42" y="57" font-family="monospace" font-size="16" fill="#EA580C" font-weight="bold">G</text>
    
    <path d="M 80 50 L 120 50" stroke="#22C55E" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <defs>
      <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#22C55E"/>
      </marker>
    </defs>
    
    <rect x="125" y="35" width="50" height="30" rx="4" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <text x="135" y="54" font-family="monospace" font-size="12" fill="#F59E0B" font-weight="bold">AI</text>
    
    <circle cx="50" cy="110" r="8" fill="#EF4444"/>
    <line x1="45" y1="105" x2="55" y2="115" stroke="#FAFAF9" stroke-width="2"/>
    <line x1="55" y1="105" x2="45" y2="115" stroke="#FAFAF9" stroke-width="2"/>
    
    <text x="65" y="115" font-family="Arial, sans-serif" font-size="11" fill="#A8A29E">不可读</text>
    
    <circle cx="150" cy="110" r="8" fill="#22C55E"/>
    <polyline points="146,110 149,113 154,106" fill="none" stroke="#FAFAF9" stroke-width="2"/>
    
    <text x="125" y="130" font-family="Arial, sans-serif" font-size="11" fill="#22C55E">可理解</text>
