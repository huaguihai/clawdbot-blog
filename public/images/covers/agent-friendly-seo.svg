<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="1.5" fill="#D6D3D1" opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  <rect width="660" height="300" fill="url(#dots)"/>
  
  <rect x="50" y="20" width="4" height="260" fill="url(#accentGrad)" opacity="0.9"/>
  
  <text x="70" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9" letter-spacing="0.5">
    <tspan x="70" dy="0">Google 能找到你，</tspan>
    <tspan x="70" dy="28">AI 找不到你：</tspan>
    <tspan x="70" dy="28">Agent 时代的 SEO 生存指南</tspan>
  </text>
  
  <text x="70" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" dy="0">你的网站对 Google 友好，但对 ChatGPT、Claude、Perplexity 来说是个黑箱。</tspan>
  </text>
  
  <g transform="translate(70, 230)">
    <rect x="0" y="0" width="75" height="24" rx="4" fill="#57534E" opacity="0.4"/>
    <text x="37.5" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">AI Agent</text>
    
    <rect x="85" y="0" width="60" height="24" rx="4" fill="#57534E" opacity="0.4"/>
    <text x="115" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">SEO</text>
    
    <rect x="155" y="0" width="60" height="24" rx="4" fill="#57534E" opacity="0.4"/>
    <text x="185" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">流量</text>
  </g>
  
  <g transform="translate(520, 190)" opacity="0.2">
    <circle cx="35" cy="35" r="30" fill="none" stroke="#EA580C" stroke-width="1.5"/>
    <circle cx="35" cy="35" r="22" fill="none" stroke="#EA580C" stroke-width="1"/>
    <circle cx="35" cy="35" r="8" fill="#EA580C"/>
    <line x1="35" y1="5" x2="35" y2="15" stroke="#EA580C" stroke-width="1.5"/>
    <line x1="35" y1="55" x2="35" y2="65" stroke="#EA580C" stroke-width="1.5"/>
    <line x1="15" y1="35" x2="25" y2="35" stroke="#EA580C" stroke-width="1.5"/>
    <line x1="45" y1="35" x2="55" y2="35" stroke="#EA580C" stroke-width="1.5"/>
  </g>
  
  <g transform="translate(565, 220)" opacity="0.12">
    <rect x="0" y="0" width="40" height="40" fill="none" stroke="#FAFAF9" stroke-width="1"/>
    <line x1="0" y1="8" x2="40" y2="8" stroke="#FAFAF9" stroke-width="1"/>
    <line x1="0" y1="16" x2="40" y2="16" stroke="#FAFAF9" stroke-width="1"/>
    <line x1="0" y1="24" x2="30" y2="24" stroke="#FAFAF9" stroke-width="1"/>
    <line x1="0" y1="32" x2="25" y2="32" stroke="#FAFAF9" stroke-width="1"/>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>