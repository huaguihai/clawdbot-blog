    <circle cx="40" cy="35" r="18" fill="none" stroke="#EA580C" stroke-width="2.5"/>
    <path d="M 40 20 L 40 50 M 25 35 L 55 35" stroke="#EA580C" stroke-width="2.5" stroke-linecap="round"/>
    <text x="40" y="62" font-family="monospace" font-size="11" fill="#A8A29E" text-anchor="middle">Google</text>
    
    <rect x="100" y="15" width="80" height="50" rx="6" fill="none" stroke="#22C55E" stroke-width="2.5"/>
    <text x="110" y="32" font-family="monospace" font-size="10" fill="#22C55E">&gt; llms.txt</text>
    <text x="110" y="48" font-family="monospace" font-size="10" fill="#22C55E">&gt; RSS feed</text>
    <text x="140" y="80" font-family="monospace" font-size="11" fill="#A8A29E" text-anchor="middle">AI Agent</text>
    
    <path d="M 60 35 L 95 35" stroke="#F59E0B" stroke-width="2" marker-end="url(#arrow)"/>
