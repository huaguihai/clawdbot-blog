<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="80" r="1.5" fill="#D6D3D1"/>
    <circle cx="190" cy="130" r="1.5" fill="#D6D3D1"/>
    <circle cx="340" cy="170" r="1.5" fill="#D6D3D1"/>
    <circle cx="150" cy="220" r="1.5" fill="#D6D3D1"/>
    <circle cx="480" cy="60" r="1.5" fill="#D6D3D1"/>
    <circle cx="550" cy="140" r="1.5" fill="#D6D3D1"/>
    <circle cx="600" cy="200" r="1.5" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="50" width="5" height="180" fill="url(#accentGrad)"/>
  
  <text x="70" y="75" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
