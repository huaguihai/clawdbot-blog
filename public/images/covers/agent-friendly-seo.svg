  </g>
  
  <g transform="translate(170, 185)">
    <rect width="75" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="37.5" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">llms.txt</text>
  </g>
  
  <g transform="translate(255, 185)">
