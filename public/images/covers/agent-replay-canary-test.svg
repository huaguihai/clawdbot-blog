<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300" role="img" aria-label="Agent 上线：用回放集抓住最隐蔽的崩坏">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <rect width="120" height="120" fill="none"/>
      <g fill="#D6D3D1" opacity="0.06">
        <circle cx="12" cy="18" r="1.2"/>
        <circle cx="36" cy="22" r="0.9"/>
        <circle cx="58" cy="14" r="1.0"/>
        <circle cx="82" cy="28" r="1.3"/>
        <circle cx="104" cy="18" r="0.8"/>
        <circle cx="18" cy="44" r="0.9"/>
        <circle cx="44" cy="54" r="1.3"/>
        <circle cx="70" cy="46" r="0.8"/>
        <circle cx="96" cy="52" r="1.1"/>
        <circle cx="112" cy="42" r="0.9"/>
        <circle cx="10" cy="76" r="1.1"/>
        <circle cx="34" cy="86" r="0.8"/>
        <circle cx="62" cy="78" r="1.3"/>
        <circle cx="86" cy="92" r="0.9"/>
        <circle cx="108" cy="84" r="1.2"/>
        <circle cx="20" cy="108" r="0.8"/>
        <circle cx="48" cy="104" r="1.1"/>
        <circle cx="74" cy="110" r="0.9"/>
        <circle cx="98" cy="106" r="1.3"/>
        <circle cx="114" cy="112" r="0.8"/>
      </g>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="28" width="5" height="244" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',Arial,sans-serif">
    <!-- Title -->
    <text x="70" y="88" fill="#FAFAF9" font-size="22" font-weight="700" letter-spacing="0.2">
      <tspan x="70" dy="0">Agent 上线：用回放集</tspan>
      <tspan x="70" dy="28">抓住最隐蔽的崩坏</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="152" fill="#A8A29E" font-size="13" font-weight="500">
      Agent 上线最怕的不是偶发报错，而是行为漂移你还复现不了。这篇给你一套可落地
    </text>

    <!-- Tags -->
    <g>
      <g transform="translate(70,238)">
        <rect x="0" y="0" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="41" y="16.5" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">回放集</text>
      </g>
      <g transform="translate(162,238)">
        <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="43" y="16.5" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">离线打分</text>
      </g>
      <g transform="translate(258,238)">
        <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="43" y="16.5" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">灰度对照</text>
      </g>
    </g>
  </g>

  <!-- Decorations (right-bottom only, to the right of tags; no overlap with text) -->
  <g opacity="0.24" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Replay/loop icon -->
    <g transform="translate(520,188)">
      <path d="M26 10c-10 0-18 8-18 18" stroke="#EA580C" stroke-width="2.4"/>
      <path d="M8 28l-4-4m4 4l4-4" stroke="#EA580C" stroke-width="2.4"/>
      <path d="M14 46c10 0 18-8 18-18" stroke="#EA580C" stroke-width="2.4"/>
      <path d="M32 28l4 4m-4-4l-4 4" stroke="#EA580C" stroke-width="2.4"/>
    </g>

    <!-- Checklist card icon -->
    <g transform="translate(578,198)">
      <rect x="0" y="0" width="62" height="72" rx="10" stroke="#A8A29E" stroke-width="2.2"/>
      <path d="M14 20l6 6 10-12" stroke="#EA580C" stroke-width="2.4"/>
      <path d="M14 38h34" stroke="#A8A29E" stroke-width="2.2"/>
      <path d="M14 52h28" stroke="#A8A29E" stroke-width="2.2"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>