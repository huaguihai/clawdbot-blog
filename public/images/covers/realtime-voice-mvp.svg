<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#78350F"/>
      <stop offset="1" stop-color="#451A03"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="accentGrad" x1="0" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F59E0B"/>
      <stop offset="1" stop-color="#D97706"/>
    </linearGradient>

    <!-- Paper grain texture -->
    <pattern id="grain" width="70" height="70" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="14" r="1.2" fill="#D6A456" opacity="0.06"/>
      <circle cx="22" cy="40" r="1.0" fill="#D6A456" opacity="0.06"/>
      <circle cx="48" cy="18" r="1.1" fill="#D6A456" opacity="0.06"/>
      <circle cx="62" cy="52" r="1.3" fill="#D6A456" opacity="0.06"/>
      <circle cx="36" cy="60" r="0.9" fill="#D6A456" opacity="0.06"/>
      <circle cx="14" cy="60" r="0.8" fill="#D6A456" opacity="0.06"/>
      <circle cx="56" cy="34" r="0.9" fill="#D6A456" opacity="0.06"/>
      <circle cx="32" cy="26" r="0.8" fill="#D6A456" opacity="0.06"/>
      <circle cx="6" cy="34" r="0.7" fill="#D6A456" opacity="0.06"/>
      <circle cx="44" cy="46" r="0.7" fill="#D6A456" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="26" width="5" height="238" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text layer (x from 70 to 600) -->
  <g font-family="system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <!-- Title -->
    <text x="70" y="78" fill="#FEFCE8" font-size="22" font-weight="700">
      <tspan x="70" dy="0">实时语音别再观望：</tspan>
      <tspan x="70" dy="28">3类产品现在就能开做</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="142" fill="#D6A456" font-size="13" font-weight="500">
      实时语音这波 API 更新，不只是给大厂做语音助手用的。GPT-Realtime
    </text>

    <!-- Category (small hint) -->
    <text x="70" y="170" fill="#D6A456" font-size="12" opacity="0.9">
      分类：搞钱实操
    </text>

    <!-- Tag capsules (bottom area y ≈ 240-260) -->
    <g>
      <rect x="70" y="240" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="113" y="257" text-anchor="middle" fill="#FDE68A" font-size="13" font-weight="600">实时语音</text>

      <rect x="166" y="240" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="209" y="257" text-anchor="middle" fill="#FDE68A" font-size="13" font-weight="600">语音转写</text>

      <rect x="262" y="240" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
      <text x="305" y="257" text-anchor="middle" fill="#FDE68A" font-size="13" font-weight="600">语音翻译</text>
    </g>
  </g>

  <!-- Decorative elements (ONLY right-bottom corner, and to the right of tags) -->
  <g opacity="0.22" stroke="#F59E0B" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Simple waveform icon -->
    <path d="M500 232 L500 248"/>
    <path d="M512 224 L512 256"/>
    <path d="M524 236 L524 244"/>
    <path d="M536 218 L536 262"/>
    <path d="M548 230 L548 250"/>

    <!-- Small speech bubble outline -->
    <path d="M586 220
             Q604 220 604 238
             Q604 256 586 256
             L574 256
             L566 264
             L566 256
             L562 256
             Q544 256 544 238
             Q544 220 562 220
             Z"/>

    <!-- Tiny node-link hint (network-ish) -->
    <g stroke="#D6A456" opacity="0.75">
      <circle cx="612" cy="266" r="3.5" fill="none"/>
      <circle cx="635" cy="252" r="3.5" fill="none"/>
      <circle cx="626" cy="232" r="3.5" fill="none"/>
      <path d="M612 266 L635 252 L626 232 L612 266"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>