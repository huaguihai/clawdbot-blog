<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300" role="img" aria-label="AI 产品数据可迁移：导出、隐私与信任怎么做">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="bottomGrad" x1="0" y1="293" x2="660" y2="293" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- subtle paper grain -->
    <pattern id="grain" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="12" r="1.2" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="28" cy="18" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="44" cy="10" r="1.4" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="62" cy="22" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="78" cy="14" r="1.3" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="16" cy="38" r="1.3" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="36" cy="46" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="58" cy="40" r="1.5" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="74" cy="52" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="86" cy="40" r="1.2" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="12" cy="66" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="26" cy="78" r="1.4" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="48" cy="70" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="66" cy="82" r="1.3" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="82" cy="72" r="1.1" fill="#D6D3D1" opacity="0.06"/>
    </pattern>

    <style>
      .title { font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 800; font-size: 22px; fill: #FAFAF9; }
      .subtitle { font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 500; font-size: 13px; fill: #A8A29E; }
      .tagText { font-family: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-weight: 600; font-size: 12px; fill: #D6D3D1; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="24" width="5" height="252" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Text block (x >= 70, can span to 600) -->
  <text class="title" x="70" y="92">
    <tspan x="70" dy="0">AI 产品数据可迁移：导出、隐私与</tspan>
    <tspan x="70" dy="28">信任怎么做</tspan>
  </text>

  <text class="subtitle" x="70" y="152">
    AI 产品数据可迁移不是锦上添花，而是用户决定敢不敢长期用你的关键。导出格式怎么
  </text>

  <!-- Tags (bottom area y≈240-260), kept left so decorations can sit to the right -->
  <g aria-label="tags">
    <rect x="70" y="240" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="111" y="257" text-anchor="middle">数据导出</text>

    <rect x="162" y="240" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="203" y="257" text-anchor="middle">隐私告知</text>

    <rect x="254" y="240" width="82" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text class="tagText" x="295" y="257" text-anchor="middle">用户信任</text>
  </g>

  <!-- Decorations (right-bottom only; must be right of tags and not overlap any text) -->
  <g transform="translate(0,0)" opacity="0.22" fill="none" stroke="#EA580C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- document icon -->
    <path d="M505 196 h64 a8 8 0 0 1 8 8 v74 a8 8 0 0 1-8 8 h-64 a8 8 0 0 1-8-8 v-74 a8 8 0 0 1 8-8 z"/>
    <path d="M553 196 v22 a8 8 0 0 0 8 8 h16"/>
    <path d="M512 232 h48"/>
    <path d="M512 248 h40"/>
    <path d="M512 264 h44"/>

    <!-- small lock (trust/privacy) -->
    <g opacity="0.85" stroke="#A8A29E">
      <rect x="588" y="238" width="54" height="44" rx="10"/>
      <path d="M603 238 v-10 a12 12 0 0 1 24 0 v10"/>
      <path d="M615 259 v10"/>
      <circle cx="615" cy="258" r="4"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#bottomGrad)"/>
</svg>