  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1.2" fill="#D6D3D1"/>
    <circle cx="450" cy="65" r="1.8" fill="#D6D3D1"/>
    <circle cx="190" cy="140" r="1.3" fill="#D6D3D1"/>
    <circle cx="380" cy="180" r="1.6" fill="#D6D3D1"/>
