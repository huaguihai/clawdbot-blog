<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI 功能页总翻车？先补上 5 个交互护栏">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- paper grain -->
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="18" r="1.2" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="34" cy="22" r="0.9" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="58" cy="16" r="1.1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="86" cy="28" r="0.8" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="106" cy="20" r="1.0" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="18" cy="54" r="0.9" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="42" cy="64" r="1.2" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="70" cy="52" r="0.8" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="92" cy="68" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="110" cy="58" r="0.9" fill="#D6D3D1" opacity="0.06"/>

      <circle cx="14" cy="92" r="1.0" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="36" cy="102" r="0.8" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="60" cy="92" r="1.2" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="84" cy="104" r="0.9" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="108" cy="96" r="1.1" fill="#D6D3D1" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#grain)"/>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)"/>

  <!-- Text block -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Noto Sans CJK SC', 'Microsoft YaHei', Arial, sans-serif">
    <text x="70" y="92" fill="#FAFAF9" font-size="22" font-weight="700">
      <tspan x="70" dy="0">AI 功能页总翻车？</tspan>
      <tspan x="70" dy="28">先补上 5 个交互护栏</tspan>
    </text>

    <text x="70" y="156" fill="#A8A29E" font-size="13" font-weight="400">
      AI 功能页总翻车，很多时候不是模型太弱，而是界面没把输入边界、数据权限和确认步
    </text>

    <!-- Tags -->
    <g aria-label="tags">
      <g transform="translate(70,238)">
        <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="43" y="16" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">交互护栏</text>
      </g>

      <g transform="translate(168,238)">
        <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="43" y="16" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">权限边界</text>
      </g>

      <g transform="translate(266,238)">
        <rect x="0" y="0" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
        <text x="43" y="16" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">确认步骤</text>
      </g>
    </g>
  </g>

  <!-- Decorative elements (bottom-right only; no overlap with text/tags) -->
  <g transform="translate(505,188)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield + check -->
    <g opacity="0.24" stroke="#EA580C" stroke-width="2">
      <path d="M58 10 L86 22 V48 C86 66 74 80 58 86 C42 80 30 66 30 48 V22 Z"/>
      <path d="M44 49 L54 59 L72 38"/>
    </g>

    <!-- Guardrail / control icon -->
    <g opacity="0.20" stroke="#A8A29E" stroke-width="2" transform="translate(0,64)">
      <path d="M8 18 C24 6, 44 6, 60 18"/>
      <path d="M8 18 V54"/>
      <path d="M60 18 V54"/>
      <path d="M8 38 H60"/>
      <circle cx="34" cy="38" r="6"/>
      <path d="M34 32 V44"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>