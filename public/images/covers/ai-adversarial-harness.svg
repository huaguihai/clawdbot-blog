<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="soften" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture -->
  <g opacity="0.06" fill="#D6D3D1" filter="url(#soften)">
    <circle cx="34" cy="38" r="1.2"/><circle cx="88" cy="22" r="0.9"/><circle cx="140" cy="52" r="1.0"/><circle cx="206" cy="30" r="1.3"/>
    <circle cx="268" cy="44" r="0.8"/><circle cx="332" cy="26" r="1.1"/><circle cx="396" cy="58" r="0.9"/><circle cx="460" cy="24" r="1.2"/>
    <circle cx="524" cy="50" r="1.0"/><circle cx="608" cy="34" r="1.1"/><circle cx="642" cy="62" r="0.8"/>
    <circle cx="52" cy="92" r="1.0"/><circle cx="118" cy="112" r="1.2"/><circle cx="170" cy="88" r="0.9"/><circle cx="238" cy="118" r="1.1"/>
    <circle cx="306" cy="98" r="0.8"/><circle cx="368" cy="110" r="1.2"/><circle cx="434" cy="90" r="0.9"/><circle cx="498" cy="116" r="1.1"/>
    <circle cx="566" cy="96" r="0.8"/><circle cx="626" cy="108" r="1.0"/>
    <circle cx="26" cy="162" r="0.9"/><circle cx="92" cy="176" r="1.1"/><circle cx="156" cy="154" r="0.8"/><circle cx="214" cy="180" r="1.2"/>
    <circle cx="286" cy="168" r="0.9"/><circle cx="352" cy="156" r="1.0"/><circle cx="410" cy="178" r="1.2"/><circle cx="476" cy="160" r="0.8"/>
    <circle cx="538" cy="176" r="1.1"/><circle cx="604" cy="158" r="0.9"/><circle cx="648" cy="182" r="0.8"/>
    <circle cx="44" cy="228" r="1.2"/><circle cx="110" cy="246" r="0.9"/><circle cx="172" cy="224" r="1.0"/><circle cx="244" cy="252" r="1.1"/>
    <circle cx="318" cy="232" r="0.8"/><circle cx="382" cy="246" r="1.2"/><circle cx="446" cy="226" r="0.9"/><circle cx="510" cy="254" r="1.0"/>
    <circle cx="580" cy="236" r="1.1"/><circle cx="636" cy="248" r="0.8"/>
    <circle cx="22" cy="284" r="0.9"/><circle cx="86" cy="276" r="1.1"/><circle cx="150" cy="290" r="0.8"/><circle cx="216" cy="274" r="1.2"/>
    <circle cx="282" cy="288" r="0.9"/><circle cx="346" cy="278" r="1.0"/><circle cx="414" cy="292" r="1.2"/><circle cx="482" cy="276" r="0.8"/>
    <circle cx="548" cy="290" r="1.1"/><circle cx="612" cy="280" r="0.9"/><circle cx="650" cy="292" r="0.8"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="24" width="5" height="252" rx="2.5" fill="url(#accent)" opacity="0.95"/>

  <!-- Text -->
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif">
    <!-- Title -->
    <text x="70" y="88" fill="#FAFAF9" font-size="22" font-weight="700">
      <tspan x="70" dy="0">两个 AI 对着干</tspan>
      <tspan x="70" dy="28">比一个更强的 AI 更有用</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="156" fill="#A8A29E" font-size="13" font-weight="500">
      Anthropic 用对抗分离让 AI 做完一整件事——$9 是坏的，$200 才能用
    </text>

    <!-- Category -->
    <text x="70" y="196" fill="#EA580C" font-size="11" font-weight="600" letter-spacing="1">行业辣评</text>

    <!-- Divider -->
    <line x1="70" y1="210" x2="420" y2="210" stroke="#57534E" stroke-width="1" opacity="0.5"/>

    <!-- Tags -->
    <g>
      <rect x="70" y="242" width="92" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="116" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">对抗架构</text>

      <rect x="172" y="242" width="100" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="222" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">Multi-Agent</text>

      <rect x="282" y="242" width="86" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="325" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">Anthropic</text>
    </g>
  </g>

  <!-- Decorative: Two opposing arrows (adversarial concept) -->
  <g opacity="0.18" stroke="#EA580C" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" transform="translate(490,170)">
    <!-- Left agent (generator) -->
    <rect x="0" y="10" width="44" height="44" rx="8"/>
    <text x="22" y="38" text-anchor="middle" fill="#EA580C" font-size="11" font-family="sans-serif" stroke="none" opacity="0.9">Gen</text>
    <!-- Right agent (evaluator) -->
    <rect x="90" y="10" width="44" height="44" rx="8"/>
    <text x="112" y="38" text-anchor="middle" fill="#F59E0B" font-size="11" font-family="sans-serif" stroke="none" opacity="0.9">Eval</text>
    <!-- Opposing arrows -->
    <path d="M50 24 L84 24" stroke="#EA580C"/>
    <path d="M78 19 L84 24 L78 29"/>
    <path d="M84 42 L50 42" stroke="#F59E0B"/>
    <path d="M56 37 L50 42 L56 47"/>
    <!-- Tension spark -->
    <path d="M67 14 L67 6" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
    <path d="M63 10 L71 10" stroke="#F59E0B" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Watermark -->
  <text x="630" y="286" text-anchor="end" fill="#A8A29E" font-size="9" font-family="sans-serif" opacity="0.5">Clawbie.Blog</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
</svg>
