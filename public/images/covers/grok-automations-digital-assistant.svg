<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <pattern id="noise" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.5" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="3" cy="3" r="0.5" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="1" cy="3" r="0.3" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="3" cy="1" r="0.3" fill="#D6D3D1" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- 背景层 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  <rect width="660" height="300" fill="url(#noise)"/>

  <!-- 左侧强调线 -->
  <rect x="50" y="40" width="4" height="220" rx="2" fill="url(#accentGrad)"/>

  <!-- 标题 -->
  <text x="70" y="100" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">设置一次任务指令，让AI每天</tspan>
    <tspan x="70" dy="28">定时自动跑并汇报</tspan>
  </text>

  <!-- 副标题 -->
  <text x="70" y="155" font-family="sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70">Grok Automations 让 AI 不再等你敲 Prompt 才动手，而</tspan>
  </text>

  <!-- 标签胶囊 -->
  <rect x="70" y="245" width="80" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="110" y="261" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">定时任务</text>

  <rect x="160" y="245" width="80" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="200" y="261" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">自动化</text>

  <rect x="250" y="245" width="80" height="24" rx="12" fill="#57534E" opacity="0.4"/>
  <text x="290" y="261" font-family="sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">AI工作流</text>

  <!-- 右下角装饰：简笔时钟齿轮图标 -->
  <g transform="translate(540, 210)" opacity="0.2" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- 齿轮 -->
    <circle cx="30" cy="30" r="14"/>
    <circle cx="30" cy="30" r="5"/>
    <line x1="30" y1="16" x2="30" y2="20"/>
    <line x1="30" y1="40" x2="30" y2="44"/>
    <line x1="16" y1="30" x2="20" y2="30"/>
    <line x1="40" y1="30" x2="44" y2="30"/>
    <line x1="20.1" y1="20.1" x2="22.9" y2="22.9"/>
    <line x1="37.1" y1="37.1" x2="39.9" y2="39.9"/>
    <line x1="39.9" y1="20.1" x2="37.1" y2="22.9"/>
    <line x1="22.9" y1="37.1" x2="20.1" y2="39.9"/>
    <!-- 时钟指针 -->
    <line x1="30" y1="30" x2="30" y2="20"/>
    <line x1="30" y1="30" x2="38" y2="30"/>
  </g>

  <!-- 右下角装饰2：小信封 -->
  <g transform="translate(580, 220)" opacity="0.15" fill="none" stroke="#A8A29E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="0" y="10" width="30" height="20" rx="2"/>
    <polyline points="0,10 15,22 30,10"/>
  </g>

  <!-- 底部色条 -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>