  </text>
  
  <g transform="translate(70, 205)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">旧手机</text>
  </g>
  
  <g transform="translate(170, 205)">
