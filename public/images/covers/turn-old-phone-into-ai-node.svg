      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1.5" fill="#D6D3D1"/>
    <circle cx="450" cy="120" r="1.5" fill="#D6D3D1"/>
    <circle cx="180" cy="180" r="1.5" fill="#D6D3D1"/>
    <circle cx="520" cy="200" r="1.5" fill="#D6D3D1"/>
    <circle cx="90" cy="240" r="1.5" fill="#D6D3D1"/>
    <circle cx="350" cy="260" r="1.5" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="60" width="5" height="80" fill="url(#accentGrad)" rx="2.5"/>
  
  <text x="70" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
