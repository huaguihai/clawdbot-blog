    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">IoT</text>
  </g>
  
  <g transform="translate(420, 50)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="none" stroke="#A8A29E" stroke-width="2"/>
    
    <circle cx="90" cy="35" r="18" fill="none" stroke="#EA580C" stroke-width="2.5"/>
    <circle cx="90" cy="35" r="8" fill="#EA580C"/>
    <path d="M 75 50 L 90 35 L 105 50" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <rect x="20" y="70" width="50" height="35" rx="4" fill="none" stroke="#22C55E" stroke-width="2"/>
    <text x="45" y="90" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle">Node</text>
    
    <rect x="110" y="70" width="50" height="35" rx="4" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="135" cy="82" r="3" fill="#F59E0B"/>
    <circle cx="135" cy="93" r="3" fill="#F59E0B"/>
    
    <path d="M 70 87 L 90 87 M 90 87 L 110 87" stroke="#A8A29E" stroke-width="1.5" marker-end="url(#arrow)"/>
  </g>
  
  <defs>
