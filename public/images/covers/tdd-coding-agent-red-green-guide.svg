<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture dots -->
  <g fill="#D6D3D1" opacity="0.06">
    <circle cx="90" cy="22" r="1.2"/><circle cx="140" cy="48" r="1"/><circle cx="200" cy="15" r="1.4"/>
    <circle cx="260" cy="38" r="1.1"/><circle cx="330" cy="20" r="1.3"/><circle cx="400" cy="44" r="1"/>
    <circle cx="460" cy="12" r="1.2"/><circle cx="520" cy="35" r="1.4"/><circle cx="590" cy="22" r="1"/>
    <circle cx="630" cy="50" r="1.2"/><circle cx="75" cy="75" r="1.1"/><circle cx="160" cy="90" r="1.3"/>
    <circle cx="230" cy="68" r="1"/><circle cx="310" cy="85" r="1.2"/><circle cx="390" cy="72" r="1.4"/>
    <circle cx="450" cy="95" r="1.1"/><circle cx="540" cy="78" r="1"/><circle cx="610" cy="88" r="1.3"/>
    <circle cx="105" cy="130" r="1"/><circle cx="180" cy="118" r="1.2"/><circle cx="250" cy="140" r="1.4"/>
    <circle cx="340" cy="125" r="1.1"/><circle cx="410" cy="142" r="1"/><circle cx="475" cy="115" r="1.3"/>
    <circle cx="555" cy="135" r="1.2"/><circle cx="625" cy="120" r="1"/>
    <circle cx="88" cy="170" r="1.3"/><circle cx="155" cy="185" r="1"/><circle cx="225" cy="165" r="1.2"/>
    <circle cx="295" cy="178" r="1.4"/><circle cx="365" cy="190" r="1.1"/><circle cx="430" cy="172" r="1"/>
    <circle cx="500" cy="188" r="1.3"/><circle cx="570" cy="162" r="1.2"/><circle cx="635" cy="180" r="1"/>
    <circle cx="112" cy="220" r="1.1"/><circle cx="195" cy="210" r="1.4"/><circle cx="270" cy="228" r="1"/>
    <circle cx="345" cy="215" r="1.2"/><circle cx="415" cy="232" r="1.3"/>
    <circle cx="82" cy="268" r="1"/><circle cx="165" cy="255" r="1.2"/><circle cx="240" cy="272" r="1.4"/>
    <circle cx="320" cy="258" r="1.1"/><circle cx="385" cy="270" r="1"/>
  </g>

  <!-- Left accent bar -->
  <rect x="50" y="40" width="4" height="200" fill="url(#accentV)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-weight="700" font-size="22" fill="#FAFAF9">
    <tspan x="70" y="95">TDD 驯服 Coding Agent：</tspan>
    <tspan x="70" dy="30">周末装好红绿灯</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" y="158">TDD 驯服 Coding Agent，不靠玄学。把"先写测试再写实现"变成硬约束</tspan>
  </text>

  <!-- Divider line under subtitle -->
  <line x1="70" y1="172" x2="420" y2="172" stroke="#57534E" stroke-width="1" opacity="0.5"/>

  <!-- Category label -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="11" fill="#EA580C" font-weight="600" letter-spacing="1">
    <tspan x="70" y="196">上手指南</tspan>
  </text>

  <!-- Tags -->
  <!-- Tag 1: TDD -->
  <rect x="70" y="228" width="64" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="102" y="244" text-anchor="middle">TDD</text>

  <!-- Tag 2: Coding Agent -->
  <rect x="144" y="228" width="100" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="194" y="244" text-anchor="middle">Coding Agent</text>

  <!-- Tag 3: 红绿灯测试 -->
  <rect x="254" y="228" width="88" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="298" y="244" text-anchor="middle">红绿灯测试</text>

  <!-- Decorative elements - bottom right corner only (x>=480, y>=180) -->
  <!-- Traffic light icon, simplified line style -->
  <g transform="translate(510, 195)" opacity="0.22" stroke="#EA580C" stroke-width="1.8" fill="none">
    <!-- Housing -->
    <rect x="0" y="0" width="28" height="68" rx="5" stroke="#F59E0B" stroke-width="1.5"/>
    <!-- Red light circle -->
    <circle cx="14" cy="13" r="7" stroke="#EA580C" stroke-width="1.8"/>
    <!-- Yellow light circle -->
    <circle cx="14" cy="34" r="7" stroke="#F59E0B" stroke-width="1.8"/>
    <!-- Green light circle -->
    <circle cx="14" cy="55" r="7" stroke="#A8A29E" stroke-width="1.5"/>
    <!-- Pole -->
    <line x1="14" y1="68" x2="14" y2="85" stroke="#F59E0B" stroke-width="1.5"/>
  </g>

  <!-- Small code bracket decoration -->
  <g transform="translate(558, 210)" opacity="0.18" stroke="#A8A29E" stroke-width="1.6" fill="none">
    <!-- { -->
    <path d="M18,0 Q8,0 8,8 L8,18 Q8,24 2,24 Q8,24 8,30 L8,40 Q8,48 18,48"/>
    <!-- } -->
    <path d="M28,0 Q38,0 38,8 L38,18 Q38,24 44,24 Q38,24 38,30 L38,40 Q38,48 28,48"/>
  </g>

  <!-- Subtle check mark -->
  <g transform="translate(608, 218)" opacity="0.2" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="0,18 12,30 32,0"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
</svg>