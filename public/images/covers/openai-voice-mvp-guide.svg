<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="660" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#44403C"/>
      <stop offset="1" stop-color="#1C1917"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <linearGradient id="bottomGrad" x1="0" y1="0" x2="660" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#EA580C"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>

    <filter id="soften" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>

  <!-- Paper-grain texture -->
  <g opacity="0.06" fill="#D6D3D1" filter="url(#soften)">
    <circle cx="42" cy="38" r="1.2"/><circle cx="86" cy="64" r="1.0"/><circle cx="128" cy="32" r="1.1"/>
    <circle cx="170" cy="58" r="0.9"/><circle cx="214" cy="40" r="1.2"/><circle cx="260" cy="70" r="1.0"/>
    <circle cx="304" cy="36" r="1.1"/><circle cx="350" cy="62" r="0.9"/><circle cx="396" cy="44" r="1.2"/>
    <circle cx="442" cy="28" r="1.0"/><circle cx="488" cy="66" r="1.1"/><circle cx="536" cy="42" r="0.9"/>
    <circle cx="588" cy="58" r="1.2"/><circle cx="620" cy="30" r="1.0"/>

    <circle cx="60" cy="118" r="1.1"/><circle cx="108" cy="146" r="0.9"/><circle cx="156" cy="132" r="1.2"/>
    <circle cx="204" cy="154" r="1.0"/><circle cx="252" cy="124" r="1.1"/><circle cx="300" cy="150" r="0.9"/>
    <circle cx="348" cy="128" r="1.2"/><circle cx="396" cy="156" r="1.0"/><circle cx="444" cy="132" r="1.1"/>
    <circle cx="492" cy="152" r="0.9"/><circle cx="540" cy="126" r="1.2"/><circle cx="608" cy="148" r="1.0"/>

    <circle cx="36" cy="206" r="1.0"/><circle cx="92" cy="232" r="1.2"/><circle cx="140" cy="214" r="0.9"/>
    <circle cx="188" cy="238" r="1.1"/><circle cx="236" cy="210" r="1.0"/><circle cx="284" cy="236" r="1.2"/>
    <circle cx="332" cy="214" r="0.9"/><circle cx="380" cy="240" r="1.1"/><circle cx="428" cy="212" r="1.0"/>
    <circle cx="476" cy="236" r="1.2"/><circle cx="524" cy="214" r="0.9"/><circle cx="572" cy="238" r="1.1"/>
    <circle cx="628" cy="210" r="1.0"/>
  </g>

  <!-- Left accent line -->
  <rect x="50" y="24" width="5" height="252" rx="2.5" fill="url(#accentGrad)"/>

  <!-- Text block -->
  <g font-family="PingFang SC, Microsoft YaHei, Noto Sans CJK SC, system-ui, -apple-system, Segoe UI, Arial, sans-serif">
    <!-- Title -->
    <text x="70" y="78" fill="#FAFAF9" font-size="22" font-weight="700">
      <tspan x="70" dy="0">OpenAI语音：别做Demo</tspan>
      <tspan x="70" dy="28">先过三道坎</tspan>
    </text>

    <!-- Subtitle -->
    <text x="70" y="138" fill="#A8A29E" font-size="13" font-weight="400">
      OpenAI语音 API 这次更新，不是让你多做一个会说话的玩具，而是更接近把语
    </text>

    <!-- Category (small hint, still text-only) -->
    <text x="70" y="166" fill="#A8A29E" font-size="12" font-weight="500" opacity="0.9">
      分类：上手指南
    </text>

    <!-- Tags -->
    <g>
      <rect x="70" y="242" width="74" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="107" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">延迟</text>

      <rect x="154" y="242" width="74" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="191" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">成本</text>

      <rect x="238" y="242" width="74" height="24" rx="12" fill="#57534E" opacity="0.4"/>
      <text x="275" y="258" text-anchor="middle" fill="#D6D3D1" font-size="12" font-weight="600">合规</text>
    </g>
  </g>

  <!-- Decorative elements (right-bottom only; no overlap with text/tags) -->
  <g opacity="0.22" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Minimal waveform icon -->
    <g stroke="#EA580C" stroke-width="2" transform="translate(504 194)">
      <path d="M0 36 L0 52"/>
      <path d="M10 28 L10 60"/>
      <path d="M20 40 L20 48"/>
      <path d="M30 20 L30 68"/>
      <path d="M40 34 L40 54"/>
      <path d="M50 26 L50 62"/>
      <path d="M60 40 L60 48"/>
      <path d="M70 30 L70 58"/>
    </g>

    <!-- Minimal shield/check (compliance) -->
    <g stroke="#A8A29E" stroke-width="2" transform="translate(586 196)">
      <path d="M24 0 C14 6 6 7 0 8 V28 C0 44 10 56 24 64 C38 56 48 44 48 28 V8 C42 7 34 6 24 0 Z"/>
      <path d="M14 34 L22 42 L36 26"/>
    </g>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#bottomGrad)"/>
</svg>