<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bg)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1.5" fill="#D6D3D1"/>
    <circle cx="450" cy="60" r="1.5" fill="#D6D3D1"/>
    <circle cx="180" cy="150" r="1.5" fill="#D6D3D1"/>
    <circle cx="380" cy="180" r="1.5" fill="#D6D3D1"/>
    <circle cx="520" cy="120" r="1.5" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="0" width="5" height="300" fill="url(#accent)"/>
  
  <text x="70" y="90" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">智谱 AutoClaw 上线——国产一键养虾，</tspan>
    <tspan x="70" dy="28">我帮你踩完了第一轮坑</tspan>
  </text>
  
  <text x="70" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#A8A29E">
    智谱今天发布 AutoClaw，号称一分钟本地部署 OpenClaw。实际体验如
  </text>
  
  <g transform="translate(70, 240)">
    <rect width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="42.5" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">本地部署</text>
  </g>
  
  <g transform="translate(165, 240)">
    <rect width="75" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="37.5" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">OpenClaw</text>
  </g>
  
  <g transform="translate(250, 240)">
    <rect width="70" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="35" y="16" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#D6D3D1" text-anchor="middle">飞书接入</text>
  </g>
  
  <g transform="translate(540, 210)" opacity="0.2">
    <path d="M0,30 L20,0 L40,30 L30,30 L30,50 L10,50 L10,30 Z" fill="none" stroke="#EA580C" stroke-width="2"/>
    <circle cx="20" cy="15" r="3" fill="#EA580C"/>
  </g>
  
  <g transform="translate(500, 240)" opacity="0.25">
    <rect x="0" y="0" width="35" height="35" rx="4" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <path d="M8,17.5 L17.5,17.5 M17.5,8 L17.5,27" stroke="#A8A29E" stroke-width="2"/>
  </g>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>
