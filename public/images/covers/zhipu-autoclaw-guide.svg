<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1.5" fill="#D6D3D1"/>
    <circle cx="180" cy="150" r="1.5" fill="#D6D3D1"/>
    <circle cx="90" cy="200" r="1.5" fill="#D6D3D1"/>
    <circle cx="240" cy="240" r="1.5" fill="#D6D3D1"/>
    <circle cx="320" cy="180" r="1.5" fill="#D6D3D1"/>
    <circle cx="150" cy="270" r="1.5" fill="#D6D3D1"/>
    <circle cx="500" cy="60" r="1.5" fill="#D6D3D1"/>
    <circle cx="580" cy="140" r="1.5" fill="#D6D3D1"/>
    <circle cx="450" cy="220" r="1.5" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="50" width="4" height="60" fill="url(#accentGrad)" rx="2"/>
  
  <text x="70" y="75" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    智谱 AutoClaw 上线
  </text>
  <text x="70" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    国产一键养虾
  </text>
  
  <text x="70" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A8A29E">
    我帮你踩完了第一轮坑
  </text>
  
  <g transform="translate(70, 155)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">本地部署</text>
  </g>
  
  <g transform="translate(170, 155)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">飞书接入</text>
  </g>
  
  <g transform="translate(270, 155)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">踩坑指南</text>
  </g>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="none" stroke="#57534E" stroke-width="2"/>
    
    <rect x="15" y="15" width="170" height="25" rx="4" fill="#1C1917" stroke="#22C55E" stroke-width="2"/>
    <text x="25" y="33" font-family="Monaco, monospace" font-size="12" fill="#22C55E">$ npm install</text>
    
    <line x1="100" y1="55" x2="100" y2="85" stroke="#EA580C" stroke-width="3" marker-end="url(#arrow)"/>
    <circle cx="100" cy="90" r="8" fill="none" stroke="#EA580C" stroke-width="2"/>
    <line x1="95" y1="90" x2="105" y2="90" stroke="#EA580C" stroke-width="2"/>
    
    <rect x="15" y="105" width="170" height="25" rx="4" fill="#1C1917" stroke="#F59E0B" stroke-width="2"/>
    <text x="25" y="123" font-family="Monaco, monospace" font-size="12" fill="#F59E0B">AutoClaw 一键启动</text>
    
    <text x="140" y="75" font-family="system-ui, sans-serif" font-size="11" fill="#A8A29E">简化</text>
  </g>
  
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#EA580C"/>
    </marker>
  </defs>
  
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
