<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300" width="660" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
    <filter id="textureFilter">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncR type="linear" slope="0.3"/>
        <feFuncG type="linear" slope="0.3"/>
        <feFuncB type="linear" slope="0.3"/>
      </feComponentTransfer>
    </filter>
  </defs>
  
  <!-- 背景 -->
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <!-- 纹理散点 -->
  <g opacity="0.06" fill="#D6D3D1">
    <circle cx="50" cy="30" r="1.5"/><circle cx="120" cy="80" r="1"/><circle cx="200" cy="40" r="1.2"/>
    <circle cx="300" cy="90" r="1"/><circle cx="400" cy="25" r="1.5"/><circle cx="550" cy="70" r="1"/>
    <circle cx="80" cy="150" r="1.2"/><circle cx="180" cy="200" r="1"/><circle cx="280" cy="140" r="1.5"/>
    <circle cx="350" cy="220" r="1"/><circle cx="450" cy="180" r="1.2"/><circle cx="520" cy="250" r="1"/>
    <circle cx="30" cy="270" r="1"/><circle cx="150" cy="280" r="1.5"/><circle cx="250" cy="260" r="1"/>
    <circle cx="480" cy="120" r="1.2"/><circle cx="600" cy="200" r="1"/><circle cx="100" cy="50" r="0.8"/>
    <circle cx="320" cy="60" r="1.2"/><circle cx="580" cy="30" r="1"/><circle cx="420" cy="270" r="1.5"/>
  </g>
  
  <!-- 左侧文字区域 -->
  <!-- 强调色竖线 -->
  <rect x="50" y="70" width="5" height="140" fill="url(#accentGrad)" rx="2"/>
  
  <!-- 标题 - 3行 -->
  <text x="70" y="110" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">智谱 AutoClaw 上线</text>
  <text x="70" y="140" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">国产一键养虾</text>
  <text x="70" y="170" font-family="system-ui, sans-serif" font-size="22" font-weight="bold" fill="#FAFAF9">帮你踩完第一轮坑</text>
  
  <!-- 副标题 -->
  <text x="70" y="205" font-family="system-ui, sans-serif" font-size="14" fill="#A8A29E">智谱今天发布 AutoClaw，号称一分钟</text>
  <text x="70" y="223" font-family="system-ui, sans-serif" font-size="14" fill="#A8A29E">本地部署 OpenClaw。实际体验如何？</text>
  
  <!-- 标签胶囊 -->
  <g transform="translate(70, 245)">
    <rect width="70" height="22" rx="11" fill="#57534E" opacity="0.4"/>
    <text x="35" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">AutoClaw</text>
  </g>
  <g transform="translate(148, 245)">
    <rect width="70" height="22" rx="11" fill="#57534E" opacity="0.4"/>
    <text x="35" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">本地部署</text>
  </g>
  <g transform="translate(226, 245)">
    <rect width="70" height="22" rx="11" fill="#57534E" opacity="0.4"/>
    <text x="35" y="16" font-family="system-ui, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">飞书接入</text>
  </g>
  
  <!-- 右侧插图区域：展示一键部署流程 -->
  <g transform="translate(430, 50)">
    <!-- 电脑边框 -->
    <rect x="20" y="20" width="160" height="110" rx="6" fill="none" stroke="#FAFAF9" stroke-width="2" opacity="0.8"/>
    <rect x="30" y="30" width="140" height="70" rx="3" fill="#1C1917" opacity="0.6"/>
    
    <!-- 屏幕内容：终端风格 -->
    <text x="40" y="50" font-family="monospace" font-size="9" fill="#22C55E">&gt; ./install.sh</text>
    <text x="40" y="62" font-family="monospace" font-size="8" fill="#FAFAF9">Downloading...</text>
    <text x="40" y="74" font-family="monospace" font-size="8" fill="#FAFAF9">Configuring API keys...</text>
    <text x="40" y="86" font-family="monospace" font-size="8" fill="#22C55E">✓ Done! (58s)</text>
    
    <!-- 飞书图标 -->
    <rect x="40" y="100" width="30" height="20" rx="3" fill="#FAFAF9" opacity="0.9"/>
    <text x="55" y="114" font-family="system-ui, sans-serif" font-size="10" font-weight="bold" fill="#1C1917" text-anchor="middle">Feishu</text>
    
    <!-- 连接箭头 -->
    <path d="M80 115 L120 115" stroke="#F59E0B" stroke-width="2" stroke-dasharray="3,2" marker-end="url(#arrowhead)"/>
    
    <!-- 下方的步骤标签 -->
    <g transform="translate(0, 145)">
      <circle cx="30" cy="5" r="10" fill="url(#accentGrad)"/>
      <text x="30" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#1C1917" text-anchor="middle" font-weight="bold">1</text>
      <text x="50" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#FAFAF9">下载安装</text>
      
      <circle cx="100" cy="5" r="10" fill="url(#accentGrad)"/>
      <text x="100" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#1C1917" text-anchor="middle" font-weight="bold">2</text>
      <text x="120" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#FAFAF9">配 API</text>
      
      <circle cx="170" cy="5" r="10" fill="url(#accentGrad)"/>
      <text x="170" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#1C1917" text-anchor="middle" font-weight="bold">3</text>
      <text x="190" y="9" font-family="system-ui, sans-serif" font-size="10" fill="#FAFAF9">接飞书</text>
    </g>
  </g>
  
  <!-- 底部强调色条 -->
  <rect x="50" y="293" width="560" height="7" fill="url(#accentGrad)" rx="3"/>
</svg>