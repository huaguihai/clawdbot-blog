<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="paperNoise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="8" result="noise"/>
      <feColorMatrix in="noise" type="matrix" values="
        0 0 0 0 0.839
        0 0 0 0 0.827
        0 0 0 0 0.824
        0 0 0 0.06 0"/>
    </filter>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #FAFAF9; letter-spacing: 0; }
      .sub { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #A8A29E; letter-spacing: 0; }
      .tagText { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #D6D3D1; letter-spacing: 0; }
      .decor { fill: none; stroke: #EA580C; stroke-opacity: 0.22; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .decor2 { fill: none; stroke: #A8A29E; stroke-opacity: 0.18; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="660" height="300" fill="url(#bg)"/>
  <rect width="660" height="300" filter="url(#paperNoise)" opacity="0.9"/>
  <rect x="0" y="0" width="660" height="300" fill="#D6D3D1" opacity="0.06"/>

  <rect x="50" y="0" width="5" height="293" fill="url(#accent)"/>
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>

  <text class="title" x="70" y="52">
    <tspan x="70" dy="0">prompt-injection-agent-guide</tspan>
    <tspan x="70" dy="28">Agent 安全防护</tspan>
    <tspan x="70" dy="28">与输入隔离</tspan>
  </text>

  <text class="sub" x="70" y="140">prompt-injection-agent-guide</text>

  <rect x="70" y="238" width="84" height="24" rx="8" fill="#57534E" fill-opacity="0.4"/>
  <text class="tagText" x="112" y="254" text-anchor="middle">提示注入</text>

  <rect x="164" y="238" width="84" height="24" rx="8" fill="#57534E" fill-opacity="0.4"/>
  <text class="tagText" x="206" y="254" text-anchor="middle">Agent 安全</text>

  <rect x="258" y="238" width="84" height="24" rx="8" fill="#57534E" fill-opacity="0.4"/>
  <text class="tagText" x="300" y="254" text-anchor="middle">权限控制</text>

  <g transform="translate(500 186)">
    <path class="decor" d="M24 14 h18 l8 8 v20 l-8 8 h-18 l-8 -8 v-20 z"/>
    <path class="decor2" d="M31 22 h8"/>
    <path class="decor2" d="M31 30 h12"/>
    <path class="decor2" d="M31 38 h10"/>
    <path class="decor" d="M74 18 l10 10 -10 10 -10 -10 z"/>
    <path class="decor2" d="M74 28 v18"/>
    <path class="decor2" d="M66 46 h16"/>
  </g>
</svg>