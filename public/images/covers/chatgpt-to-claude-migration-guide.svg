    <tspan x="70" dy="32">一份冷静的迁移指南</tspan>
  </text>
  
  <text x="70" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A8A29E">
    Anthropic 刚推出了迁移工具，ChatGPT 卸载量在涨
  </text>
  
  <g transform="translate(70, 195)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">迁移工具</text>
  </g>
  
  <g transform="translate(170, 195)">
    <rect width="80" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="40" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">成本分析</text>
  </g>
  
  <g transform="translate(260, 195)">
    <rect width="70" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="35" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">Claude</text>
  </g>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="140" rx="8" fill="none" stroke="#A8A29E" stroke-width="2" stroke-dasharray="4,4"/>
    
    <g transform="translate(20, 25)">
