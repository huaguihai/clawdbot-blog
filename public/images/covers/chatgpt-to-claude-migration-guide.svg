      <text x="35" y="18" font-family="monospace" font-size="11" fill="#FAFAF9" text-anchor="middle">ChatGPT</text>
      <circle cx="35" cy="35" r="8" fill="#22C55E" opacity="0.6"/>
    </g>
    
    <path d="M 95 50 L 115 50" stroke="url(#accentGrad)" stroke-width="3" marker-end="url(#arrowhead)"/>
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#F59E0B"/>
      </marker>
    </defs>
    
    <g transform="translate(120, 25)">
      <rect x="0" y="0" width="60" height="50" rx="4" fill="#57534E" opacity="0.3"/>
      <text x="30" y="18" font-family="monospace" font-size="11" fill="#FAFAF9" text-anchor="middle">Claude</text>
      <circle cx="30" cy="35" r="8" fill="#EA580C" opacity="0.6"/>
    </g>
    
    <text x="100" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#A8A29E" text-anchor="middle">数据迁移</text>
    
    <g transform="translate(15, 105)">
      <rect x="0" y="0" width="35" height="18" rx="3" fill="#EF4444" opacity="0.2"/>
      <text x="17.5" y="13" font-family="monospace" font-size="9" fill="#EF4444" text-anchor="middle">成本</text>
    </g>
    
    <g transform="translate(55, 105)">
