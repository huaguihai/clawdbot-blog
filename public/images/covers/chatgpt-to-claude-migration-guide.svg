  <rect x="50" y="80" width="4" height="60" fill="url(#accentGrad)" rx="2"/>
  
  <text x="70" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
