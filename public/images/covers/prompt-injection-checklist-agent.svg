<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1C1917;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
    <pattern id="grain" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="20" cy="15" r="0.5" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="35" cy="30" r="1" fill="#D6D3D1" opacity="0.06"/>
      <circle cx="10" cy="35" r="0.8" fill="#D6D3D1" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg-grad)"/>
  <rect width="660" height="300" fill="url(#grain)"/>

  <!-- Left Accent Line -->
  <rect x="50" y="60" width="4" height="120" rx="2" fill="url(#accent-grad)"/>

  <!-- Text Content -->
  <text x="70" y="90" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-weight="bold" font-size="22" fill="#FAFAF9">
    <tspan x="70" dy="0">Prompt注入防线：</tspan>
    <tspan x="70" dy="32">上线前30分钟自检</tspan>
  </text>

  <text x="70" y="165" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="13" fill="#A8A29E">
    Prompt注入防线不是大厂专属课题。很多 Agent Demo 表现完美，一上线就被带跑。
  </text>

  <!-- Tags -->
  <g transform="translate(70, 240)">
    <rect width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="42.5" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">Prompt安全</text>
  </g>
  <g transform="translate(165, 240)">
    <rect width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="42.5" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">Agent开发</text>
  </g>
  <g transform="translate(260, 240)">
    <rect width="85" height="24" rx="12" fill="#57534E" opacity="0.4"/>
    <text x="42.5" y="16" font-family="Source Han Sans CN, Microsoft YaHei, sans-serif" font-size="11" fill="#D6D3D1" text-anchor="middle">风险防控</text>
  </g>

  <!-- Decoration Element (Right Bottom) -->
  <g transform="translate(540, 200)" opacity="0.2">
    <path d="M0 10 L30 0 L60 10 V35 C60 50 30 65 30 65 C30 65 0 50 0 35 Z" stroke="#EA580C" stroke-width="2" fill="none"/>
    <path d="M15 30 L25 40 L45 20" stroke="#EA580C" stroke-width="2" fill="none"/>
  </g>

  <!-- Bottom Bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent-grad)"/>
</svg>