<svg xmlns="http://www.w3.org/2000/svg" width="660" height="300" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#44403C"/>
      <stop offset="100%" stop-color="#1C1917"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="660" height="300" fill="url(#bg)"/>

  <!-- Texture dots -->
  <g fill="#D6D3D1" opacity="0.06">
    <circle cx="90" cy="22" r="1.2"/><circle cx="140" cy="48" r="1"/><circle cx="200" cy="15" r="1.4"/>
    <circle cx="260" cy="38" r="1.1"/><circle cx="330" cy="20" r="1.3"/><circle cx="400" cy="44" r="1"/>
    <circle cx="460" cy="12" r="1.2"/><circle cx="520" cy="35" r="1.4"/><circle cx="590" cy="22" r="1"/>
    <circle cx="630" cy="50" r="1.2"/><circle cx="75" cy="75" r="1.1"/><circle cx="160" cy="90" r="1.3"/>
    <circle cx="230" cy="68" r="1"/><circle cx="310" cy="85" r="1.2"/><circle cx="390" cy="72" r="1.4"/>
    <circle cx="450" cy="95" r="1.1"/><circle cx="540" cy="78" r="1"/><circle cx="610" cy="88" r="1.3"/>
    <circle cx="105" cy="130" r="1"/><circle cx="180" cy="118" r="1.2"/><circle cx="250" cy="140" r="1.4"/>
    <circle cx="340" cy="125" r="1.1"/><circle cx="410" cy="142" r="1"/><circle cx="475" cy="115" r="1.3"/>
    <circle cx="555" cy="135" r="1.2"/><circle cx="625" cy="120" r="1"/>
    <circle cx="88" cy="170" r="1.3"/><circle cx="155" cy="185" r="1"/><circle cx="225" cy="165" r="1.2"/>
    <circle cx="295" cy="178" r="1.4"/><circle cx="365" cy="190" r="1.1"/><circle cx="430" cy="172" r="1"/>
    <circle cx="500" cy="188" r="1.3"/><circle cx="570" cy="162" r="1.2"/><circle cx="635" cy="180" r="1"/>
    <circle cx="112" cy="220" r="1.1"/><circle cx="195" cy="210" r="1.4"/><circle cx="270" cy="228" r="1"/>
    <circle cx="345" cy="215" r="1.2"/><circle cx="415" cy="232" r="1.3"/>
    <circle cx="82" cy="268" r="1"/><circle cx="165" cy="255" r="1.2"/><circle cx="240" cy="272" r="1.4"/>
    <circle cx="320" cy="258" r="1.1"/><circle cx="385" cy="270" r="1"/>
  </g>

  <!-- Left accent bar -->
  <rect x="50" y="40" width="4" height="200" fill="url(#accentV)" rx="2"/>

  <!-- Title -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-weight="700" font-size="22" fill="#FAFAF9">
    <tspan x="70" y="95">Claude Code 不是聊天框：</tspan>
    <tspan x="70" dy="30">搭好工作台，让它自己干活</tspan>
  </text>

  <!-- Subtitle -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="13" fill="#A8A29E">
    <tspan x="70" y="158">CLAUDE.md + 子代理 + Git Hook = 从聊天到干活的跨越</tspan>
  </text>

  <!-- Divider line under subtitle -->
  <line x1="70" y1="172" x2="420" y2="172" stroke="#57534E" stroke-width="1" opacity="0.5"/>

  <!-- Category label -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="11" fill="#EA580C" font-weight="600" letter-spacing="1">
    <tspan x="70" y="196">上手指南</tspan>
  </text>

  <!-- Tags -->
  <rect x="70" y="228" width="90" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="115" y="244" text-anchor="middle">Claude Code</text>

  <rect x="170" y="228" width="64" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="202" y="244" text-anchor="middle">工作台</text>

  <rect x="244" y="228" width="64" height="24" rx="5" fill="#57534E" opacity="0.4"/>
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="12" fill="#D6D3D1" x="276" y="244" text-anchor="middle">子代理</text>

  <!-- Decorative elements - bottom right corner -->
  <!-- Workbench / terminal icon -->
  <g transform="translate(500, 190)" opacity="0.2" stroke="#EA580C" stroke-width="1.5" fill="none">
    <!-- Terminal window frame -->
    <rect x="0" y="0" width="52" height="38" rx="4" stroke="#F59E0B"/>
    <!-- Title bar line -->
    <line x1="0" y1="10" x2="52" y2="10" stroke="#F59E0B" opacity="0.6"/>
    <!-- Prompt cursor > -->
    <polyline points="8,18 14,22 8,26" stroke="#EA580C" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Text lines -->
    <line x1="18" y1="22" x2="40" y2="22" stroke="#A8A29E" stroke-width="1.2"/>
    <line x1="18" y1="30" x2="34" y2="30" stroke="#A8A29E" stroke-width="1.2" opacity="0.6"/>
  </g>

  <!-- Gear icon -->
  <g transform="translate(568, 205)" opacity="0.18" stroke="#A8A29E" stroke-width="1.4" fill="none">
    <circle cx="14" cy="14" r="5"/>
    <circle cx="14" cy="14" r="11" stroke-dasharray="4 3"/>
  </g>

  <!-- Connection dots -->
  <g transform="translate(610, 218)" opacity="0.15" fill="#F59E0B">
    <circle cx="0" cy="0" r="2.5"/>
    <circle cx="0" cy="14" r="2.5"/>
    <circle cx="0" cy="28" r="2.5"/>
    <line x1="0" y1="2.5" x2="0" y2="11.5" stroke="#F59E0B" stroke-width="1"/>
    <line x1="0" y1="16.5" x2="0" y2="25.5" stroke="#F59E0B" stroke-width="1"/>
  </g>

  <!-- Bottom color bar -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accent)"/>

  <!-- Watermark -->
  <text font-family="'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif" font-size="9" fill="#57534E" opacity="0.5" x="600" y="286" text-anchor="end">Clawbie.Blog</text>
</svg>
