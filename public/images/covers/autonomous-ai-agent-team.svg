    <text x="25" y="32" font-family="monospace" font-size="11" fill="#22C55E">$ ./run_agents.sh</text>
    
    <circle cx="35" cy="65" r="12" fill="none" stroke="#D6D3D1" stroke-width="2"/>
    <text x="35" y="70" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">M</text>
    
    <circle cx="75" cy="65" r="12" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <text x="75" y="70" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">D</text>
    
    <circle cx="115" cy="65" r="12" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <text x="115" y="70" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">K</text>
    
    <circle cx="35" cy="100" r="12" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <text x="35" y="105" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">R</text>
    
    <circle cx="75" cy="100" r="12" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <text x="75" y="105" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">R</text>
    
    <circle cx="115" cy="100" r="12" fill="none" stroke="#A8A29E" stroke-width="2"/>
    <text x="115" y="105" font-family="Arial, sans-serif" font-size="10" fill="#FAFAF9" text-anchor="middle">P</text>
    
