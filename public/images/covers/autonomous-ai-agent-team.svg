    <rect x="15" y="15" width="30" height="30" rx="4" fill="#57534E" stroke="#EA580C" stroke-width="2"/>
    <text x="30" y="35" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="bold">M</text>
    
    <rect x="55" y="15" width="30" height="30" rx="4" fill="#57534E" stroke="#22C55E" stroke-width="2"/>
    <text x="70" y="35" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle" font-weight="bold">D</text>
    
    <rect x="95" y="15" width="30" height="30" rx="4" fill="#57534E" stroke="#F59E0B" stroke-width="2"/>
    <text x="110" y="35" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="bold">K</text>
    
    <rect x="15" y="55" width="30" height="30" rx="4" fill="#57534E" stroke="#EA580C" stroke-width="2"/>
    <text x="30" y="75" font-family="monospace" font-size="11" fill="#EA580C" text-anchor="middle" font-weight="bold">R</text>
    
    <rect x="55" y="55" width="30" height="30" rx="4" fill="#57534E" stroke="#22C55E" stroke-width="2"/>
    <text x="70" y="75" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle" font-weight="bold">Rs</text>
    
    <rect x="95" y="55" width="30" height="30" rx="4" fill="#57534E" stroke="#F59E0B" stroke-width="2"/>
    <text x="110" y="75" font-family="monospace" font-size="11" fill="#F59E0B" text-anchor="middle" font-weight="bold">P</text>
    
    <line x1="30" y1="50" x2="30" y2="95" stroke="#EA580C" stroke-width="1.5" opacity="0.4"/>
    <line x1="70" y1="50" x2="70" y2="95" stroke="#22C55E" stroke-width="1.5" opacity="0.4"/>
    <line x1="110" y1="50" x2="110" y2="95" stroke="#F59E0B" stroke-width="1.5" opacity="0.4"/>
    
    <rect x="140" y="20" width="45" height="70" rx="4" fill="#1C1917" stroke="#A8A29E" stroke-width="1.5"/>
    <rect x="145" y="25" width="35" height="20" rx="2" fill="#22C55E" opacity="0.3"/>
    <text x="162.5" y="38" font-family="monospace" font-size="8" fill="#22C55E" text-anchor="middle">cron</text>
    <line x1="148" y1="52" x2="178" y2="52" stroke="#A8A29E" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="58" x2="172" y2="58" stroke="#A8A29E" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="64" x2="180" y2="64" stroke="#A8A29E" stroke-width="1" opacity="0.5"/>
    <line x1="148" y1="70" x2="168" y2="70" stroke="#A8A29E" stroke-width="1" opacity="0.5"/>
    
    <text x="100" y="115" font-family="system-ui, sans-serif" font-size="11" fill="#A8A29E" text-anchor="middle">6 Agents</text>
