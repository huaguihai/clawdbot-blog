<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="90" r="1" fill="#D6D3D1"/>
    <circle cx="180" cy="150" r="1.2" fill="#D6D3D1"/>
    <circle cx="520" cy="70" r="1" fill="#D6D3D1"/>
    <circle cx="90" cy="200" r="1.3" fill="#D6D3D1"/>
    <circle cx="450" cy="180" r="1.1" fill="#D6D3D1"/>
    <circle cx="340" cy="240" r="1" fill="#D6D3D1"/>
    <circle cx="580" cy="130" r="1.2" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="60" width="5" height="80" fill="url(#accentGrad)" rx="2.5"/>
  
  <text x="70" y="85" font-family="system-ui,-apple-system,sans-serif" font-size="26" font-weight="700" fill="#FAFAF9">
    <tspan x="70" dy="0">一个人雇了 6 个 AI 员工</tspan>
    <tspan x="70" dy="32">月薪 400 美元，全年无休</tspan>
  </text>
  
  <text x="70" y="155" font-family="system-ui,-apple-system,sans-serif" font-size="16" fill="#A8A29E">
    Mac Mini 上跑 6 个 Agent 替自己干活
  </text>
  
  <g transform="translate(70, 185)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">AI Agent</text>
  </g>
  
  <g transform="translate(170, 185)">
    <rect width="100" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="50" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">自动化</text>
  </g>
  
  <g transform="translate(280, 185)">
    <rect width="80" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="40" y="19" font-family="system-ui,-apple-system,sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">成本</text>
  </g>
  
  <g transform="translate(420, 60)">
    <rect x="0" y="0" width="200" height="160" rx="8" fill="none" stroke="#A8A29E" stroke-width="2" stroke-dasharray="4,4"/>
    
    <rect x="20" y="20" width="40" height="50" rx="4" fill="#57534E" stroke="#D6D3D1" stroke-width="1.5"/>
    <text x="40" y="52" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle">Mac</text>
    <text x="40" y="64" font-family="monospace" font-size="11" fill="#22C55E" text-anchor="middle">Mini</text>
    
    <circle cx="100" cy="35" r="12" fill="none" stroke="#EA580C" stroke-width="2"/>
    <circle cx="100" cy="35" r="8" fill="#EA580C" opacity="0.3"/>
    <text x="100" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#D6D3D1" text-anchor="middle">Agent 1</text>
    
    <circle cx="140" cy="35" r="12" fill="none" stroke="#F59E0B" stroke-width="2"/>
    <circle cx="140" cy="35" r="8" fill="#F59E0B" opacity="0.3"/>
    <text x="140" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#D6D3D1" text-anchor="middle">Agent 2</text>
    
    <circle cx="180" cy="35" r="12" fill="none" stroke="#EA580C" stroke-width="2"/>
    <circle cx="180" cy="35" r="8" fill="#EA580C" opacity="0.3"/>
    <text x="180" y="58" font-family="system-ui,-apple-system,sans-serif" font-size="9" fill="#D6D3D1" text-anchor="middle">Agent 3</text>
    
    <line x1="100" y1="50" x2="100" y2="90" stroke="#A8A29E" stroke-width="1.5"/>
    <line x1="140" y1="50" x2="140" y2="90" stroke="#A8A29E" stroke-width="1.5"/>
    <line x1="180" y1="50" x2="180" y2="90" stroke="#A8A29E" stroke-width="1.5"/>
    
    <rect x="70" y="90" width="100" height="30" rx="4" fill="#1C1917" stroke="#D6D3D1" stroke-width="1.5"/>
    <text x="120" y="108" font-family="monospace" font-size="10" fill="#FAFAF9" text-anchor="middle">文件系统</text>
    <text x="120" y="118" font-family="monospace" font-size="8" fill="#A8A29E" text-anchor="middle">*.md 协调</text>
    
    <text x="100" y="145" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#EA580C" font-weight="600" text-anchor="middle">$400/月</text>
  </g>
  
  <rect y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>