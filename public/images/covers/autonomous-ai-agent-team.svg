  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#A8A29E"/>
    <circle cx="280" cy="80" r="1" fill="#A8A29E"/>
    <circle cx="95" cy="150" r="1.2" fill="#A8A29E"/>
    <circle cx="340" cy="120" r="1" fill="#A8A29E"/>
    <circle cx="180" cy="200" r="1.5" fill="#A8A29E"/>
    <circle cx="250" cy="260" r="1" fill="#A8A29E"/>
    <circle cx="150" cy="95" r="1" fill="#A8A29E"/>
    <circle cx="310" cy="180" r="1.2" fill="#A8A29E"/>
    <circle cx="480" cy="70" r="1" fill="#A8A29E"/>
