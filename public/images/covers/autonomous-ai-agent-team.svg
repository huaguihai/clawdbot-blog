  <rect x="165" y="240" width="90" height="24" rx="12" fill="#78716C" opacity="0.4"/>
  <text x="210" y="256" font-family="Arial, sans-serif" font-size="12" fill="#E7E5E4" text-anchor="middle">自动化</text>
  
  <rect x="265" y="240" width="90" height="24" rx="12" fill="#78716C" opacity="0.4"/>
