<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#44403C"/>
      <stop offset="100%" style="stop-color:#1C1917"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EA580C"/>
      <stop offset="100%" style="stop-color:#F59E0B"/>
    </linearGradient>
  </defs>
  
  <rect width="660" height="300" fill="url(#bgGrad)"/>
  
  <g opacity="0.06">
    <circle cx="120" cy="45" r="1.5" fill="#D6D3D1"/>
    <circle cx="280" cy="80" r="1" fill="#D6D3D1"/>
    <circle cx="450" cy="120" r="1.2" fill="#D6D3D1"/>
    <circle cx="180" cy="160" r="0.8" fill="#D6D3D1"/>
    <circle cx="520" cy="200" r="1.3" fill="#D6D3D1"/>
    <circle cx="90" cy="220" r="1" fill="#D6D3D1"/>
    <circle cx="350" cy="250" r="1.1" fill="#D6D3D1"/>
    <circle cx="580" cy="90" r="0.9" fill="#D6D3D1"/>
    <circle cx="240" cy="190" r="1.4" fill="#D6D3D1"/>
    <circle cx="420" cy="270" r="1" fill="#D6D3D1"/>
  </g>
  
  <rect x="50" y="60" width="5" height="60" fill="url(#accentGrad)" rx="2.5"/>
  
  <text x="70" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="bold" fill="#FAFAF9">
    <tspan x="70" dy="0">一个人雇了 6 个 AI 员工，</tspan>
    <tspan x="70" dy="32">月薪 400 美元，全年无休</tspan>
  </text>
  
  <text x="70" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#A8A29E">
    <tspan x="70" dy="0">有人在 Mac Mini 上跑了 6 个 AI Agent 替自己干活，</tspan>
    <tspan x="70" dy="22">研究、写稿、审代码全自动</tspan>
  </text>
  
  <g transform="translate(70, 210)">
    <rect width="90" height="28" rx="14" fill="#57534E" opacity="0.4"/>
    <text x="45" y="19" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#D6D3D1" text-anchor="middle">AI Agent</text>
  </g>
  
  <g transform="translate(170, 210)">
