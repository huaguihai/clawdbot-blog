<svg width="660" height="300" viewBox="0 0 660 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI 产品护城河：先抢工作流入口">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </linearGradient>

    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>

    <!-- Paper grain / speckle texture -->
    <pattern id="speckle" width="90" height="90" patternUnits="userSpaceOnUse">
      <rect width="90" height="90" fill="none"/>
      <g fill="#D6A456" opacity="0.06">
        <circle cx="10" cy="14" r="1.2"/>
        <circle cx="26" cy="22" r="0.9"/>
        <circle cx="44" cy="12" r="1.0"/>
        <circle cx="68" cy="18" r="1.3"/>
        <circle cx="80" cy="36" r="0.8"/>
        <circle cx="14" cy="44" r="1.1"/>
        <circle cx="36" cy="52" r="0.8"/>
        <circle cx="58" cy="46" r="1.0"/>
        <circle cx="76" cy="58" r="1.1"/>
        <circle cx="18" cy="72" r="0.9"/>
        <circle cx="40" cy="76" r="1.2"/>
        <circle cx="64" cy="74" r="0.8"/>
        <circle cx="84" cy="80" r="1.0"/>
      </g>
    </pattern>

    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-weight: 700; font-size: 22px; fill: #FEFCE8; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-weight: 500; font-size: 13px; fill: #D6A456; }
      .tagText { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-weight: 600; font-size: 12px; fill: #FDE68A; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="300" fill="url(#bgGrad)"/>
  <rect x="0" y="0" width="660" height="300" fill="url(#speckle)"/>

  <!-- Left accent line -->
  <rect x="50" y="0" width="5" height="300" fill="url(#accentGrad)" opacity="0.95"/>

  <!-- Text block (x from 70, can extend to 600) -->
  <g transform="translate(70,70)">
    <text class="title" x="0" y="0">
      <tspan x="0" dy="0">AI 产品护城河：先抢</tspan>
      <tspan x="0" dy="28">工作流入口</tspan>
    </text>

    <text class="subtitle" x="0" y="70">
      AI 产品护城河常被误判成模型效果。真正决定你能不能活下来的，是你有没有卡进用户
    </text>
  </g>

  <!-- Tag capsules (bottom area y ≈ 240-260) -->
  <g>
    <rect x="70" y="242" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text class="tagText" x="113" y="258" text-anchor="middle">工作流入口</text>

    <rect x="166" y="242" width="72" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text class="tagText" x="202" y="258" text-anchor="middle">记录源</text>

    <rect x="248" y="242" width="86" height="24" rx="12" fill="#92400E" opacity="0.4"/>
    <text class="tagText" x="291" y="258" text-anchor="middle">审批节点</text>
  </g>

  <!-- Decorative elements (right-bottom only, x ≥ 480, y ≥ 180; to the right of tags) -->
  <g opacity="0.22" stroke="#F59E0B" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Small workflow/graph icon -->
    <circle cx="520" cy="210" r="6"/>
    <circle cx="560" cy="230" r="6"/>
    <circle cx="600" cy="208" r="6"/>
    <circle cx="620" cy="248" r="6"/>

    <path d="M526 212 L554 226"/>
    <path d="M566 228 L594 212"/>
    <path d="M604 214 L616 242"/>
    <path d="M566 236 L614 246"/>

    <!-- Minimal "approval stamp" outline -->
    <g opacity="0.85" stroke="#D6A456">
      <rect x="540" y="250" width="78" height="34" rx="8"/>
      <path d="M552 267 h22"/>
      <path d="M582 267 h24"/>
      <path d="M552 276 h38"/>
    </g>
  </g>

  <!-- Bottom color strip -->
  <rect x="0" y="293" width="660" height="7" fill="url(#accentGrad)"/>
</svg>