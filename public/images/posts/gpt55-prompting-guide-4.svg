<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .sub { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #374151; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #111827; }
      .label { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #374151; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .pillText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 600; fill: #111827; }
      .dash { stroke: #9CA3AF; stroke-width: 1.5; stroke-dasharray: 5 5; fill: none; }
    </style>
  </defs>

  <!-- Background container -->
  <rect x="10" y="10" width="640" height="380" rx="12" class="bg"/>

  <!-- Header -->
  <text x="30" y="45" class="title">什么该写死约束 / 什么该给示例 / 何时拆步骤</text>
  <text x="30" y="68" class="sub">按任务类型补最容易返工的那部分，让输出更稳定</text>

  <!-- Rule strip (top) -->
  <rect x="30" y="85" width="600" height="62" rx="12" class="card"/>

  <!-- Rule 1 -->
  <rect x="46" y="101" width="176" height="30" rx="15" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="58" y="121" class="pillText">不可逆后果 → 写死约束</text>

  <!-- Rule 2 -->
  <rect x="242" y="101" width="172" height="30" rx="15" fill="#FFEDD5" stroke="#EA580C" stroke-width="1"/>
  <text x="254" y="121" class="pillText">风格对齐 → 优先示例</text>

  <!-- Rule 3 -->
  <rect x="432" y="101" width="182" height="30" rx="15" fill="#DCFCE7" stroke="#16A34A" stroke-width="1"/>
  <text x="444" y="121" class="pillText">多步推理 → 拆步骤</text>

  <text x="46" y="142" class="label">口诀：先防不可逆，再对齐风格，最后拆解复杂推理</text>

  <!-- Task cards (middle) -->
  <!-- Card 1: Code -->
  <rect x="30" y="165" width="200" height="130" rx="12" class="card"/>
  <rect x="30" y="165" width="200" height="8" rx="12" fill="#2563EB"/>
  <text x="46" y="195" class="small" style="font-weight:700;">写代码</text>
  <text x="46" y="218" class="label">最该补：约束 + 输出格式</text>
  <text x="46" y="242" class="label">原因：防止改多、改偏、爆接口</text>
  <rect x="46" y="258" width="90" height="22" rx="11" fill="#DBEAFE"/>
  <text x="56" y="273" class="pillText" fill="#1D4ED8">约束</text>
  <rect x="140" y="258" width="74" height="22" rx="11" fill="#DBEAFE"/>
  <text x="150" y="273" class="pillText" fill="#1D4ED8">格式</text>

  <!-- Card 2: Docs -->
  <rect x="245" y="165" width="200" height="130" rx="12" class="card"/>
  <rect x="245" y="165" width="200" height="8" rx="12" fill="#EA580C"/>
  <text x="261" y="195" class="small" style="font-weight:700;">写文档</text>
  <text x="261" y="218" class="label">最该补：示例 + 语气要求</text>
  <text x="261" y="242" class="label">原因：风格一致胜过“创意”</text>
  <rect x="261" y="258" width="78" height="22" rx="11" fill="#FFEDD5"/>
  <text x="271" y="273" class="pillText" fill="#C2410C">示例</text>
  <rect x="343" y="258" width="86" height="22" rx="11" fill="#FFEDD5"/>
  <text x="353" y="273" class="pillText" fill="#C2410C">语气</text>

  <!-- Card 3: Analysis -->
  <rect x="460" y="165" width="170" height="130" rx="12" class="card"/>
  <rect x="460" y="165" width="170" height="8" rx="12" fill="#16A34A"/>
  <text x="476" y="195" class="small" style="font-weight:700;">做分析</text>
  <text x="476" y="218" class="label">最该补：步骤 + 不确定项</text>
  <text x="476" y="242" class="label">原因：避免猜测写成结论</text>
  <rect x="476" y="258" width="64" height="22" rx="11" fill="#DCFCE7"/>
  <text x="486" y="273" class="pillText" fill="#166534">步骤</text>
  <rect x="544" y="258" width="78" height="22" rx="11" fill="#DCFCE7"/>
  <text x="554" y="273" class="pillText" fill="#166534">不确定</text>

  <!-- Dashed connectors from rule strip to cards -->
  <path d="M 134 147 L 130 165" class="dash"/>
  <path d="M 328 147 L 345 165" class="dash"/>
  <path d="M 524 147 L 545 165" class="dash"/>

  <!-- Bottom: 3 prompt parts -->
  <rect x="30" y="310" width="600" height="70" rx="12" class="card"/>
  <text x="46" y="338" class="small" style="font-weight:700;">检查 Prompt 是否有“三个零件”</text>

  <rect x="46" y="350" width="170" height="24" rx="12" fill="#EDE9FE" stroke="#9333EA" stroke-width="1"/>
  <text x="58" y="366" class="pillText" fill="#6D28D9">任务目标：要产出什么</text>

  <rect x="230" y="350" width="180" height="24" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="1"/>
  <text x="242" y="366" class="pillText" fill="#92400E">动作边界：能改/不能改</text>

  <rect x="424" y="350" width="206" height="24" rx="12" fill="#DBEAFE" stroke="#2563EB" stroke-width="1"/>
  <text x="436" y="366" class="pillText" fill="#1D4ED8">验收方式：什么算做对</text>
</svg>