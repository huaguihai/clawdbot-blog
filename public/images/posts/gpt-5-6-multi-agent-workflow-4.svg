<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA" />
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; fill: #111827; }
    .title { font-size: 18px; font-weight: 600; }
    .subtitle { font-size: 12px; fill: #6B7280; }
    .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; rx: 10; }
    .card-title { font-size: 13px; font-weight: 600; }
  </style>

  <!-- 标题 -->
  <text x="330" y="40" text-anchor="middle" class="title">总控 Prompt 协调 10 个 AI 小助手</text>
  <text x="330" y="60" text-anchor="middle" class="subtitle">项目经理型总控：拆分任务、派工、跟踪进度、阶段汇总</text>

  <!-- 用户目标卡片 -->
  <rect x="40" y="90" width="180" height="70" class="card" />
  <text x="130" y="115" text-anchor="middle" class="card-title">用户目标</text>
  <text x="55" y="140">· 描述最终想要的结果</text>
  <text x="55" y="160">· 作为所有工单的来源</text>

  <!-- 总控 Prompt / AI 项目经理卡片 -->
  <rect x="240" y="90" width="180" height="120" class="card" />
  <text x="330" y="115" text-anchor="middle" class="card-title">总控 Prompt / AI 项目经理</text>
  <text x="255" y="140">1. 拆分目标为工单</text>
  <text x="255" y="160">2. 指派合适助手角色</text>
  <text x="255" y="180">3. 跟踪状态与返工</text>
  <text x="255" y="200">4. 输出阶段性版本与建议</text>

  <!-- 工单列表卡片 -->
  <rect x="440" y="90" width="180" height="120" class="card" />
  <text x="530" y="115" text-anchor="middle" class="card-title">工单列表（Markdown 表格）</text>
  <text x="455" y="140">· 标题</text>
  <text x="455" y="160">· 角色</text>
  <text x="455" y="180">· 输入来源</text>
  <text x="455" y="200">· 预期输出 / 截止时间</text>

  <!-- 用户目标 -> 总控虚线 -->
  <line x1="220" y1="125" x2="240" y2="125" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrowBlue)" />

  <!-- 总控 -> 工单列表虚线 -->
  <line x1="420" y1="145" x2="440" y2="145" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrowBlue)" />

  <!-- 阶段进度总览卡片 -->
  <rect x="240" y="240" width="180" height="120" class="card" />
  <text x="330" y="265" text-anchor="middle" class="card-title">阶段进度总览</text>
  <text x="255" y="290">· 已完成工单</text>
  <text x="255" y="310">· 剩余工单</text>
  <text x="255" y="330">· 风险与堵点</text>
  <text x="255" y="350">· 下一步建议</text>

  <!-- 工单列表 -> 阶段进度总览虚线 -->
  <line x1="530" y1="230" x2="330" y2="240" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrowBlue)" />

  <!-- 角色区标题 -->
  <text x="330" y="225" text-anchor="middle" class="subtitle">工单按角色派发执行</text>

  <!-- 五个角色卡片行 -->
  <!-- 写作助手 -->
  <rect x="40" y="240" width="120" height="80" class="card" />
  <text x="100" y="265" text-anchor="middle" class="card-title" fill="#EA580C">写作助手</text>
  <text x="50" y="290">· 长文结构化</text>
  <text x="50" y="310">· 营销文案/邮件</text>

  <!-- 代码助手 -->
  <rect x="190" y="240" width="120" height="80" class="card" />
  <text x="250" y="265" text-anchor="middle" class="card-title" fill="#2563EB">代码助手</text>
  <text x="200" y="290">· 修 Bug / 测试</text>
  <text x="200" y="310">· 小工具开发</text>

  <!-- 调研助手 -->
  <rect x="340" y="240" width="120" height="80" class="card" />
  <text x="400" y="265" text-anchor="middle" class="card-title" fill="#9333EA">调研助手</text>
  <text x="350" y="290">· 提炼观点</text>
  <text x="350" y="310">· 方案对比</text>

  <!-- 数据助手 -->
  <rect x="490" y="240" width="120" height="80" class="card" />
  <text x="550" y="265" text-anchor="middle" class="card-title" fill="#16A34A">数据助手</text>
  <text x="500" y="290">· 表格处理</text>
  <text x="500" y="310">· 简单统计分析</text>

  <!-- 客服助手 -->
  <rect x="265" y="330" width="130" height="70" class="card" />
  <text x="330" y="355" text-anchor="middle" class="card-title" fill="#D97706">客服助手</text>
  <text x="275" y="380">· 固定话术回复</text>
  <text x="275" y="400">· 整理 FAQ</text>

  <!-- 总控 -> 角色派工虚线（示意） -->
  <line x1="330" y1="210" x2="100" y2="240" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="330" y1="210" x2="250" y2="240" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="330" y1="210" x2="400" y2="240" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="330" y1="210" x2="550" y2="240" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3" />
  <line x1="330" y1="210" x2="330" y2="330" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="3 3" />

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 Z" fill="#2563EB" />
    </marker>
  </defs>
</svg>