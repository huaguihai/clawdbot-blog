<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/></filter><marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker><marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/></marker><marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/></marker></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">为什么 Prompt Injection 变成产品问题</text><text x="330" y="64" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">当模型从“只回答”升级为“可执行”，风险从内容错误扩散为系统动作错误</text><rect x="40" y="100" width="150" height="92" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="115" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#2563EB">外部内容</text><text x="115" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 邮件 / PDF</text><text x="115" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">知识库文档</text><rect x="255" y="92" width="150" height="108" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#FCD7AA"/><text x="330" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#EA580C">Agent</text><text x="330" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">把资料也当输入</text><text x="330" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可能误把隐藏指令</text><text x="330" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">当成下一步动作</text><rect x="470" y="100" width="150" height="92" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#D1FAE5"/><text x="545" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#16A34A">可执行系统</text><text x="545" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">读邮件 / 查库 / 发消息</text><text x="545" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">调用工具与数据</text><line x1="190" y1="146" x2="255" y2="146" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/><line x1="405" y1="146" x2="470" y2="146" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowOrange)"/><rect x="130" y="238" width="400" height="108" rx="18" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="330" y="266" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">风险升级路径</text><text x="180" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#D97706">提示词问题</text><text x="180" y="322" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">说错了</text><text x="330" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#EA580C">执行问题</text><text x="330" y="322" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">做错了</text><text x="480" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#16A34A">产品问题</text><text x="480" y="322" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">需要权限、确认、审计</text><line x1="225" y1="307" x2="285" y2="307" stroke="#D97706" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowOrange)"/><line x1="375" y1="307" x2="435" y2="307" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><line x1="330" y1="200" x2="330" y2="238" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowGreen)"/><text x="580" y="366" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心：外部输入一旦连到执行能力，防线就必须上升到产品架构</text></svg>