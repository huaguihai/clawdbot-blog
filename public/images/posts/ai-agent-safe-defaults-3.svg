<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #0F172A; }
      .text { font-size: 12px; fill: #0F172A; }
      .muted { font-size: 11px; fill: #475569; }
      .chip { font-size: 11px; font-weight: 600; fill: #0F172A; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .dash { stroke: #94A3B8; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; }
      .arrow { fill: #94A3B8; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- Header -->
  <text x="30" y="45" class="font title">Agent 每次工具调用：像记账一样可审计</text>
  <text x="30" y="68" class="font muted">核心：统一字段 + 追踪链路（trace_id / step_id）+ 原始证据可回溯</text>

  <!-- Left: Trigger -->
  <rect x="30" y="120" width="170" height="92" rx="12" class="card"/>
  <text x="45" y="148" class="font text" font-weight="700" fill="#9333EA">触发者 (operator)</text>
  <text x="45" y="172" class="font muted">用户 / 定时任务 / 人工审批</text>
  <rect x="45" y="185" width="140" height="18" rx="9" fill="#F3E8FF"/>
  <text x="55" y="198" class="font chip" fill="#9333EA">operator: agent</text>

  <!-- Center: Audit Log Record -->
  <rect x="230" y="98" width="400" height="210" rx="12" class="card"/>
  <text x="250" y="126" class="font text" font-weight="800">最小可审计日志（一次工具调用）</text>

  <!-- trace/step chips -->
  <rect x="250" y="140" width="170" height="22" rx="11" fill="#DBEAFE"/>
  <text x="262" y="155" class="font chip" fill="#2563EB">trace_id: task_xxx</text>
  <rect x="430" y="140" width="170" height="22" rx="11" fill="#DBEAFE"/>
  <text x="442" y="155" class="font chip" fill="#2563EB">step_id: step-02</text>

  <!-- tool_name -->
  <rect x="250" y="170" width="220" height="26" rx="10" fill="#FFEDD5"/>
  <text x="262" y="188" class="font chip" fill="#EA580C">tool_name: send_email</text>

  <!-- sanitized_input -->
  <rect x="250" y="204" width="360" height="44" rx="10" fill="#DCFCE7"/>
  <text x="262" y="222" class="font chip" fill="#16A34A">sanitized_input</text>
  <text x="262" y="240" class="font muted">recipient / template_id / 订单号（脱敏快照）</text>

  <!-- result_summary -->
  <rect x="250" y="254" width="360" height="44" rx="10" fill="#FEF3C7"/>
  <text x="262" y="272" class="font chip" fill="#D97706">result_summary</text>
  <text x="262" y="290" class="font muted">成功/失败、返回码、阻断原因</text>

  <!-- Note -->
  <text x="250" y="328" class="font muted">日志里放摘要；原始输入输出单独落盘，避免日志爆炸</text>

  <!-- Right: Systems -->
  <rect x="30" y="240" width="170" height="86" rx="12" class="card"/>
  <text x="45" y="268" class="font text" font-weight="700" fill="#2563EB">链路追踪/日志系统</text>
  <text x="45" y="292" class="font muted">OpenTelemetry / 现有日志平台</text>
  <rect x="45" y="304" width="140" height="16" rx="8" fill="#DBEAFE"/>
  <text x="55" y="316" class="font chip" fill="#2563EB">统一字段查询</text>

  <rect x="460" y="320" width="170" height="66" rx="12" class="card"/>
  <text x="475" y="348" class="font text" font-weight="700" fill="#16A34A">对象存储/本地文件</text>
  <text x="475" y="370" class="font muted">原始 I/O 证据（按需回放）</text>

  <!-- Dashed connectors -->
  <!-- Trigger -> Center -->
  <path d="M 200 166 C 215 166, 215 166, 230 166" class="dash"/>
  <polygon points="230,166 222,162 222,170" class="arrow"/>

  <!-- Center -> Log system (down-left) -->
  <path d="M 310 308 C 260 330, 210 330, 200 283" class="dash"/>
  <polygon points="200,283 206,288 198,292" class="arrow"/>

  <!-- Center -> Object storage (down-right) -->
  <path d="M 520 308 C 555 318, 575 318, 560 320" class="dash"/>
  <polygon points="560,320 552,316 552,324" class="arrow"/>

  <!-- Legend -->
  <rect x="30" y="340" width="410" height="46" rx="12" class="card"/>
  <text x="45" y="366" class="font muted">查询路径：用 trace_id 串起任务，用 step_id 定位每次调用；再用存储路径取回原始证据</text>
</svg>