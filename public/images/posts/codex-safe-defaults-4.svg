<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:14px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .small { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#4B5563; }
      .line { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .tag { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:700; fill:#111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text x="30" y="48" class="title">方法论：默认禁用 → 逐步放行</text>
  <text x="30" y="70" class="small">从运行形态开始，逐步把权限/动作放到可审计、可回滚的轨道里</text>

  <!-- Flow connectors -->
  <path class="line" d="M 170 130 L 250 130"/>
  <path class="line" d="M 400 130 L 480 130"/>
  <path class="line" d="M 555 175 L 555 215"/>
  <path class="line" d="M 480 260 L 400 260"/>
  <path class="line" d="M 250 260 L 170 260"/>

  <!-- Cards row 1 -->
  <rect class="card" x="30" y="100" width="140" height="90" rx="12"/>
  <rect x="30" y="100" width="140" height="6" fill="#2563EB" rx="12"/>
  <text x="42" y="128" class="tag">Step 0</text>
  <text x="42" y="148" class="text">定运行形态</text>
  <text x="42" y="168" class="small">本地强隔离/禁网</text>
  <text x="42" y="184" class="small">CI 代理=job 有日志</text>

  <rect class="card" x="250" y="100" width="150" height="90" rx="12"/>
  <rect x="250" y="100" width="150" height="6" fill="#16A34A" rx="12"/>
  <text x="262" y="128" class="tag">Step 1</text>
  <text x="262" y="148" class="text">仓库默认只读</text>
  <text x="262" y="168" class="small">改动只能走 PR</text>
  <text x="262" y="184" class="small">可追溯成为默认</text>

  <rect class="card" x="480" y="100" width="150" height="90" rx="12"/>
  <rect x="480" y="100" width="150" height="6" fill="#EA580C" rx="12"/>
  <text x="492" y="128" class="tag">Step 2</text>
  <text x="492" y="148" class="text">命令白名单</text>
  <text x="492" y="168" class="small">允许 / 需确认 / 禁止</text>
  <text x="492" y="184" class="small">默认不执行高危动作</text>

  <!-- Cards row 2 -->
  <rect class="card" x="480" y="215" width="150" height="90" rx="12"/>
  <rect x="480" y="215" width="150" height="6" fill="#D97706" rx="12"/>
  <text x="492" y="243" class="tag">Step 3</text>
  <text x="492" y="263" class="text">密钥注入策略</text>
  <text x="492" y="283" class="small">只给需要的那一步</text>
  <text x="492" y="299" class="small">避免进 repo/日志/产物</text>

  <rect class="card" x="250" y="215" width="150" height="90" rx="12"/>
  <rect x="250" y="215" width="150" height="6" fill="#9333EA" rx="12"/>
  <text x="262" y="243" class="tag">Step 4</text>
  <text x="262" y="263" class="text">审计与回滚</text>
  <text x="262" y="283" class="small">命令清单/依赖/文件</text>
  <text x="262" y="299" class="small">PR 可回滚、CI 可复现</text>

  <!-- Bottom summary callout -->
  <rect class="card" x="30" y="310" width="600" height="60" rx="12"/>
  <rect x="30" y="310" width="600" height="6" fill="#2563EB" rx="12"/>
  <text x="42" y="342" class="text">核心思路：把“危险能力”改成默认不执行，通过确认/PR/审计把每一次放行变成可追溯的操作。</text>
  <text x="42" y="362" class="small">建议：先挑最危险的一个动作，改为“必须确认”，立刻提升控制感。</text>
</svg>