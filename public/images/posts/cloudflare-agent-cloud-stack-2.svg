<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">Agent 商用必须补齐的 4 个工程能力</text>
  <text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">少一个都难稳定上线</text>

  <line x1="330" y1="88" x2="170" y2="118" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="88" x2="490" y2="118" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="88" x2="170" y2="274" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="88" x2="490" y2="274" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="110" width="260" height="115" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="56" y="126" width="10" height="28" rx="5" fill="#2563EB"/>
  <text x="78" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">执行环境</text>
  <text x="78" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">症状：本地能跑，线上常超时或冷启动</text>
  <text x="78" y="192" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">需要：稳定运行、水平扩展、可控超时重试</text>
  <text x="78" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">示例积木：Workers</text>

  <rect x="360" y="110" width="260" height="115" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="376" y="126" width="10" height="28" rx="5" fill="#16A34A"/>
  <text x="398" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">状态 / 队列</text>
  <text x="398" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">症状：多轮任务易丢，并发一高就乱</text>
  <text x="398" y="192" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">需要：持久状态、幂等、排队、异步化</text>
  <text x="398" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">示例积木：Durable Objects / Queues</text>

  <rect x="40" y="250" width="260" height="115" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="56" y="266" width="10" height="28" rx="5" fill="#9333EA"/>
  <text x="78" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">权限与审计</text>
  <text x="78" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">症状：权限放不放心，出事难追责</text>
  <text x="78" y="332" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">需要：最小权限、可追溯日志、证据链</text>
  <text x="78" y="354" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">示例积木：Access / Zero Trust / Logs</text>

  <rect x="360" y="250" width="260" height="115" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="376" y="266" width="10" height="28" rx="5" fill="#EA580C"/>
  <text x="398" y="286" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">成本与限流</text>
  <text x="398" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">症状：成本飙升、工具失控、容易被刷</text>
  <text x="398" y="332" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">需要：预算、速率限制、降级策略、缓存</text>
  <text x="398" y="354" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">示例积木：Rate Limiting / Cache / Analytics</text>

  <rect x="236" y="72" width="188" height="32" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="330" y="93" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#D97706">核心价值：把运维骨架默认焊在一起</text>
</svg>