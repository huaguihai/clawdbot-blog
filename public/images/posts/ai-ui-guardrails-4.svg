<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .sub { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#6B7280; }
      .pillText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:700; fill:#FFFFFF; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="24" y="36">先别急着调参：5 个交互护栏在护什么？</text>
  <text class="sub" x="24" y="58">把“输出不稳 / 不可复核 / 不敢授权 / 误操作 / 不可审计”收敛到可治理的最小骨架</text>

  <!-- Center hub -->
  <rect class="card" x="230" y="146" width="200" height="108" rx="12"/>
  <text class="title" x="250" y="178">最低治理骨架</text>
  <text class="sub" x="250" y="202">5 个护栏组件</text>
  <text class="muted" x="250" y="226">先补缺口，再做优化与调参</text>

  <!-- Dashed connectors -->
  <path class="dash" d="M 230 200 C 170 200, 170 110, 170 92"/>
  <path class="dash" d="M 430 200 C 510 200, 510 110, 510 92"/>
  <path class="dash" d="M 230 200 C 160 200, 160 310, 170 338"/>
  <path class="dash" d="M 430 200 C 520 200, 520 310, 510 338"/>
  <path class="dash" d="M 330 254 C 330 300, 330 312, 330 338"/>

  <!-- Card 1: 输入规范 (Blue) -->
  <rect class="card" x="24" y="72" width="220" height="96" rx="12"/>
  <rect x="38" y="86" width="72" height="22" rx="11" fill="#2563EB"/>
  <text class="pillText" x="50" y="102">输入规范</text>
  <text class="sub" x="38" y="126">解决：用户不会提需求</text>
  <text class="muted" x="38" y="146">缺失：输出飘、复现难、支持成本高</text>
  <text class="muted" x="38" y="163">场景：生成 / 分析 / 客服</text>

  <!-- Card 2: 上下文注入 (Purple) -->
  <rect class="card" x="416" y="72" width="220" height="96" rx="12"/>
  <rect x="430" y="86" width="84" height="22" rx="11" fill="#9333EA"/>
  <text class="pillText" x="442" y="102">上下文注入</text>
  <text class="sub" x="430" y="126">解决：依据不透明</text>
  <text class="muted" x="430" y="146">缺失：像在猜，结果不可复核</text>
  <text class="muted" x="430" y="163">场景：知识库 / CRM / 项管</text>

  <!-- Card 3: 工具权限 (Orange) -->
  <rect class="card" x="24" y="304" width="220" height="96" rx="12"/>
  <rect x="38" y="318" width="72" height="22" rx="11" fill="#EA580C"/>
  <text class="pillText" x="50" y="334">工具权限</text>
  <text class="sub" x="38" y="358">解决：不敢让 AI 动数据</text>
  <text class="muted" x="38" y="378">缺失：不敢授权或出事难追责</text>
  <text class="muted" x="38" y="395">场景：邮件 / DB / 工单 / 发布</text>

  <!-- Card 4: 逐步确认 (Yellow) -->
  <rect class="card" x="416" y="304" width="220" height="96" rx="12"/>
  <rect x="430" y="318" width="72" height="22" rx="11" fill="#D97706"/>
  <text class="pillText" x="442" y="334">逐步确认</text>
  <text class="sub" x="430" y="358">解决：高风险动作缺刹车</text>
  <text class="muted" x="430" y="378">缺失：一次误操作造成真实损失</text>
  <text class="muted" x="430" y="395">场景：删除 / 发送 / 批改 / 付款</text>

  <!-- Card 5: 可追溯记录 (Green) -->
  <rect class="card" x="220" y="304" width="220" height="88" rx="12"/>
  <rect x="234" y="318" width="84" height="22" rx="11" fill="#16A34A"/>
  <text class="pillText" x="246" y="334">可追溯记录</text>
  <text class="sub" x="234" y="358">解决：事后能复盘与审计</text>
  <text class="muted" x="234" y="378">场景：企业内 AI / 多人协作 / 交付</text>
</svg>