<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="35" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#111827">五层交互安全架构</text><g><rect x="80" y="60" width="500" height="55" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="1"/><rect x="80" y="60" width="8" height="55" rx="4" fill="#2563EB"/><text x="100" y="85" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">1. 输入规范层</text><text x="100" y="103" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">结构化解析 + 前置过滤</text></g><g><rect x="80" y="125" width="500" height="55" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="1"/><rect x="80" y="125" width="8" height="55" rx="4" fill="#EA580C"/><text x="100" y="150" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">2. 上下文注入层</text><text x="100" y="168" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">最小必要原则 + 权限标记</text></g><g><rect x="80" y="190" width="500" height="55" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="1"/><rect x="80" y="190" width="8" height="55" rx="4" fill="#16A34A"/><text x="100" y="215" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">3. 工具权限层</text><text x="100" y="233" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">白名单 + 三级权限校验</text></g><g><rect x="80" y="255" width="500" height="55" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="1"/><rect x="80" y="255" width="8" height="55" rx="4" fill="#9333EA"/><text x="100" y="280" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">4. 逐步确认层</text><text x="100" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">预览 → 确认 → 执行</text></g><g><rect x="80" y="320" width="500" height="55" rx="8" fill="#fff" stroke="#E5E7EB" stroke-width="1"/><rect x="80" y="320" width="8" height="55" rx="4" fill="#D97706"/><text x="100" y="345" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">5. 可追溯记录层</text><text x="100" y="363" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">结构化日志 + 会话关联</text></g></svg>