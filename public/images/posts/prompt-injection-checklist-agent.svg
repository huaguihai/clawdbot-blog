<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' font-family='-apple-system, Segoe UI, sans-serif' font-size='18' font-weight='bold' fill='#1F2937' text-anchor='middle'>Agent 安全核心矛盾：消失的边界</text><rect x='40' y='80' width='270' height='280' rx='8' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><text x='175' y='110' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#4B5563' text-anchor='middle'>传统软件 (隔离模式)</text><rect x='70' y='130' width='210' height='60' rx='6' fill='#DBEAFE' stroke='#2563EB' stroke-width='1'/><text x='175' y='165' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#1E40AF' text-anchor='middle'>程序逻辑 (Code)</text><line x1='70' y1='215' x2='280' y2='215' stroke='#EF4444' stroke-width='2' stroke-dasharray='4'/><text x='175' y='210' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#EF4444' text-anchor='middle'>坚固的边界</text><rect x='70' y='240' width='210' height='60' rx='6' fill='#DCFCE7' stroke='#16A34A' stroke-width='1'/><text x='175' y='275' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#166534' text-anchor='middle'>用户数据 (Data)</text><rect x='350' y='80' width='270' height='280' rx='8' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><text x='485' y='110' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#4B5563' text-anchor='middle'>LLM Agent (混合模式)</text><rect x='380' y='130' width='210' height='170' rx='6' fill='#F3F4F6' stroke='#9333EA' stroke-width='1'/><text x='485' y='155' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' font-weight='bold' fill='#6B21A8' text-anchor='middle'>上下文窗口 (Context Window)</text><rect x='395' y='170' width='180' height='40' rx='4' fill='#DBEAFE' stroke='#2563EB' stroke-width='1'/><text x='485' y='195' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#1E40AF' text-anchor='middle'>系统提示词 (指令)</text><rect x='395' y='220' width='180' height='40' rx='4' fill='#DCFCE7' stroke='#16A34A' stroke-width='1'/><text x='485' y='245' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#166534' text-anchor='middle'>用户输入 (数据)</text><path d='M585 240 Q620 240 600 190' stroke='#EA580C' stroke-width='2' fill='none' marker-end='url(#arrowhead)'/><text x='590' y='180' font-family='-apple-system, Segoe UI, sans-serif' font-size='11' fill='#EA580C' text-anchor='middle'>指令注入风险</text><defs><marker id='arrowhead' markerWidth='10' markerHeight='7' refX='0' refY='3.5' orient='auto'><polygon points='0 0, 10 3.5, 0 7' fill='#EA580C'/></marker></defs><text x='485' y='330' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280' text-anchor='middle'>模型无法 100% 分辨谁是“老板”</text></svg>