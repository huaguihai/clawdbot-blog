<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA" />
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">你真正需要的不是更聪明的 Agent</text>
  <text x="330" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">而是可回放、可打分、可灰度</text>

  <line x1="190" y1="180" x2="250" y2="180" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 6" />
  <line x1="410" y1="180" x2="470" y2="180" stroke="#94A3B8" stroke-width="3" stroke-dasharray="8 6" />

  <g filter="url(#shadow)">
    <rect x="40" y="105" width="150" height="150" rx="16" fill="#FFFFFF" />
    <circle cx="78" cy="141" r="22" fill="#DBEAFE" />
    <text x="78" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563EB">1</text>
    <text x="115" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">回放集</text>
    <text x="60" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">从生产日志抽取真实</text>
    <text x="60" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">对话与任务样本</text>
    <text x="60" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">沉淀为版本化数据集</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="255" y="105" width="150" height="150" rx="16" fill="#FFFFFF" />
    <circle cx="293" cy="141" r="22" fill="#FDE7DA" />
    <text x="293" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">2</text>
    <text x="330" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#EA580C">离线打分</text>
    <text x="275" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">规则与评分器批量跑</text>
    <text x="275" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">得到可比较指标</text>
    <text x="275" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">为版本决策提供依据</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="470" y="105" width="150" height="150" rx="16" fill="#FFFFFF" />
    <circle cx="508" cy="141" r="22" fill="#DCFCE7" />
    <text x="508" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">3</text>
    <text x="545" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#16A34A">线上对照</text>
    <text x="490" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">Shadow 或 Canary</text>
    <text x="490" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">A/B 对照观察阈值</text>
    <text x="490" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">自动回滚或降级</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="65" y="287" width="530" height="72" rx="16" fill="#FFFFFF" />
    <rect x="81" y="304" width="118" height="38" rx="10" fill="#FEF3C7" />
    <text x="140" y="328" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">重点盯行为指标</text>
    <text x="220" y="315" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">工具调用</text>
    <text x="300" y="315" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">成本</text>
    <text x="352" y="315" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">拒绝率</text>
    <text x="430" y="315" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">越权尝试率</text>
    <text x="220" y="339" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#9333EA">不要只看最终文本是否“像对”</text>
  </g>
</svg>