<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">先判断：用户在等答案，还是在等动作</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心不是模型会不会说，而是问题是否需要落到系统动作与流程留痕</text>

  <rect x="230" y="88" width="200" height="64" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="114" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">用户问题进入支持入口</text>
  <text x="330" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">先分辨需求类型，而不是直接生成回复</text>

  <line x1="330" y1="152" x2="330" y2="184" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6"/>
  <polygon points="330,192 324,182 336,182" fill="#9333EA"/>

  <rect x="250" y="188" width="160" height="58" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="212" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#9333EA">这是知识问题吗？</text>
  <text x="330" y="232" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">只需解释，还是必须推动状态变化</text>

  <line x1="250" y1="217" x2="126" y2="217" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="410" y1="217" x2="534" y2="217" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>

  <text x="176" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#2563EB">是</text>
  <text x="484" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#EA580C">否</text>

  <rect x="40" y="168" width="170" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="168" width="170" height="10" rx="16" fill="#DBEAFE"/>
  <text x="125" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563EB">答案型</text>
  <text x="125" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">示例：怎么重置密码？</text>
  <text x="125" y="248" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">适合 FAQ / 知识库 /</text>
  <text x="125" y="267" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">标准回复模板</text>
  <text x="125" y="291" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">目标：快速给到正确解释</text>

  <rect x="450" y="148" width="170" height="180" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="450" y="148" width="170" height="10" rx="16" fill="#FED7AA"/>
  <text x="535" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">动作型</text>
  <text x="535" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">示例：扣费未开通、退款进度、发票开具</text>
  <text x="535" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">必须查系统 / 改状态 / 留痕</text>
  <text x="535" y="252" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">不能只给“像那么回事”的解释</text>
  <text x="535" y="280" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">目标：推动结果真正发生</text>
  <text x="535" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">而不只是回答得流畅</text>

  <line x1="535" y1="328" x2="535" y2="348" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>

  <rect x="165" y="336" width="330" height="44" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="355" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">优先优化流程摩擦</text>
  <text x="330" y="372" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">别重复问、别丢信息、别让交接断掉，通常比盲目堆模型能力更见效</text>
</svg>