<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:18px; font-weight:700; fill:#111827; }
      .subtitle { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6B7280; }
      .h { font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; font-weight:700; fill:#111827; }
      .t { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .small { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#374151; }
      .pill { fill:#F3F4F6; stroke:#E5E7EB; }
      .dash { stroke:#9CA3AF; stroke-width:1.2; stroke-dasharray:5 5; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text class="title" x="30" y="46">3 条 AI 工作流：一周内见数的搭法</text>
  <text class="subtitle" x="30" y="68">每条统一 5 件套：输入模板 → 系统指令 → 固定输出 → 指标阈值 → 常见坑（迭代样本）</text>

  <!-- Top dashed flow hint -->
  <path class="dash" d="M30 88 H630"/>

  <!-- Cards layout -->
  <!-- Card 1: Email -->
  <rect class="card" x="30" y="110" width="190" height="240" rx="12"/>
  <rect x="30" y="110" width="190" height="42" rx="12" fill="#2563EB"/>
  <text x="44" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">工作流 1：邮件首稿</text>

  <circle cx="50" cy="168" r="6" fill="#2563EB"/>
  <text class="h" x="64" y="172">输入模板</text>
  <text class="t" x="64" y="190">场景/原文/语气/要点/限制词</text>

  <circle cx="50" cy="214" r="6" fill="#9333EA"/>
  <text class="h" x="64" y="218">系统指令</text>
  <text class="t" x="64" y="236">主题&lt;50字，2-3段，禁词</text>

  <circle cx="50" cy="260" r="6" fill="#16A34A"/>
  <text class="h" x="64" y="264">固定输出</text>
  <text class="t" x="64" y="282">主题/正文/下一步/风险提醒</text>

  <circle cx="50" cy="306" r="6" fill="#D97706"/>
  <text class="h" x="64" y="310">指标阈值</text>
  <text class="t" x="64" y="328">≤5分钟，采纳≥70%，返工≤1</text>

  <!-- Card 2: Minutes -->
  <rect class="card" x="235" y="110" width="190" height="240" rx="12"/>
  <rect x="235" y="110" width="190" height="42" rx="12" fill="#16A34A"/>
  <text x="249" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">工作流 2：会议纪要</text>

  <circle cx="255" cy="168" r="6" fill="#2563EB"/>
  <text class="h" x="269" y="172">输入模板</text>
  <text class="t" x="269" y="190">主题/角色/目标/转写/口径</text>

  <circle cx="255" cy="214" r="6" fill="#9333EA"/>
  <text class="h" x="269" y="218">系统指令</text>
  <text class="t" x="269" y="236">摘要+决策+待办+风险+[待确认]</text>

  <circle cx="255" cy="260" r="6" fill="#16A34A"/>
  <text class="h" x="269" y="264">固定输出</text>
  <text class="t" x="269" y="282">Action Items 含负责人/截止/依赖</text>

  <circle cx="255" cy="306" r="6" fill="#D97706"/>
  <text class="h" x="269" y="310">指标阈值</text>
  <text class="t" x="269" y="328">≤10分钟，遗漏≤1，确认≥90%</text>

  <!-- Card 3: Translation -->
  <rect class="card" x="440" y="110" width="190" height="240" rx="12"/>
  <rect x="440" y="110" width="190" height="42" rx="12" fill="#EA580C"/>
  <text x="454" y="136" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">工作流 3：双语润色</text>

  <circle cx="460" cy="168" r="6" fill="#2563EB"/>
  <text class="h" x="474" y="172">输入模板</text>
  <text class="t" x="474" y="190">原文/目标语/口吻/术语表/场景</text>

  <circle cx="460" cy="214" r="6" fill="#9333EA"/>
  <text class="h" x="474" y="218">系统指令</text>
  <text class="t" x="474" y="236">严格术语，不增减事实，给两版</text>

  <circle cx="460" cy="260" r="6" fill="#16A34A"/>
  <text class="h" x="474" y="264">固定输出</text>
  <text class="t" x="474" y="282">A/B版本+术语检查+本地化+清单</text>

  <circle cx="460" cy="306" r="6" fill="#D97706"/>
  <text class="h" x="474" y="310">指标阈值</text>
  <text class="t" x="474" y="328">返工≤1，审校≤10分/千字，偏差=0</text>

  <!-- Dashed connectors between cards (shared structure) -->
  <path class="dash" d="M220 230 H235"/>
  <path class="dash" d="M425 230 H440"/>

  <!-- Bottom summary pill -->
  <rect class="pill" x="30" y="360" width="600" height="22" rx="11"/>
  <text class="small" x="44" y="375">落地要点：先做“首稿/纪要/润色”，用指标驱动迭代；不接自动发送；不喂全量敏感数据</text>
</svg>