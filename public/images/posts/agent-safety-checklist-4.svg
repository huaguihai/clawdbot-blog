<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .subtitle { font-size: 12px; fill: #374151; }
      .cardTitle { font-size: 14px; font-weight: 700; fill: #111827; }
      .item { font-size: 12px; fill: #111827; }
      .muted { font-size: 11px; fill: #6B7280; }
      .dash { stroke-dasharray: 6 6; }
    </style>
  </defs>

  <!-- Header -->
  <text x="28" y="38" class="font title">体检对象：典型 Agent 的工具能力与安全三问</text>
  <text x="28" y="60" class="font subtitle">任何一次工具调用，都要回答：来源、影响面、可逆性</text>

  <!-- Left: Agent tools -->
  <g filter="url(#shadow)">
    <rect x="28" y="86" width="290" height="286" rx="12" fill="#FFFFFF"/>
  </g>
  <text x="48" y="114" class="font cardTitle">Agent 的“手脚”（工具面）</text>

  <!-- Read -->
  <rect x="48" y="132" width="250" height="52" rx="10" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="62" y="154" class="font item" fill="#2563EB">读（Read）</text>
  <text x="140" y="154" class="font item">Gmail / IMAP、工单系统</text>
  <text x="140" y="172" class="font item">网页抓取</text>

  <!-- Write -->
  <rect x="48" y="194" width="250" height="52" rx="10" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="62" y="216" class="font item" fill="#16A34A">写（Write）</text>
  <text x="140" y="216" class="font item">PostgreSQL / MySQL</text>
  <text x="140" y="234" class="font item">Notion / 飞书、Google Sheet</text>

  <!-- Send -->
  <rect x="48" y="256" width="250" height="52" rx="10" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="62" y="278" class="font item" fill="#EA580C">发（Send）</text>
  <text x="140" y="278" class="font item">SMTP、Slack / Discord</text>
  <text x="140" y="296" class="font item">短信</text>

  <!-- Call -->
  <rect x="48" y="318" width="250" height="44" rx="10" fill="#F5F3FF" stroke="#9333EA"/>
  <text x="62" y="346" class="font item" fill="#9333EA">调（Call API）</text>
  <text x="170" y="346" class="font item">Stripe / Shopify / 自家 API</text>

  <!-- Right: three questions -->
  <g filter="url(#shadow)">
    <rect x="342" y="86" width="290" height="286" rx="12" fill="#FFFFFF"/>
  </g>
  <text x="362" y="114" class="font cardTitle">每次工具调用的“三句话”</text>
  <text x="362" y="134" class="font muted">用来驱动后续四类风险测试</text>

  <!-- Q1 -->
  <rect x="362" y="154" width="250" height="58" rx="10" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="378" y="178" class="font item" fill="#2563EB">1）来源（谁下的指令）</text>
  <text x="378" y="198" class="font muted">用户、系统、外部消息、插件等</text>

  <!-- Q2 -->
  <rect x="362" y="224" width="250" height="58" rx="10" fill="#FFFBEB" stroke="#D97706"/>
  <text x="378" y="248" class="font item" fill="#D97706">2）影响面（动了哪块资产）</text>
  <text x="378" y="268" class="font muted">账户、资金、数据、状态、对外输出</text>

  <!-- Q3 -->
  <rect x="362" y="294" width="250" height="58" rx="10" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="378" y="318" class="font item" fill="#16A34A">3）可逆性（能否撤回）</text>
  <text x="378" y="338" class="font muted">回滚、撤销、补偿、审计追踪</text>

  <!-- Connector -->
  <line x1="318" y1="229" x2="342" y2="229" stroke="#9CA3AF" stroke-width="2" class="dash"/>
  <polygon points="342,229 334,224 334,234" fill="#9CA3AF"/>
  <text x="320" y="214" class="font muted" text-anchor="end">每次调用</text>

  <!-- Footer note -->
  <text x="28" y="388" class="font muted">提示：只要能对外发送、改状态、触及账户或数据，就不再是“只是摘要”。</text>
</svg>