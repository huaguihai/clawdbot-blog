<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><text x="330" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">run 工具：命令菜单设计</text><rect x="240" y="54" width="180" height="48" rx="10" fill="#2563EB" filter="url(#s)"/><text x="330" y="74" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AI 模型</text><text x="330" y="92" text-anchor="middle" font-size="11" fill="#BFDBFE">只负责"点菜"</text><line x1="330" y1="102" x2="330" y2="130" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/><rect x="220" y="130" width="220" height="44" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/><text x="330" y="150" text-anchor="middle" font-size="13" font-weight="700" fill="#9333EA">代理 CLI（ops）</text><text x="330" y="166" text-anchor="middle" font-size="11" fill="#A855F7">统一入口 · 只读默认 · 可审计</text><line x1="220" y1="152" x2="100" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/><line x1="330" y1="174" x2="330" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/><line x1="440" y1="152" x2="560" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5,3"/><rect x="30" y="200" width="140" height="116" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/><rect x="30" y="200" width="140" height="28" rx="10" fill="#16A34A"/><rect x="30" y="216" width="140" height="12" rx="0" fill="#16A34A"/><text x="100" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">📂 文件与文本</text><text x="44" y="244" font-size="11" fill="#374151">ls / find</text><text x="44" y="260" font-size="11" fill="#374151">cat / grep / awk</text><text x="44" y="276" font-size="11" fill="#374151">sed / jq</text><text x="44" y="300" font-size="10" fill="#6B7280">仅限工作目录</text><rect x="245" y="200" width="170" height="116" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/><rect x="245" y="200" width="170" height="28" rx="10" fill="#EA580C"/><rect x="245" y="216" width="170" height="12" rx="0" fill="#EA580C"/><text x="330" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🛠️ 诊断与调试</text><text x="259" y="244" font-size="11" fill="#374151">tail -n / head -n</text><text x="259" y="260" font-size="11" fill="#374151">ops logs ...</text><text x="259" y="276" font-size="11" fill="#374151">ops status ...</text><text x="259" y="300" font-size="10" fill="#6B7280">限制行数输出</text><rect x="490" y="200" width="140" height="116" rx="10" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" filter="url(#s)"/><rect x="490" y="200" width="140" height="28" rx="10" fill="#D97706"/><rect x="490" y="216" width="140" height="12" rx="0" fill="#D97706"/><text x="560" y="219" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">🎯 外部请求</text><text x="504" y="244" font-size="11" fill="#374151">curl</text><text x="504" y="260" font-size="11" fill="#374151">域名白名单</text><text x="504" y="276" font-size="11" fill="#374151">超时 + 大小限制</text><text x="504" y="300" font-size="10" fill="#6B7280">慎用</text><rect x="140" y="348" width="380" height="36" rx="8" fill="#F1F5F9" stroke="#CBD5E1" stroke-width="1"/><text x="330" y="363" text-anchor="middle" font-size="11" fill="#475569" font-weight="600">核心原则：菜单越短越稳定，输出越短越可复核</text><text x="330" y="378" text-anchor="middle" font-size="10" fill="#94A3B8">每条命令支持 --help · 输出纯文本或 JSON</text><defs><filter id="s" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0000001a"/></filter></defs></svg>