<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Agent 工具权限隔离：按风险分层授权</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心原则：每个任务只拿到当下需要的工具</text><rect x="40" y="95" width="170" height="230" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><rect x="245" y="95" width="170" height="230" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><rect x="450" y="95" width="170" height="230" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><rect x="60" y="112" width="130" height="34" rx="10" fill="#2563EB"/><text x="125" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">低风险</text><text x="125" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">可自动执行</text><text x="60" y="190" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 搜索公开网页</text><text x="60" y="216" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 读取公开文档</text><text x="60" y="242" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 格式转换</text><rect x="265" y="112" width="130" height="34" rx="10" fill="#EA580C"/><text x="330" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">中风险</text><text x="330" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#D97706">尽量人工确认</text><text x="265" y="190" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 写草稿</text><text x="265" y="216" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 生成待审核回复</text><text x="265" y="242" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 建待确认任务</text><rect x="470" y="112" width="130" height="34" rx="10" fill="#9333EA"/><text x="535" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">高风险</text><text x="535" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#DC2626">默认禁止自动执行</text><text x="470" y="190" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 发邮件 / 调内部 API</text><text x="470" y="216" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 改数据 / 付款</text><text x="470" y="242" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 执行命令 / 访后台</text><line x1="210" y1="210" x2="245" y2="210" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="415" y1="210" x2="450" y2="210" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="120" y="340" width="420" height="38" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/><text x="330" y="364" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">别把“能调用”当成“该调用”</text><text x="330" y="383" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">任务越具体，挂载工具越少，注入后的破坏面越小</text></svg>