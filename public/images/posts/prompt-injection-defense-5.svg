<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/></marker></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1F2937">高风险动作一律二次确认</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不可逆或影响外部世界的操作，必须先计划、再确认、后执行</text><rect x="40" y="95" width="170" height="92" rx="12" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/><text x="125" y="123" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">高风险请求</text><text x="125" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">发邮件 / 删记录</text><text x="125" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">改配置 / 外发内容</text><rect x="245" y="95" width="170" height="92" rx="12" fill="#FFFFFF" stroke="#FCD34D" filter="url(#shadow)"/><text x="330" y="123" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">阶段一：生成计划</text><text x="330" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">只输出将要执行什么</text><text x="330" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">暂不直接落地</text><rect x="450" y="95" width="170" height="92" rx="12" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/><text x="535" y="123" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">阶段二：确认执行</text><text x="535" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">人工或规则引擎确认</text><text x="535" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">通过后才能执行</text><line x1="210" y1="141" x2="245" y2="141" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="415" y1="141" x2="450" y2="141" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="90" y="235" width="480" height="120" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/><text x="330" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">确认信息必须具体</text><rect x="118" y="279" width="92" height="48" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/><text x="164" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">收件人</text><text x="164" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">对谁执行</text><rect x="223" y="279" width="92" height="48" rx="10" fill="#FFF7ED" stroke="#FED7AA"/><text x="269" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">主题/动作</text><text x="269" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">具体做什么</text><rect x="328" y="279" width="92" height="48" rx="10" fill="#F0FDF4" stroke="#BBF7D0"/><text x="374" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">正文摘要</text><text x="374" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">核心内容</text><rect x="433" y="279" width="92" height="48" rx="10" fill="#FAF5FF" stroke="#E9D5FF"/><text x="479" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">依据来源</text><text x="479" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">为什么这样做</text><line x1="535" y1="187" x2="535" y2="235" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><text x="70" y="380" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不要只弹出“是否确认执行”——要让人一眼看懂：对谁做什么，依据是什么</text></svg>