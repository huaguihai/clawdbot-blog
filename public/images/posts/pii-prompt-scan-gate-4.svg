<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .sub { font-size: 12px; fill: #374151; }
      .h { font-size: 13px; font-weight: 700; fill: #111827; }
      .p { font-size: 12px; fill: #374151; }
      .mono { font-size: 12px; fill: #111827; font-weight: 600; }
    </style>
  </defs>

  <!-- Header -->
  <text x="28" y="40" class="font title">本地扫描组合：PII vs Secrets</text>
  <text x="28" y="62" class="font sub">两类工具定位不同：文本中的个人信息 vs 串状密钥</text>

  <!-- Left card: Presidio -->
  <rect x="28" y="90" width="296" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="28" y="90" width="296" height="44" rx="12" fill="#2563EB"/>
  <text x="44" y="118" class="font" font-size="16" font-weight="800" fill="#FFFFFF">Microsoft Presidio</text>
  <text x="44" y="138" class="font" font-size="12" fill="#DBEAFE">PII 识别与脱敏框架</text>

  <circle cx="52" cy="172" r="6" fill="#16A34A"/>
  <text x="66" y="176" class="font h">擅长抓</text>
  <text x="66" y="196" class="font p">邮箱、手机号、姓名、地址等</text>
  <text x="66" y="214" class="font p">“像 PII 的自然语言文本”</text>

  <circle cx="52" cy="244" r="6" fill="#EA580C"/>
  <text x="66" y="248" class="font h">不擅长</text>
  <text x="66" y="268" class="font p">供应商各异的 Key 形态</text>

  <circle cx="52" cy="296" r="6" fill="#9333EA"/>
  <text x="66" y="300" class="font h">更适合放</text>
  <text x="66" y="320" class="font p">浏览器 / IDE / CLI 的“文本入口”</text>

  <!-- Right card: Gitleaks -->
  <rect x="336" y="90" width="296" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="336" y="90" width="296" height="44" rx="12" fill="#D97706"/>
  <text x="352" y="118" class="font" font-size="16" font-weight="800" fill="#FFFFFF">Gitleaks</text>
  <text x="352" y="138" class="font" font-size="12" fill="#FEF3C7">Secrets 扫描（Token / Key）</text>

  <circle cx="360" cy="172" r="6" fill="#16A34A"/>
  <text x="374" y="176" class="font h">擅长抓</text>
  <text x="374" y="196" class="font p">Token、API Key、私钥等</text>
  <text x="374" y="214" class="font p">“像 Secrets 的高熵字符串”</text>

  <circle cx="360" cy="244" r="6" fill="#EA580C"/>
  <text x="374" y="248" class="font h">不擅长</text>
  <text x="374" y="268" class="font p">自然语言里的个人信息</text>

  <circle cx="360" cy="296" r="6" fill="#9333EA"/>
  <text x="374" y="300" class="font h">更适合放</text>
  <text x="374" y="320" class="font p">pre-commit / 粘贴前 / 导出前</text>

  <!-- Dashed relationship line -->
  <line x1="324" y1="205" x2="336" y2="205" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Bottom recommendation callout -->
  <rect x="28" y="334" width="604" height="46" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="52" cy="357" r="8" fill="#2563EB"/>
  <text x="68" y="353" class="font mono">优先级建议：</text>
  <text x="170" y="353" class="font p">如果你最怕“把 Key 发出去”，先上</text>
  <text x="430" y="353" class="font" font-size="12" font-weight="800" fill="#D97706">Gitleaks</text>
  <text x="484" y="353" class="font p">收益最直观</text>

  <!-- Small legend tag -->
  <rect x="520" y="346" width="96" height="22" rx="11" fill="#DBEAFE"/>
  <text x="568" y="361" text-anchor="middle" class="font" font-size="11" font-weight="700" fill="#2563EB">本地可落地</text>
</svg>