<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif"><rect width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">什么时候不该用小模型？</text><g transform="translate(30, 55)"><rect width="290" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/><rect width="290" height="80" rx="10" fill="white" filter="url(#shadow)"/><text x="15" y="24" font-size="13" font-weight="700" fill="#9333EA">&#x1F9E0; 复杂推理任务</text><text x="15" y="44" font-size="11" fill="#64748B">GPQA Diamond 得分对比</text><rect x="15" y="54" width="220" height="8" rx="4" fill="#F1F5F9"/><rect x="15" y="54" width="220" height="8" rx="4" fill="#9333EA" opacity="0.2"/><rect x="15" y="54" width="204" height="8" rx="4" fill="#9333EA" opacity="0.4"/><rect x="15" y="54" width="193" height="8" rx="4" fill="#9333EA"/><text x="240" y="63" font-size="9" fill="#9333EA" font-weight="600">93 / 88 / 82.8%</text></g><g transform="translate(340, 55)"><rect width="290" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/><rect width="290" height="80" rx="10" fill="white" filter="url(#shadow)"/><text x="15" y="24" font-size="13" font-weight="700" fill="#2563EB">&#x1F3D7; 深度规划任务</text><text x="15" y="44" font-size="11" fill="#64748B">系统架构 / 技术方案 / 业务分析</text><text x="15" y="63" font-size="10" fill="#94A3B8">小模型容易跳步或遗漏细节</text></g><g transform="translate(30, 150)"><rect width="290" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/><rect width="290" height="80" rx="10" fill="white" filter="url(#shadow)"/><text x="15" y="24" font-size="13" font-weight="700" fill="#EA580C">&#x1F527; 长工具调用链任务</text><text x="15" y="44" font-size="11" fill="#64748B">Toolathlon 得分对比</text><rect x="15" y="54" width="220" height="8" rx="4" fill="#F1F5F9"/><rect x="15" y="54" width="220" height="8" rx="4" fill="#EA580C" opacity="0.15"/><rect x="15" y="54" width="173" height="8" rx="4" fill="#EA580C" opacity="0.35"/><rect x="15" y="54" width="120" height="8" rx="4" fill="#EA580C"/><text x="240" y="63" font-size="9" fill="#EA580C" font-weight="600">54.6 / 42.9 / 35.5%</text></g><g transform="translate(340, 150)"><rect width="290" height="80" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/><rect width="290" height="80" rx="10" fill="white" filter="url(#shadow)"/><text x="15" y="24" font-size="13" font-weight="700" fill="#16A34A">&#x1F4B0; 一次性任务</text><text x="15" y="44" font-size="11" fill="#64748B">成本差距仅几分钱</text><text x="15" y="63" font-size="10" fill="#94A3B8">小模型价值在高频场景，非单次</text></g><line x1="330" y1="260" x2="330" y2="270" stroke="#CBD5E1" stroke-width="1" stroke-dasharray="4,3"/><rect x="80" y="270" width="500" height="110" rx="10" fill="white" stroke="#E2E8F0" stroke-width="1"/><text x="330" y="295" text-anchor="middle" font-size="13" font-weight="700" fill="#1E293B">模型性能梯度示意</text><g transform="translate(100, 310)"><rect x="0" y="0" width="140" height="24" rx="6" fill="#2563EB"/><text x="70" y="16" text-anchor="middle" font-size="11" fill="white" font-weight="600">GPT-5.4 &#x2014; 最强</text><rect x="155" y="0" width="140" height="24" rx="6" fill="#D97706"/><text x="225" y="16" text-anchor="middle" font-size="11" fill="white" font-weight="600">mini &#x2014; 均衡</text><rect x="310" y="0" width="140" height="24" rx="6" fill="#94A3B8"/><text x="380" y="16" text-anchor="middle" font-size="11" fill="white" font-weight="600">nano &#x2014; 轻量</text></g><g transform="translate(100, 345)"><line x1="0" y1="8" x2="450" y2="8" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6,4"/><polygon points="450,3 460,8 450,13" fill="#CBD5E1"/><text x="0" y="25" font-size="10" fill="#94A3B8">能力强 / 成本高</text><text x="380" y="25" font-size="10" fill="#94A3B8">成本低 / 适合高频</text></g><defs><filter id="shadow" x="-2%" y="-2%" width="104%" height="108%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.06"/></filter></defs