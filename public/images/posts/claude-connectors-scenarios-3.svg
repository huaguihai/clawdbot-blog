<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Claude 会前准备核心流程</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">把日历、邮件、文档整合成开会前 3 分钟可用的会前简报</text><rect x="40" y="110" width="150" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><rect x="255" y="110" width="150" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><rect x="470" y="110" width="150" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/><text x="115" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">输入信息</text><text x="115" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">日历信息</text><text x="115" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">最近往来邮件</text><text x="115" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">关联文档</text><text x="330" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">Claude 处理</text><text x="330" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">读取并对齐上下文</text><text x="330" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">提取未决点与矛盾</text><text x="330" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">只基于已有信息总结</text><text x="545" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">会前简报输出</text><text x="545" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">会议目标</text><text x="545" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">对方关注点与风险</text><text x="545" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">建议先问的问题</text><line x1="190" y1="158" x2="255" y2="158" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/><polygon points="255,158 247,154 247,162" fill="#9333EA"/><line x1="405" y1="158" x2="470" y2="158" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/><polygon points="470,158 462,154 462,162" fill="#9333EA"/><rect x="90" y="262" width="480" height="92" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/><text x="330" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">为什么这个场景适合先试</text><circle cx="140" cy="317" r="6" fill="#2563EB"/><text x="154" y="321" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">以“读”和“整”为主，不替你做决定</text><circle cx="340" cy="317" r="6" fill="#EA580C"/><text x="354" y="321" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">能发现未决点和资料矛盾</text><circle cx="140" cy="339" r="6" fill="#16A34A"/><text x="154" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">风险边界清楚，引用已有信息</text><circle cx="340" cy="339" r="6" fill="#9333EA"/><text x="354" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">节省会前翻资料和热身时间</text></svg>