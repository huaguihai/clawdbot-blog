<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="636" height="376" rx="12" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="330" y="44" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#0F172A" font-weight="700">Prompt vs 行为说明书（Model Spec）</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">一句交代（当下） vs 一套 SOP（长期）</text>

  <!-- Left card: Prompt -->
  <rect x="44" y="92" width="270" height="268" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="44" y="92" width="270" height="44" rx="12" fill="#EFF6FF"/>
  <text x="64" y="120" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#2563EB" font-weight="700">普通 Prompt</text>
  <text x="246" y="120" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">“现在做什么”</text>

  <!-- Prompt rows -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">
    <circle cx="64" cy="160" r="4" fill="#2563EB"/>
    <text x="76" y="164" fill="#0F172A"><tspan font-weight="700">作用：</tspan>交代当前任务</text>

    <circle cx="64" cy="196" r="4" fill="#2563EB"/>
    <text x="76" y="200"><tspan font-weight="700">稳定性：</tspan>易被上下文冲掉</text>

    <circle cx="64" cy="232" r="4" fill="#2563EB"/>
    <text x="76" y="236"><tspan font-weight="700">边界处理：</tspan>常靠临时补丁</text>

    <circle cx="64" cy="268" r="4" fill="#2563EB"/>
    <text x="76" y="272"><tspan font-weight="700">适合场景：</tspan>单次任务/个人</text>

    <circle cx="64" cy="304" r="4" fill="#2563EB"/>
    <text x="76" y="308"><tspan font-weight="700">出错方式：</tspan>坑不稳定、难复现</text>
  </g>

  <!-- Right card: Model Spec -->
  <rect x="346" y="92" width="270" height="268" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="346" y="92" width="270" height="44" rx="12" fill="#F5F3FF"/>
  <text x="366" y="120" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#9333EA" font-weight="700">行为说明书 / Model Spec</text>
  <text x="598" y="120" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">“长期怎么做事”</text>

  <!-- Model Spec rows -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">
    <circle cx="366" cy="160" r="4" fill="#9333EA"/>
    <text x="378" y="164"><tspan font-weight="700">作用：</tspan>沉淀可复用 SOP</text>

    <circle cx="366" cy="196" r="4" fill="#9333EA"/>
    <text x="378" y="200"><tspan font-weight="700">稳定性：</tspan>更适合固定规则</text>

    <circle cx="366" cy="232" r="4" fill="#9333EA"/>
    <text x="378" y="236"><tspan font-weight="700">边界处理：</tspan>先写优先级/禁区</text>

    <circle cx="366" cy="268" r="4" fill="#9333EA"/>
    <text x="378" y="272"><tspan font-weight="700">适合场景：</tspan>产品化/团队/用户</text>

    <circle cx="366" cy="304" r="4" fill="#9333EA"/>
    <text x="378" y="308"><tspan font-weight="700">出错方式：</tspan>坑可预期、易修复</text>
  </g>

  <!-- Connector: evolution -->
  <line x1="314" y1="226" x2="346" y2="226" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <text x="330" y="212" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#2563EB">从“交代”走向“制度化”</text>

  <!-- Bottom note -->
  <rect x="44" y="344" width="572" height="28" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">
    抄一句开场白 ≠ 抄到运营能力（培训流程、复盘机制、事故预案）
  </text>
</svg>