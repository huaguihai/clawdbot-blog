<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/></marker></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">把“资料区”和“指令区”硬拆开</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心原则：系统规则与用户目标可驱动执行，外部资料只能提供证据</text><rect x="52" y="96" width="160" height="98" rx="16" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/><rect x="66" y="110" width="42" height="42" rx="10" fill="#DBEAFE"/><text x="87" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">1</text><text x="132" y="128" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">系统规则</text><text x="132" y="151" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">定义不可违背边界</text><text x="132" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">决定什么绝对不能做</text><rect x="250" y="96" width="160" height="98" rx="16" fill="#FFFFFF" stroke="#FDE68A" filter="url(#shadow)"/><rect x="264" y="110" width="42" height="42" rx="10" fill="#FEF3C7"/><text x="285" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#D97706">2</text><text x="330" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#92400E">用户目标</text><text x="330" y="151" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">定义本次任务要完成什么</text><text x="330" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">可驱动执行，但受规则约束</text><rect x="448" y="96" width="160" height="98" rx="16" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/><rect x="462" y="110" width="42" height="42" rx="10" fill="#DCFCE7"/><text x="483" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#16A34A">3</text><text x="528" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#166534">外部资料</text><text x="528" y="151" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">网页、邮件、附件、搜索结果</text><text x="528" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">只能当证据，不能直接发号施令</text><line x1="212" y1="145" x2="250" y2="145" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/><line x1="410" y1="145" x2="448" y2="145" stroke="#D97706" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowOrange)"/><rect x="96" y="238" width="468" height="102" rx="18" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/><text x="330" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">执行链路中的隔离原则</text><line x1="167" y1="290" x2="167" y2="318" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="330" y1="290" x2="330" y2="318" stroke="#D97706" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><line x1="493" y1="290" x2="493" y2="318" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><text x="167" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1E3A8A">高优先级约束</text><text x="330" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#92400E">明确任务方向</text><text x="493" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">仅提取事实信息</text><rect x="136" y="352" width="388" height="26" rx="13" fill="#F5F3FF" stroke="#DDD6FE"/><text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B21A8">提示词只能提醒；真正有效的是在数据结构层面完成“命令/资料”隔离</text></svg>