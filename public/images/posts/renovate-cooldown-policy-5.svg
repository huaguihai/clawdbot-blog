<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12px; fill:#374151; }
      .muted { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:11px; fill:#6B7280; }
      .pillText { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:11px; font-weight:700; fill:#111827; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .arrow { fill:#9CA3AF; }
      .blue { stroke:#2563EB; }
      .orange { stroke:#EA580C; }
      .green { stroke:#16A34A; }
      .purple { stroke:#9333EA; }
      .yellow { stroke:#D97706; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="28" y="44">只配冷却期不够：发布流水线的三道闸</text>
  <text class="muted" x="28" y="66">目标：在影响范围小的时候发现不兼容，并能快速回退</text>

  <!-- Cards -->
  <!-- PR + Diff -->
  <rect class="card" x="28" y="92" width="180" height="86" rx="12"/>
  <text class="text" x="44" y="118" font-weight="700" fill="#111827">依赖 PR / 升级提交</text>
  <text class="muted" x="44" y="142">进入审查前的变更入口</text>
  <text class="muted" x="44" y="160">含 package.json + lockfile</text>

  <!-- Gate 1 -->
  <rect class="card" x="240" y="92" width="190" height="120" rx="12"/>
  <rect x="254" y="104" width="84" height="20" rx="10" fill="#DBEAFE"/>
  <text class="pillText" x="264" y="119">闸 1</text>
  <text class="text" x="254" y="144" font-weight="700" fill="#111827">锁文件审查</text>
  <text class="muted" x="254" y="164">diff 是否可解释？</text>
  <text class="muted" x="254" y="182">脚本/跨生态/异常大改动</text>
  <rect x="415" y="92" width="15" height="120" rx="8" fill="#2563EB" opacity="0.12"/>

  <!-- Staging + Cooldown -->
  <rect class="card" x="460" y="92" width="172" height="120" rx="12"/>
  <text class="text" x="476" y="120" font-weight="700" fill="#111827">Staging 验证</text>
  <text class="muted" x="476" y="142">集成测试/冒烟</text>
  <rect x="476" y="154" width="140" height="28" rx="10" fill="#FEF3C7"/>
  <text class="pillText" x="486" y="172">冷却期：躲开刚发布不稳</text>
  <text class="muted" x="476" y="198">但躲不开不兼容</text>

  <!-- Gate 2 -->
  <rect class="card" x="110" y="244" width="220" height="128" rx="12"/>
  <rect x="124" y="256" width="84" height="20" rx="10" fill="#FFEDD5"/>
  <text class="pillText" x="134" y="271">闸 2</text>
  <text class="text" x="124" y="296" font-weight="700" fill="#111827">金丝雀发布</text>
  <text class="muted" x="124" y="316">少量实例/租户/区域/内网</text>
  <text class="muted" x="124" y="334">看：错误率、p95/p99、业务指标、资源</text>
  <rect x="314" y="244" width="16" height="128" rx="8" fill="#EA580C" opacity="0.12"/>

  <!-- Gate 3 -->
  <rect class="card" x="360" y="244" width="272" height="128" rx="12"/>
  <rect x="374" y="256" width="84" height="20" rx="10" fill="#DCFCE7"/>
  <text class="pillText" x="384" y="271">闸 3</text>
  <text class="text" x="374" y="296" font-weight="700" fill="#111827">一键回滚</text>
  <text class="muted" x="374" y="316">回到上个稳定镜像 / 上个 lockfile</text>
  <text class="muted" x="374" y="334">或禁用当前部署批次</text>
  <text class="muted" x="374" y="352">避免人肉改版本、重跑流水线</text>
  <rect x="616" y="244" width="16" height="128" rx="8" fill="#16A34A" opacity="0.12"/>

  <!-- Connectors (dashed) -->
  <!-- PR -> Gate1 -->
  <path class="dash" d="M 208 135 C 218 135, 224 135, 238 135"/>
  <polygon class="arrow" points="238,135 230,130 230,140"/>

  <!-- Gate1 -> Staging -->
  <path class="dash" d="M 430 152 C 440 152, 448 152, 458 152"/>
  <polygon class="arrow" points="458,152 450,147 450,157"/>

  <!-- Staging -> Canary (down-left) -->
  <path class="dash" d="M 546 212 C 546 238, 360 238, 330 272"/>
  <polygon class="arrow" points="330,272 331,263 338,269"/>

  <!-- Canary -> Rollback (right) -->
  <path class="dash" d="M 330 308 C 340 308, 348 308, 358 308"/>
  <polygon class="arrow" points="358,308 350,303 350,313"/>

  <!-- Rollback -> PR (feedback loop) -->
  <path class="dash" d="M 496 372 C 496 388, 64 388, 64 178"/>
  <path class="dash" d="M 64 178 C 64 164, 86 156, 110 156"/>
  <polygon class="arrow" points="110,156 102,151 102,161"/>

  <!-- Note: Full release after Canary -->
  <rect x="28" y="244" width="64" height="34" rx="12" fill="#EDE9FE"/>
  <text class="pillText" x="40" y="265">全量发布</text>
  <path class="dash" d="M 92 261 C 102 261, 106 261, 110 261"/>
  <polygon class="arrow" points="110,261 102,256 102,266"/>
  <text class="muted" x="28" y="292">全量在金丝雀稳定后再做</text>
</svg>