<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">会议纪要最适合先做成工作流</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">输入标准化 → 结构化整理 → 按三项验收</text>

  <rect x="38" y="92" width="170" height="214" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="38" y="92" width="170" height="44" rx="16" fill="#DBEAFE"/>
  <text x="123" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">输入材料</text>
  <rect x="56" y="150" width="134" height="32" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="123" y="171" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">会议转写文本</text>
  <rect x="56" y="190" width="134" height="32" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="123" y="211" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">会议目标</text>
  <rect x="56" y="230" width="134" height="32" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="123" y="251" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">固定输出模板</text>
  <rect x="56" y="270" width="134" height="32" rx="10" fill="#EFF6FF" stroke="#93C5FD"/>
  <text x="123" y="291" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">待办与决定定义</text>

  <rect x="245" y="92" width="170" height="214" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="245" y="92" width="170" height="44" rx="16" fill="#FFEDD5"/>
  <text x="330" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">GPT 整理</text>
  <text x="330" y="161" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">按固定结构输出</text>
  <text x="330" y="189" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">3-5 条核心结论</text>
  <text x="330" y="213" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">待办：负责人 / 时间 / 依赖</text>
  <text x="330" y="237" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">未决问题与风险</text>
  <text x="330" y="261" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">信息不足标“待确认”</text>
  <text x="330" y="285" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不复述闲聊和口头语</text>

  <rect x="452" y="92" width="170" height="214" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="452" y="92" width="170" height="44" rx="16" fill="#DCFCE7"/>
  <text x="537" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">三项验收</text>
  <rect x="470" y="148" width="134" height="40" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="537" y="165" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">结论提取</text>
  <text x="537" y="181" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">别把讨论过程当结论</text>
  <rect x="470" y="198" width="134" height="40" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="537" y="215" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">待办拆分</text>
  <text x="537" y="231" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">必须有负责人、时间、依赖</text>
  <rect x="470" y="248" width="134" height="40" rx="10" fill="#F0FDF4" stroke="#86EFAC"/>
  <text x="537" y="265" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">风险标注</text>
  <text x="537" y="281" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">别把不确定写成确定结果</text>

  <line x1="208" y1="199" x2="245" y2="199" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
  <line x1="415" y1="199" x2="452" y2="199" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowOrange)"/>

  <rect x="84" y="328" width="492" height="46" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="110" cy="351" r="10" fill="#9333EA"/>
  <text x="128" y="356" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#111827">为什么适合先试点：</text>
  <text x="260" y="356" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">输入输出标准、错误易发现、像“归位整理”而非“创造判断”</text>

  <path d="M537 306 C537 324, 480 324, 480 338" fill="none" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
  <path d="M123 306 C123 324, 180 324, 180 338" fill="none" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M330 306 C330 324, 330 324, 330 338" fill="none" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/>
</svg>