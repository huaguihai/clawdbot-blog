<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">Hy-MT2 到底看哪一档</text>
  <text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">从端侧试水到高算力上限的四档选型</text>

  <line x1="110" y1="86" x2="550" y2="86" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="110" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">更省资源</text>
  <text x="550" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">效果上限更高</text>

  <g filter="url(#shadow)">
    <rect x="30" y="100" width="140" height="210" rx="14" fill="#FFFFFF"/>
    <rect x="30" y="100" width="140" height="8" rx="14" fill="#16A34A"/>
    <text x="100" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">1.8B</text>
    <text x="100" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">1.25Bit-GGUF</text>
    <text x="100" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">440MB 极致量化</text>
    <text x="100" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">主流手机芯片可本地跑</text>
    <text x="100" y="218" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">速度较 Hy-MT1.5 快 1.5×</text>
    <rect x="47" y="246" width="106" height="28" rx="14" fill="#DCFCE7"/>
    <text x="100" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#166534">端侧 / 离线优先</text>
    <rect x="48" y="282" width="104" height="20" rx="10" fill="#16A34A" opacity="0.12"/>
    <text x="100" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#166534">想省钱先看它</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="185" y="100" width="140" height="210" rx="14" fill="#FFFFFF"/>
    <rect x="185" y="100" width="140" height="8" rx="14" fill="#2563EB"/>
    <text x="255" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563EB">1.8B</text>
    <text x="255" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">GGUF（常规量化）</text>
    <text x="255" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">跑得更稳</text>
    <text x="255" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">兼容路径更现实</text>
    <text x="255" y="218" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">适合先验证产品</text>
    <rect x="203" y="246" width="104" height="28" rx="14" fill="#DBEAFE"/>
    <text x="255" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#1D4ED8">验证期打底首选</text>
    <rect x="210" y="282" width="90" height="20" rx="10" fill="#2563EB" opacity="0.12"/>
    <text x="255" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#1D4ED8">先做 MVP</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="340" y="100" width="140" height="210" rx="14" fill="#FFFFFF"/>
    <rect x="340" y="100" width="140" height="8" rx="14" fill="#EA580C"/>
    <text x="410" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">7B</text>
    <text x="410" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">平衡档</text>
    <text x="410" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">效果与资源占用平衡</text>
    <text x="410" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">桌面端 / 本地服务可用</text>
    <text x="410" y="218" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">适合做正式功能</text>
    <rect x="358" y="246" width="104" height="28" rx="14" fill="#FFEDD5"/>
    <text x="410" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#C2410C">功能化重点看</text>
    <rect x="364" y="282" width="92" height="20" rx="10" fill="#EA580C" opacity="0.12"/>
    <text x="410" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#C2410C">小型服务器</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="495" y="100" width="140" height="210" rx="14" fill="#FFFFFF"/>
    <rect x="495" y="100" width="140" height="8" rx="14" fill="#9333EA"/>
    <text x="565" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#9333EA">30B-A3B</text>
    <text x="565" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">上限档</text>
    <text x="565" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">开源里更强</text>
    <text x="565" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">适合追求效果上限</text>
    <text x="565" y="218" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">不适合先试试</text>
    <rect x="513" y="246" width="104" height="28" rx="14" fill="#F3E8FF"/>
    <text x="565" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#7E22CE">高算力预算档</text>
    <rect x="513" y="282" width="104" height="20" rx="10" fill="#9333EA" opacity="0.12"/>
    <text x="565" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#7E22CE">追求开源上限</text>
  </g>

  <line x1="100" y1="324" x2="255" y2="324" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="255" y1="324" x2="410" y2="324" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="410" y1="324" x2="565" y2="324" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="42" y="342" width="576" height="38" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="63" cy="361" r="6" fill="#D97706"/>
  <text x="78" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">共同卖点：</text>
  <text x="146" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">33 语种互译</text>
  <text x="240" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">1.8B 官方称达开源 SOTA</text>
  <text x="425" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">关键变化：本地翻译进入产品预算表</text>
</svg>