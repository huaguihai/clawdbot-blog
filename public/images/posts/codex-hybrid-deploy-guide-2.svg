<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" fill="#FAFAFA" rx="12"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-size: 12px; fill: #475569; }
      .label { font-size: 13px; font-weight: 700; fill: #0F172A; }
      .text { font-size: 12px; fill: #334155; }
      .chip { font-size: 11px; fill: #0F172A; }
      .dash { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .card { fill: #FFFFFF; rx: 12; filter: url(#shadow); }
    </style>
  </defs>

  <!-- Title -->
  <text x="28" y="38" class="font title">混合部署 Codex 的最小可行架构（4 层）</text>
  <text x="28" y="60" class="font subtitle">核心：把“推理在哪里跑”和“数据能碰到什么”拆开，权限/审计由你掌控</text>

  <!-- Left stack: 4 layers -->
  <!-- Interaction -->
  <rect x="28" y="88" width="380" height="64" class="card"/>
  <rect x="28" y="88" width="8" height="64" fill="#2563EB" rx="12"/>
  <text x="48" y="112" class="font label">1 交互层</text>
  <text x="48" y="134" class="font text">IDE 插件 / Web 控制台 / CLI</text>

  <!-- Orchestration -->
  <rect x="28" y="166" width="380" height="74" class="card"/>
  <rect x="28" y="166" width="8" height="74" fill="#9333EA" rx="12"/>
  <text x="48" y="190" class="font label">2 编排层</text>
  <text x="48" y="212" class="font text">会话与任务拆分、工具调用、策略判断、权限下发</text>

  <!-- Resource -->
  <rect x="28" y="254" width="380" height="74" class="card"/>
  <rect x="28" y="254" width="8" height="74" fill="#16A34A" rx="12"/>
  <text x="48" y="278" class="font label">3 资源层</text>
  <text x="48" y="300" class="font text">私有 Git / 工单 / 内部知识库 / 测试环境</text>

  <!-- Control -->
  <rect x="28" y="342" width="380" height="46" class="card"/>
  <rect x="28" y="342" width="8" height="46" fill="#EA580C" rx="12"/>
  <text x="48" y="370" class="font label">4 控制层</text>
  <text x="170" y="370" class="font text">审计、回滚、审批、密钥轮换、只读/可写</text>

  <!-- Dashed connectors between layers -->
  <path d="M218 152 L218 166" class="dash"/>
  <path d="M218 240 L218 254" class="dash"/>
  <path d="M218 328 L218 342" class="dash"/>

  <!-- Right: separation concept -->
  <rect x="432" y="88" width="200" height="300" class="card"/>
  <text x="452" y="114" class="font label">关键拆分</text>
  <text x="452" y="134" class="font text">推理位置 ≠ 数据权限</text>

  <!-- Inference box -->
  <rect x="452" y="154" width="160" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="452" y="154" width="160" height="6" fill="#2563EB" rx="12"/>
  <text x="466" y="182" class="font label">推理（模型）</text>
  <text x="466" y="204" class="font text">可在云 / 可在内网</text>
  <text x="466" y="226" class="font text">只拿“最少能力”</text>

  <!-- Data/Access box -->
  <rect x="452" y="270" width="160" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="452" y="270" width="160" height="6" fill="#EA580C" rx="12"/>
  <text x="466" y="298" class="font label">数据与操作权限</text>
  <text x="466" y="320" class="font text">由编排+控制层发放</text>
  <text x="466" y="342" class="font text">审计可追溯、可回滚</text>

  <!-- Dashed arrow from orchestration to right panel -->
  <path d="M408 203 C 438 203, 430 203, 448 203" class="dash"/>
  <polygon points="448,203 440,199 440,207" fill="#94A3B8"/>

  <!-- Bottom note chips -->
  <rect x="452" y="374" width="74" height="22" rx="11" fill="#FEF3C7"/>
  <text x="465" y="389" class="font chip">最小权限</text>
  <rect x="532" y="374" width="80" height="22" rx="11" fill="#E0E7FF"/>
  <text x="545" y="389" class="font chip">可控边界</text>
</svg>