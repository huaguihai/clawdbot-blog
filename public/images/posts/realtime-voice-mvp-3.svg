<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">为什么不该先做“万能语音助手”</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">先做可收费的具体流程，而不是开放式陪聊能力</text>

  <rect x="36" y="88" width="260" height="264" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="54" y="106" width="118" height="30" rx="15" fill="#FEE2E2"/>
  <text x="113" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">不建议先做</text>
  <text x="54" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">万能语音助手</text>

  <rect x="54" y="182" width="224" height="42" rx="10" fill="#FFF7ED" stroke="#FDBA74"/>
  <circle cx="72" cy="203" r="7" fill="#EA580C"/>
  <text x="88" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#7C2D12">需求发散</text>
  <text x="160" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9A3412">开放话题越多，范围越失控</text>

  <rect x="54" y="232" width="224" height="42" rx="10" fill="#FEF3C7" stroke="#FCD34D"/>
  <circle cx="72" cy="253" r="7" fill="#D97706"/>
  <text x="88" y="258" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#78350F">验收模糊</text>
  <text x="160" y="258" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#92400E">听错、答偏、抢话都难定义</text>

  <rect x="54" y="282" width="224" height="42" rx="10" fill="#DCFCE7" stroke="#86EFAC"/>
  <circle cx="72" cy="303" r="7" fill="#16A34A"/>
  <text x="88" y="308" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#166534">成本不可控</text>
  <text x="160" y="308" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#166534">连续对话、安全边界都烧钱</text>

  <line x1="318" y1="220" x2="342" y2="220" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <text x="330" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">更好的起点</text>

  <rect x="364" y="88" width="260" height="264" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="382" y="106" width="128" height="30" rx="15" fill="#DBEAFE"/>
  <text x="446" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">建议先做</text>
  <text x="382" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">替代一个动作</text>
  <text x="382" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">先回答：用户愿意为哪 30 秒付钱？</text>

  <rect x="382" y="202" width="224" height="38" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <circle cx="400" cy="221" r="7" fill="#2563EB"/>
  <text x="416" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">会议录音</text>
  <text x="486" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">直接生成结构化纪要</text>

  <rect x="382" y="248" width="224" height="38" rx="10" fill="#F5F3FF" stroke="#DDD6FE"/>
  <circle cx="400" cy="267" r="7" fill="#9333EA"/>
  <text x="416" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#7E22CE">跨语言沟通</text>
  <text x="500" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">先翻成可执行信息</text>

  <rect x="382" y="294" width="224" height="38" rx="10" fill="#F0FDF4" stroke="#BBF7D0"/>
  <circle cx="400" cy="313" r="7" fill="#16A34A"/>
  <text x="416" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#15803D">一线口述记录</text>
  <text x="510" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">自动转成表单</text>

  <rect x="188" y="360" width="284" height="24" rx="12" fill="#E0F2FE"/>
  <text x="330" y="376" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#0F172A">结论：先做“可验证、可收费、可两周交付”的语音 MVP</text>
</svg>