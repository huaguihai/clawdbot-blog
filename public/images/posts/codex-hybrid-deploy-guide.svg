<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; fill:#111827; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6B7280; }
      .badgeText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#FFFFFF; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text x="330" y="44" text-anchor="middle" class="title">哪些场景必须把代码留在内网？</text>
  <text x="330" y="66" text-anchor="middle" class="muted">看“不可逆后果” + AI任务会触达的资源范围</text>

  <!-- Start -->
  <rect class="card" x="230" y="85" width="200" height="54" rx="12"/>
  <text x="330" y="111" text-anchor="middle" class="text">开始：评估 AI 任务</text>
  <text x="330" y="130" text-anchor="middle" class="muted">不仅看仓库 private</text>

  <!-- Decision 1 -->
  <rect class="card" x="145" y="160" width="370" height="64" rx="12"/>
  <text x="330" y="187" text-anchor="middle" class="text">是否涉及客户代码 / 核心算法 / 合规数据？</text>
  <text x="330" y="207" text-anchor="middle" class="muted">外流损失难以补回（不可逆）</text>

  <!-- Arrow Start -> D1 -->
  <path class="dash" d="M330 139 L330 160"/>

  <!-- Outcome: On-prem -->
  <rect class="card" x="30" y="255" width="200" height="88" rx="12"/>
  <rect x="46" y="268" width="168" height="22" rx="11" fill="#16A34A"/>
  <text x="130" y="284" text-anchor="middle" class="badgeText">全本地优先</text>
  <text x="130" y="309" text-anchor="middle" class="text">客户交付代码</text>
  <text x="130" y="328" text-anchor="middle" class="text">核心算法/定价逻辑</text>

  <!-- Decision 2 -->
  <rect class="card" x="245" y="255" width="370" height="64" rx="12"/>
  <text x="430" y="282" text-anchor="middle" class="text">是否需要直连内网系统执行操作？</text>
  <text x="430" y="302" text-anchor="middle" class="muted">数据库/工单/知识库/私有包源等</text>

  <!-- Outcome: Hybrid -->
  <rect class="card" x="245" y="335" width="200" height="52" rx="12"/>
  <rect x="261" y="348" width="168" height="22" rx="11" fill="#2563EB"/>
  <text x="345" y="364" text-anchor="middle" class="badgeText">混合部署优先</text>
  <text x="345" y="384" text-anchor="middle" class="muted">AI 需要“碰系统”</text>

  <!-- Outcome: Cloud -->
  <rect class="card" x="470" y="335" width="170" height="52" rx="12"/>
  <rect x="486" y="348" width="138" height="22" rx="11" fill="#EA580C"/>
  <text x="555" y="364" text-anchor="middle" class="badgeText">纯云优先</text>
  <text x="555" y="384" text-anchor="middle" class="muted">开源/原型/个人项目</text>

  <!-- Connectors from D1 -->
  <!-- Yes to On-prem -->
  <path class="dash" d="M230 192 C170 192 130 220 130 255"/>
  <text x="185" y="232" class="muted">是</text>

  <!-- No to D2 -->
  <path class="dash" d="M430 224 L430 255"/>
  <text x="442" y="244" class="muted">否</text>

  <!-- Connectors from D2 -->
  <!-- Yes to Hybrid -->
  <path class="dash" d="M430 319 C430 325 380 330 345 335"/>
  <text x="405" y="334" class="muted">是</text>

  <!-- No to Cloud -->
  <path class="dash" d="M615 287 C640 287 640 320 555 335"/>
  <text x="612" y="316" class="muted">否</text>

  <!-- Small note -->
  <rect x="470" y="255" width="170" height="64" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <rect x="486" y="268" width="138" height="22" rx="11" fill="#9333EA"/>
  <text x="555" y="284" text-anchor="middle" class="badgeText">易忽略提醒</text>
  <text x="555" y="306" text-anchor="middle" class="muted">仓库不敏感 ≠ 任务不敏感</text>
  <text x="555" y="323" text-anchor="middle" class="muted">看权限链会串到哪里</text>
</svg>