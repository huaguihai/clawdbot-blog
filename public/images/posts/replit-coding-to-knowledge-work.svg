<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><defs><filter id="shadow" x="-50%" y="-50%" width="200%" height="200%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter></defs><g id="workflow"><rect x="40" y="60" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="90" y="95" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2563EB">Canvas</text><text x="90" y="115" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">文档编辑</text><rect x="180" y="60" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/><text x="230" y="95" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#EA580C">Code</text><text x="230" y="115" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">代码生成</text><rect x="320" y="60" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/><text x="370" y="95" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#16A34A">Apps</text><text x="370" y="115" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">交互应用</text><rect x="460" y="60" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#9333EA" stroke-width="2" filter="url(#shadow)"/><text x="510" y="95" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#9333EA">Sites</text><text x="510" y="115" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">网站生成</text><rect x="40" y="220" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/><text x="90" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#D97706">Slides</text><text x="90" y="275" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">演示文稿</text><rect x="180" y="220" width="100" height="70" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="230" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2563EB">Videos</text><text x="230" y="275" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">视频内容</text><line x1="140" y1="95" x2="180" y2="95" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><line x1="280" y1="95" x2="320" y2="95" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><line x1="420" y1="95" x2="460" y2="95" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><line x1="90" y1="130" x2="90" y2="220" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><line x1="230" y1="130" x2="230" y2="220" stroke="#999" stroke-width="2" stroke-dasharray="5,5"/><rect x="320" y="220" width="240" height="100" rx="8" fill="#F0F9FF" stroke="#2563EB" stroke-width="2" stroke-dasharray="5,5" filter="url(#shadow)"/><text x="440" y="245" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#2563EB">完整工作流</text><text x="440" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">想法 → 文档 → 代码 → 应用</text><text x="440" y="285" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#666">→ 网站 → 演示 → 视频</text><text x="330" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#999" text-anchor="start">从想法到交付的完整平台</text></g></svg>