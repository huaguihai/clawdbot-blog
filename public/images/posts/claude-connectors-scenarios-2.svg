<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">先按任务类型，而不是工具名，判断是否接 Connector</text><rect x="40" y="78" width="170" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="125" y="101" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">任务类型</text><text x="125" y="121" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">比“接了哪些工具”更重要</text><line x1="210" y1="106" x2="250" y2="106" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="250" y="55" width="170" height="70" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#16A34A" stroke-width="2"/><text x="335" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#16A34A">适合接入</text><text x="335" y="102" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">查上下文、做归纳</text><text x="335" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">会前准备、会后整理</text><rect x="250" y="145" width="170" height="70" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#D97706" stroke-width="2"/><text x="335" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#D97706">部分适合</text><text x="335" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">依赖最新状态的关键判断</text><text x="335" y="209" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可辅助，但别完全拍板</text><rect x="250" y="235" width="170" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#EA580C" stroke-width="2"/><text x="335" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#EA580C">谨慎接入</text><text x="335" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">直接发信、改数据、删任务</text><text x="335" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">隐私、合同、财务审批</text><line x1="420" y1="90" x2="465" y2="90" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="420" y1="180" x2="465" y2="180" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="420" y1="281" x2="465" y2="281" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="465" y="55" width="155" height="70" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="542.5" y="82" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">原因</text><text x="542.5" y="103" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">擅长从分散信息里</text><text x="542.5" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">提炼重点、拼接背景</text><rect x="465" y="145" width="155" height="70" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="542.5" y="172" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">边界</text><text x="542.5" y="193" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">状态变化快时可参考</text><text x="542.5" y="209" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">但保留人工决策</text><rect x="465" y="235" width="155" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="542.5" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">风险</text><text x="542.5" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">进入执行层后</text><text x="542.5" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">误操作与泄露成本更高</text><rect x="40" y="340" width="580" height="34" rx="10" fill="#EEF2FF" stroke="#9333EA" stroke-width="1.5"/><text x="330" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333EA">核心原则：Connector 的价值不在“连上什么”，而在“放进什么任务里”</text></svg>