<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><g font-family="-apple-system, 'Segoe UI', sans-serif"><rect x="50" y="56" width="240" height="118" rx="16" fill="#FFFFFF" stroke="#DBEAFE"/><rect x="54" y="60" width="240" height="118" rx="16" fill="none" stroke="rgba(37,99,235,0.08)"/><text x="78" y="92" font-size="22" font-weight="700" fill="#2563EB">AWS 云内集成</text><text x="78" y="122" font-size="15" fill="#334155">帮你降低的是</text><text x="78" y="148" font-size="28" font-weight="800" fill="#16A34A">接入摩擦</text><line x1="108" y1="188" x2="552" y2="188" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="8 8"/><polygon points="552,188 540,181 540,195" fill="#94A3B8"/><text x="300" y="180" font-size="14" fill="#64748B">不自动带来</text><rect x="370" y="56" width="240" height="118" rx="16" fill="#FFFFFF" stroke="#FCD34D"/><rect x="374" y="60" width="240" height="118" rx="16" fill="none" stroke="rgba(217,119,6,0.1)"/><text x="398" y="92" font-size="22" font-weight="700" fill="#D97706">你仍要解决</text><text x="398" y="122" font-size="15" fill="#334155">真正困难的是</text><text x="398" y="148" font-size="28" font-weight="800" fill="#EA580C">做对的难度</text><rect x="50" y="228" width="112" height="108" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/><circle cx="84" cy="260" r="16" fill="#DBEAFE"/><text x="84" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#2563EB">1</text><text x="84" y="296" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">提示注入</text><text x="106" y="317" text-anchor="middle" font-size="13" fill="#64748B">一句话带偏模型</text><rect x="178" y="228" width="112" height="108" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/><circle cx="212" cy="260" r="16" fill="#DCFCE7"/><text x="212" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#16A34A">2</text><text x="212" y="296" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">检索泄露</text><text x="234" y="317" text-anchor="middle" font-size="13" fill="#64748B">混入敏感内容</text><rect x="306" y="228" width="112" height="108" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/><circle cx="340" cy="260" r="16" fill="#FEE2E2"/><text x="340" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#EA580C">3</text><text x="340" y="296" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">权限越界</text><text x="362" y="317" text-anchor="middle" font-size="13" fill="#64748B">工具权限给大了</text><rect x="434" y="228" width="112" height="108" rx="14" fill="#FFFFFF" stroke="#E5E7EB"/><circle cx="468" cy="260" r="16" fill="#E9D5FF"/><text x="468" y="266" text-anchor="middle" font-size="16" font-weight="700" fill="#9333EA">4</text><text x="468" y="296" text-anchor="middle" font-size="16" font-weight="700" fill="#0F172A">评测容错</text><text x="490" y="317" text-anchor="middle" font-size="13" fill="#64748B">错了还自动执行</text><rect x="526" y="222" width="84" height="120" rx="14" fill="#FFF7ED" stroke="#FDBA74"/><text x="568" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#EA580C">关键提醒</text><text x="568" y="280" text-anchor="middle" font-size="13" fill="#7C2D12">云集成</text><text x="568" y="300" text-anchor="middle" font-size="13" fill="#7C2D12">不是</text><text x="568" y="320" text-anchor="middle" font-size="13" font-weight="700" fill="#7C2D12">安全替代品</text></g></svg>