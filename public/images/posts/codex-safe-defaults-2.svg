<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">先说清危险动作，再落到安全开关</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心概念：怕的不是写错代码，而是它顺手做了你没授权的事</text>

  <rect x="220" y="78" width="220" height="62" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">危险动作</text>
  <text x="330" y="124" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">看似一个命令，实际可能触发一串隐含动作</text>

  <line x1="330" y1="140" x2="130" y2="178" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="140" x2="278" y2="178" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="140" x2="430" y2="178" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="140" x2="548" y2="178" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="178" width="180" height="86" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="178" width="180" height="8" rx="14" fill="#2563EB"/>
  <text x="56" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">升级依赖</text>
  <text x="56" y="227" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 改 lockfile 生成方式</text>
  <text x="56" y="245" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 构建缓存失效</text>
  <text x="56" y="259" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">结果：账单飙升</text>

  <rect x="240" y="178" width="180" height="86" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="240" y="178" width="180" height="8" rx="14" fill="#EA580C"/>
  <text x="256" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#EA580C">日志与变量</text>
  <text x="256" y="227" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• .env / CI 变量被打进日志</text>
  <text x="256" y="245" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 调试输出泄露上下文</text>
  <text x="256" y="259" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">结果：密钥泄露</text>

  <rect x="440" y="178" width="180" height="86" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="440" y="178" width="180" height="8" rx="14" fill="#16A34A"/>
  <text x="456" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">脚本联动</text>
  <text x="456" y="227" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 看到 deploy 就尝试执行</text>
  <text x="456" y="245" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 生产环境被误碰</text>
  <text x="456" y="259" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">结果：越权部署</text>

  <rect x="240" y="276" width="180" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="240" y="276" width="180" height="8" rx="14" fill="#9333EA"/>
  <text x="256" y="303" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#9333EA">修复测试</text>
  <text x="256" y="325" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 为了“通过”去改测试本身</text>
  <text x="256" y="339" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">结果：伪稳定，真实问题被掩盖</text>

  <line x1="130" y1="264" x2="130" y2="306" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="350" x2="330" y2="366" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="530" y1="264" x2="530" y2="306" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="130" y1="306" x2="530" y2="306" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="56" y="320" width="548" height="56" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="74" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">把“谨慎使用”拆成可配置开关</text>

  <rect x="74" y="350" width="64" height="18" rx="9" fill="#DBEAFE"/>
  <text x="106" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">文件</text>

  <rect x="148" y="350" width="64" height="18" rx="9" fill="#FFEDD5"/>
  <text x="180" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#EA580C">网络</text>

  <rect x="222" y="350" width="64" height="18" rx="9" fill="#DCFCE7"/>
  <text x="254" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#16A34A">进程</text>

  <rect x="296" y="350" width="64" height="18" rx="9" fill="#EDE9FE"/>
  <text x="328" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#9333EA">权限</text>

  <rect x="370" y="350" width="64" height="18" rx="9" fill="#FEF3C7"/>
  <text x="402" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#D97706">密钥</text>

  <rect x="444" y="350" width="64" height="18" rx="9" fill="#DBEAFE"/>
  <text x="476" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">审计</text>

  <text x="580" y="363" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">边界越细，代理越安全</text>
</svg>