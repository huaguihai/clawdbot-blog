<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <!-- background -->
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,'Segoe UI',sans-serif;}
      .title{font-size:18px;font-weight:700;fill:#0F172A;}
      .label{font-size:13px;fill:#0F172A;}
      .muted{font-size:12px;fill:#475569;}
      .card{fill:#FFFFFF;stroke:#E2E8F0;stroke-width:1;filter:url(#shadow);}
      .dash{stroke:#94A3B8;stroke-width:2;stroke-dasharray:6 6;fill:none;}
      .solid{stroke-width:2;fill:none;}
    </style>
  </defs>

  <!-- header -->
  <text x="28" y="42" class="font title">真正风险：幻觉 + 执行权 绑在一起</text>
  <text x="28" y="64" class="font muted">模型会错不可怕，可怕的是错误能直接改系统</text>

  <!-- left: risk path -->
  <rect x="28" y="92" width="300" height="260" rx="12" fill="#F8FAFC" stroke="#E2E8F0"/>
  <text x="44" y="118" class="font label" fill="#EA580C">默认值太松（常见坑）</text>

  <!-- pitfall cards -->
  <rect x="44" y="132" width="268" height="44" rx="10" class="card"/>
  <circle cx="62" cy="154" r="6" fill="#EA580C"/>
  <text x="78" y="150" class="font label">tools 全开</text>
  <text x="78" y="167" class="font muted">一个 tools=[...] 放出所有能力</text>

  <rect x="44" y="184" width="268" height="44" rx="10" class="card"/>
  <circle cx="62" cy="206" r="6" fill="#EA580C"/>
  <text x="78" y="202" class="font label">只校验能跑，不校验该跑</text>
  <text x="78" y="219" class="font muted">参数缺少策略/权限/约束</text>

  <rect x="44" y="236" width="268" height="44" rx="10" class="card"/>
  <circle cx="62" cy="258" r="6" fill="#EA580C"/>
  <text x="78" y="254" class="font label">日志太弱，追不回现场</text>
  <text x="78" y="271" class="font muted">只打一行文本，缺少可回放证据</text>

  <rect x="44" y="288" width="268" height="44" rx="10" class="card"/>
  <circle cx="62" cy="310" r="6" fill="#EA580C"/>
  <text x="78" y="306" class="font label">无演练态，决定就提交</text>
  <text x="78" y="323" class="font muted">缺少 dry-run / 审批 / 人工闸门</text>

  <!-- middle: agent -->
  <rect x="350" y="132" width="132" height="74" rx="12" class="card"/>
  <text x="366" y="160" class="font label">AI Agent</text>
  <text x="366" y="181" class="font muted">幻觉不可避免</text>

  <!-- right: outcomes -->
  <rect x="502" y="92" width="130" height="120" rx="12" class="card"/>
  <text x="518" y="120" class="font label" fill="#DC2626">事故后果</text>
  <text x="518" y="145" class="font muted">脏数据</text>
  <text x="518" y="165" class="font muted">误触发</text>
  <text x="518" y="185" class="font muted">合规风险</text>

  <!-- right-bottom: guardrails -->
  <rect x="350" y="236" width="282" height="116" rx="12" class="card"/>
  <text x="366" y="262" class="font label" fill="#16A34A">工程护栏（把执行权变可控）</text>

  <!-- guardrail chips -->
  <rect x="366" y="276" width="118" height="28" rx="10" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="378" y="295" class="font muted" fill="#166534">权限分级/最小化</text>

  <rect x="494" y="276" width="124" height="28" rx="10" fill="#EEF2FF" stroke="#2563EB"/>
  <text x="506" y="295" class="font muted" fill="#1D4ED8">策略校验/约束</text>

  <rect x="366" y="312" width="118" height="28" rx="10" fill="#FFFBEB" stroke="#D97706"/>
  <text x="378" y="331" class="font muted" fill="#92400E">演练态(Dry-run)</text>

  <rect x="494" y="312" width="124" height="28" rx="10" fill="#F5F3FF" stroke="#9333EA"/>
  <text x="506" y="331" class="font muted" fill="#6D28D9">可回放日志/回滚</text>

  <!-- arrows -->
  <!-- pitfalls -> agent -->
  <path d="M 328 222 C 340 222 340 170 350 170" class="dash"/>
  <text x="300" y="160" class="font muted" fill="#EA580C">默认全开</text>

  <!-- agent ->事故 -->
  <path d="M 482 170 C 498 170 498 150 502 150" class="dash"/>
  <text x="470" y="142" class="font muted" fill="#DC2626">直接执行</text>

  <!-- agent ->护栏 -->
  <path d="M 416 206 C 416 222 416 224 416 236" class="dash"/>
  <text x="430" y="226" class="font muted" fill="#16A34A">加闸门</text>

  <!-- guardrails -> safe outcome -->
  <rect x="502" y="236" width="130" height="62" rx="12" fill="#ECFDF5" stroke="#16A34A" filter="url(#shadow)"/>
  <text x="518" y="262" class="font label" fill="#16A34A">可控执行</text>
  <text x="518" y="282" class="font muted" fill="#166534">能拦、能查、能回滚</text>

  <path d="M 490 294 C 496 294 498 280 502 270" class="dash"/>

  <!-- footer note -->
  <text x="28" y="378" class="font muted">生产关注点：它能做到哪一步？做错能不能拦住？</text>
</svg>