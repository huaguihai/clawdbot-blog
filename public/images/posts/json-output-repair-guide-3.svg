<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="40" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">哪些错误能靠提示词先压下去？</text>
  <text x="330" y="66" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心结论：能约束表达形式，难修复结构性输出问题</text>

  <rect x="40" y="100" width="260" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="360" y="100" width="260" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="60" y="120" width="220" height="38" rx="10" fill="#DBEAFE"/>
  <text x="170" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">提示词通常能压住</text>

  <rect x="380" y="120" width="220" height="38" rx="10" fill="#FEE2E2"/>
  <text x="490" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">提示词通常压不住</text>

  <rect x="60" y="175" width="220" height="42" rx="10" fill="#F8FAFC" stroke="#BFDBFE"/>
  <circle cx="82" cy="196" r="7" fill="#16A34A"/>
  <text x="98" y="201" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">不要解释，减少多余话术</text>

  <rect x="60" y="228" width="220" height="42" rx="10" fill="#F8FAFC" stroke="#BFDBFE"/>
  <circle cx="82" cy="249" r="7" fill="#16A34A"/>
  <text x="98" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">不要 Markdown 代码块</text>

  <rect x="60" y="281" width="220" height="42" rx="10" fill="#F8FAFC" stroke="#BFDBFE"/>
  <circle cx="82" cy="302" r="7" fill="#16A34A"/>
  <text x="98" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">不要超出指定字段范围</text>

  <rect x="380" y="170" width="220" height="36" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="402" cy="188" r="7" fill="#EA580C"/>
  <text x="418" y="193" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">语法损坏</text>

  <rect x="380" y="214" width="220" height="36" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="402" cy="232" r="7" fill="#EA580C"/>
  <text x="418" y="237" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">输出截断</text>

  <rect x="380" y="258" width="220" height="36" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="402" cy="276" r="7" fill="#EA580C"/>
  <text x="418" y="281" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">类型跑偏</text>

  <rect x="380" y="302" width="220" height="36" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="402" cy="320" r="7" fill="#EA580C"/>
  <text x="418" y="325" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">模型失误与环境波动</text>

  <line x1="300" y1="220" x2="360" y2="220" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/>
  <rect x="275" y="205" width="110" height="30" rx="15" fill="#F3E8FF" stroke="#D8B4FE"/>
  <text x="330" y="225" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9333EA">边界在结构层</text>

  <rect x="115" y="348" width="430" height="32" rx="10" fill="#FEF3C7" stroke="#FCD34D"/>
  <text x="330" y="369" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#92400E">实操建议：字段做窄、缺失写 null、别让模型猜默认值</text>
</svg>