<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#FAFAFA;}
      .card{fill:#FFFFFF;stroke:#E5E7EB;stroke-width:1.2;filter:url(#shadow);}
      .title{font-family:-apple-system,'Segoe UI',sans-serif;font-size:16px;font-weight:700;fill:#111827;}
      .text{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12.5px;fill:#374151;}
      .muted{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;}
      .badge{font-family:-apple-system,'Segoe UI',sans-serif;font-size:11px;font-weight:700;}
      .dash{stroke:#9CA3AF;stroke-width:2;stroke-dasharray:6 6;fill:none;}
      .arrow{fill:#9CA3AF;}
    </style>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="636" height="376" rx="12" class="bg"/>

  <!-- Header -->
  <text x="36" y="52" class="title">AI 生成 JSON：最稳的四层防线</text>
  <text x="36" y="74" class="muted">提示词缩小错误范围；校验拦截结构问题；repair 修补语法小伤；失败回退保流程不断</text>

  <!-- Main pipeline container (subtle) -->
  <rect x="28" y="96" width="604" height="210" rx="12" fill="#F3F4F6" stroke="#E5E7EB"/>

  <!-- Step 1: Prompt -->
  <rect x="48" y="124" width="135" height="150" rx="12" class="card"/>
  <rect x="48" y="124" width="135" height="30" rx="12" fill="#2563EB"/>
  <text x="60" y="145" class="badge" fill="#FFFFFF">① 提示词约束</text>
  <text x="60" y="172" class="text">压住常见“壳”</text>
  <text x="60" y="192" class="muted">• 代码块</text>
  <text x="60" y="210" class="muted">• 前后废话</text>
  <text x="60" y="228" class="muted">• 注释/伪 JSON</text>
  <text x="60" y="246" class="muted">（不稳定，仅减概率）</text>

  <!-- Step 2: Schema validate -->
  <rect x="205" y="124" width="135" height="150" rx="12" class="card"/>
  <rect x="205" y="124" width="135" height="30" rx="12" fill="#16A34A"/>
  <text x="217" y="145" class="badge" fill="#FFFFFF">② Schema 校验</text>
  <text x="217" y="172" class="text">拦截“能 parse”</text>
  <text x="217" y="190" class="text">但不该通过</text>
  <text x="217" y="214" class="muted">• 类型漂移</text>
  <text x="217" y="232" class="muted">• 字段漂移</text>
  <text x="217" y="250" class="muted">• 额外字段(白名单)</text>

  <!-- Step 3: Repair -->
  <rect x="362" y="124" width="135" height="150" rx="12" class="card"/>
  <rect x="362" y="124" width="135" height="30" rx="12" fill="#EA580C"/>
  <text x="374" y="145" class="badge" fill="#FFFFFF">③ Repair 修复</text>
  <text x="374" y="172" class="text">处理语法层小伤</text>
  <text x="374" y="196" class="muted">• 尾逗号/引号</text>
  <text x="374" y="214" class="muted">• 转义/换行</text>
  <text x="374" y="232" class="muted">• 重复 key(按规则)</text>
  <text x="374" y="250" class="muted">（修完仍需再校验）</text>

  <!-- Step 4: Fallback -->
  <rect x="519" y="124" width="135" height="150" rx="12" class="card"/>
  <rect x="519" y="124" width="135" height="30" rx="12" fill="#9333EA"/>
  <text x="531" y="145" class="badge" fill="#FFFFFF">④ 失败回退</text>
  <text x="531" y="172" class="text">兜底不断流</text>
  <text x="531" y="196" class="muted">• 重试(更强约束)</text>
  <text x="531" y="214" class="muted">• 回退到上次结果</text>
  <text x="531" y="232" class="muted">• 人工审核队列</text>
  <text x="531" y="250" class="muted">• 默认值/降级路径</text>

  <!-- Dashed arrows between steps -->
  <line x1="183" y1="199" x2="205" y2="199" class="dash"/>
  <polygon points="205,199 196,194 196,204" class="arrow"/>

  <line x1="340" y1="199" x2="362" y2="199" class="dash"/>
  <polygon points="362,199 353,194 353,204" class="arrow"/>

  <line x1="497" y1="199" x2="519" y2="199" class="dash"/>
  <polygon points="519,199 510,194 510,204" class="arrow"/>

  <!-- Loop note: repair -> validate -->
  <path d="M 430 284 C 430 330, 270 330, 270 284" class="dash"/>
  <polygon points="270,284 279,279 279,289" class="arrow"/>
  <text x="300" y="343" class="muted">修复后要再走一次校验</text>

  <!-- Bottom warning callout -->
  <rect x="28" y="320" width="604" height="56" rx="12" fill="#FFFBEB" stroke="#FDE68A"/>
  <circle cx="52" cy="348" r="10" fill="#D97706"/>
  <text x="48" y="352" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#FFFFFF">!</text>
  <text x="72" y="344" class="text" fill="#92400E">最坑的不是解析失败，而是“解析成功但字段悄悄偏了”</text>
  <text x="72" y="364" class="muted" fill="#92400E">因此必须：校验结构 + 白名单字段 + 可观测回退</text>
</svg>