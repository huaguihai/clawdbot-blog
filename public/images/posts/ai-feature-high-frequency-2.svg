<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#0f172a; }
      .label { font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; fill:#0f172a; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#475569; }
      .small { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#0f172a; }
      .dash { stroke:#94a3b8; stroke-width:2; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text class="title" x="40" y="55">Linear “先等再做”到底等什么？</text>
  <text class="muted" x="40" y="78">三个条件成熟再引入 AI vs 常见的反序做法</text>

  <!-- Left column: Wait then do -->
  <rect class="card" x="40" y="105" width="280" height="255" rx="12"/>
  <text class="label" x="60" y="135" fill="#16A34A" style="font-weight:700;">正确顺序：先等再做</text>

  <!-- Left steps -->
  <rect x="60" y="155" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#16A34A" stroke-width="2"/>
  <circle cx="76" cy="182" r="10" fill="#16A34A"/>
  <text class="small" x="72.5" y="186" fill="#FFFFFF" style="font-weight:700;">1</text>
  <text class="label" x="95" y="176">工作流稳定</text>
  <text class="muted" x="95" y="196">知道 AI 插入点</text>

  <rect x="60" y="222" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
  <circle cx="76" cy="249" r="10" fill="#2563EB"/>
  <text class="small" x="72.5" y="253" fill="#FFFFFF" style="font-weight:700;">2</text>
  <text class="label" x="95" y="243">数据干净结构化</text>
  <text class="muted" x="95" y="263">避免放大“脏数据”</text>

  <rect x="60" y="289" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#9333EA" stroke-width="2"/>
  <circle cx="76" cy="316" r="10" fill="#9333EA"/>
  <text class="small" x="72.5" y="320" fill="#FFFFFF" style="font-weight:700;">3</text>
  <text class="label" x="95" y="310">价值可前后对比</text>
  <text class="muted" x="95" y="330">立刻知道更省事</text>

  <!-- Left connectors -->
  <path class="dash" d="M180 209 L180 222"/>
  <path class="dash" d="M180 276 L180 289"/>

  <!-- Right column: Common reverse order -->
  <rect class="card" x="340" y="105" width="280" height="255" rx="12"/>
  <text class="label" x="360" y="135" fill="#EA580C" style="font-weight:700;">常见反序：先做入口再祈祷</text>

  <!-- Right steps -->
  <rect x="360" y="155" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#EA580C" stroke-width="2"/>
  <text class="label" x="380" y="176">万能助手入口</text>
  <text class="muted" x="380" y="196">欢迎词 / 引导气泡</text>

  <rect x="360" y="222" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="2"/>
  <text class="label" x="380" y="243">要求用户喂上下文</text>
  <text class="muted" x="380" y="263">把背景再写一遍</text>

  <rect x="360" y="289" width="240" height="54" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2"/>
  <text class="label" x="380" y="310">体验退缩</text>
  <text class="muted" x="380" y="330">用户：我就是懒得描述</text>

  <!-- Right connectors -->
  <path class="dash" d="M480 209 L480 222"/>
  <path class="dash" d="M480 276 L480 289"/>

  <!-- Middle comparison arrow -->
  <path class="dash" d="M320 232 C330 232, 330 232, 340 232"/>
  <path class="dash" d="M320 252 C330 252, 330 252, 340 252"/>
  <text class="muted" x="292" y="246">对比</text>
</svg>