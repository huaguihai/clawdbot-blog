<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1.2; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; fill:#111827; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6B7280; }
      .badgeText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#FFFFFF; }
      .line { stroke:#9CA3AF; stroke-width:1.4; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="28" y="44">编程 Agent 任务：怎么拆成可出网 / 不可出网</text>
  <text class="muted" x="28" y="66">核心判定：输入是否敏感？输出是否会直接进入主干并改动真实业务？</text>

  <!-- Center decision card -->
  <rect class="card" x="190" y="90" width="280" height="110" rx="12"/>
  <text class="text" x="210" y="122" style="font-weight:700;">先看“任务输入包”</text>
  <text class="muted" x="210" y="144">不要先纠结整个仓库能否出网</text>
  <text class="text" x="210" y="170">Q1：输入含敏感数据？</text>
  <text class="text" x="210" y="192">Q2：输出会直接改主干/真实业务？</text>

  <!-- Left: A class (allowed) -->
  <rect class="card" x="40" y="235" width="270" height="135" rx="12"/>
  <rect x="56" y="251" width="78" height="22" rx="11" fill="#16A34A"/>
  <text class="badgeText" x="68" y="267">A 类 可出网</text>
  <text class="text" x="56" y="295">输入不敏感 + 输出可丢弃/可复现</text>
  <text class="muted" x="56" y="318">• 单测骨架 / Mock / 伪数据</text>
  <text class="muted" x="56" y="338">• format / lint / 注释整理</text>
  <text class="muted" x="56" y="358">• 文档、PR 描述、开源用法示例</text>

  <!-- Right: B class (forbidden) -->
  <rect class="card" x="350" y="235" width="270" height="135" rx="12"/>
  <rect x="366" y="251" width="90" height="22" rx="11" fill="#EA580C"/>
  <text class="badgeText" x="378" y="267">B 类 禁止出网</text>
  <text class="text" x="366" y="295">输入敏感 或 输出会改真实业务</text>
  <text class="muted" x="366" y="318">• 密钥/证书/生产配置/用户原始数据</text>
  <text class="muted" x="366" y="338">• 风控/定价/推荐等核心策略代码</text>
  <text class="muted" x="366" y="358">• 批量改仓库、访问内网系统/私有 API</text>

  <!-- Connections -->
  <path class="line" d="M 250 200 C 210 215, 180 220, 160 235"/>
  <path class="line" d="M 410 200 C 450 215, 480 220, 500 235"/>

  <!-- Decision labels -->
  <rect x="108" y="210" width="106" height="18" rx="9" fill="#2563EB" opacity="0.95"/>
  <text class="badgeText" x="124" y="223">Q1否 且 Q2否</text>

  <rect x="446" y="210" width="134" height="18" rx="9" fill="#9333EA" opacity="0.95"/>
  <text class="badgeText" x="458" y="223">Q1是 或 Q2是</text>

  <!-- Footer hint -->
  <text class="muted" x="28" y="392">提示：边界按“任务输入包”划分，混合部署更容易落地。</text>
</svg>