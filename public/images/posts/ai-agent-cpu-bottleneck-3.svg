<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .title { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:18px; font-weight:700; fill:#111827; }
      .sub { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12px; fill:#4B5563; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .h { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:13px; font-weight:700; fill:#111827; }
      .t { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12px; fill:#374151; }
      .pill { rx:10; ry:10; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .stepText { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:11px; fill:#111827; }
      .mono { font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:10.5px; fill:#111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Title -->
  <text class="title" x="28" y="44">15 分钟“瓶颈体检”：先分段打点，再对照系统指标</text>
  <text class="sub" x="28" y="66">把一次 Agent 运行切成 5 段记录时间戳，再用 CPU/内存/磁盘IO/网络定位慢在哪</text>

  <!-- Left card: 5 timestamps -->
  <rect class="card" x="28" y="92" width="372" height="274" rx="12"/>
  <text class="h" x="48" y="124">步骤 A：记录 5 个时间点（跑 3 次同类任务）</text>
  <text class="sub" x="48" y="144">目的：把“感觉慢”变成“慢在第几段”</text>

  <!-- Timeline baseline -->
  <line class="dash" x1="70" y1="190" x2="360" y2="190"/>

  <!-- Nodes -->
  <circle cx="80" cy="190" r="10" fill="#2563EB"/>
  <circle cx="150" cy="190" r="10" fill="#9333EA"/>
  <circle cx="220" cy="190" r="10" fill="#16A34A"/>
  <circle cx="290" cy="190" r="10" fill="#EA580C"/>
  <circle cx="360" cy="190" r="10" fill="#D97706"/>

  <!-- Labels -->
  <text class="mono" x="58" y="170">start</text>
  <text class="stepText" x="54" y="214">收到任务</text>

  <text class="mono" x="112" y="170">prompt_ready</text>
  <text class="stepText" x="112" y="214">上下文拼装</text>

  <text class="mono" x="196" y="170">llm_done</text>
  <text class="stepText" x="194" y="214">模型返回</text>

  <text class="mono" x="252" y="170">tools_done</text>
  <text class="stepText" x="258" y="214">工具结束</text>

  <text class="mono" x="346" y="170">end</text>
  <text class="stepText" x="340" y="214">最终输出</text>

  <!-- Hint box -->
  <rect x="48" y="248" width="332" height="98" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text class="h" x="64" y="274">怎么用这 5 段耗时？</text>
  <text class="t" x="64" y="296">• prompt_ready 慢：多半是检索/拼上下文/编排</text>
  <text class="t" x="64" y="316">• llm_done 慢：模型推理或排队</text>
  <text class="t" x="64" y="336">• tools_done 慢：外部 API/IO/限流</text>

  <!-- Right card: 4 metrics -->
  <rect class="card" x="420" y="92" width="212" height="274" rx="12"/>
  <text class="h" x="440" y="124">步骤 B：同时盯 4 类指标</text>
  <text class="sub" x="440" y="144">不用完整 APM，也能快速定性</text>

  <!-- Metric pills -->
  <rect class="pill" x="440" y="168" width="172" height="32" fill="#EFF6FF" stroke="#BFDBFE"/>
  <circle cx="454" cy="184" r="6" fill="#2563EB"/>
  <text class="t" x="468" y="188">CPU：单核 90%+？</text>

  <rect class="pill" x="440" y="212" width="172" height="32" fill="#ECFDF5" stroke="#BBF7D0"/>
  <circle cx="454" cy="228" r="6" fill="#16A34A"/>
  <text class="t" x="468" y="232">内存：swap/压力高？</text>

  <rect class="pill" x="440" y="256" width="172" height="32" fill="#FFF7ED" stroke="#FED7AA"/>
  <circle cx="454" cy="272" r="6" fill="#EA580C"/>
  <text class="t" x="468" y="276">磁盘 IO：util/队列高？</text>

  <rect class="pill" x="440" y="300" width="172" height="32" fill="#FFFBEB" stroke="#FDE68A"/>
  <circle cx="454" cy="316" r="6" fill="#D97706"/>
  <text class="t" x="468" y="320">网络：延迟/丢包/限流？</text>

  <!-- Connector between cards -->
  <path class="dash" d="M 400 228 C 410 228, 410 228, 420 228"/>
  <text class="sub" x="382" y="220">对照</text>

  <!-- Bottom note -->
  <rect x="28" y="372" width="604" height="0" fill="none"/>
  <text class="sub" x="28" y="388">小判断：GPU 利用率低但 CPU 某几核拉满 → 优先怀疑上下文拼装/检索/工具编排，而非模型推理</text>
</svg>