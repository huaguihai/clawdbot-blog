<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:18px; font-weight:700; fill:#111827; }
      .h { font-family:-apple-system,'Segoe UI',sans-serif; font-size:14px; font-weight:700; fill:#111827; }
      .t { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; fill:#374151; }
      .muted { fill:#6B7280; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .solid { stroke:#9CA3AF; stroke-width:2; fill:none; }
      .pillText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; font-weight:700; fill:#111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="30" y="44">同样花 API 钱：一遍过 vs 反复返工</text>
  <text class="t muted" x="30" y="68">差别往往不在模型能力，而在任务说明书是否完整</text>

  <!-- Left: vague prompt -->
  <rect class="card" x="30" y="92" width="270" height="230" rx="12"/>
  <text class="h" x="50" y="122">模糊提示词（旧写法）</text>

  <rect x="50" y="140" width="230" height="44" rx="10" fill="#FFF7ED"/>
  <text class="t" x="62" y="166">目标模糊：帮我优化一下</text>

  <rect x="50" y="194" width="230" height="44" rx="10" fill="#FEF3C7"/>
  <text class="t" x="62" y="220">边界不清：按 best practice 重构</text>

  <rect x="50" y="248" width="230" height="54" rx="10" fill="#F3F4F6"/>
  <text class="t" x="62" y="274">验收缺失：给我一版结果</text>
  <text class="t muted" x="62" y="294">（格式、未确定项不明确）</text>

  <!-- Left outcome -->
  <rect class="card" x="70" y="334" width="190" height="44" rx="12"/>
  <text class="h" x="120" y="362" fill="#EA580C">结果：返工</text>

  <!-- Right: structured prompt -->
  <rect class="card" x="360" y="92" width="270" height="230" rx="12"/>
  <text class="h" x="380" y="122">完整任务说明书（更稳）</text>
  <text class="t muted" x="380" y="142">拆成三层：目标、边界、标准</text>

  <!-- Three layers -->
  <rect x="380" y="158" width="230" height="44" rx="10" fill="#DBEAFE"/>
  <text class="pillText" x="392" y="186">目标（要做什么）</text>
  <text class="t" x="520" y="186">保留结构，只改语气</text>

  <rect x="380" y="212" width="230" height="44" rx="10" fill="#DCFCE7"/>
  <text class="pillText" x="392" y="240">边界（不能碰什么）</text>
  <text class="t" x="520" y="240">只改 auth.ts</text>

  <rect x="380" y="266" width="230" height="54" rx="10" fill="#EDE9FE"/>
  <text class="pillText" x="392" y="294">标准（怎么验收）</text>
  <text class="t" x="520" y="294">表格或 JSON 输出</text>
  <text class="t muted" x="520" y="314">并列出未确定项</text>

  <!-- Right outcome -->
  <rect class="card" x="400" y="334" width="190" height="44" rx="12"/>
  <text class="h" x="446" y="362" fill="#16A34A">结果：一遍过</text>

  <!-- Center label -->
  <rect class="card" x="286" y="182" width="88" height="60" rx="12"/>
  <text class="h" x="300" y="210">关键</text>
  <text class="t" x="300" y="232">任务说明书</text>

  <!-- Connectors -->
  <path class="dash" d="M300 212 C 260 212, 240 212, 215 212"/>
  <path class="dash" d="M360 212 C 400 212, 420 212, 445 212"/>

  <path class="dash" d="M165 322 L165 334"/>
  <path class="dash" d="M495 322 L495 334"/>

  <!-- Bottom note -->
  <path class="solid" d="M30 388 L630 388"/>
  <text class="t muted" x="30" y="382">要点：缺任何一层（目标/边界/标准），模型也可能认真执行，但更容易放大歧义导致返工</text>
</svg>