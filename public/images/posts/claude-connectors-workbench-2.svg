<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="40" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">Claude连接器先连什么工具？</text>
  <text x="40" y="68" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">原则：优先连接“每天都在用、但最讨厌整理”的工具，而不是理论上最全的工具</text>

  <line x1="106" y1="150" x2="554" y2="150" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="105" width="130" height="90" rx="14" fill="#FFFFFF"/>
  </g>
  <circle cx="68" cy="132" r="16" fill="#2563EB"/>
  <text x="68" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <text x="90" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#0F172A">高频使用</text>
  <text x="54" y="161" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">每天打开 ≥5 次</text>
  <text x="54" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">信息密度高</text>

  <g filter="url(#shadow)">
    <rect x="190" y="105" width="130" height="90" rx="14" fill="#FFFFFF"/>
  </g>
  <circle cx="218" cy="132" r="16" fill="#16A34A"/>
  <text x="218" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <text x="240" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#0F172A">影响决策</text>
  <text x="204" y="161" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">需求、排期、Bug</text>
  <text x="204" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">客户反馈等关键内容</text>

  <g filter="url(#shadow)">
    <rect x="340" y="105" width="130" height="90" rx="14" fill="#FFFFFF"/>
  </g>
  <circle cx="368" cy="132" r="16" fill="#EA580C"/>
  <text x="368" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <text x="390" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#0F172A">返工高发</text>
  <text x="354" y="161" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">常因找不到内容</text>
  <text x="354" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">或版本不一致返工</text>

  <g filter="url(#shadow)">
    <rect x="490" y="105" width="130" height="90" rx="14" fill="#FFFFFF"/>
  </g>
  <circle cx="518" cy="132" r="16" fill="#9333EA"/>
  <text x="518" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text>
  <text x="540" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#0F172A">先给只读</text>
  <text x="504" y="161" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">能接受只读权限</text>
  <text x="504" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">便于低风险试跑</text>

  <g filter="url(#shadow)">
    <rect x="40" y="235" width="280" height="115" rx="16" fill="#FFFFFF"/>
  </g>
  <rect x="58" y="252" width="92" height="28" rx="14" fill="#D97706"/>
  <text x="104" y="271" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">推荐起手式</text>
  <text x="58" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">先接 1 个核心工具</text>
  <text x="58" y="324" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">范围小，反馈更清楚，问题更容易定位</text>

  <g filter="url(#shadow)">
    <rect x="340" y="235" width="280" height="115" rx="16" fill="#FFFFFF"/>
  </g>
  <rect x="358" y="252" width="104" height="28" rx="14" fill="#EA580C"/>
  <text x="410" y="271" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">避免误区</text>
  <text x="358" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">不要一上来全都接</text>
  <text x="358" y="324" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">接太多会让答案分散，最后哪条都不敢信</text>

  <line x1="330" y1="292" x2="330" y2="292" stroke="#94A3B8" stroke-width="2"/>
</svg>