<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; fill: #111827; }
      .muted { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #6B7280; }
      .chipText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 600; fill: #111827; }
      .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .dot { fill: #9CA3AF; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" class="bg"/>

  <!-- Header -->
  <text x="28" y="44" class="title">Agent 到底在慢什么：把耗时拆开</text>
  <text x="28" y="68" class="muted">从“备菜→下锅→端盘→洗碗→翻冰箱”看瓶颈不只在 GPU</text>

  <!-- Cards -->
  <!-- 1 备菜 -->
  <rect x="28" y="96" width="188" height="92" rx="12" class="card"/>
  <rect x="28" y="96" width="6" height="92" rx="12" fill="#2563EB"/>
  <text x="44" y="124" class="text" font-weight="700">备菜</text>
  <text x="44" y="146" class="muted">拼 prompt：对话/文件/检索</text>
  <rect x="44" y="158" width="110" height="22" rx="11" fill="#DBEAFE"/>
  <text x="56" y="174" class="chipText">CPU / 内存</text>

  <!-- 2 下锅 -->
  <rect x="236" y="96" width="188" height="92" rx="12" class="card"/>
  <rect x="236" y="96" width="6" height="92" rx="12" fill="#16A34A"/>
  <text x="252" y="124" class="text" font-weight="700">下锅</text>
  <text x="252" y="146" class="muted">模型推理（本地或云端）</text>
  <rect x="252" y="158" width="128" height="22" rx="11" fill="#DCFCE7"/>
  <text x="264" y="174" class="chipText">GPU / 云模型</text>

  <!-- 3 端盘 -->
  <rect x="444" y="96" width="188" height="92" rx="12" class="card"/>
  <rect x="444" y="96" width="6" height="92" rx="12" fill="#EA580C"/>
  <text x="460" y="124" class="text" font-weight="700">端盘</text>
  <text x="460" y="146" class="muted">工具调用：HTTP/DB/脚本</text>
  <rect x="460" y="158" width="156" height="22" rx="11" fill="#FFEDD5"/>
  <text x="472" y="174" class="chipText">网络 / 并发任务</text>

  <!-- 4 洗碗 -->
  <rect x="132" y="216" width="188" height="92" rx="12" class="card"/>
  <rect x="132" y="216" width="6" height="92" rx="12" fill="#9333EA"/>
  <text x="148" y="244" class="text" font-weight="700">洗碗</text>
  <text x="148" y="266" class="muted">日志/落库/缓存/生成文件</text>
  <rect x="148" y="278" width="108" height="22" rx="11" fill="#F3E8FF"/>
  <text x="160" y="294" class="chipText">磁盘 IO</text>

  <!-- 5 翻冰箱 -->
  <rect x="340" y="216" width="292" height="92" rx="12" class="card"/>
  <rect x="340" y="216" width="6" height="92" rx="12" fill="#D97706"/>
  <text x="356" y="244" class="text" font-weight="700">翻冰箱（向量检索 / RAG）</text>
  <text x="356" y="266" class="muted">索引/存储决定：磁盘IO/内存/CPU</text>
  <rect x="356" y="278" width="206" height="22" rx="11" fill="#FEF3C7"/>
  <text x="368" y="294" class="chipText">磁盘 IO / 内存 / CPU</text>

  <!-- Dashed connections (top row) -->
  <path d="M 216 142 L 236 142" class="dash"/>
  <circle cx="226" cy="142" r="2.5" class="dot"/>
  <path d="M 424 142 L 444 142" class="dash"/>
  <circle cx="434" cy="142" r="2.5" class="dot"/>

  <!-- Connections to bottom row -->
  <path d="M 538 188 L 538 206 L 226 206 L 226 216" class="dash"/>
  <circle cx="538" cy="198" r="2.5" class="dot"/>
  <circle cx="226" cy="206" r="2.5" class="dot"/>

  <path d="M 320 262 L 340 262" class="dash"/>
  <circle cx="330" cy="262" r="2.5" class="dot"/>

  <!-- Callout: GPU idle -->
  <rect x="28" y="324" width="604" height="54" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <rect x="28" y="324" width="6" height="54" rx="12" fill="#16A34A"/>
  <text x="44" y="350" class="text" font-weight="700">常见现象</text>
  <text x="140" y="350" class="muted">多轮规划 + 多工具并发 + RAG 时：GPU 可能很闲，但整体被网络/IO/拼装等拖慢</text>
</svg>