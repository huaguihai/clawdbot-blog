<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <rect width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748B"/>
    </marker>
  </defs>

  <rect x="30" y="42" width="150" height="74" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="255" y="42" width="150" height="74" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="480" y="42" width="150" height="74" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="120" y="164" width="180" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="360" y="164" width="180" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="195" y="292" width="270" height="68" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <line x1="180" y1="79" x2="255" y2="79" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="405" y1="79" x2="480" y2="79" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <line x1="330" y1="116" x2="210" y2="164" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="330" y1="116" x2="450" y2="164" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <line x1="210" y1="250" x2="260" y2="292" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="450" y1="250" x2="400" y2="292" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <circle cx="105" cy="79" r="18" fill="#2563EB"/>
  <text x="105" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF">1</text>
  <circle cx="330" cy="79" r="18" fill="#EA580C"/>
  <text x="330" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF">2</text>
  <circle cx="555" cy="79" r="18" fill="#9333EA"/>
  <text x="555" y="85" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#FFFFFF">3</text>

  <text x="105" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">想省事</text>
  <text x="330" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">边界变模糊</text>
  <text x="555" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">权限被放大</text>

  <text x="210" y="196" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">确认步骤被隐藏</text>
  <text x="210" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#475569">体验更顺，但判断更弱</text>

  <text x="450" y="196" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">工具链开始自动执行</text>
  <text x="450" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#475569">上下文、检索、发送串联</text>

  <text x="330" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">一次污染进入生产系统</text>
  <text x="330" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#475569">流畅的动作，模糊的判断，最终变成事故</text>

  <rect x="62" y="150" width="56" height="28" rx="8" fill="#16A34A"/>
  <text x="90" y="169" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">资料</text>
  <rect x="302" y="150" width="56" height="28" rx="8" fill="#D97706"/>
  <text x="330" y="169" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">权限</text>
  <rect x="542" y="150" width="56" height="28" rx="8" fill="#2563EB"/>
  <text x="570" y="169" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">执行</text>
</svg>