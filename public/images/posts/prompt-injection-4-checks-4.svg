<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">AI 读取前的四道安全关卡</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">前后接力，层层限伤、拦截与追溯</text><line x1="100" y1="210" x2="560" y2="210" stroke="#2563EB" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#arrowBlue)"/><rect x="38" y="118" width="132" height="124" rx="16" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/><circle cx="62" cy="144" r="14" fill="#2563EB"/><text x="62" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text><text x="104" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">内容隔离</text><text x="104" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">先隔离网页、邮件</text><text x="104" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">文档中的外部指令</text><text x="104" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">漏了也给后面留缓冲</text><rect x="188" y="118" width="132" height="124" rx="16" fill="#FFFFFF" stroke="#FFEDD5" filter="url(#shadow)"/><circle cx="212" cy="144" r="14" fill="#EA580C"/><text x="212" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text><text x="254" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">权限最小化</text><text x="254" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">只给当前任务必需</text><text x="254" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">的读写与调用范围</text><text x="254" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">被带偏时尽量限伤</text><rect x="338" y="118" width="132" height="124" rx="16" fill="#FFFFFF" stroke="#DCFCE7" filter="url(#shadow)"/><circle cx="362" cy="144" r="14" fill="#16A34A"/><text x="362" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text><text x="404" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">操作前确认</text><text x="404" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">执行发送、修改、删除</text><text x="404" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">前必须人工确认</text><text x="404" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">高风险动作最后拦截</text><rect x="488" y="118" width="132" height="124" rx="16" fill="#FFFFFF" stroke="#E9D5FF" filter="url(#shadow)"/><circle cx="512" cy="144" r="14" fill="#9333EA"/><text x="554" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">结果可追溯</text><text x="512" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text><text x="554" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">记录输入、决策、工具</text><text x="554" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">调用与最终结果</text><text x="554" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">出事后能定位原因</text><rect x="92" y="282" width="476" height="68" rx="16" fill="#FFFFFF" stroke="#FDE68A" filter="url(#shadow)"/><rect x="108" y="298" width="92" height="36" rx="10" fill="#D97706" opacity="0.12"/><text x="154" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">核心结论</text><text x="220" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">与其追求万能防注入，不如先把工作流设计成：</text><text x="220" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">“即使被带偏，也不容易真的执行危险操作。”</text></svg>