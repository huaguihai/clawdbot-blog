<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .h { font-family:-apple-system,'Segoe UI',sans-serif; font-size:13px; font-weight:700; fill:#111827; }
      .p { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .tag { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:700; fill:#111827; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" class="bg"/>

  <!-- Header -->
  <text x="28" y="40" class="title">方法论：可复制的对话编排清单（核心流程）</text>

  <!-- Step cards -->
  <!-- Step 0 -->
  <rect x="28" y="64" width="604" height="56" rx="12" class="card"/>
  <rect x="28" y="64" width="10" height="56" rx="12" fill="#EA580C"/>
  <text x="50" y="88" class="h">第0步：把“转人工”当产品功能</text>
  <text x="50" y="108" class="p">核心：交接班不踢皮球（带上已收集信息）</text>

  <!-- Arrow 0 -> 1 -->
  <path d="M 330 128 L 330 140" class="dash"/>
  <path d="M 322 138 L 330 146 L 338 138" fill="#9CA3AF"/>

  <!-- Step 1 -->
  <rect x="28" y="144" width="604" height="56" rx="12" class="card"/>
  <rect x="28" y="144" width="10" height="56" rx="12" fill="#2563EB"/>
  <text x="50" y="168" class="h">第1步：开场确认“目标 + 边界”</text>
  <text x="50" y="188" class="p">给选项（A/B/C/D）+ 复述确认（对/不对）</text>

  <!-- Arrow 1 -> 2 -->
  <path d="M 330 208 L 330 220" class="dash"/>
  <path d="M 322 218 L 330 226 L 338 218" fill="#9CA3AF"/>

  <!-- Step 2 -->
  <rect x="28" y="224" width="604" height="56" rx="12" class="card"/>
  <rect x="28" y="224" width="10" height="56" rx="12" fill="#16A34A"/>
  <text x="50" y="248" class="h">第2步：信息收集“最少字段 + 解释理由”</text>
  <text x="50" y="268" class="p">给选择 + 给退路（先给一个也行，从这里开始查）</text>

  <!-- Arrow 2 -> 3 -->
  <path d="M 330 288 L 330 300" class="dash"/>
  <path d="M 322 298 L 330 306 L 338 298" fill="#9CA3AF"/>

  <!-- Step 3 -->
  <rect x="28" y="304" width="410" height="68" rx="12" class="card"/>
  <rect x="28" y="304" width="10" height="68" rx="12" fill="#9333EA"/>
  <text x="50" y="328" class="h">第3步：逐步授权（两段式）</text>
  <text x="50" y="348" class="p">先问：可访问哪些数据？再执行动作</text>
  <text x="50" y="366" class="p">加“超时承诺”：10秒无果说明卡点+给转人工</text>

  <!-- Step 4 (right) -->
  <rect x="460" y="304" width="172" height="68" rx="12" class="card"/>
  <rect x="460" y="304" width="10" height="68" rx="12" fill="#D97706"/>
  <text x="482" y="328" class="h">第4步：失败兜底</text>
  <text x="482" y="348" class="p">说人话 + 给下一步</text>
  <text x="482" y="366" class="p">1 转人工 2 补字段再试</text>

  <!-- Connector 3 -> 4 -->
  <path d="M 448 338 L 454 338" class="dash"/>
  <path d="M 452 330 L 460 338 L 452 346" fill="#9CA3AF"/>

  <!-- Hard rule callout -->
  <rect x="28" y="384" width="604" height="0" rx="12" fill="none"/>
  <rect x="28" y="314" width="0" height="0" fill="none"/>

  <rect x="28" y="382" width="604" height="0" fill="none"/>

  <!-- Bottom callout bar -->
  <rect x="28" y="380" width="604" height="0" fill="none"/>

  <!-- Callout box -->
  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <!-- Visible callout -->
  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <!-- Actual callout (placed above bottom; ensure within viewBox) -->
  <rect x="28" y="380" width="604" height="0" rx="12" fill="none"/>

  <rect x="28" y="380" width="604" height="0" rx="12" fill="none"/>

  <!-- Hard rule callout (proper) -->
  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <!-- Dedicated callout area just above bottom edge -->
  <rect x="28" y="372" width="604" height="0" rx="12" fill="none"/>

  <!-- Since y=380+ would exceed, place at y=354 within remaining space: -->
  <rect x="28" y="376" width="604" height="18" rx="9" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="28" y="376" width="6" height="18" rx="9" fill="#EA580C"/>
  <text x="44" y="389" class="tag">硬规则：同一件事连续失败两次 → 换问法（字段更少/给选项）或直接转人工</text>
</svg>