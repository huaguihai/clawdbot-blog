<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><rect width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter><marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker></defs><style>text{font-family:-apple-system, 'Segoe UI', sans-serif;}</style><text x="330" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827">把赏金计划变成独立开发者自测清单</text><rect x="38" y="78" width="150" height="82" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="68" cy="109" r="15" fill="#DBEAFE"/><text x="68" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#2563EB">奖</text><text x="92" y="106" font-size="15" font-weight="700" fill="#111827">赏金计划</text><text x="92" y="130" font-size="12" fill="#64748B">别人筛过优先级</text><text x="92" y="148" font-size="12" fill="#64748B">高风险问题菜单</text><line x1="188" y1="119" x2="276" y2="119" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/><rect x="276" y="78" width="148" height="82" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="306" cy="109" r="15" fill="#DCFCE7"/><text x="306" y="115" text-anchor="middle" font-size="18" font-weight="700" fill="#16A34A">测</text><text x="330" y="106" font-size="15" font-weight="700" fill="#111827">优先自测</text><text x="330" y="130" font-size="12" fill="#64748B">不是先修全部</text><text x="330" y="148" font-size="12" fill="#64748B">而是先测最危险</text><line x1="350" y1="160" x2="350" y2="197" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/><rect x="58" y="212" width="114" height="108" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><rect x="58" y="212" width="114" height="8" rx="4" fill="#2563EB"/><text x="115" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">提示注入</text><text x="115" y="268" text-anchor="middle" font-size="12" fill="#64748B">输入或文档</text><text x="115" y="286" text-anchor="middle" font-size="12" fill="#64748B">塞入新指令</text><text x="115" y="306" text-anchor="middle" font-size="12" fill="#2563EB">规则被覆盖</text><rect x="202" y="212" width="114" height="108" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><rect x="202" y="212" width="114" height="8" rx="4" fill="#EA580C"/><text x="259" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">工具越权</text><text x="259" y="268" text-anchor="middle" font-size="12" fill="#64748B">诱导调用工具</text><text x="259" y="286" text-anchor="middle" font-size="12" fill="#64748B">读写敏感资源</text><text x="259" y="306" text-anchor="middle" font-size="12" fill="#EA580C">默认可信出事</text><rect x="346" y="212" width="114" height="108" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><rect x="346" y="212" width="114" height="8" rx="4" fill="#9333EA"/><text x="403" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">上下文泄露</text><text x="403" y="268" text-anchor="middle" font-size="12" fill="#64748B">套出隐藏提示</text><text x="403" y="286" text-anchor="middle" font-size="12" fill="#64748B">暴露历史内容</text><text x="403" y="306" text-anchor="middle" font-size="12" fill="#9333EA">混放是误区</text><rect x="490" y="212" width="114" height="108" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><rect x="490" y="212" width="114" height="8" rx="4" fill="#D97706"/><text x="547" y="242" text-anchor="middle" font-size="15" font-weight="700" fill="#111827">错误执行</text><text x="547" y="268" text-anchor="middle" font-size="12" fill="#64748B">模型误判后</text><text x="547" y="286" text-anchor="middle" font-size="12" fill="#64748B">直接执行动作</text><text x="547" y="306" text-anchor="middle" font-size="12" fill="#D97706">该做需确认</text><rect x="238" y="338" width="184" height="42" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="263" cy="359" r="10" fill="#DCFCE7"/><text x="263" y="363" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">记</text><text x="286" y="356" font-size="14" font-weight="700" fill="#111827">日志可追溯</text><text x="286" y="373" font-size="11" fill="#64748B">记录触发链路，才能复盘补洞</text><line x1="350" y1="320" x2="330" y2="338" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/></svg>