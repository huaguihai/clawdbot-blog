<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">别先聊性能，先把“可撤销”打开</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">真实项目里，先保证可控与可回滚，再讨论执行速度</text>

  <rect x="42" y="102" width="250" height="218" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="368" y="102" width="250" height="218" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <text x="167" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">只追求性能</text>
  <text x="493" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">先打开可撤销</text>

  <circle cx="82" cy="170" r="6" fill="#EA580C"/>
  <text x="98" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">补全更快 / 执行更猛</text>
  <circle cx="82" cy="206" r="6" fill="#EA580C"/>
  <text x="98" y="211" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">但缺少完整轨迹</text>
  <circle cx="82" cy="242" r="6" fill="#EA580C"/>
  <text x="98" y="247" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">问题会更快扩散</text>
  <circle cx="82" cy="278" r="6" fill="#EA580C"/>
  <text x="98" y="283" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">改坏后难以恢复</text>

  <circle cx="408" cy="170" r="6" fill="#16A34A"/>
  <text x="424" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">每一步都有 Git 快照</text>
  <circle cx="408" cy="206" r="6" fill="#16A34A"/>
  <text x="424" y="211" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">冲突可回滚</text>
  <circle cx="408" cy="242" r="6" fill="#16A34A"/>
  <text x="424" y="247" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">历史可追踪</text>
  <circle cx="408" cy="278" r="6" fill="#16A34A"/>
  <text x="424" y="283" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">Agent 行为可控</text>

  <line x1="292" y1="211" x2="368" y2="211" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <text x="330" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2563EB">优先级切换</text>

  <rect x="142" y="334" width="376" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <path d="M176 355 C224 320, 274 320, 322 355" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <path d="M338 355 C386 320, 436 320, 484 355" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
  <text x="330" y="360" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#0F172A">结论：没有可撤销能力，性能越高，放大风险越快</text>

  <rect x="257" y="92" width="146" height="30" rx="15" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="330" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2563EB">核心问题：有没有完整轨迹？</text>
</svg>