<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #0F172A; }
      .h { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 700; fill: #0F172A; }
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #334155; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #475569; }
      .dash { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .arrow { fill: #94A3B8; }
      .badgeText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <!-- background -->
  <rect x="0" y="0" width="660" height="400" rx="12" class="bg"/>

  <!-- header -->
  <text x="28" y="40" class="title">MTP 怎么开、怎么调：三档策略 + 固定回滚路径</text>

  <!-- Step 1: support check -->
  <rect x="28" y="62" width="604" height="58" rx="12" class="card"/>
  <circle cx="52" cy="91" r="12" fill="#2563EB"/>
  <text x="48" y="95" text-anchor="middle" class="badgeText">1</text>
  <text x="74" y="88" class="h">确认框架确实支持 MTP / 推测解码</text>
  <text x="74" y="106" class="t">优先看官方文档；注意版本/编译选项是否对上</text>

  <!-- Step 2: benchmark -->
  <rect x="28" y="134" width="604" height="58" rx="12" class="card"/>
  <circle cx="52" cy="163" r="12" fill="#9333EA"/>
  <text x="48" y="167" text-anchor="middle" class="badgeText">2</text>
  <text x="74" y="160" class="h">用同一套测速表：off → 保守 → 中等 → 激进</text>
  <text x="74" y="178" class="t">指标：tok/s、TTFT、长上下文退化、格式稳定性、异常率</text>

  <!-- dashed connector to tiers -->
  <path d="M330 192 L330 214" class="dash"/>
  <polygon points="330,224 324,214 336,214" class="arrow"/>

  <!-- Tiers cards -->
  <!-- Conservative -->
  <rect x="28" y="228" width="190" height="118" rx="12" class="card"/>
  <rect x="28" y="228" width="190" height="30" rx="12" fill="#16A34A"/>
  <text x="40" y="248" class="h" fill="#FFFFFF">保守档</text>
  <text x="40" y="270" class="small">目标：先验证能提速且稳</text>
  <text x="40" y="290" class="small">做法：少量预测 token</text>
  <text x="40" y="307" class="small">并发/batch 先别大动</text>
  <text x="40" y="326" class="small">通过：10 次连续无异常</text>

  <!-- Balanced -->
  <rect x="235" y="228" width="190" height="118" rx="12" class="card"/>
  <rect x="235" y="228" width="190" height="30" rx="12" fill="#2563EB"/>
  <text x="247" y="248" class="h" fill="#FFFFFF">中等档</text>
  <text x="247" y="270" class="small">目标：体感明显变快</text>
  <text x="247" y="290" class="small">做法：提高预测 token</text>
  <text x="247" y="307" class="small">适度提高 batch/并行</text>
  <text x="247" y="326" class="small">通过：退化曲线别恶化</text>

  <!-- Aggressive -->
  <rect x="442" y="228" width="190" height="118" rx="12" class="card"/>
  <rect x="442" y="228" width="190" height="30" rx="12" fill="#EA580C"/>
  <text x="454" y="248" class="h" fill="#FFFFFF">激进档</text>
  <text x="454" y="270" class="small">目标：冲极限数据/benchmark</text>
  <text x="454" y="290" class="small">做法：更高预测 + 更激进并行</text>
  <text x="454" y="307" class="small">通常需要更多显存余量</text>
  <text x="454" y="326" class="small">通过：错误/卡死率不升</text>

  <!-- dashed progression arrows between tiers -->
  <path d="M218 287 L235 287" class="dash"/>
  <polygon points="245,287 235,281 235,293" class="arrow"/>
  <path d="M425 287 L442 287" class="dash"/>
  <polygon points="452,287 442,281 442,293" class="arrow"/>

  <!-- Rollback box -->
  <rect x="28" y="356" width="604" height="32" rx="12" class="card"/>
  <rect x="28" y="356" width="150" height="32" rx="12" fill="#D97706"/>
  <text x="42" y="377" class="h" fill="#FFFFFF">固定回滚顺序</text>
  <text x="190" y="377" class="t">① 关 MTP 回基线  →  ② 降上下文(16k→8k)  →  ③ 换更稳量化/降模型(14B/7B)</text>

  <!-- dashed connectors from tiers to rollback -->
  <path d="M123 346 L123 356" class="dash"/>
  <path d="M330 346 L330 356" class="dash"/>
  <path d="M537 346 L537 356" class="dash"/>
</svg>