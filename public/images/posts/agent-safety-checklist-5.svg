<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">第三方 Prompt Injection 最低防线</text>
  <text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心原则：外部内容是证词，不是命令；工具调用必须由用户显式确认</text>

  <rect x="36" y="92" width="150" height="94" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="111" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">外部内容输入</text>
  <text x="111" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">邮件 / 网页隐藏文字</text>
  <text x="111" y="163" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">PDF 注释 / 工单历史</text>

  <rect x="238" y="92" width="184" height="94" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="119" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">解析阶段</text>
  <text x="330" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">只抽取事实：金额、日期</text>
  <text x="330" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">公司名、附件链接</text>

  <rect x="474" y="92" width="150" height="94" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="549" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">摘要与标注</text>
  <text x="549" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">标记为外部指令</text>
  <text x="549" y="163" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">不可信，不执行</text>

  <rect x="238" y="230" width="184" height="100" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">行动阶段闸门</text>
  <text x="330" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">只有用户显式请求</text>
  <text x="330" y="301" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">才能进入工具调用</text>

  <rect x="36" y="248" width="150" height="64" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="111" y="274" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#D97706">用户显式确认</text>
  <text x="111" y="294" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">点击确认发送/退款</text>

  <rect x="474" y="230" width="150" height="100" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="549" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">工具调用</text>
  <text x="549" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">代码决定是否放行</text>
  <text x="549" y="301" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">模型只负责建议</text>

  <rect x="36" y="344" width="588" height="36" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-dasharray="5 5"/>
  <text x="330" y="367" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9A3412">过关信号：命中 prompt injection 标签，且未触发发送邮件、导出客户等高风险工具</text>

  <line x1="186" y1="139" x2="238" y2="139" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="422" y1="139" x2="474" y2="139" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="330" y1="186" x2="330" y2="230" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <line x1="186" y1="280" x2="238" y2="280" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <line x1="422" y1="280" x2="474" y2="280" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>

  <text x="194" y="128" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#2563EB">当作证词</text>
  <text x="431" y="128" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#2563EB">识别外部指令</text>
  <text x="340" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#9333EA">禁止自动执行</text>
  <text x="194" y="269" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#D97706">显式请求</text>
  <text x="431" y="269" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">允许放行</text>
</svg>