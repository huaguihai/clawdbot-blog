<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">输入隔离：资料区和命令区分开</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心原则：外部资料永远只能当证据，不能当命令</text><rect x="36" y="92" width="180" height="242" rx="12" fill="#EFF6FF" stroke="#93C5FD"/><text x="126" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">命令区</text><rect x="56" y="136" width="140" height="66" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="126" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1F2937">系统规则</text><text x="126" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">唯一高优先级约束</text><rect x="56" y="220" width="140" height="66" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="126" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1F2937">用户请求</text><text x="126" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">当前明确提出的任务</text><rect x="250" y="92" width="160" height="242" rx="12" fill="#F9FAFB" stroke="#D1D5DB" stroke-dasharray="6 6"/><text x="330" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">隔离层</text><rect x="270" y="146" width="120" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#EA580C">分类与标记</text><text x="330" y="188" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">先判断来源，再决定权限</text><rect x="270" y="220" width="120" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">执行原则</text><text x="330" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">资料可引用</text><text x="330" y="280" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">不可直接当命令</text><rect x="444" y="92" width="180" height="242" rx="12" fill="#FFF7ED" stroke="#FDBA74"/><text x="534" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">资料区</text><rect x="464" y="136" width="140" height="40" rx="10" fill="#FFFFFF" filter="url(#shadow)"/><text x="534" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">外部资料</text><rect x="464" y="186" width="140" height="40" rx="10" fill="#FFFFFF" filter="url(#shadow)"/><text x="534" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">工具返回</text><rect x="464" y="236" width="140" height="40" rx="10" fill="#FFFFFF" filter="url(#shadow)"/><text x="534" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">敏感状态信息</text><rect x="464" y="286" width="140" height="30" rx="10" fill="#F3E8FF" stroke="#D8B4FE"/><text x="534" y="306" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">仅作证据输入</text><line x1="196" y1="169" x2="270" y2="169" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/><line x1="196" y1="253" x2="270" y2="253" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/><line x1="390" y1="169" x2="464" y2="156" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/><line x1="390" y1="250" x2="464" y2="206" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/><line x1="390" y1="270" x2="464" y2="256" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/><text x="330" y="364" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#D97706">谁能下命令要靠结构定义，不靠模型自己理解</text></svg>