<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">输入规范：把开放提问变成可用结果</text><rect x="38" y="82" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="118" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">用户原始状态</text><text x="58" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 只有模糊目标</text><text x="58" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 不知该补哪些条件</text><line x1="198" y1="128" x2="238" y2="128" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><polygon points="238,128 230,123 230,133" fill="#9CA3AF"/><rect x="238" y="62" width="184" height="132" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="90" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">组件 1：输入规范</text><text x="258" y="116" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">1. 半结构化输入</text><text x="258" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">2. 给具体示例</text><text x="258" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">3. 明示缺失信息影响</text><line x1="422" y1="128" x2="462" y2="128" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><polygon points="462,128 454,123 454,133" fill="#9CA3AF"/><rect x="462" y="82" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="542" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">结果</text><text x="482" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 降低试错成本</text><text x="482" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 首次使用也能产出</text><rect x="54" y="238" width="552" height="124" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="74" y="266" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">可直接套用的输入骨架</text><rect x="74" y="280" width="118" height="56" rx="10" fill="#EFF6FF" stroke="#2563EB"/><text x="133" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">任务目标</text><text x="133" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">想让 AI 完成什么</text><rect x="206" y="280" width="118" height="56" rx="10" fill="#FFF7ED" stroke="#EA580C"/><text x="265" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">必要约束</text><text x="265" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">语气 长度 时间范围</text><rect x="338" y="280" width="118" height="56" rx="10" fill="#F0FDF4" stroke="#16A34A"/><text x="397" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">参考资料</text><text x="397" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">文档 记录 页面 数据</text><rect x="470" y="280" width="118" height="56" rx="10" fill="#FEF3C7" stroke="#D97706"/><text x="529" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">输出要求</text><text x="529" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">摘要 草稿 表格 建议</text></svg>