<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/><text x="330" y="45" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#111827">四层防御体系</text><g><rect x="60" y="70" width="540" height="65" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><rect x="70" y="80" width="8" height="45" rx="4" fill="#2563EB"/><text x="95" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#111827">① 输入规范层</text><text x="95" y="120" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">API 网关 + JSON Schema + 敏感词黑名单</text></g><g><rect x="60" y="150" width="540" height="65" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><rect x="70" y="160" width="8" height="45" rx="4" fill="#EA580C"/><text x="95" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#111827">② 工具权限层</text><text x="95" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">白名单 action/resource + 高风险操作二次确认</text></g><g><rect x="60" y="230" width="540" height="65" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><rect x="70" y="240" width="8" height="45" rx="4" fill="#16A34A"/><text x="95" y="260" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#111827">③ 逐步确认层</text><text x="95" y="280" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">生成可读执行计划 + 用户显式确认/拒绝</text></g><g><rect x="60" y="310" width="540" height="65" rx="10" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/><rect x="70" y="320" width="8" height="45" rx="4" fill="#9333EA"/><text x="95" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#111827">④ 可追溯记录层</text><text x="95" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">结构化日志 + 会话 ID + 5 秒审计查询</text></g></svg>