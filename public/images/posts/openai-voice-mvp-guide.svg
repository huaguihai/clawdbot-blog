<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #0f172a; }
      .sub { font-size: 12px; fill: #334155; }
      .cardTitle { font-size: 14px; font-weight: 700; fill: #0f172a; }
      .cardText { font-size: 12px; fill: #334155; }
      .small { font-size: 11px; fill: #475569; }
      .dash { stroke-dasharray: 6 6; }
    </style>
  </defs>

  <!-- Header -->
  <text x="34" y="52" class="font title">你真正需要的是：可上线的语音闭环（流水线）</text>
  <text x="34" y="74" class="font sub">不是“输入语音 → AI回答 → 输出语音”，而是四段可解耦的链路</text>

  <!-- Pipeline cards -->
  <!-- 1 -->
  <rect x="34" y="110" width="146" height="150" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#dbeafe"/>
  <rect x="34" y="110" width="146" height="10" rx="12" fill="#2563EB"/>
  <text x="48" y="145" class="font cardTitle">1 听见</text>
  <text x="48" y="168" class="font cardText">采集音频</text>
  <text x="48" y="188" class="font cardText">端侧降噪</text>
  <text x="48" y="208" class="font cardText">VAD 检测说完</text>

  <!-- 2 -->
  <rect x="198" y="110" width="146" height="150" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#dcfce7"/>
  <rect x="198" y="110" width="146" height="10" rx="12" fill="#16A34A"/>
  <text x="212" y="145" class="font cardTitle">2 听懂</text>
  <text x="212" y="168" class="font cardText">语音转文字</text>
  <text x="212" y="188" class="font cardText">意图结构化</text>
  <text x="212" y="208" class="font cardText">风险词识别</text>

  <!-- 3 -->
  <rect x="362" y="110" width="146" height="150" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#fae8ff"/>
  <rect x="362" y="110" width="146" height="10" rx="12" fill="#9333EA"/>
  <text x="376" y="145" class="font cardTitle">3 说回去</text>
  <text x="376" y="168" class="font cardText">流式生成</text>
  <text x="376" y="188" class="font cardText">可打断</text>
  <text x="376" y="208" class="font cardText">语气/节奏控制</text>

  <!-- 4 -->
  <rect x="526" y="110" width="146" height="150" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#ffedd5"/>
  <rect x="526" y="110" width="146" height="10" rx="12" fill="#EA580C"/>
  <text x="540" y="145" class="font cardTitle">4 留痕</text>
  <text x="540" y="168" class="font cardText">日志 / 质检</text>
  <text x="540" y="188" class="font cardText">录音 / 申诉</text>
  <text x="540" y="208" class="font cardText">合规与删除策略</text>

  <!-- Dashed connectors -->
  <line x1="180" y1="185" x2="198" y2="185" stroke="#64748b" stroke-width="2" class="dash"/>
  <polygon points="198,185 190,180 190,190" fill="#64748b"/>

  <line x1="344" y1="185" x2="362" y2="185" stroke="#64748b" stroke-width="2" class="dash"/>
  <polygon points="362,185 354,180 354,190" fill="#64748b"/>

  <line x1="508" y1="185" x2="526" y2="185" stroke="#64748b" stroke-width="2" class="dash"/>
  <polygon points="526,185 518,180 518,190" fill="#64748b"/>

  <!-- Pain points (callouts) -->
  <!-- Callout A: interrupt -->
  <rect x="54" y="278" width="260" height="86" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0"/>
  <circle cx="72" cy="304" r="7" fill="#D97706"/>
  <text x="88" y="309" class="font cardText">说到一半被打断不了、停顿误判</text>
  <text x="88" y="330" class="font small">多来自 VAD 阈值与“可打断”策略设计</text>

  <!-- connector to stage 1 and 3 -->
  <line x1="140" y1="278" x2="120" y2="260" stroke="#94a3b8" stroke-width="2" class="dash"/>
  <line x1="260" y1="278" x2="420" y2="260" stroke="#94a3b8" stroke-width="2" class="dash"/>

  <!-- Callout B: noise and cost -->
  <rect x="332" y="278" width="294" height="86" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#e2e8f0"/>
  <circle cx="350" cy="304" r="7" fill="#2563EB"/>
  <text x="366" y="309" class="font cardText">背景音导致转写乱、通话成本算不清</text>
  <text x="366" y="330" class="font small">多来自降噪/ASR 与计费、日志埋点缺失</text>

  <!-- connector to stage 2 and 4 -->
  <line x1="450" y1="278" x2="270" y2="260" stroke="#94a3b8" stroke-width="2" class="dash"/>
  <line x1="560" y1="278" x2="600" y2="260" stroke="#94a3b8" stroke-width="2" class="dash"/>

  <!-- Bottom note -->
  <text x="34" y="388" class="font small" fill="#64748b">核心：把四段解耦成流水线，问题就不再是“模型不行”，而是定位到具体环节可优化。</text>
</svg>