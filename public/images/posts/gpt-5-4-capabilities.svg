<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="300" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1a1a">GPT-5.4：五大能力 → 一个模型</text>

  <!-- Center circle -->
  <circle cx="300" cy="210" r="52" fill="#EA580C" filter="url(#shadow)"/>
  <text x="300" y="203" text-anchor="middle" font-size="13" font-weight="700" fill="white">GPT-5.4</text>
  <text x="300" y="222" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">统一模型</text>

  <!-- Reasoning - top -->
  <rect x="235" y="68" width="130" height="46" rx="10" fill="white" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="300" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#2563EB">🧠 推理</text>
  <text x="300" y="104" text-anchor="middle" font-size="10" fill="#666">思维链 + 更少 Token</text>
  <line x1="300" y1="114" x2="300" y2="158" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Coding - top right -->
  <rect x="420" y="108" width="140" height="46" rx="10" fill="white" stroke="#9333EA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="490" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#9333EA">💻 编程</text>
  <text x="490" y="144" text-anchor="middle" font-size="10" fill="#666">SWE-Bench 57.7%</text>
  <line x1="420" y1="131" x2="352" y2="195" stroke="#9333EA" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Computer Use - right -->
  <rect x="420" y="218" width="155" height="46" rx="10" fill="white" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/>
  <text x="497" y="238" text-anchor="middle" font-size="12" font-weight="700" fill="#EA580C">🖱️ 电脑操作 ← NEW</text>
  <text x="497" y="254" text-anchor="middle" font-size="10" fill="#666">OSWorld 75.0% &gt; 人类</text>
  <line x1="420" y1="241" x2="352" y2="218" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Deep Search - bottom left -->
  <rect x="40" y="218" width="150" height="46" rx="10" fill="white" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="238" text-anchor="middle" font-size="12" font-weight="600" fill="#16A34A">🔍 深度搜索</text>
  <text x="115" y="254" text-anchor="middle" font-size="10" fill="#666">BrowseComp 82.7%</text>
  <line x1="190" y1="241" x2="248" y2="218" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Long Context - top left -->
  <rect x="40" y="108" width="150" height="46" rx="10" fill="white" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="115" y="128" text-anchor="middle" font-size="12" font-weight="600" fill="#D97706">📄 百万 Token</text>
  <text x="115" y="144" text-anchor="middle" font-size="10" fill="#666">1024 万像素原图</text>
  <line x1="190" y1="131" x2="248" y2="195" stroke="#D97706" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom annotation -->
  <rect x="130" y="310" width="340" height="56" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="300" y="332" text-anchor="middle" font-size="12" font-weight="600" fill="#EA580C">以前：5 个模型 / 工具分别调用</text>
  <text x="300" y="352" text-anchor="middle" font-size="12" font-weight="600" fill="#EA580C">现在：1 个模型全搞定，Token 成本 ↓47%</text>
</svg>
