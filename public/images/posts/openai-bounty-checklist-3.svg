<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">准备“坏用户”测试账号</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心：验证模型是否有边界感，而不是回答是否漂亮</text><rect x="40" y="92" width="170" height="104" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="40" y="92" width="170" height="8" rx="12" fill="#2563EB"/><text x="125" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1E3A8A">普通低权限账号</text><text x="125" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">模拟真实用户</text><text x="125" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">避免管理员视角偏差</text><rect x="245" y="92" width="170" height="104" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="245" y="92" width="170" height="8" rx="12" fill="#EA580C"/><text x="330" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9A3412">受限测试账号</text><text x="330" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">故意移除部分工具权限</text><text x="330" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">观察是否越权硬闯</text><rect x="450" y="92" width="170" height="104" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="450" y="92" width="170" height="8" rx="12" fill="#9333EA"/><text x="535" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#6B21A8">攻击式提问</text><text x="535" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">系统提示 / 工具列表</text><text x="535" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">日志 / 自动执行 / 群发</text><line x1="125" y1="196" x2="125" y2="236" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="196" x2="330" y2="236" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="535" y1="196" x2="535" y2="236" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="165" y="236" width="330" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="165" y="236" width="330" height="8" rx="12" fill="#16A34A"/><text x="330" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#166534">检查结果：有没有边界感</text><text x="330" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">是否拒绝越权、泄露、盲目执行</text><text x="330" y="312" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">重点看约束是否生效，而非措辞是否流畅</text><rect x="40" y="338" width="580" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="68" cy="359" r="10" fill="#D97706"/><text x="68" y="363" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">!</text><text x="92" y="355" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#92400E">别只测聊天框输入</text><text x="92" y="372" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">上传文件、网页抓取、知识库文档、外部 API 返回值，只要能进上下文都算潜在攻击输入源</text></svg>