<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">优先做“一轮对话就能交付价值”的语音场景</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">闭环短、结果明确、调试成本低</text>

  <rect x="220" y="82" width="220" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">核心筛选标准</text>
  <text x="330" y="124" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">用户说一句 → 系统给明确结果</text>

  <line x1="330" y1="136" x2="150" y2="168" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="136" x2="510" y2="168" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="136" x2="150" y2="280" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="136" x2="510" y2="280" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="170" width="220" height="88" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#16A34A" stroke-width="2"/>
  <rect x="52" y="182" width="72" height="24" rx="12" fill="#16A34A"/>
  <text x="88" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">优先押注</text>
  <text x="150" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">客服分流</text>
  <text x="150" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">用户提问 → 分类 → 知识库回答或转人工</text>
  <text x="150" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">指标：首轮命中率、转人工率</text>

  <rect x="400" y="170" width="220" height="88" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#2563EB" stroke-width="2"/>
  <rect x="412" y="182" width="72" height="24" rx="12" fill="#2563EB"/>
  <text x="448" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">优先押注</text>
  <text x="510" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">口述录入</text>
  <text x="510" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">用户口述 → 转写 → 自动整理结构化内容</text>
  <text x="510" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">指标：转写准确度、可直接提交比例</text>

  <rect x="40" y="282" width="220" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="52" y="294" width="56" height="22" rx="11" fill="#D97706"/>
  <text x="80" y="309" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">可拓展</text>
  <text x="150" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#111827">课程陪练/讲解</text>
  <text x="150" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">提问或跟读 → AI反馈与补充讲解</text>
  <text x="150" y="352" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#D97706">指标：单次时长、复用率</text>

  <rect x="400" y="282" width="220" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="412" y="294" width="56" height="22" rx="11" fill="#9333EA"/>
  <text x="440" y="309" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">入口改造</text>
  <text x="510" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#111827">创作者口播辅助</text>
  <text x="510" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">口述大纲 → 整理稿子/提词/复述</text>
  <text x="510" y="352" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">适合已有内容工具时叠加</text>

  <text x="330" y="386" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">结论：先做离钱近、价值证明快的短闭环场景</text>
</svg>