<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">输入分层：外部内容是分析对象，不是指令来源</text><rect x="70" y="72" width="520" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#2563EB" stroke-width="2"/><text x="96" y="97" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">1. 系统规则</text><text x="96" y="117" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">最高优先级，决定整体边界与安全约束</text><rect x="95" y="145" width="470" height="46" rx="10" fill="none" stroke="#94A3B8" stroke-dasharray="6 6"/><text x="330" y="173" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">按优先级逐层传递给模型</text><rect x="90" y="210" width="230" height="72" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#EA580C" stroke-width="2"/><text x="108" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#EA580C">2. 开发者任务说明</text><text x="108" y="257" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">定义本轮目标、允许动作</text><text x="108" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">和禁止动作</text><rect x="340" y="210" width="230" height="72" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#16A34A" stroke-width="2"/><text x="358" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">3. 用户请求</text><text x="358" y="257" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">表达用户真正想解决的</text><text x="358" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">问题与期望输出</text><line x1="205" y1="128" x2="205" y2="210" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="455" y1="128" x2="455" y2="210" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="70" y="308" width="520" height="68" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#9333EA" stroke-width="2"/><text x="94" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#9333EA">4. 外部内容</text><text x="94" y="355" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">网页 / 邮件 / OCR / 搜索结果 / 工具返回文本</text><text x="548" y="336" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#D97706">仅作分析材料</text><text x="548" y="356" text-anchor="end" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#D97706">不可作为行为依据</text><line x1="330" y1="282" x2="330" y2="308" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="470" y="146" width="120" height="44" rx="10" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="530" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#D97706">关键原则</text><text x="530" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#92400E">先标记不可信，再分析</text></svg>