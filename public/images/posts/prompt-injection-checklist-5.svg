<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">工具权限最小化：按风险分层授权</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心原则：能只读，就别给写；高风险写操作禁止自动执行</text><line x1="330" y1="86" x2="330" y2="118" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="230" y="118" width="200" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="330" y="141" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">工具白名单</text><text x="330" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">先限制可调用范围，再考虑能力扩展</text><line x1="330" y1="174" x2="330" y2="204" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="40" y="214" width="130" height="112" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#BBF7D0"/><text x="105" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">低风险只读</text><text x="105" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">搜索 / 检索</text><text x="105" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">读取文档</text><text x="105" y="304" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">可自动执行</text><rect x="190" y="214" width="130" height="112" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#BFDBFE"/><text x="255" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">受限只读</text><text x="255" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">查订单 / 状态</text><text x="255" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">读报表</text><text x="255" y="304" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">可自动，但限范围</text><rect x="340" y="214" width="130" height="112" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#FCD34D"/><text x="405" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">一般写操作</text><text x="405" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">改字段 / 建任务</text><text x="405" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">发消息</text><text x="405" y="304" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#D97706">尽量不要自动执行</text><rect x="490" y="214" width="130" height="112" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><text x="555" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">高风险写操作</text><text x="555" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">删除 / 退款 / 支付</text><text x="555" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">共享 / 导出</text><text x="555" y="304" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">禁止自动执行</text><line x1="105" y1="214" x2="255" y2="174" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="255" y1="214" x2="305" y2="174" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="405" y1="214" x2="355" y2="174" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="555" y1="214" x2="330" y2="174" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="120" y="342" width="420" height="36" rx="10" fill="#FFFFFF" stroke="#E2E8F0" filter="url(#shadow)"/><text x="330" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9333EA" font-weight="600">判断准则：如果半夜误调一次，明早需要道歉，就不该默认自动执行</text></svg>