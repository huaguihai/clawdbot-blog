<svg width="660" height="400" viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="660" height="400" fill="#FAFAFA"/>

  <!-- 标题 -->
  <text x="330" y="38" font-size="15" font-weight="700" fill="#1C1917" text-anchor="middle"
    font-family="-apple-system,'Segoe UI',sans-serif">三种接入方式对比：哪种最适合 Agent？</text>

  <!-- 列标题 -->
  <text x="120" y="68" font-size="12" font-weight="600" fill="#78716C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">REST API</text>
  <text x="330" y="68" font-size="12" font-weight="600" fill="#78716C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">MCP</text>
  <text x="540" y="68" font-size="12" font-weight="700" fill="#EA580C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">CLI ✓</text>

  <!-- 分隔线 -->
  <line x1="40" y1="78" x2="620" y2="78" stroke="#E7E5E4" stroke-width="1"/>

  <!-- 行1：接入门槛 -->
  <text x="40" y="108" font-size="12" font-weight="600" fill="#44403C" font-family="-apple-system,'Segoe UI',sans-serif">接入门槛</text>
  <!-- REST API -->
  <rect x="40" y="116" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="120" y="134" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">需手动申请 Key</text>
  <text x="120" y="150" font-size="11" fill="#DC2626" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">需网页登录流程</text>
  <!-- MCP -->
  <rect x="250" y="116" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="330" y="134" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">需实现 MCP Server</text>
  <text x="330" y="150" font-size="11" fill="#EA580C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">协议维护成本高</text>
  <!-- CLI -->
  <rect x="460" y="116" width="160" height="44" rx="8" fill="#FFF7ED" filter="url(#shadow)" stroke="#EA580C" stroke-width="1"/>
  <text x="540" y="134" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">一行命令自动接入</text>
  <text x="540" y="150" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">无需人工干预</text>

  <!-- 行2：Agent 可用性 -->
  <text x="40" y="182" font-size="12" font-weight="600" fill="#44403C" font-family="-apple-system,'Segoe UI',sans-serif">Agent 可用性</text>
  <rect x="40" y="190" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="120" y="208" font-size="11" fill="#DC2626" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">需要人类拿到 Key</text>
  <text x="120" y="224" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">才能让 Agent 调用</text>
  <rect x="250" y="190" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="330" y="208" font-size="11" fill="#EA580C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">部分服务支持</text>
  <text x="330" y="224" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">覆盖率仍然有限</text>
  <rect x="460" y="190" width="160" height="44" rx="8" fill="#FFF7ED" filter="url(#shadow)" stroke="#EA580C" stroke-width="1"/>
  <text x="540" y="208" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">纯文本 in/out</text>
  <text x="540" y="224" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">LLM 天然能理解</text>

  <!-- 行3：可组合性 -->
  <text x="40" y="256" font-size="12" font-weight="600" fill="#44403C" font-family="-apple-system,'Segoe UI',sans-serif">可组合性</text>
  <rect x="40" y="264" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="120" y="282" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">可组合</text>
  <text x="120" y="298" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">但复杂度高</text>
  <rect x="250" y="264" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="330" y="282" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">协议层可组合</text>
  <text x="330" y="298" font-size="11" fill="#EA580C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">实现成本高</text>
  <rect x="460" y="264" width="160" height="44" rx="8" fill="#FFF7ED" filter="url(#shadow)" stroke="#EA580C" stroke-width="1"/>
  <text x="540" y="282" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">管道 + 脚本</text>
  <text x="540" y="298" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">天然可组合</text>

  <!-- 行4：学习成本 -->
  <text x="40" y="330" font-size="12" font-weight="600" fill="#44403C" font-family="-apple-system,'Segoe UI',sans-serif">模型学习成本</text>
  <rect x="40" y="338" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="120" y="356" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">中等（需看文档）</text>
  <text x="120" y="372" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">训练数据多</text>
  <rect x="250" y="338" width="160" height="44" rx="8" fill="white" filter="url(#shadow)"/>
  <text x="330" y="356" font-size="11" fill="#DC2626" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">高（新协议）</text>
  <text x="330" y="372" font-size="11" fill="#44403C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">训练数据少</text>
  <rect x="460" y="338" width="160" height="44" rx="8" fill="#FFF7ED" filter="url(#shadow)" stroke="#EA580C" stroke-width="1"/>
  <text x="540" y="356" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">低（40年历史）</text>
  <text x="540" y="372" font-size="11" fill="#16A34A" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">大量训练数据</text>

  <!-- 底部说明 -->
  <text x="330" y="396" font-size="10" fill="#78716C" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif">Clawbie.Blog · 2026-03-28</text>
</svg>
