<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' text-anchor='middle' font-weight='bold' font-size='18' fill='#1F2937' font-family='-apple-system, Segoe UI, sans-serif'>Agent 核心逻辑对比：开环 vs 闭环</text><rect x='40' y='80' width='260' height='280' rx='10' fill='#FFFFFF' stroke='#E5E7EB'/><text x='170' y='110' text-anchor='middle' font-weight='bold' fill='#6B7280' font-size='16'>普通 AI 助手 (开环)</text><g transform='translate(70, 140)'><circle cx='100' cy='20' r='18' fill='#F3F4F6'/><text x='100' y='25' text-anchor='middle' font-size='12' fill='#374151'>模糊目标</text><path d='M100 40 L100 70' stroke='#94A3B8' stroke-width='2' marker-end='url(#arrow)'/><rect x='50' y='75' width='100' height='35' rx='6' fill='#DBEAFE' stroke='#2563EB'/><text x='100' y='97' text-anchor='middle' font-size='12' fill='#1E40AF'>生成内容</text><path d='M100 115 L100 145' stroke='#94A3B8' stroke-width='2' marker-end='url(#arrow)'/><rect x='50' y='150' width='100' height='35' rx='6' fill='#F3F4F6' stroke='#94A3B8'/><text x='100' y='172' text-anchor='middle' font-size='12' fill='#6B7280'>任务结束</text><text x='100' y='210' text-anchor='middle' font-size='11' fill='#EF4444' font-style='italic'>无法自我修正</text></g><rect x='360' y='80' width='260' height='280' rx='10' fill='#FFFFFF' stroke='#E5E7EB'/><text x='490' y='110' text-anchor='middle' font-weight='bold' fill='#2563EB' font-size='16'>AI 化学家 (闭环)</text><g transform='translate(390, 140)'><circle cx='100' cy='20' r='18' fill='#DCFCE7'/><text x='100' y='25' text-anchor='middle' font-size='12' fill='#166534'>量化目标</text><path d='M118 20 Q180 20 180 100 Q180 180 100 180 Q20 180 20 100 Q20 20 82 20' fill='none' stroke='#16A34A' stroke-width='2' stroke-dasharray='4' marker-end='url(#arrow-green)'/><rect x='50' y='55' width='100' height='30' rx='6' fill='#F0FDFA' stroke='#14B8A6'/><text x='100' y='75' text-anchor='middle' font-size='12' fill='#134E4A'>实验设计</text><rect x='50' y='100' width='100' height='30' rx='6' fill='#FEF3C7' stroke='#D97706'/><text x='100' y='120' text-anchor='middle' font-size='12' fill='#92400E'>自动执行</text><rect x='50' y='145' width='100' height='30' rx='6' fill='#F5F3FF' stroke='#9333EA'/><text x='100' y='165' text-anchor='middle' font-size='12' fill='#5B21B6'>数据反馈</text><text x='100' y='210' text-anchor='middle' font-size='11' fill='#16A34A' font-weight='bold'>根据结果自动优化</text></g><defs><marker id='arrow' markerWidth='10' markerHeight='10' refX='9' refY='5' orientation='auto'><path d='M0,0 L0,10 L9,5 Z' fill='#94A3B8'/></marker><marker id='arrow-green' markerWidth='10' markerHeight='10' refX='9' refY='5' orientation='auto'><path d='M0,0 L0,10 L9,5 Z' fill='#16A34A'/></marker></defs></svg>