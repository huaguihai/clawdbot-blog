<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .frame { fill: #FAFAFA; stroke: #E5E7EB; stroke-width: 1; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .h { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; fill: #111827; }
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #374151; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #4B5563; }
      .badgeText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; fill: #111827; }
      .dash { stroke: #9CA3AF; stroke-width: 1.5; stroke-dasharray: 6 5; fill: none; }
    </style>
  </defs>

  <!-- Background frame -->
  <rect x="10" y="10" width="640" height="380" rx="12" class="frame"/>

  <!-- Header -->
  <text x="40" y="50" class="title">先对照 4 个典型场景：推荐组合更稳</text>

  <!-- Central principle card -->
  <rect x="170" y="70" width="320" height="72" rx="12" class="card"/>
  <text x="190" y="98" class="h">核心原则</text>
  <text x="190" y="120" class="t">Agent 进内网要同时解决：</text>
  <text x="380" y="120" class="t">“在哪执行” + “怎么连进去”</text>

  <!-- Scenario cards (2x2) -->
  <!-- 1 -->
  <rect x="40" y="170" width="290" height="88" rx="12" class="card"/>
  <rect x="56" y="186" width="70" height="20" rx="10" fill="#2563EB" opacity="0.18"/>
  <text x="66" y="200" class="badgeText">只读查库</text>
  <text x="56" y="224" class="small">能力：最小权限读取 + 可追溯</text>
  <text x="56" y="246" class="h">组合：沙箱 + MCP tunnel</text>

  <!-- 2 -->
  <rect x="330" y="170" width="290" height="88" rx="12" class="card"/>
  <rect x="346" y="186" width="84" height="20" rx="10" fill="#16A34A" opacity="0.18"/>
  <text x="356" y="200" class="badgeText">内部脚本</text>
  <text x="346" y="224" class="small">能力：稳定执行 + 不污染宿主机</text>
  <text x="346" y="246" class="h">组合：自托管沙箱</text>

  <!-- 3 -->
  <rect x="40" y="270" width="290" height="88" rx="12" class="card"/>
  <rect x="56" y="286" width="78" height="20" rx="10" fill="#EA580C" opacity="0.18"/>
  <text x="66" y="300" class="badgeText">调用内网API</text>
  <text x="56" y="324" class="small">能力：访问服务但别全开</text>
  <text x="56" y="346" class="h">组合：MCP tunnel（最小权限工具）</text>

  <!-- 4 -->
  <rect x="330" y="270" width="290" height="88" rx="12" class="card"/>
  <rect x="346" y="286" width="96" height="20" rx="10" fill="#9333EA" opacity="0.18"/>
  <text x="356" y="300" class="badgeText">工单/CRM写入</text>
  <text x="346" y="324" class="small">能力：受控写入 + 审计回放</text>
  <text x="346" y="346" class="h">组合：沙箱 + tunnel + 强审计</text>

  <!-- Connectors from principle to each scenario -->
  <path d="M330 142 C260 155, 220 155, 185 170" class="dash"/>
  <path d="M410 142 C480 155, 520 155, 475 170" class="dash"/>
  <path d="M320 142 C230 190, 180 225, 185 270" class="dash"/>
  <path d="M420 142 C510 190, 560 225, 475 270" class="dash"/>

  <!-- Legend (execution vs connection) -->
  <rect x="40" y="140" width="580" height="22" rx="11" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="58" cy="151" r="5" fill="#16A34A"/>
  <text x="70" y="155" class="small">在哪执行：沙箱 / 自托管沙箱</text>
  <circle cx="270" cy="151" r="5" fill="#2563EB"/>
  <text x="282" y="155" class="small">怎么连进去：MCP tunnel</text>
  <circle cx="430" cy="151" r="5" fill="#9333EA"/>
  <text x="442" y="155" class="small">写入场景：强审计（批准/回放/可撤回）</text>
</svg>