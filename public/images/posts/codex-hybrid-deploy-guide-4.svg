<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 16px; font-weight: 700; fill: #111827; }
      .h { font-size: 13px; font-weight: 700; fill: #111827; }
      .t { font-size: 12px; fill: #374151; }
      .small { font-size: 11px; fill: #4B5563; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; rx: 12; filter: url(#shadow); }
      .dash { fill: none; stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; }
      .badgeText { font-size: 11px; font-weight: 700; fill: #111827; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="26" y="38" class="font title">不要给凭证，给受控工具接口（最小权限）</text>

  <!-- Center: Agent -->
  <rect x="240" y="82" width="180" height="92" class="card"/>
  <text x="330" y="112" text-anchor="middle" class="font h">Agent</text>
  <text x="330" y="134" text-anchor="middle" class="font t">只通过工具调用</text>
  <text x="330" y="154" text-anchor="middle" class="font small">不直连系统 / 不持有通用凭证</text>

  <!-- Left Top: Repo Proxy -->
  <rect x="40" y="210" width="190" height="142" class="card"/>
  <rect x="54" y="226" width="90" height="22" rx="11" fill="#2563EB" opacity="0.14"/>
  <text x="99" y="242" text-anchor="middle" class="font badgeText">私有仓库</text>
  <text x="135" y="268" text-anchor="middle" class="font h">仓库代理</text>
  <text x="56" y="292" class="font t">允许：clone / read / search</text>
  <text x="56" y="312" class="font t">允许：建分支 / 提 PR</text>
  <text x="56" y="332" class="font t">禁止：force push / secrets</text>

  <!-- Middle Bottom: KB Search -->
  <rect x="235" y="210" width="190" height="142" class="card"/>
  <rect x="249" y="226" width="90" height="22" rx="11" fill="#16A34A" opacity="0.14"/>
  <text x="294" y="242" text-anchor="middle" class="font badgeText">内网文档</text>
  <text x="330" y="268" text-anchor="middle" class="font h">检索接口</text>
  <text x="251" y="292" class="font t">返回：片段 + 引用标记</text>
  <text x="251" y="312" class="font t">处理：脱敏 / 权限过滤</text>
  <text x="251" y="332" class="font t">禁止：数据库自由查询</text>

  <!-- Right Top: Ticket Draft Actions -->
  <rect x="430" y="210" width="190" height="142" class="card"/>
  <rect x="444" y="226" width="90" height="22" rx="11" fill="#EA580C" opacity="0.14"/>
  <text x="489" y="242" text-anchor="middle" class="font badgeText">工单系统</text>
  <text x="525" y="268" text-anchor="middle" class="font h">草稿动作</text>
  <text x="446" y="292" class="font t">允许：评论草稿 / 复现步骤</text>
  <text x="446" y="312" class="font t">允许：修复建议 / 标签建议</text>
  <text x="446" y="332" class="font t">禁止：直接结案 / 改完成态</text>

  <!-- Connections (dashed) -->
  <path d="M 285 174 C 240 195, 210 200, 170 210" class="dash"/>
  <path d="M 330 174 C 330 190, 330 196, 330 210" class="dash"/>
  <path d="M 375 174 C 420 195, 450 200, 490 210" class="dash"/>

  <!-- Principle footer -->
  <rect x="40" y="64" width="580" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <circle cx="60" cy="86" r="7" fill="#9333EA" opacity="0.9"/>
  <text x="76" y="90" class="font t">每个接口只暴露最小能力；写操作走隔离分支/草稿 + 人审；结果可追溯（引用/日志）</text>
</svg>