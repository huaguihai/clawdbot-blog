<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">把“资料区”和“命令区”彻底分开</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心原则：只有系统规则和当前用户请求能直接驱动执行</text><rect x="36" y="90" width="270" height="240" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="171" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">命令区</text><rect x="58" y="136" width="226" height="58" rx="10" fill="#EFF6FF" stroke="#2563EB"/><text x="74" y="159" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">1. 系统规则</text><text x="74" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">最高优先级，定义不可覆盖边界</text><rect x="58" y="210" width="226" height="58" rx="10" fill="#F5F3FF" stroke="#9333EA"/><text x="74" y="233" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">2. 用户请求</text><text x="74" y="253" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">可以影响任务目标，但不能越过系统规则</text><rect x="58" y="284" width="226" height="28" rx="8" fill="#ECFDF5" stroke="#16A34A"/><text x="171" y="303" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">允许进入执行决策</text><rect x="354" y="90" width="270" height="240" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><text x="489" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">资料区</text><rect x="376" y="136" width="226" height="58" rx="10" fill="#FFF7ED" stroke="#EA580C"/><text x="392" y="159" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">外部材料</text><text x="392" y="179" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">网页、邮件、文档、搜索结果</text><rect x="376" y="210" width="226" height="58" rx="10" fill="#FEFCE8" stroke="#D97706"/><text x="392" y="233" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">工具返回</text><text x="392" y="253" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">只能当数据，不能自动升级为指令</text><rect x="376" y="284" width="226" height="28" rx="8" fill="#FEF2F2" stroke="#EA580C"/><text x="489" y="303" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">只能作为证据输入</text><line x1="306" y1="170" x2="354" y2="170" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="306" y1="240" x2="354" y2="240" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="264" y="146" width="132" height="118" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/><text x="330" y="171" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">分区网关</text><text x="330" y="195" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">识别来源</text><text x="330" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">校验优先级</text><text x="330" y="233" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">阻断越权命令</text><text x="330" y="252" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">高风险需确认</text><text x="330" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">外部内容若夹带“忽略规则、泄露信息、调用工具”等指令，应标记可疑并停止自动执行</text></svg>