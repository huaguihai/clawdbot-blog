<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">技术人把 PII/密钥塞进 prompt 的高频场景</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">风险点：复制的是排障材料，夹带的是可追溯到人、账号或权限的线索</text>

  <rect x="200" y="72" width="260" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="200" y="72" width="260" height="54" rx="12" fill="none" stroke="#EA580C" stroke-width="1.5"/>
  <text x="330" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">不是主动写隐私</text>
  <text x="330" y="114" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">而是复制内容时，把敏感字段一起带了进去</text>

  <line x1="330" y1="126" x2="330" y2="146" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="330" y1="146" x2="115" y2="146" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="330" y1="146" x2="330" y2="146" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="330" y1="146" x2="545" y2="146" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="115" y1="146" x2="115" y2="160" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="330" y1="146" x2="330" y2="160" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="545" y1="146" x2="545" y2="160" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>

  <rect x="30" y="160" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="30" y="160" width="170" height="88" rx="12" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="42" y="172" width="54" height="20" rx="10" fill="#DBEAFE"/>
  <text x="69" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">工单记录</text>
  <text x="42" y="206" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：描述 + 复现</text>
  <text x="42" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：邮箱、手机号、</text>
  <text x="42" y="239" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">订单号、地址</text>

  <rect x="245" y="160" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="245" y="160" width="170" height="88" rx="12" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <rect x="257" y="172" width="54" height="20" rx="10" fill="#DCFCE7"/>
  <text x="284" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#16A34A">线上日志</text>
  <text x="257" y="206" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：路径 + 状态</text>
  <text x="257" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：Authorization、</text>
  <text x="257" y="239" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">Cookie、IP、session</text>

  <rect x="460" y="160" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="460" y="160" width="170" height="88" rx="12" fill="none" stroke="#9333EA" stroke-width="1.5"/>
  <rect x="472" y="172" width="54" height="20" rx="10" fill="#F3E8FF"/>
  <text x="499" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#9333EA">错误栈</text>
  <text x="472" y="206" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：调用链路</text>
  <text x="472" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：请求参数、SQL、</text>
  <text x="472" y="239" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">用户名、内网路径</text>

  <line x1="115" y1="248" x2="115" y2="264" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="330" y1="248" x2="330" y2="264" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="545" y1="248" x2="545" y2="264" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>

  <rect x="30" y="264" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="30" y="264" width="170" height="88" rx="12" fill="none" stroke="#D97706" stroke-width="1.5"/>
  <rect x="42" y="276" width="66" height="20" rx="10" fill="#FEF3C7"/>
  <text x="75" y="290" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#D97706">截图转写</text>
  <text x="42" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：报错截图</text>
  <text x="42" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：账号、邮箱、</text>
  <text x="42" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">工号、二维码内容</text>

  <rect x="245" y="264" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="245" y="264" width="170" height="88" rx="12" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <rect x="257" y="276" width="60" height="20" rx="10" fill="#DBEAFE"/>
  <text x="287" y="290" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">CRM/表格</text>
  <text x="257" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：客户标签</text>
  <text x="257" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：全名、电话、</text>
  <text x="257" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">地址、合同编号</text>

  <rect x="460" y="264" width="170" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="460" y="264" width="170" height="88" rx="12" fill="none" stroke="#EA580C" stroke-width="1.5"/>
  <rect x="472" y="276" width="72" height="20" rx="10" fill="#FFEDD5"/>
  <text x="508" y="290" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#EA580C">配置片段</text>
  <text x="472" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">你以为：变量含义</text>
  <text x="472" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">夹带：API Key、Token、</text>
  <text x="472" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">Webhook URL</text>

  <rect x="158" y="362" width="344" height="24" rx="12" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="1"/>
  <text x="330" y="378" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">特别容易误判：随机字符串、普通 URL 也可能藏着 token、signature、临时授权参数</text>
</svg>