<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">对话搜索库的最小结构</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先收得全，再搜得到，最后才是长得久</text>

  <!-- Left stack -->
  <g filter="url(#shadow)">
    <rect x="40" y="78" width="350" height="74" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="40" y="168" width="350" height="74" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="40" y="258" width="350" height="74" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  </g>

  <!-- Layer 1 -->
  <circle cx="74" cy="115" r="18" fill="#2563EB"/>
  <text x="74" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">1</text>
  <text x="108" y="108" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">采集层</text>
  <text x="108" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">从 Claude、ChatGPT、Gemini 抓取内容</text>

  <!-- Layer 2 -->
  <circle cx="74" cy="205" r="18" fill="#EA580C"/>
  <text x="74" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">2</text>
  <text x="108" y="198" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">存储层</text>
  <text x="108" y="220" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">稳定落盘，不只存在浏览器历史里</text>

  <!-- Layer 3 -->
  <circle cx="74" cy="295" r="18" fill="#16A34A"/>
  <text x="74" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">3</text>
  <text x="108" y="288" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">检索层</text>
  <text x="108" y="310" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">关键词、平台、时间、标签一键搜出</text>

  <!-- Connectors -->
  <line x1="215" y1="152" x2="215" y2="168" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="215" y1="242" x2="215" y2="258" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="390" y1="205" x2="430" y2="205" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Right panel -->
  <g filter="url(#shadow)">
    <rect x="430" y="78" width="190" height="254" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  </g>
  <rect x="446" y="94" width="72" height="26" rx="13" fill="#9333EA" opacity="0.12"/>
  <text x="482" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">统一入口</text>
  <text x="446" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">统一结构字段</text>
  <text x="446" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">把不同平台对话转成同一套数据</text>

  <!-- Chips -->
  <g font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1F2937">
    <rect x="446" y="182" width="74" height="28" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="483" y="201" text-anchor="middle">平台名</text>

    <rect x="528" y="182" width="74" height="28" rx="14" fill="#FEF3C7" stroke="#FCD34D"/>
    <text x="565" y="201" text-anchor="middle">时间戳</text>

    <rect x="446" y="220" width="74" height="28" rx="14" fill="#F3E8FF" stroke="#D8B4FE"/>
    <text x="483" y="239" text-anchor="middle">标题</text>

    <rect x="528" y="220" width="74" height="28" rx="14" fill="#ECFDF5" stroke="#A7F3D0"/>
    <text x="565" y="239" text-anchor="middle">标签</text>

    <rect x="446" y="258" width="74" height="28" rx="14" fill="#FFF7ED" stroke="#FDBA74"/>
    <text x="483" y="277" text-anchor="middle">用户问题</text>

    <rect x="528" y="258" width="74" height="28" rx="14" fill="#EFF6FF" stroke="#BFDBFE"/>
    <text x="565" y="277" text-anchor="middle">会话ID</text>

    <rect x="486" y="296" width="94" height="28" rx="14" fill="#F5F3FF" stroke="#C4B5FD"/>
    <text x="533" y="315" text-anchor="middle">模型回答</text>
  </g>
</svg>