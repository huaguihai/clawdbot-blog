<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">把安全赏金范围翻译成发版自测流程</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">先补边界与观测，再做修复与门禁</text>

  <line x1="150" y1="185" x2="220" y2="185" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <line x1="310" y1="185" x2="380" y2="185" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>
  <line x1="470" y1="185" x2="540" y2="185" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="40" y="108" width="110" height="150" rx="16" fill="#FFFFFF"/>
    <rect x="52" y="122" width="34" height="34" rx="10" fill="#DBEAFE"/>
    <text x="69" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">1</text>
    <text x="95" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1E293B">威胁建模</text>
    <text x="55" y="181" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">梳理风险入口</text>
    <text x="55" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">• 提示词</text>
    <text x="55" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">• 工具调用</text>
    <text x="55" y="244" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">• 数据回显</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="200" y="108" width="110" height="150" rx="16" fill="#FFFFFF"/>
    <rect x="212" y="122" width="34" height="34" rx="10" fill="#FFEDD5"/>
    <text x="229" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">2</text>
    <text x="255" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1E293B">最小权限</text>
    <text x="215" y="181" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">收紧工具能力</text>
    <text x="215" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">• 限制可用工具</text>
    <text x="215" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">• 限制参数范围</text>
    <text x="215" y="244" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">• 限制数据访问</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="108" width="110" height="150" rx="16" fill="#FFFFFF"/>
    <rect x="372" y="122" width="34" height="34" rx="10" fill="#DCFCE7"/>
    <text x="389" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">3</text>
    <text x="415" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1E293B">日志与回放</text>
    <text x="375" y="181" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">补齐可观测性</text>
    <text x="375" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">• 对话过程</text>
    <text x="375" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">• 工具参数与结果</text>
    <text x="375" y="244" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">• 支持复盘回放</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="108" width="110" height="150" rx="16" fill="#FFFFFF"/>
    <rect x="532" y="122" width="34" height="34" rx="10" fill="#F3E8FF"/>
    <text x="549" y="145" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">4</text>
    <text x="575" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#1E293B">可复现实验</text>
    <text x="535" y="181" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">形成发版门禁</text>
    <text x="535" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">• 编写 10 条用例</text>
    <text x="535" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">• 每次上线必跑</text>
    <text x="535" y="244" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">• 不靠运气发布</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="90" y="300" width="480" height="62" rx="16" fill="#FFFFFF"/>
    <rect x="108" y="318" width="12" height="12" rx="3" fill="#D97706"/>
    <text x="130" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#1E293B">核心原则：</text>
    <text x="205" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">先补边界与观测，再补修复与门禁</text>
    <text x="108" y="349" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">将安全赏金项目的漏洞范围，直接翻译成团队发版检查清单。</text>
  </g>
</svg>