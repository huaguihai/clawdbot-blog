<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">AI 问答不是败在效果差，而是败在边界不清</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心判断：不要看像不像医生，而要看会不会影响用户下一步行动</text><rect x="48" y="98" width="164" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><rect x="248" y="98" width="164" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><rect x="448" y="98" width="164" height="170" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="130" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">信息检索</text><text x="130" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">相对低风险</text><rect x="68" y="166" width="124" height="34" rx="10" fill="#EFF6FF"/><text x="130" y="187" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1F2937">感冒一般会不会发烧</text><text x="130" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#2563EB">偏知识问答</text><text x="130" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#2563EB">可回答事实与常识</text><text x="330" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">一般建议</text><text x="330" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">风险开始上升</text><rect x="268" y="166" width="124" height="34" rx="10" fill="#FFF7ED"/><text x="330" y="187" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1F2937">38.9℃两天要不要吃药</text><text x="330" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#EA580C">开始靠近个体建议</text><text x="330" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#EA580C">已可能影响行动</text><text x="530" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">个体判断</text><text x="530" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">高风险区</text><rect x="468" y="166" width="124" height="34" rx="10" fill="#F5F3FF"/><text x="530" y="187" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1F2937">怀孕12周能不能吃药</text><text x="530" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9333EA">不再是普通问答</text><text x="530" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9333EA">需要严格边界与转介</text><line x1="212" y1="183" x2="248" y2="183" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="412" y1="183" x2="448" y2="183" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><polygon points="244,178 248,183 244,188" fill="#9CA3AF"/><polygon points="444,178 448,183 444,188" fill="#9CA3AF"/><rect x="82" y="302" width="496" height="64" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/><circle cx="114" cy="334" r="16" fill="#16A34A"/><text x="114" y="339" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">!</text><text x="142" y="325" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">真正的风控标准</text><text x="142" y="347" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">只要回答会推动用户决定“吃什么、停什么、等多久、要不要去医院”，就应视为高风险内容；事后补免责声明并不能抵消前面的行动影响。</text><line x1="530" y1="268" x2="530" y2="302" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6"/></svg>