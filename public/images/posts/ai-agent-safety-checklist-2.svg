<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">为什么这 4 类坑最该先测？</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心差异：演示环境很配合，真实用户环境很脏</text>

  <rect x="40" y="90" width="250" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="370" y="90" width="250" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="58" y="108" width="214" height="38" rx="10" fill="#DBEAFE"/>
  <text x="165" y="133" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">演示环境</text>

  <rect x="388" y="108" width="214" height="38" rx="10" fill="#FFEDD5"/>
  <text x="495" y="133" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">真实用户环境</text>

  <circle cx="75" cy="172" r="6" fill="#16A34A"/>
  <text x="90" y="177" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">自己账号测试</text>
  <circle cx="75" cy="204" r="6" fill="#16A34A"/>
  <text x="90" y="209" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">干净文档与页面</text>
  <circle cx="75" cy="236" r="6" fill="#16A34A"/>
  <text x="90" y="241" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">消息与邮件可控</text>
  <circle cx="75" cy="268" r="6" fill="#16A34A"/>
  <text x="90" y="273" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">看起来聪明且稳定</text>

  <circle cx="405" cy="172" r="6" fill="#D97706"/>
  <text x="420" y="177" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">奇怪文本与脏网页</text>
  <circle cx="405" cy="204" r="6" fill="#D97706"/>
  <text x="420" y="209" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">敏感字段工单</text>
  <circle cx="405" cy="236" r="6" fill="#D97706"/>
  <text x="420" y="241" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">只读/可写边界混杂</text>
  <circle cx="405" cy="268" r="6" fill="#D97706"/>
  <text x="420" y="273" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#0F172A">有人故意试探攻击</text>

  <line x1="290" y1="200" x2="370" y2="200" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="330" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">环境变化</text>

  <line x1="165" y1="310" x2="165" y2="330" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="495" y1="310" x2="495" y2="330" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>

  <rect x="110" y="334" width="440" height="46" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="354" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#9333EA" font-weight="700">先测重点</text>
  <text x="330" y="371" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#0F172A">不是“它会不会工作”</text>
  <text x="330" y="390" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">而是“它会不会在脏环境里失控”</text>
</svg>