<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#0F172A" font-weight="700">Managed Agents：把领班从后厨搬出去</text>

  <!-- Left: Old design -->
  <text x="165" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155" font-weight="600">旧：全塞进一个容器（pet）</text>

  <rect x="55" y="88" width="220" height="250" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/>
  <rect x="75" y="120" width="180" height="60" rx="12" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="165" y="155" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1D4ED8" font-weight="700">session</text>

  <rect x="75" y="195" width="180" height="60" rx="12" fill="#F3E8FF" stroke="#9333EA"/>
  <text x="165" y="230" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#7E22CE" font-weight="700">harness</text>

  <rect x="75" y="270" width="180" height="60" rx="12" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="165" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#15803D" font-weight="700">sandbox</text>

  <text x="165" y="360" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#B91C1C">卡死难定位 · Debug 触碰用户数据风险</text>

  <!-- Divider -->
  <line x1="330" y1="80" x2="330" y2="370" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Right: New design -->
  <text x="495" y="70" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155" font-weight="600">新：三抽象解耦（cattle）</text>

  <!-- Session ledger -->
  <rect x="385" y="100" width="220" height="70" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/>
  <circle cx="410" cy="135" r="10" fill="#2563EB"/>
  <text x="425" y="129" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">session</text>
  <text x="425" y="150" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">只追加的流水账本</text>

  <!-- Harness foreman -->
  <rect x="385" y="190" width="220" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/>
  <circle cx="410" cy="230" r="10" fill="#9333EA"/>
  <text x="425" y="224" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">harness</text>
  <text x="425" y="245" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">领班：循环调度</text>
  <text x="425" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">不住在后厨里</text>

  <!-- Sandbox kitchen -->
  <rect x="385" y="290" width="220" height="80" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/>
  <circle cx="410" cy="330" r="10" fill="#16A34A"/>
  <text x="425" y="324" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">sandbox</text>
  <text x="425" y="345" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">后厨灶台：真正执行</text>

  <!-- Dashed connectors -->
  <path d="M495 170 L495 190" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)" fill="none"/>
  <path d="M495 270 L495 290" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)" fill="none"/>

  <!-- Replaceability callout -->
  <rect x="360" y="84" width="270" height="40" rx="12" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="495" y="109" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9A3412" font-weight="700">任一组件挂了可替换；账本独立不共生死</text>

  <!-- Small arrows from left to right (concept shift) -->
  <path d="M275 210 C300 210, 305 210, 330 210" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)" fill="none"/>
  <text x="302" y="200" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">拆分解耦</text>
</svg>