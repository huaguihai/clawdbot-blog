ont-size="11" fill="#4B5563">污染文档伪造规则</text><rect x="290" y="100" width="80" height="200" rx="16" fill="#FFFFFF" stroke="#FCD34D"/><rect x="294" y="104" width="80" height="200" rx="16" fill="none" stroke="#E5E7EB" opacity="0.6"/><text x="330" y="136" text-anchor="middle" font-size="16" font-weight="700" fill="#D97706">模型</text><text x="330" y="160" text-anchor="middle" font-size="12" fill="#6B7280">误判内容</text><text x="330" y="178" text-anchor="middle" font-size="12" fill="#6B7280">层级</text><text x="330" y="214" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">不可信材料</text><text x="330" y="234" text-anchor="middle" font-size="12" fill="#6B7280">被当成</text><text x="330" y="254" text-anchor="middle" font-size="14" font-weight="700" fill="#111827">可执行命令</text><rect x="520" y="130" width="100" height="60" rx="12" fill="#FFFFFF" stroke="#BBF7D0"/><rect x="524" y="134" width="100" height="60" rx="12" fill="none" stroke="#E5E7EB" opacity="0.6"/><text x="570" y="155" text-anchor="middle" font-size="15" font-weight="700" fill="#16A34A">多工具工作流</text><text x="570" y="176" text-anchor="middle" font-size="11" fill="#4B5563">推动调用外部工具</text><rect x="520" y="210" width="100" height="60" rx="12" fill="#FFFFFF" stroke="#BFDBFE"/><rect x="524" y="214" width="100" height="60" rx="12" fill="none" stroke="#E5E7EB" opacity="0.6"/><text x="570" y="235" text-anchor="middle" font-size="15" font-weight="700" fill="#2563EB">后台运营助手</text><text x="570" y="256" text-anchor="middle" font-size="11" fill="#4B5563">越权影响业务数据</text><text x="330" y="346" text-anchor="middle" font-size="13" fill="#374151">不是“攻破模型”，而是内容经由资料入口混入，再顺着工具链放大风险</text></g></svg>