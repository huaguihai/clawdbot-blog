<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">先看是否已进入高风险区</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">核心判断：外部输入是否已连接自动工具调用</text><rect x="240" y="84" width="180" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#2563EB" stroke-width="2"/><text x="330" y="107" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">高风险 Agent 形态</text><text x="330" y="127" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">读外部内容 + 自动调用工具</text><rect x="48" y="186" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#16A34A" stroke-width="2"/><text x="128" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">外部输入</text><text x="128" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 邮件 / PDF</text><text x="128" y="255" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">CRM / 混合数据源</text><rect x="250" y="186" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#D97706" stroke-width="2"/><text x="330" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">自动动作</text><text x="330" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">发消息 / 发邮件</text><text x="330" y="255" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">建任务 / 更库 / 调 API</text><rect x="452" y="186" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#EA580C" stroke-width="2"/><text x="532" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">主要风险</text><text x="532" y="235" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">诱导执行 / 越权查询</text><text x="532" y="255" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">信息泄露 / 链路带偏</text><line x1="128" y1="140" x2="128" y2="186" stroke="#93C5FD" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="140" x2="330" y2="186" stroke="#FCD34D" stroke-width="2" stroke-dasharray="6 6"/><line x1="532" y1="140" x2="532" y2="186" stroke="#FDBA74" stroke-width="2" stroke-dasharray="6 6"/><line x1="208" y1="232" x2="250" y2="232" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="410" y1="232" x2="452" y2="232" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="132" y="314" width="396" height="48" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#9333EA" stroke-width="2"/><text x="330" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">判断重点</text><text x="330" y="352" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不是模型够不够聪明，而是是否被限制在该做的边界里</text></svg>