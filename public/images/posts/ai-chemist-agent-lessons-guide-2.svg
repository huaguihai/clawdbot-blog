<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='20' font-weight='bold' fill='#1F2937'>Agent 任务选择逻辑：寻找“反馈回路”</text><rect x='40' y='80' width='270' height='280' rx='10' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><rect x='50' y='90' width='60' height='24' rx='4' fill='#FEE2E2'/><text x='80' y='107' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' font-weight='bold' fill='#991B1B'>开放命题</text><text x='175' y='145' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' fill='#4B5563'>写小说 / 运营自媒体</text><line x1='80' y1='170' x2='270' y2='170' stroke='#F3F4F6' stroke-width='2'/><text x='70' y='210' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#EF4444'>✘ 缺乏客观评价标准</text><text x='70' y='240' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#EF4444'>✘ 试错成本极高</text><text x='70' y='270' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#EF4444'>✘ 难以形成进化闭环</text><rect x='350' y='80' width='270' height='280' rx='10' fill='#FFFFFF' stroke='#DBEAFE' stroke-width='2'/><rect x='360' y='90' width='70' height='24' rx='4' fill='#DBEAFE'/><text x='395' y='107' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' font-weight='bold' fill='#1E40AF'>闭环任务</text><text x='485' y='145' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#2563EB'>“化学实验型”任务</text><path d='M 485 180 A 40 40 0 1 1 484 180' fill='none' stroke='#16A34A' stroke-width='3' stroke-dasharray='4 2'/><polygon points='525,210 535,220 515,220' fill='#16A34A'/><text x='485' y='215' text-anchor='middle' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#16A34A' font-weight='bold'>快速迭代</text><g transform='translate(370, 250)'><rect width='230' height='90' rx='8' fill='#F0FDF4'/><text x='15' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#166534' font-weight='bold'>三大核心要素：</text><text x='15' y='48' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#166534'>• 稳定：ROI / 测试用例 / 点击率</text><text x='15' y='66' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#166534'>• 便宜：Token 消耗可控</text><text x='15' y='84' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#166534'>• 快速：秒级/分钟级获得反馈</text></g><path d='M 310 220 L 350 220' stroke='#94A3B8' stroke-width='2' stroke-dasharray='5 5' marker-end='url(#arrowhead)'/><defs><marker id='arrowhead' markerWidth='10' markerHeight='7' refX='0' refY='3.5' orient='auto'><polygon points='0 0, 10 3.5, 0 7' fill='#94A3B8'/></marker></defs></svg>