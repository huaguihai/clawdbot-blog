<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #0F172A; }
      .sub { font-size: 12px; fill: #334155; }
      .axis { stroke: #CBD5E1; stroke-width: 1; }
      .grid { stroke: #E2E8F0; stroke-width: 1; stroke-dasharray: 4 6; }
      .label { font-size: 12px; fill: #475569; }
      .cardTitle { font-size: 14px; font-weight: 700; }
      .legend { font-size: 12px; fill: #0F172A; }
    </style>
  </defs>

  <!-- Header -->
  <text x="32" y="44" class="font title">长上下文一直在收“超重费”</text>
  <text x="32" y="66" class="font sub">核心对比：超过阈值后价格跳档 vs 全程平滑不跳档</text>

  <!-- Chart card -->
  <rect x="24" y="88" width="612" height="280" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <!-- Plot area -->
  <!-- margins: left=72, right=40, top=120, bottom=332 -->
  <line x1="72" y1="332" x2="612" y2="332" class="axis"/>
  <line x1="72" y1="120" x2="72" y2="332" class="axis"/>

  <!-- grid lines -->
  <line x1="72" y1="262" x2="612" y2="262" class="grid"/>
  <line x1="72" y1="196" x2="612" y2="196" class="grid"/>
  <line x1="72" y1="136" x2="612" y2="136" class="grid"/>

  <!-- axis labels -->
  <text x="72" y="360" class="font label">上下文长度（tokens） →</text>
  <text x="18" y="152" class="font label" transform="rotate(-90 18 152)">单位成本 ↑</text>

  <!-- threshold marker -->
  <line x1="408" y1="120" x2="408" y2="332" stroke="#D97706" stroke-width="2" stroke-dasharray="6 6"/>
  <rect x="352" y="102" width="112" height="24" rx="8" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="408" y="118" text-anchor="middle" class="font" font-size="12" fill="#9A3412">阈值（200K/272K）</text>

  <!-- Step pricing curve (others) -->
  <path d="M 96 270 L 408 270 L 408 206 L 612 206" fill="none" stroke="#2563EB" stroke-width="4"/>
  <!-- points -->
  <circle cx="96" cy="270" r="4" fill="#2563EB"/>
  <circle cx="408" cy="270" r="4" fill="#2563EB"/>
  <circle cx="408" cy="206" r="4" fill="#2563EB"/>
  <circle cx="612" cy="206" r="4" fill="#2563EB"/>

  <!-- Flat pricing curve (Anthropic) -->
  <path d="M 96 238 L 612 238" fill="none" stroke="#16A34A" stroke-width="4"/>
  <circle cx="96" cy="238" r="4" fill="#16A34A"/>
  <circle cx="612" cy="238" r="4" fill="#16A34A"/>

  <!-- Annotations -->
  <rect x="92" y="290" width="192" height="32" rx="10" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="188" y="311" text-anchor="middle" class="font legend">多数模型：超过阈值价格跳档</text>

  <rect x="424" y="214" width="188" height="32" rx="10" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="518" y="235" text-anchor="middle" class="font legend">Anthropic：1 到 1,000,000 平滑</text>

  <!-- Mini legend in card -->
  <rect x="92" y="132" width="232" height="56" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
  <line x1="108" y1="154" x2="150" y2="154" stroke="#2563EB" stroke-width="4"/>
  <text x="160" y="158" class="font" font-size="12" fill="#0F172A">跳档计费（溢价线）</text>
  <line x1="108" y1="176" x2="150" y2="176" stroke="#16A34A" stroke-width="4"/>
  <text x="160" y="180" class="font" font-size="12" fill="#0F172A">平滑计费（无分界线）</text>
</svg>