<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .title { font-size: 18px; font-weight: 700; fill: #111827; }
      .sub { font-size: 12px; fill: #6B7280; }
      .cardTitle { font-size: 13px; font-weight: 700; fill: #111827; }
      .cardMeta { font-size: 11px; fill: #4B5563; }
      .cardStrong { font-size: 12px; font-weight: 700; fill: #111827; }
      .axisLabel { font-size: 11px; fill: #374151; }
      .hint { font-size: 11px; fill: #6B7280; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- Header -->
  <text x="40" y="48" class="font title">冷却期默认值：按依赖风险分级</text>
  <text x="40" y="68" class="font sub">同样是“更新依赖”，冷却期应随风险从 0-1 天到 14 天以上变化</text>

  <!-- Cards -->
  <!-- Card 1: Security -->
  <g filter="url(#shadow)">
    <rect x="40" y="88" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="40" y="88" width="190" height="6" rx="12" fill="#16A34A"/>
  </g>
  <text x="54" y="118" class="font cardTitle">已确认的安全补丁</text>
  <text x="54" y="138" class="font cardMeta">例：CVE / Advisory</text>
  <text x="54" y="158" class="font cardStrong">建议：0–1 天</text>

  <!-- Card 2: Patch -->
  <g filter="url(#shadow)">
    <rect x="235" y="88" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="235" y="88" width="190" height="6" rx="12" fill="#2563EB"/>
  </g>
  <text x="249" y="118" class="font cardTitle">普通 patch 更新</text>
  <text x="249" y="138" class="font cardMeta">例：1.2.3 → 1.2.4</text>
  <text x="249" y="158" class="font cardStrong">建议：3 天</text>

  <!-- Card 3: Indirect -->
  <g filter="url(#shadow)">
    <rect x="430" y="88" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="430" y="88" width="190" height="6" rx="12" fill="#D97706"/>
  </g>
  <text x="444" y="118" class="font cardTitle">间接依赖</text>
  <text x="444" y="138" class="font cardMeta">例：lockfile 带入</text>
  <text x="444" y="158" class="font cardStrong">建议：3–7 天</text>

  <!-- Card 4: Minor -->
  <g filter="url(#shadow)">
    <rect x="40" y="176" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="40" y="176" width="190" height="6" rx="12" fill="#D97706"/>
  </g>
  <text x="54" y="206" class="font cardTitle">普通 minor 更新</text>
  <text x="54" y="226" class="font cardMeta">例：1.2.3 → 1.3.0</text>
  <text x="54" y="246" class="font cardStrong">建议：7 天</text>

  <!-- Card 5: Runtime/Base -->
  <g filter="url(#shadow)">
    <rect x="235" y="176" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="235" y="176" width="190" height="6" rx="12" fill="#9333EA"/>
  </g>
  <text x="249" y="206" class="font cardTitle">基础库 / 底层运行时</text>
  <text x="249" y="226" class="font cardMeta">例：React / Next / ORM</text>
  <text x="249" y="246" class="font cardStrong">建议：7–14 天</text>

  <!-- Card 6: Major -->
  <g filter="url(#shadow)">
    <rect x="430" y="176" width="190" height="76" rx="12" fill="#FFFFFF"/>
    <rect x="430" y="176" width="190" height="6" rx="12" fill="#EA580C"/>
  </g>
  <text x="444" y="206" class="font cardTitle">大版本更新</text>
  <text x="444" y="226" class="font cardMeta">例：1.x → 2.x</text>
  <text x="444" y="246" class="font cardStrong">建议：14 天以上</text>

  <!-- Connectors (dashed) -->
  <!-- Axis Y = 320 -->
  <g stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 5" fill="none">
    <path d="M135 164 L135 292"/>
    <path d="M330 164 L190 292"/>
    <path d="M525 164 L270 292"/>
    <path d="M135 252 L350 292"/>
    <path d="M330 252 L440 292"/>
    <path d="M525 252 L570 292"/>
  </g>

  <!-- Axis -->
  <line x1="70" y1="320" x2="590" y2="320" stroke="#111827" stroke-width="2"/>

  <!-- Ticks -->
  <g stroke="#111827" stroke-width="2">
    <line x1="70" y1="314" x2="70" y2="326"/>
    <line x1="110" y1="314" x2="110" y2="326"/>
    <line x1="190" y1="314" x2="190" y2="326"/>
    <line x1="350" y1="314" x2="350" y2="326"/>
    <line x1="530" y1="314" x2="530" y2="326"/>
    <line x1="590" y1="314" x2="590" y2="326"/>
  </g>

  <!-- Tick labels -->
  <text x="70" y="346" text-anchor="middle" class="font axisLabel">0</text>
  <text x="110" y="346" text-anchor="middle" class="font axisLabel">1</text>
  <text x="190" y="346" text-anchor="middle" class="font axisLabel">3</text>
  <text x="350" y="346" text-anchor="middle" class="font axisLabel">7</text>
  <text x="530" y="346" text-anchor="middle" class="font axisLabel">14</text>
  <text x="590" y="346" text-anchor="middle" class="font axisLabel">14+</text>
  <text x="600" y="320" dx="8" dy="4" class="font hint">天</text>

  <!-- Range bars on axis -->
  <!-- Security 0-1 -->
  <line x1="70" y1="292" x2="110" y2="292" stroke="#16A34A" stroke-width="6" stroke-linecap="round"/>
  <circle cx="70" cy="292" r="5" fill="#16A34A"/>
  <circle cx="110" cy="292" r="5" fill="#16A34A"/>

  <!-- Patch at 3 -->
  <circle cx="190" cy="292" r="6" fill="#2563EB"/>

  <!-- Indirect 3-7 -->
  <line x1="190" y1="304" x2="350" y2="304" stroke="#D97706" stroke-width="6" stroke-linecap="round"/>
  <circle cx="190" cy="304" r="5" fill="#D97706"/>
  <circle cx="350" cy="304" r="5" fill="#D97706"/>

  <!-- Minor at 7 -->
  <circle cx="350" cy="292" r="6" fill="#D97706"/>

  <!-- Runtime 7-14 -->
  <line x1="350" y1="280" x2="530" y2="280" stroke="#9333EA" stroke-width="6" stroke-linecap="round"/>
  <circle cx="350" cy="280" r="5" fill="#9333EA"/>
  <circle cx="530" cy="280" r="5" fill="#9333EA"/>

  <!-- Major 14+ -->
  <circle cx="570" cy="292" r="6" fill="#EA580C"/>
  <path d="M590 292 L610 292" stroke="#EA580C" stroke-width="6" stroke-linecap="round"/>

  <!-- Footer hint -->
  <text x="40" y="378" class="font hint">冷却期越长 → 风险越高：从“可自动合并”逐步过渡到“必须人工审查 + 金丝雀发布”</text>
</svg>