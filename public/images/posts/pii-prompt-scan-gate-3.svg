<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">发送前自检：把风险拦在电脑上</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心做法：本地扫描 → 分级拦截 → 脱敏替换</text>

  <rect x="40" y="95" width="150" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="55" y="110" width="42" height="42" rx="10" fill="#DBEAFE"/>
  <text x="76" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">1</text>
  <text x="115" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">本地扫描</text>
  <text x="55" y="177" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• PII 检测器</text>
  <text x="55" y="202" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• Secrets 扫描器</text>
  <text x="55" y="227" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• 仅在本机处理</text>
  <text x="55" y="268" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">识别邮箱、手机号、</text>
  <text x="55" y="287" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">身份证、API Key、Token、私钥</text>

  <rect x="255" y="95" width="150" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="270" y="110" width="42" height="42" rx="10" fill="#FFEDD5"/>
  <text x="291" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#EA580C">2</text>
  <text x="330" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">分级拦截</text>
  <rect x="272" y="170" width="116" height="34" rx="10" fill="#FEE2E2"/>
  <text x="330" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#B91C1C">红线：直接拦截</text>
  <rect x="272" y="216" width="116" height="34" rx="10" fill="#FEF3C7"/>
  <text x="330" y="238" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">灰线：给替换建议</text>
  <text x="276" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">按风险级别决定：</text>
  <text x="276" y="297" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">阻止发送或提示处理</text>

  <rect x="470" y="95" width="150" height="220" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="485" y="110" width="42" height="42" rx="10" fill="#DCFCE7"/>
  <text x="506" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#16A34A">3</text>
  <text x="545" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">脱敏替换</text>
  <text x="485" y="177" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• 保留可用文本</text>
  <text x="485" y="202" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• 替换敏感字段</text>
  <text x="485" y="227" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">• 再发送脱敏版本</text>
  <rect x="485" y="255" width="120" height="34" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-dasharray="4 4"/>
  <text x="545" y="277" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#16A34A">user@example.com → [EMAIL]</text>

  <line x1="190" y1="205" x2="255" y2="205" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <line x1="405" y1="205" x2="470" y2="205" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowOrange)"/>

  <rect x="104" y="333" width="452" height="44" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="128" cy="355" r="9" fill="#9333EA"/>
  <text x="128" y="359" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">i</text>
  <text x="147" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">不依赖云端策略，不上传原文给第三方：成本低、见效快、隐私更稳妥</text>
</svg>