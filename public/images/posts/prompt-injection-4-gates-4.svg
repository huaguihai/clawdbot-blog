<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/></marker></defs><text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">输入隔离：把资料和命令分开</text><rect x="34" y="78" width="170" height="108" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="119" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">系统规则 + 用户请求</text><text x="54" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 可信指令来源</text><text x="54" y="154" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 定义任务目标</text><text x="54" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 唯一可遵循对象</text><rect x="250" y="78" width="160" height="108" rx="12" fill="#FFFFFF" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/><text x="330" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">UNTRUSTED 外部材料</text><text x="270" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 网页 / 邮件 / OCR</text><text x="270" y="154" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 仅作为待分析内容</text><text x="270" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 命令句不可执行</text><rect x="456" y="78" width="170" height="108" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/><text x="541" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">隔离提示模板</text><text x="476" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 明确规则优先级</text><text x="476" y="154" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 加边界标签包裹</text><text x="476" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 限制输出与工具调用</text><line x1="204" y1="132" x2="250" y2="132" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="410" y1="132" x2="456" y2="132" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="108" y="242" width="180" height="96" rx="12" fill="#FFFFFF" stroke="#9333EA" stroke-width="2" filter="url(#shadow)"/><text x="198" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">阶段 1：只读内容</text><text x="128" y="296" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">抽取、总结、标注风险</text><text x="128" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不开放工具选择权</text><rect x="372" y="242" width="180" height="96" rx="12" fill="#FFFFFF" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/><text x="462" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">阶段 2：受限决策</text><text x="392" y="296" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">基于抽取结果再判断</text><text x="392" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">是否允许后续工具调用</text><line x1="330" y1="186" x2="330" y2="220" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="220" x2="198" y2="220" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/><line x1="198" y1="220" x2="198" y2="242" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="288" y1="290" x2="372" y2="290" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><rect x="34" y="350" width="592" height="30" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/><text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">核心原则：外部内容统一标记为 UNTRUSTED，先分析再决策，避免资料中的伪命令串台</text></svg>