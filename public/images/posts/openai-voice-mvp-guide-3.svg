<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
  </defs>

  <text x="36" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">先把语音 MVP 的最小闭环跑通</text>
  <text x="36" y="68" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">目标：先让用户愿意把第二次任务也交给你，而不是先追求“像真人”</text>

  <rect x="36" y="96" width="388" height="236" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="56" y="126" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">最小闭环：4 步先做稳</text>

  <rect x="56" y="146" width="155" height="58" rx="14" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/>
  <circle cx="82" cy="175" r="14" fill="#2563EB"/>
  <text x="82" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">1</text>
  <text x="104" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">说进去</text>
  <text x="104" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">输入能流式</text>

  <rect x="247" y="146" width="155" height="58" rx="14" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5"/>
  <circle cx="273" cy="175" r="14" fill="#9333EA"/>
  <text x="273" y="180" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">2</text>
  <text x="295" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">理解</text>
  <text x="295" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">停顿判断别太蠢</text>

  <rect x="56" y="234" width="155" height="58" rx="14" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <circle cx="82" cy="263" r="14" fill="#EA580C"/>
  <text x="82" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">3</text>
  <text x="104" y="258" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">回出来</text>
  <text x="104" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">回答可被打断</text>

  <rect x="247" y="234" width="155" height="58" rx="14" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/>
  <circle cx="273" cy="263" r="14" fill="#16A34A"/>
  <text x="273" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">4</text>
  <text x="295" y="258" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">留记录</text>
  <text x="295" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">全文转文字可追溯</text>

  <line x1="211" y1="175" x2="247" y2="175" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="324.5" y1="204" x2="324.5" y2="234" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="247" y1="263" x2="211" y2="263" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="133.5" y1="234" x2="133.5" y2="204" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="448" y="96" width="176" height="236" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="468" y="126" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">用户在意顺序</text>

  <rect x="468" y="144" width="136" height="34" rx="10" fill="#FFF7ED"/>
  <text x="482" y="165" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#EA580C">1 能不能完成任务</text>

  <rect x="468" y="188" width="136" height="34" rx="10" fill="#FEF3C7"/>
  <text x="482" y="209" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#D97706">2 会不会耽误时间</text>

  <rect x="468" y="232" width="136" height="34" rx="10" fill="#F0FDF4"/>
  <text x="482" y="253" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#16A34A">3 出问题能否补救</text>

  <rect x="468" y="276" width="136" height="34" rx="10" fill="#F5F3FF"/>
  <text x="482" y="297" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">4 最后才是好不好听</text>

  <line x1="424" y1="214" x2="448" y2="214" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <text x="438" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">先稳链路</text>

  <rect x="36" y="346" width="588" height="34" rx="10" fill="#E0F2FE" stroke="#2563EB" stroke-width="1"/>
  <text x="330" y="367" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">结论：先把闭环稳定上线试单，再决定是否继续优化拟人感、延迟与成本</text>
</svg>