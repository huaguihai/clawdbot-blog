<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' font-family='-apple-system, Segoe UI, sans-serif' font-size='20' font-weight='bold' fill='#1E293B' text-anchor='middle'>OpenAI Partner Network 角色演进</text><rect x='40' y='80' width='260' height='280' rx='10' fill='#FFFFFF' stroke='#E2E8F0' stroke-width='1'/><rect x='360' y='80' width='260' height='280' rx='10' fill='#FFFFFF' stroke='#DBEAFE' stroke-width='2'/><text x='170' y='110' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#64748B' text-anchor='middle'>以前：AI 开发者</text><text x='490' y='110' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#2563EB' text-anchor='middle'>现在：OPN 交付者</text><line x1='310' y1='220' x2='350' y2='220' stroke='#94A3B8' stroke-width='2' stroke-dasharray='4'/><path d='M345 215 L355 220 L345 225 Z' fill='#94A3B8'/><g font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#475569'><text x='60' y='150'>• 核心：API 调用与 Prompt</text><text x='60' y='200'>• 交付：单一对话框网页</text><text x='60' y='250'>• 痛点：探索 AI 可能性</text><text x='60' y='300'>• 盈利：卖账号 / 工具订阅</text></g><g font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#1E293B' font-weight='500'><text x='380' y='150'>• 核心：行业逻辑 + 工作流编排</text><text x='380' y='200'>• 交付：稳定、合规的业务系统</text><text x='380' y='250'>• 痛点：降本增效 (ROI 导向)</text><text x='380' y='300'>• 盈利：咨询 / 定制 / 效率增量</text></g><rect x='380' y='135' width='220' height='22' rx='4' fill='#2563EB' fill-opacity='0.1'/><rect x='380' y='185' width='220' height='22' rx='4' fill='#2563EB' fill-opacity='0.1'/><rect x='380' y='235' width='220' height='22' rx='4' fill='#2563EB' fill-opacity='0.1'/><rect x='380' y='285' width='220' height='22' rx='4' fill='#2563EB' fill-opacity='0.1'/></svg>