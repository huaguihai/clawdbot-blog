<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .h { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#111827; }
      .t { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .mini { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#374151; }
      .tag { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:700; fill:#111827; }
      .dash { stroke:#6B7280; stroke-width:1.5; stroke-dasharray:6 5; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="28" y="38">连接器最值得先用的 3 个场景：把“对齐信息”变成“可追溯引用”</text>

  <!-- Left: Inputs -->
  <rect class="card" x="28" y="66" width="185" height="290" rx="12"/>
  <text class="h" x="44" y="96">信息散落（输入）</text>

  <rect x="44" y="112" width="153" height="34" rx="10" fill="#FFFFFF" stroke="#2563EB"/>
  <text class="t" x="56" y="134">会议纪要 / 文档</text>

  <rect x="44" y="156" width="153" height="34" rx="10" fill="#FFFFFF" stroke="#EA580C"/>
  <text class="t" x="56" y="178">聊天记录 / 讨论</text>

  <rect x="44" y="200" width="153" height="34" rx="10" fill="#FFFFFF" stroke="#16A34A"/>
  <text class="t" x="56" y="222">代码 PR / 变更</text>

  <rect x="44" y="244" width="153" height="34" rx="10" fill="#FFFFFF" stroke="#9333EA"/>
  <text class="t" x="56" y="266">知识库 / 规范</text>

  <rect x="44" y="288" width="153" height="34" rx="10" fill="#FFFFFF" stroke="#D97706"/>
  <text class="t" x="56" y="310">日历 / 排期</text>

  <text class="mini" x="44" y="346">痛点：同一件事多版本、无出处</text>

  <!-- Middle: Connector -->
  <rect class="card" x="238" y="66" width="184" height="290" rx="12"/>
  <text class="h" x="254" y="96">连接器（对齐机制）</text>

  <!-- Core block -->
  <rect x="254" y="112" width="152" height="78" rx="12" fill="#2563EB"/>
  <text x="270" y="138" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#FFFFFF">固定问法</text>
  <text x="270" y="158" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#EAF2FF">决定 → 任务 → 验收</text>
  <text x="270" y="176" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#EAF2FF">风险信号 → 结论</text>

  <!-- Traceability rule -->
  <rect x="254" y="202" width="152" height="64" rx="12" fill="#16A34A"/>
  <text x="270" y="228" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="800" fill="#FFFFFF">强制规则</text>
  <text x="270" y="248" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#E9FBEF">每条输出都带引用来源</text>

  <rect x="254" y="276" width="152" height="62" rx="12" fill="#FFFFFF" stroke="#6B7280"/>
  <text class="mini" x="266" y="300">避免：看似对齐</text>
  <text class="mini" x="266" y="318">实际是“新幻觉”</text>

  <!-- Right: Outputs (3 scenarios) -->
  <rect class="card" x="447" y="66" width="185" height="290" rx="12"/>
  <text class="h" x="463" y="96">三类产出（场景）</text>

  <!-- Scenario 1 -->
  <rect x="463" y="112" width="153" height="70" rx="12" fill="#FFFFFF" stroke="#2563EB"/>
  <text class="tag" x="475" y="135">场景 1：会议纪要 → TODO</text>
  <text class="mini" x="475" y="155">Owner + 验收标准</text>
  <text class="mini" x="475" y="171">每条可追溯引用</text>

  <!-- Scenario 2 -->
  <rect x="463" y="194" width="153" height="70" rx="12" fill="#FFFFFF" stroke="#EA580C"/>
  <text class="tag" x="475" y="217">场景 2：跨工具周报/复盘</text>
  <text class="mini" x="475" y="237">交付与风险（带证据）</text>
  <text class="mini" x="475" y="253">模板化，按时间范围复用</text>

  <!-- Scenario 3 -->
  <rect x="463" y="276" width="153" height="62" rx="12" fill="#FFFFFF" stroke="#9333EA"/>
  <text class="tag" x="475" y="299">场景 3：资料库问答</text>
  <text class="mini" x="475" y="319">回答 + 引用 + 可追问</text>

  <!-- Connectors dashed lines -->
  <path class="dash" d="M 213 160 C 224 160, 226 160, 238 160"/>
  <path class="dash" d="M 213 222 C 224 222, 226 222, 238 222"/>
  <path class="dash" d="M 213 284 C 224 284, 226 284, 238 284"/>

  <path class="dash" d="M 422 160 C 433 160, 435 160, 447 160"/>
  <path class="dash" d="M 422 230 C 433 230, 435 230, 447 230"/>
  <path class="dash" d="M 422 304 C 433 304, 435 304, 447 304"/>

  <!-- Footer note -->
  <text class="mini" x="28" y="384">核心：把“结论”变成“结论 + 证据（可点击引用）”，减少争论与返工</text>
</svg>