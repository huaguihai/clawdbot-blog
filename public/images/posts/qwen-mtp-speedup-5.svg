<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">你机器上的 MTP 2.5x 提速怎么判断</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先实测 off + 三档，再根据结果定位瓶颈</text>

  <rect x="220" y="82" width="220" height="64" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="108" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">步骤 1：跑基准</text>
  <text x="330" y="129" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">记录 off + 三档结果，约 2 小时可判定</text>

  <line x1="330" y1="146" x2="330" y2="172" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="210" y="172" width="240" height="64" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="198" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">步骤 2：看吞吐变化</text>
  <text x="330" y="219" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">明显提升：说明你的机器确实吃到 MTP 红利</text>

  <line x1="330" y1="236" x2="330" y2="258" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="200" y="258" width="260" height="52" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#EA580C">提升很小或变慢？通常查这三类原因</text>

  <line x1="330" y1="310" x2="330" y2="326" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <line x1="330" y1="326" x2="120" y2="326" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="326" x2="330" y2="326" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="326" x2="540" y2="326" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="120" y1="326" x2="120" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="326" x2="330" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="540" y1="326" x2="540" y2="340" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="35" y="340" width="170" height="48" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="120" y="360" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">瓶颈不在解码</text>
  <text x="120" y="378" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">主要慢在 TTFT / 启动 / 上下文 / IO</text>

  <rect x="245" y="340" width="170" height="48" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="360" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">显存余量不足</text>
  <text x="330" y="378" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">开启 MTP 触发换页，吞吐反而下降</text>

  <rect x="455" y="340" width="170" height="48" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="540" y="360" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">后端未真启用</text>
  <text x="540" y="378" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">走到 CPU 或低效路径，收益被吃掉</text>
</svg>