<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">AWS 里的 OpenAI 适合哪些场景</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">核心判断：数据、流程都在 AWS，且要把功能嵌进现有工作流</text><line x1="330" y1="110" x2="330" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="170" x2="120" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="170" x2="540" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="170" x2="120" y2="290" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="170" x2="540" y2="290" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><g filter="url(#shadow)"><rect x="220" y="90" width="220" height="90" rx="16" fill="#FFFFFF"/></g><rect x="238" y="108" width="44" height="44" rx="12" fill="#2563EB" opacity="0.12"/><text x="260" y="137" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">AWS</text><text x="330" y="125" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">适合先落地的 AI 功能</text><text x="330" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">不是炫技 Demo，而是能接入原有流程</text><g filter="url(#shadow)"><rect x="40" y="120" width="160" height="86" rx="14" fill="#FFFFFF"/></g><rect x="56" y="136" width="34" height="34" rx="10" fill="#16A34A" opacity="0.14"/><text x="73" y="159" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">问</text><text x="120" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">内部知识问答</text><text x="120" y="171" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">文档权限都在云内</text><text x="120" y="189" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">低风险试点</text><g filter="url(#shadow)"><rect x="460" y="120" width="160" height="86" rx="14" fill="#FFFFFF"/></g><rect x="476" y="136" width="34" height="34" rx="10" fill="#EA580C" opacity="0.14"/><text x="493" y="159" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">稿</text><text x="540" y="148" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">客服辅助草稿</text><text x="540" y="171" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">上下游链路清晰</text><text x="540" y="189" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">快速验证效率</text><g filter="url(#shadow)"><rect x="40" y="244" width="160" height="86" rx="14" fill="#FFFFFF"/></g><rect x="56" y="260" width="34" height="34" rx="10" fill="#D97706" opacity="0.14"/><text x="73" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">单</text><text x="120" y="272" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">工单总结分类</text><text x="120" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">结构化数据充足</text><text x="120" y="313" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#D97706">适合 A/B 对比</text><g filter="url(#shadow)"><rect x="460" y="244" width="160" height="86" rx="14" fill="#FFFFFF"/></g><rect x="476" y="260" width="34" height="34" rx="10" fill="#9333EA" opacity="0.14"/><text x="493" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">码</text><text x="540" y="272" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">开发辅助与代码理解</text><text x="540" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">贴近工程团队工作流</text><text x="540" y="313" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">技术团队可直接用</text><g filter="url(#shadow)"><rect x="190" y="282" width="280" height="76" rx="14" fill="#FFFFFF"/></g><rect x="208" y="298" width="34" height="34" rx="10" fill="#2563EB" opacity="0.14"/><text x="225" y="321" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">规</text><text x="330" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#111827">合规文档整理</text><text x="330" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">审计、留痕、访问边界更重要，适合走现有治理体系</text><text x="330" y="382" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">共同点：AI 是流程增强器，不是独立玩具</text></svg>