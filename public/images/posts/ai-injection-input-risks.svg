<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400" role="img" aria-label="四类输入风险对比图">
  <rect width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">AI 输入身份要分层</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">外部内容、用户输入、检索结果、工具回传都不应默认可信</text>

  <line x1="330" y1="78" x2="330" y2="330" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="58" y="96" width="220" height="70" rx="12" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/>
  <rect x="382" y="96" width="220" height="70" rx="12" fill="#FFFFFF" stroke="#FED7AA" filter="url(#shadow)"/>
  <rect x="58" y="218" width="220" height="70" rx="12" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/>
  <rect x="382" y="218" width="220" height="70" rx="12" fill="#FFFFFF" stroke="#E9D5FF" filter="url(#shadow)"/>

  <line x1="278" y1="131" x2="330" y2="131" stroke="#2563EB" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="382" y1="131" x2="330" y2="131" stroke="#EA580C" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="278" y1="253" x2="330" y2="253" stroke="#16A34A" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="382" y1="253" x2="330" y2="253" stroke="#9333EA" stroke-width="2" stroke-dasharray="5 5"/>

  <circle cx="84" cy="131" r="14" fill="#DBEAFE"/>
  <circle cx="408" cy="131" r="14" fill="#FFEDD5"/>
  <circle cx="84" cy="253" r="14" fill="#DCFCE7"/>
  <circle cx="408" cy="253" r="14" fill="#F3E8FF"/>

  <text x="84" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">外</text>
  <text x="408" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">用</text>
  <text x="84" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">检</text>
  <text x="408" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">工</text>

  <text x="110" y="124" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">外部内容</text>
  <text x="110" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">网页 / 邮件 / 文档</text>

  <text x="434" y="124" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">用户输入</text>
  <text x="434" y="145" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">聊天框里的消息</text>

  <text x="110" y="246" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">检索结果</text>
  <text x="110" y="267" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">RAG / 搜索 / 知识库</text>

  <text x="434" y="246" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">工具回传</text>
  <text x="434" y="267" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">API 返回 / 函数结果</text>

  <rect x="178" y="310" width="304" height="44" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text x="330" y="338" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">默认不可信，按身份分层处理</text>
  <line x1="330" y1="286" x2="330" y2="310" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
</svg>