<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,'Segoe UI',sans-serif;}
      .muted{fill:#6B7280;}
      .title{fill:#111827;font-weight:700;}
      .card{fill:#FFFFFF;filter:url(#shadow);}
      .stroke{stroke:#E5E7EB;}
      .dash{stroke:#9CA3AF;stroke-dasharray:6 6;stroke-width:2;fill:none;}
      .small{font-size:12px;}
      .base{font-size:13px;}
      .h{font-size:15px;font-weight:700;}
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" fill="#FAFAFA" rx="12"/>

  <!-- Header -->
  <text x="28" y="42" class="font title" font-size="18">最容易量化的 3 类知识工作（AI 出首稿，人类审核）</text>
  <text x="28" y="64" class="font muted" font-size="12">共同点：高频、低风险、可审核；量化重点不是“调用次数”</text>

  <!-- Cards layout -->
  <!-- Card 1: Email -->
  <rect x="28" y="92" width="196" height="210" rx="12" class="card stroke"/>
  <circle cx="52" cy="122" r="10" fill="#2563EB"/>
  <text x="70" y="127" class="font h" fill="#111827">邮件初稿 GPT</text>
  
  <text x="44" y="154" class="font base" fill="#111827">输入</text>
  <text x="44" y="172" class="font small muted">客户来信 / 上下文 / 目的</text>

  <path d="M44 186 L208 186" class="dash"/>
  <text x="44" y="208" class="font base" fill="#111827">AI 产出</text>
  <text x="44" y="226" class="font small muted">可发送首稿（半成品）</text>

  <path d="M44 240 L208 240" class="dash"/>
  <text x="44" y="262" class="font base" fill="#111827">人工审核</text>
  <text x="44" y="280" class="font small muted">销售 / 运营 / 创始人</text>

  <!-- Core metric badge -->
  <rect x="44" y="292" width="164" height="26" rx="8" fill="#2563EB"/>
  <text x="56" y="310" class="font" font-size="12" fill="#FFFFFF">核心指标：首稿时间</text>

  <!-- Card 2: Meeting notes -->
  <rect x="232" y="92" width="196" height="210" rx="12" class="card stroke"/>
  <circle cx="256" cy="122" r="10" fill="#16A34A"/>
  <text x="274" y="127" class="font h" fill="#111827">会议纪要 GPT</text>

  <text x="248" y="154" class="font base" fill="#111827">输入</text>
  <text x="248" y="172" class="font small muted">录音转写 / 议程 / 参会人</text>

  <path d="M248 186 L412 186" class="dash"/>
  <text x="248" y="208" class="font base" fill="#111827">AI 产出</text>
  <text x="248" y="226" class="font small muted">纪要 + 待办 + 风险</text>

  <path d="M248 240 L412 240" class="dash"/>
  <text x="248" y="262" class="font base" fill="#111827">人工审核</text>
  <text x="248" y="280" class="font small muted">主持人 / PM</text>

  <rect x="248" y="292" width="164" height="26" rx="8" fill="#16A34A"/>
  <text x="260" y="310" class="font" font-size="12" fill="#FFFFFF">核心指标：遗漏项数量</text>

  <!-- Card 3: Translation -->
  <rect x="436" y="92" width="196" height="210" rx="12" class="card stroke"/>
  <circle cx="460" cy="122" r="10" fill="#9333EA"/>
  <text x="478" y="127" class="font h" fill="#111827">双语翻译 GPT</text>

  <text x="452" y="154" class="font base" fill="#111827">输入</text>
  <text x="452" y="172" class="font small muted">原文 / 术语表 / 目标语气</text>

  <path d="M452 186 L616 186" class="dash"/>
  <text x="452" y="208" class="font base" fill="#111827">AI 产出</text>
  <text x="452" y="226" class="font small muted">双语版本 / 对外文案</text>

  <path d="M452 240 L616 240" class="dash"/>
  <text x="452" y="262" class="font base" fill="#111827">人工审核</text>
  <text x="452" y="280" class="font small muted">内容 / 市场 / BD</text>

  <rect x="452" y="292" width="164" height="26" rx="8" fill="#9333EA"/>
  <text x="464" y="310" class="font" font-size="12" fill="#FFFFFF">核心指标：返工次数</text>

  <!-- Pipeline hint arrows (top) -->
  <text x="28" y="338" class="font" font-size="13" fill="#111827">量化思路：</text>
  <rect x="100" y="322" width="130" height="32" rx="10" fill="#FFFFFF" class="stroke" filter="url(#shadow)"/>
  <text x="116" y="343" class="font base" fill="#111827">高频工作流</text>
  <path d="M236 338 L290 338" class="dash"/>
  <rect x="298" y="322" width="140" height="32" rx="10" fill="#FFFFFF" class="stroke" filter="url(#shadow)"/>
  <text x="314" y="343" class="font base" fill="#111827">AI 生成首稿</text>
  <path d="M444 338 L498 338" class="dash"/>
  <rect x="506" y="322" width="126" height="32" rx="10" fill="#FFFFFF" class="stroke" filter="url(#shadow)"/>
  <text x="520" y="343" class="font base" fill="#111827">人工可审核</text>

  <!-- Warning box -->
  <rect x="28" y="362" width="604" height="28" rx="10" fill="#FFF7ED" class="stroke"/>
  <circle cx="44" cy="376" r="6" fill="#EA580C"/>
  <text x="58" y="380" class="font" font-size="12" fill="#9A3412">提醒：别把“调用次数”当核心指标；调得多不等于有价值</text>
</svg>