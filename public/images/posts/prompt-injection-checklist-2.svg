<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">AI 助手为何特别容易中招</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">当“理解内容”与“采取行动”被绑定，风险会沿执行链路放大</text><rect x="40" y="100" width="170" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="125" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">输入与外部内容</text><text x="58" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 用户输入未必善意</text><text x="58" y="167" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 网页/知识库未必只是资料</text><rect x="245" y="100" width="170" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="330" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">模型决策层</text><text x="263" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 负责理解内容</text><text x="263" y="167" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 还决定要不要调用工具</text><rect x="450" y="100" width="170" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#D1FAE5"/><text x="535" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">行动执行层</text><text x="468" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 知识库 / 网页抓取</text><text x="468" y="167" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• Webhook / 内部 API</text><line x1="210" y1="141" x2="245" y2="141" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="415" y1="141" x2="450" y2="141" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="80" y="245" width="500" height="95" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#FDE68A"/><text x="330" y="273" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#D97706">核心风险：内容理解与工具调用被绑在一起</text><text x="107" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">1. 看到内容</text><text x="210" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">→ 2. 直接判断下一步</text><text x="365" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">→ 3. 顺手调用工具</text><text x="490" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">→ 4. 风险被执行</text><text x="330" y="324" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">流程越顺滑，越像“聪明助手”，也越容易把错误判断快速变成真实动作</text><line x1="330" y1="182" x2="330" y2="245" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><text x="330" y="376" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">本图聚焦一个核心概念：AI Agent 的风险来自“可行动能力”与“自动决策”的耦合</text></svg>