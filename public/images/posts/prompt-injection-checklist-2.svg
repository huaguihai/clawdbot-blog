<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">为什么 AI Agent 更容易中招</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">危险不只是污染回答，而是污染“读内容 → 判断 → 调工具”的决策链</text>

  <rect x="46" y="110" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="46" y="110" width="160" height="8" rx="12" fill="#16A34A"/>
  <text x="126" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">外部内容</text>
  <text x="126" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 邮件 / 文档</text>
  <text x="126" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可能夹带隐藏指令</text>

  <rect x="250" y="110" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="250" y="110" width="160" height="8" rx="12" fill="#2563EB"/>
  <text x="330" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">模型判断</text>
  <text x="330" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">把资料与命令混读</text>
  <text x="330" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">决策链被干扰</text>

  <rect x="454" y="110" width="160" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="454" y="110" width="160" height="8" rx="12" fill="#9333EA"/>
  <text x="534" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">工具执行</text>
  <text x="534" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">发消息 / 查订单</text>
  <text x="534" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">更新状态 / 串联调用</text>

  <line x1="206" y1="156" x2="250" y2="156" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <line x1="410" y1="156" x2="454" y2="156" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>

  <rect x="94" y="254" width="472" height="96" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="94" y="254" width="472" height="8" rx="12" fill="#EA580C"/>
  <text x="330" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#EA580C">Prompt Injection 的真正风险</text>
  <text x="330" y="312" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#111827">不是让回答变差，而是让 Agent 依据污染内容继续行动</text>
  <text x="330" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#4B5563">只靠“系统提示词提醒别相信网页命令”不够，关键是架构上分离资料与命令</text>

  <line x1="330" y1="202" x2="330" y2="254" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowOrange)"/>

  <rect x="500" y="68" width="122" height="30" rx="15" fill="#FEF3C7"/>
  <text x="561" y="88" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#D97706">普通聊天机器人：偏回答</text>
  <rect x="38" y="68" width="132" height="30" rx="15" fill="#DCFCE7"/>
  <text x="104" y="88" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">AI Agent：偏决策与执行</text>
</svg>