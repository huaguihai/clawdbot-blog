<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">一套 5 分钟能跑完的轻量工具流</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心：不是扫得多深，而是每次发版前都愿意做</text>

  <rect x="38" y="96" width="150" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="38" y="96" width="150" height="42" rx="16" fill="#2563EB"/>
  <text x="113" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">1 依赖输入</text>
  <text x="58" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">• package-lock.json</text>
  <text x="58" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">• pnpm-lock.yaml</text>
  <text x="58" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">• poetry.lock</text>
  <text x="58" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">• requirements.txt</text>
  <text x="58" y="260" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A">• go.mod</text>
  <text x="58" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">常见 Node.js / Python / Go</text>

  <rect x="255" y="96" width="150" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="255" y="96" width="150" height="42" rx="16" fill="#16A34A"/>
  <text x="330" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">2 快速扫描</text>
  <rect x="275" y="156" width="110" height="48" rx="12" fill="#F8FAFC" stroke="#16A34A" stroke-width="1.5"/>
  <text x="330" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">OSV.dev</text>
  <text x="330" y="193" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">官方漏洞查询</text>
  <rect x="275" y="220" width="110" height="48" rx="12" fill="#F8FAFC" stroke="#16A34A" stroke-width="1.5"/>
  <text x="330" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">OSV-Scanner</text>
  <text x="330" y="257" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">官方扫描工具</text>

  <rect x="472" y="96" width="150" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="472" y="96" width="150" height="42" rx="16" fill="#EA580C"/>
  <text x="547" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">3 发布决策</text>
  <rect x="493" y="154" width="108" height="36" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/>
  <text x="547" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9A3412">无高危 → 发版</text>
  <rect x="493" y="200" width="108" height="36" rx="10" fill="#FEFCE8" stroke="#D97706" stroke-width="1.5"/>
  <text x="547" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#92400E">可接受风险 → 记录</text>
  <rect x="493" y="246" width="108" height="36" rx="10" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="547" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B21A8">高危未解 → 暂缓</text>

  <line x1="188" y1="201" x2="255" y2="201" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
  <line x1="405" y1="201" x2="472" y2="201" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>

  <rect x="54" y="332" width="552" height="44" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="82" cy="354" r="11" fill="#D97706"/>
  <text x="82" y="358" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">i</text>
  <text x="104" y="359" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">轻量原则：先把漏洞检查做成发布动作的一部分，手动能坚持，再考虑接入 CI。</text>
</svg>