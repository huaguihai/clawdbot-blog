<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,'Segoe UI',sans-serif}
      .title{font-size:18px;font-weight:700;fill:#111827}
      .subtitle{font-size:12px;fill:#4B5563}
      .label{font-size:12px;font-weight:600;fill:#111827}
      .small{font-size:11px;fill:#374151}
      .card{fill:#FFFFFF;stroke:#E5E7EB;stroke-width:1;filter:url(#shadow)}
      .dash{stroke:#9CA3AF;stroke-width:2;stroke-dasharray:6 6;fill:none}
      .solid{stroke:#9CA3AF;stroke-width:2;fill:none}
    </style>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- Header -->
  <text x="30" y="48" class="font title">“能跑起来” ≠ “敢上线”</text>
  <text x="30" y="70" class="font subtitle">真实风险不在回答错，而在带着网络/凭证/工具权限去做事</text>

  <!-- Left: Agent prototype -->
  <rect x="30" y="105" width="190" height="250" rx="12" class="card"/>
  <text x="50" y="135" class="font label">本地可跑（原型）</text>

  <!-- Agent node -->
  <rect x="55" y="155" width="140" height="62" rx="12" fill="#2563EB" opacity="0.12" stroke="#2563EB"/>
  <text x="125" y="183" text-anchor="middle" class="font" font-size="13" font-weight="700" fill="#1D4ED8">Agent</text>
  <text x="125" y="202" text-anchor="middle" class="font small">能调用工具执行</text>

  <!-- Risk bullets in left card -->
  <g class="font small">
    <circle cx="55" cy="240" r="4" fill="#EA580C"/>
    <text x="68" y="244">网络出界</text>

    <circle cx="55" cy="265" r="4" fill="#D97706"/>
    <text x="68" y="269">凭证暴露</text>

    <circle cx="55" cy="290" r="4" fill="#9333EA"/>
    <text x="68" y="294">工具滥用</text>

    <circle cx="55" cy="315" r="4" fill="#16A34A"/>
    <text x="68" y="319">数据外泄</text>
  </g>

  <!-- Middle: Gate -->
  <rect x="250" y="165" width="160" height="130" rx="12" class="card"/>
  <text x="330" y="195" text-anchor="middle" class="font label">上线门禁（必须）</text>
  <text x="330" y="215" text-anchor="middle" class="font subtitle">把 Agent 当“会犯错的实习生”</text>

  <!-- Gate controls pills -->
  <g class="font" font-size="11" font-weight="600">
    <rect x="268" y="232" width="124" height="22" rx="11" fill="#FFFFFF" stroke="#2563EB"/>
    <text x="330" y="247" text-anchor="middle" fill="#1D4ED8">最小权限</text>

    <rect x="268" y="258" width="124" height="22" rx="11" fill="#FFFFFF" stroke="#16A34A"/>
    <text x="330" y="273" text-anchor="middle" fill="#15803D">审计日志</text>

    <rect x="268" y="284" width="124" height="22" rx="11" fill="#FFFFFF" stroke="#EA580C"/>
    <text x="330" y="299" text-anchor="middle" fill="#C2410C">边界校验</text>
  </g>

  <!-- Right: Production system -->
  <rect x="440" y="105" width="190" height="250" rx="12" class="card"/>
  <text x="460" y="135" class="font label">生产环境（敢上线）</text>

  <!-- Production resources -->
  <g class="font small">
    <rect x="465" y="158" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="483" cy="180" r="6" fill="#2563EB"/>
    <text x="498" y="184">内网服务</text>

    <rect x="465" y="212" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="483" cy="234" r="6" fill="#D97706"/>
    <text x="498" y="238">凭证/密钥</text>

    <rect x="465" y="266" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="483" cy="288" r="6" fill="#9333EA"/>
    <text x="498" y="292">工具接口</text>

    <rect x="465" y="320" width="140" height="44" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <circle cx="483" cy="342" r="6" fill="#16A34A"/>
    <text x="498" y="346">业务数据</text>
  </g>

  <!-- Connections -->
  <!-- Agent -> Gate -->
  <path d="M195 186 C220 186 225 210 250 215" class="dash"/>
  <polygon points="250,215 242,210 242,220" fill="#9CA3AF"/>

  <!-- Gate -> Production -->
  <path d="M410 230 C425 230 425 230 440 230" class="dash"/>
  <polygon points="440,230 432,225 432,235" fill="#9CA3AF"/>

  <!-- Warning callout: without gate -->
  <path d="M195 205 C260 115 380 115 465 165" class="dash"/>
  <text x="330" y="118" text-anchor="middle" class="font" font-size="11" fill="#C2410C" font-weight="700">无门禁：越界是“很多次小试探”</text>

  <!-- Footer note -->
  <text x="30" y="378" class="font subtitle">核心：评估的不只是模型能力，而是系统是否提前装好权限与边界</text>
</svg>