<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .h { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; }
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #374151; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #4B5563; }
      .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .badgeText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Main title -->
  <text class="title" x="330" y="38" text-anchor="middle">你做的是“功能”，还是“系统入口”？</text>

  <!-- Left: Capability tool -->
  <rect class="card" x="40" y="70" width="270" height="290" rx="12"/>
  <rect x="56" y="90" width="110" height="26" rx="8" fill="#2563EB"/>
  <text class="badgeText" x="111" y="108" text-anchor="middle">能力型工具</text>

  <text class="h" x="56" y="140" fill="#2563EB">定位</text>
  <text class="t" x="56" y="160">解决一个任务，交付一个结果</text>

  <text class="h" x="56" y="192" fill="#2563EB">用户描述</text>
  <text class="t" x="56" y="212">“它写得真好 / 总结真准”</text>

  <text class="h" x="56" y="244" fill="#2563EB">长期形态</text>
  <text class="t" x="56" y="264">越来越像插件（可替换）</text>

  <text class="h" x="56" y="296" fill="#EA580C">常见掉坑路径</text>

  <!-- Pitfall steps (left) -->
  <rect class="card" x="56" y="306" width="238" height="40" rx="10"/>
  <text class="small" x="70" y="329">前期：效果惊艳起量</text>

  <path class="dash" d="M175 346 L175 358"/>

  <rect class="card" x="56" y="360" width="238" height="0" rx="10" opacity="0"/>

  <!-- Right: Entry tool -->
  <rect class="card" x="350" y="70" width="270" height="290" rx="12"/>
  <rect x="366" y="90" width="110" height="26" rx="8" fill="#16A34A"/>
  <text class="badgeText" x="421" y="108" text-anchor="middle">入口型工具</text>

  <text class="h" x="366" y="140" fill="#16A34A">定位</text>
  <text class="t" x="366" y="160">记录、分派、审批、回执</text>
  <text class="t" x="366" y="178">把结果变成流程的一部分</text>

  <text class="h" x="366" y="210" fill="#16A34A">用户描述</text>
  <text class="t" x="366" y="230">“它能把事办完”</text>

  <text class="h" x="366" y="262" fill="#16A34A">长期形态</text>
  <text class="t" x="366" y="282">更像操作系统的一部分</text>

  <text class="h" x="366" y="314" fill="#9333EA">护城河来源</text>
  <text class="t" x="366" y="334">嵌入流程与协作网络</text>

  <!-- Middle dashed separator -->
  <path class="dash" d="M330 70 L330 360"/>

  <!-- Bottom warning note -->
  <rect class="card" x="40" y="362" width="580" height="26" rx="10"/>
  <circle cx="58" cy="375" r="6" fill="#D97706"/>
  <text class="small" x="72" y="379">警惕：被平台集成 / 模型升级 / 更便宜模型替代时，能力型更易被“免费送掉”</text>

  <!-- Left pitfall continuation (visual via arrows + labels) -->
  <!-- Draw three small chips to the left card to show later stages -->
  <rect x="56" y="346" width="238" height="32" rx="10" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text class="small" x="70" y="366">后期：被集成 / 被替代</text>

  <path class="dash" d="M175 378 L175 390"/>

  <rect x="56" y="392" width="238" height="0" rx="10" fill="#FFFFFF" stroke="#E5E7EB" opacity="0"/>

  <!-- Add final chip slightly above bottom note within left card area -->
  <rect x="56" y="346" width="0" height="0" rx="10" opacity="0"/>

  <!-- Final stage chip placed inside left card (upper area) to fit layout -->
  <rect x="56" y="270" width="238" height="32" rx="10" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text class="small" x="70" y="290">最终：卷价格 / 卷营销</text>

  <!-- Dashed arrow from pitfall header to final chip -->
  <path class="dash" d="M212 300 C212 290 212 286 212 280"/>
</svg>