<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <text x="40" y="48" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">自包含回答块：生产环境最小闭环</text>
  <text x="40" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">目标：可复现、可量化、可逐步放量（非追求零错误）</text>

  <!-- Step 1 -->
  <rect x="40" y="105" width="580" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="105" width="8" height="64" rx="12" fill="#2563EB"/>
  <text x="62" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">1. 生成回放集</text>
  <text x="62" y="152" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">采集线上真实对话 + 每步工具调用轨迹，形成可重放数据集</text>
  <text x="520" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#2563EB">Replay Set</text>

  <!-- Step 2 -->
  <rect x="40" y="190" width="580" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="190" width="8" height="64" rx="12" fill="#9333EA"/>
  <text x="62" y="217" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">2. 改动后自动重放</text>
  <text x="62" y="237" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">每次改 prompt / 模型 / 工具后，触发回归重放</text>
  <text x="495" y="225" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#9333EA">Prompt / Model / Tool</text>

  <!-- Step 3 (split) -->
  <rect x="40" y="275" width="580" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="275" width="8" height="92" rx="12" fill="#16A34A"/>
  <text x="62" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">3. 回归评估与线上试跑</text>

  <!-- Subcards inside step 3 -->
  <rect x="62" y="315" width="268" height="42" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="76" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#0F172A">规则校验</text>
  <text x="150" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">结构/字段/工具白名单/步数阈值</text>

  <rect x="344" y="315" width="276" height="42" rx="10" fill="#FFFFFF" stroke="#E2E8F0"/>
  <text x="358" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#0F172A">LLM-as-judge</text>
  <text x="460" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">固定 rubric 打分 + must-fix</text>

  <!-- Release block -->
  <rect x="62" y="360" width="558" height="28" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="76" y="379" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#EA580C">影子模式 → 灰度发布（小流量）</text>
  <text x="330" y="379" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#9A3412">配合熔断与告警</text>

  <!-- Connectors -->
  <line x1="330" y1="169" x2="330" y2="190" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="330" y1="254" x2="330" y2="275" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Loop hint -->
  <path d="M 620 198 C 645 210, 645 310, 620 322" fill="none" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>
  <path d="M 620 322 L 632 316 L 632 328 Z" fill="#64748B"/>
  <text x="520" y="268" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">持续迭代：改动 → 重放 → 评估</text>

  <!-- Footer note -->
  <text x="40" y="392" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">核心概念：用“回放集 + 自动回归 + 影子/灰度”构建可验证的最小闭环</text>
</svg>