<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; fill: #111827; }
    .title { font-size: 18px; font-weight: 600; }
    .subtitle { font-size: 12px; fill: #4B5563; }
  </style>

  <!-- 标题 -->
  <text x="330" y="40" text-anchor="middle" class="title">Telegram Serverless 执行模型示意</text>
  <text x="330" y="60" text-anchor="middle" class="subtitle">官方托管后端 + V8 沙箱 + 内置 SQLite</text>

  <!-- 左侧：Telegram 平台 -->
  <rect x="40" y="110" width="170" height="180" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.2"/>
  <text x="125" y="135" text-anchor="middle" font-weight="600" fill="#2563EB">Telegram 平台</text>

  <!-- 用户消息图标 -->
  <circle cx="80" cy="180" r="20" fill="#2563EB" opacity="0.08"/>
  <text x="80" y="184" text-anchor="middle" fill="#2563EB" font-size="20">💬</text>
  <text x="125" y="178" class="subtitle">用户 → Bot 消息</text>

  <!-- Telegram Serverless 托管 -->
  <rect x="55" y="205" width="140" height="70" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="0.8"/>
  <text x="125" y="230" text-anchor="middle" font-size="12" fill="#1D4ED8">Telegram Serverless</text>
  <text x="125" y="250" text-anchor="middle" class="subtitle">消息接收与路由</text>

  <!-- 中间：V8 沙箱执行环境 -->
  <rect x="245" y="100" width="190" height="200" rx="12" fill="#FFFFFF" stroke="#9333EA" stroke-width="1.2"/>
  <text x="340" y="125" text-anchor="middle" font-weight="600" fill="#9333EA">V8 沙箱执行环境</text>
  <text x="340" y="144" text-anchor="middle" class="subtitle">你的 JS handler 代码</text>

  <!-- Handler 卡片 -->
  <rect x="265" y="160" width="150" height="60" rx="10" fill="#FFFFFF" stroke="#D1D5DB" stroke-width="0.8"/>
  <text x="340" y="183" text-anchor="middle" font-size="13" font-weight="600">messageHandler()</text>
  <text x="340" y="203" text-anchor="middle" class="subtitle">按消息临时拉起 / 执行 / 退出</text>

  <!-- 内部能力标签 -->
  <rect x="255" y="235" width="75" height="50" rx="8" fill="#FFFFFF" stroke="#16A34A" stroke-width="0.8"/>
  <text x="292.5" y="255" text-anchor="middle" font-size="12" fill="#16A34A">Bot API</text>
  <text x="292.5" y="272" text-anchor="middle" class="subtitle">发消息 / 按钮</text>

  <rect x="350" y="235" width="75" height="50" rx="8" fill="#FFFFFF" stroke="#EA580C" stroke-width="0.8"/>
  <text x="387.5" y="255" text-anchor="middle" font-size="12" fill="#EA580C">HTTP 请求</text>
  <text x="387.5" y="272" text-anchor="middle" class="subtitle">调用外部 API</text>

  <!-- 右侧：内置 SQLite -->
  <rect x="465" y="130" width="155" height="160" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.2"/>
  <text x="542.5" y="155" text-anchor="middle" font-weight="600" fill="#16A34A">内置 SQLite 数据库</text>
  <text x="542.5" y="174" text-anchor="middle" class="subtitle">嵌入式单文件存储</text>

  <!-- 数据库图标 -->
  <ellipse cx="542.5" cy="210" rx="45" ry="18" fill="#ECFDF3" stroke="#16A34A" stroke-width="0.8"/>
  <ellipse cx="542.5" cy="210" rx="45" ry="18" fill="none" stroke="#BBF7D0" stroke-width="0.8"/>
  <text x="542.5" y="214" text-anchor="middle" font-size="12" fill="#166534">表 / 记录</text>
  <rect x="497.5" y="210" width="90" height="40" rx="10" fill="#ECFDF3" stroke="#BBF7D0" stroke-width="0.8"/>
  <text x="542.5" y="234" text-anchor="middle" class="subtitle">读写用户状态等</text>

  <!-- 消息路由虚线：Telegram → V8 -->
  <line x1="195" y1="190" x2="245" y2="190" stroke="#2563EB" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrowBlue)"/>
  <text x="220" y="180" text-anchor="middle" class="subtitle">路由消息</text>

  <!-- V8 → Bot API（仍在 Telegram 内部）提示 -->
  <line x1="290" y1="150" x2="210" y2="150" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arrowGray)"/>
  <text x="245" y="140" text-anchor="middle" class="subtitle">调用 Bot API</text>

  <!-- V8 ↔ SQLite 虚线 -->
  <line x1="435" y1="210" x2="465" y2="210" stroke="#16A34A" stroke-width="1.3" stroke-dasharray="4 4" marker-end="url(#arrowGreen)"/>
  <text x="450" y="200" text-anchor="middle" class="subtitle">读写数据</text>

  <!-- 底部对比：免运维特性摘要 -->
  <rect x="90" y="320" width="480" height="55" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="0.8"/>
  <text x="110" y="340" class="subtitle">不用再做：</text>
  <text x="190" y="340" class="subtitle">租服务器、反向代理、守护进程、安装数据库</text>
  <text x="110" y="360" class="subtitle">只需：</text>
  <text x="160" y="360" class="subtitle">项目文件夹 + CLI 部署 JS 代码</text>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>
</svg>