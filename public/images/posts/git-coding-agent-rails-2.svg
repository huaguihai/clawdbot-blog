<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">用 Git 带代理的最小可行流程</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">先建仓库，再读上下文，最后每轮提交，减少“乱改且说不清”</text>

  <line x1="188" y1="190" x2="236" y2="190" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <line x1="424" y1="190" x2="472" y2="190" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>

  <rect x="40" y="100" width="148" height="178" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="74" cy="132" r="18" fill="#DBEAFE"/>
  <text x="74" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">1</text>
  <text x="114" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">先建仓库</text>
  <text x="56" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">如果当前目录还不是</text>
  <text x="56" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">Git 仓库，先初始化</text>
  <rect x="54" y="220" width="120" height="34" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="114" y="242" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">git init</text>

  <rect x="276" y="100" width="148" height="178" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="310" cy="132" r="18" fill="#FEE2E2"/>
  <text x="310" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">2</text>
  <text x="350" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">读上下文</text>
  <text x="292" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">最近改了什么？工作区</text>
  <text x="292" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">现在是不是已经脏了？</text>
  <rect x="290" y="216" width="120" height="24" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="350" y="232" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12.5" font-weight="600" fill="#EA580C">git log -5 --stat</text>
  <rect x="290" y="246" width="120" height="24" rx="8" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="350" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12.5" font-weight="600" fill="#EA580C">git status</text>

  <rect x="512" y="100" width="108" height="178" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="544" cy="132" r="18" fill="#DCFCE7"/>
  <text x="544" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">3</text>
  <text x="576" y="137" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#0F172A">每轮落盘</text>
  <text x="528" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">先看 diff</text>
  <text x="528" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">再 status</text>
  <text x="528" y="217" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">最后 commit</text>
  <rect x="524" y="234" width="84" height="26" rx="8" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="566" y="251" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">diff → status</text>

  <rect x="42" y="314" width="576" height="56" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="72" cy="342" r="14" fill="#F3E8FF"/>
  <text x="72" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">!</text>
  <text x="98" y="337" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">核心作用</text>
  <text x="98" y="356" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">让 agent 知道自己站在哪条时间线上：先理解历史与现状，再解释本轮改动，并把结果固定下来。</text>

  <rect x="487" y="76" width="138" height="28" rx="14" fill="#FEF3C7"/>
  <text x="556" y="95" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12.5" font-weight="700" fill="#D97706">减少乱改、便于追溯</text>
</svg>