<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><defs><filter id="shadow" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000020"/></filter></defs><text x="330" y="35" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">两种输入方式的思维路径</text><rect x="40" y="60" width="260" height="220" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#2563EB" stroke-width="2"/><text x="170" y="90" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563EB">打字 Prompt</text><line x1="70" y1="105" x2="270" y2="105" stroke="#2563EB" stroke-width="1.5" opacity="0.3"/><g transform="translate(60,120)"><rect x="0" y="0" width="230" height="32" rx="6" fill="#EFF6FF"/><text x="115" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1E40AF">① 先想要问什么问题</text></g><polygon points="175,155 170,165 180,165" fill="#2563EB"/><g transform="translate(60,170)"><rect x="0" y="0" width="230" height="32" rx="6" fill="#EFF6BF"/><text x="115" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#854D0E">② 再想怎么拆步骤</text></g><polygon points="175,205 170,215 180,215" fill="#D97706"/><g transform="translate(60,220)"><rect x="0" y="0" width="230" height="32" rx="6" fill="#F0FDF4"/><text x="115" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#166534">③ 把想法塞进框架</text></g><rect x="360" y="60" width="260" height="220" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#16A34A" stroke-width="2"/><text x="490" y="90" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16A34A">语音漫谈</text><line x1="390" y1="105" x2="590" y2="105" stroke="#16A34A" stroke-width="1.5" opacity="0.3"/><g transform="translate(380,120)"><rect x="0" y="0" width="220" height="32" rx="6" fill="#F0FDF4"/><text x="110" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#166534">背景、碎碎念、犹豫</text></g><g transform="translate(380,160)"><rect x="0" y="0" width="220" height="32" rx="6" fill="#FFF7ED"/><text x="110" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9A3412">真实需求自然流露</text></g><g transform="translate(380,200)"><rect x="0" y="0" width="220" height="32" rx="6" fill="#FAF5FF"/><text x="110" y="20" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B21A8">不自我审查</text></g><path d="M 320 170 Q 340 170 360 170" fill="none" stroke="#6B7280" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowGray)"/><circle cx="340" cy="170" r="16" fill="#FFFFFF" stroke="#6B7280" stroke-width="1.5"/><text x="340" y="174" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#4B5563">LLM</text><text x="340" y="155" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#6B7280">重构</text><rect x="100" y="310" width="460" height="55" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1.5"/><text x="330" y="335" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">核心洞察：语音漫谈 = 整理思路外包给 LLM</text><text x="330" y="355" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">打字是“装成产品经理”，语音是“诚实输出脑内状态”</text><defs><marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#6B7280"/></marker></defs></svg>