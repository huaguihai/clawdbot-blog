<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.12"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">为什么产品会选开源底座</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心逻辑：从按次付费，转向可控成本与可积累壁垒</text><rect x="50" y="104" width="170" height="236" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><rect x="245" y="104" width="170" height="236" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><rect x="440" y="104" width="170" height="236" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><line x1="220" y1="222" x2="245" y2="222" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="415" y1="222" x2="440" y2="222" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><circle cx="135" cy="140" r="24" fill="#DBEAFE"/><text x="135" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563EB">1</text><circle cx="330" cy="140" r="24" fill="#DCFCE7"/><text x="330" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">2</text><circle cx="525" cy="140" r="24" fill="#F3E8FF"/><text x="525" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#9333EA">3</text><text x="135" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">成本上限可控</text><text x="135" y="208" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">付 GPU / 机器时间</text><text x="135" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">而非每次对话被抽税</text><rect x="82" y="252" width="106" height="34" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/><text x="135" y="274" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">高频工作流更划算</text><path d="M95 312 C110 292, 125 330, 145 300 S175 300, 180 288" fill="none" stroke="#EA580C" stroke-width="3"/><text x="135" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">避免“越多人用越亏”</text><text x="330" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">口味锁定客群</text><text x="330" y="208" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">微调目标不是更聪明</text><text x="330" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">而是更像你们最能干的人</text><rect x="278" y="252" width="104" height="34" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/><text x="330" y="274" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">行业表达更贴脸</text><path d="M293 314 L307 300 L320 309 L339 292 L354 304 L367 289" fill="none" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/><text x="330" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">减少法律、医疗、客服跑偏</text><text x="525" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">秘诀沉淀成壁垒</text><text x="525" y="208" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">Prompt 容易抄</text><text x="525" y="227" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">数据与偏好不容易复制</text><rect x="473" y="252" width="104" height="34" rx="8" fill="#FAF5FF" stroke="#9333EA" stroke-width="1.5"/><text x="525" y="274" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">数据飞轮越转越强</text><path d="M500 312 a25 25 0 1 0 50 0" fill="none" stroke="#D97706" stroke-width="3" stroke-linecap="round"/><path d="M548 307 l4 10 l-11 -2" fill="#D97706"/><text x="525" y="329" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">把经验和偏好变成护城河</text><rect x="185" y="348" width="290" height="30" rx="15" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="330" y="367" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9A3412">结论：开源底座让 AI 产品更容易做出毛利与差异化</text></svg>