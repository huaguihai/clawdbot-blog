<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">GPT-Realtime 适合哪些场景？</text><rect x="200" y="62" width="260" height="54" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE" stroke-width="1.5"/><text x="330" y="86" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">核心判断标准</text><text x="330" y="106" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">产品价值是否来自“即时互动”</text><line x1="330" y1="116" x2="330" y2="146" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="40" y="146" width="270" height="214" rx="18" fill="#FFFFFF" filter="url(#shadow)" stroke="#BBF7D0" stroke-width="1.5"/><rect x="58" y="162" width="110" height="30" rx="15" fill="#16A34A"/><text x="113" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">适合使用</text><text x="58" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 语音表单</text><text x="58" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">边说边确认字段，出错立刻纠正</text><text x="58" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 口语陪练</text><text x="58" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">即时纠音、追问、切换话题</text><text x="58" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 实时同传 / 车载控制</text><text x="58" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">优先不断流，用户正在等待回应</text><rect x="350" y="146" width="270" height="214" rx="18" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA" stroke-width="1.5"/><rect x="368" y="162" width="110" height="30" rx="15" fill="#EA580C"/><text x="423" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">不适合优先上</text><text x="368" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 会议纪要</text><text x="368" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">更适合异步转写，稳且省心</text><text x="368" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 客服通话质检</text><text x="368" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">更需要稳定、可复现、可审计</text><text x="368" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">• 语音内容入库</text><text x="368" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">用户并不盯着屏幕等你回话</text><line x1="330" y1="146" x2="175" y2="146" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="146" x2="485" y2="146" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="196" y="366" width="268" height="22" rx="11" fill="#EEF2FF"/><text x="330" y="381" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12.5" font-weight="600" fill="#4338CA">判断口诀：用户在等你实时回应，就考虑 Realtime</text></svg>