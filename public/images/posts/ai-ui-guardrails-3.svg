<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <g font-family="-apple-system, 'Segoe UI', sans-serif" fill="#111827">
    <!-- 标题 -->
    <text x="330" y="28" text-anchor="middle" font-size="18" font-weight="600">把 AI 变成可控的猛车：界面是刹车与仪表</text>

    <!-- 中心卡片：核心思路 -->
    <g transform="translate(170,60)" filter="url(#shadow)">
      <rect x="0" y="0" width="320" height="100" rx="10" fill="#FFFFFF"/>
      <rect x="0" y="0" width="320" height="4" fill="#2563EB"/>
      <text x="160" y="38" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">把 AI 的每一步动作变成</text>
      <text x="160" y="58" text-anchor="middle" font-size="14" font-weight="600" fill="#111827">可见 · 可停 · 可追溯</text>
      <!-- 三个标签 -->
      <g>
        <rect x="70" y="70" width="54" height="20" rx="10" fill="#2563EB"/>
        <text x="97" y="84" text-anchor="middle" font-size="12" fill="#FFFFFF">可见</text>
        <rect x="132" y="70" width="54" height="20" rx="10" fill="#EA580C"/>
        <text x="159" y="84" text-anchor="middle" font-size="12" fill="#FFFFFF">可停</text>
        <rect x="194" y="70" width="54" height="20" rx="10" fill="#16A34A"/>
        <text x="221" y="84" text-anchor="middle" font-size="12" fill="#FFFFFF">可追溯</text>
      </g>
    </g>

    <!-- 左侧：动力与引导 -->
    <g filter="url(#shadow)">
      <rect x="40" y="190" width="220" height="60" rx="10" fill="#FFFFFF"/>
      <circle cx="58" cy="220" r="6" fill="#9333EA"/>
      <text x="74" y="214" font-size="14" font-weight="600">模型 = 发动机</text>
      <text x="74" y="234" font-size="12" fill="#4B5563">提供动力</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="40" y="270" width="220" height="60" rx="10" fill="#FFFFFF"/>
      <circle cx="58" cy="300" r="6" fill="#EA580C"/>
      <text x="74" y="294" font-size="14" font-weight="600">提示词 = 方向盘</text>
      <text x="74" y="314" font-size="12" fill="#4B5563">负责引导</text>
    </g>

    <!-- 右侧组标题 -->
    <text x="500" y="118" font-size="12" fill="#4B5563">界面 = 控制装置</text>

    <!-- 右侧：治理与控制 -->
    <g filter="url(#shadow)">
      <rect x="500" y="140" width="150" height="50" rx="10" fill="#FFFFFF"/>
      <circle cx="515" cy="165" r="6" fill="#EA580C"/>
      <text x="530" y="161" font-size="13" font-weight="600">刹车</text>
      <text x="530" y="178" font-size="12" fill="#4B5563">暂停/确认</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="500" y="200" width="150" height="50" rx="10" fill="#FFFFFF"/>
      <circle cx="515" cy="225" r="6" fill="#D97706"/>
      <text x="530" y="221" font-size="13" font-weight="600">车速表</text>
      <text x="530" y="238" font-size="12" fill="#4B5563">上下文透明</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="500" y="260" width="150" height="50" rx="10" fill="#FFFFFF"/>
      <circle cx="515" cy="285" r="6" fill="#2563EB"/>
      <text x="530" y="281" font-size="13" font-weight="600">导航</text>
      <text x="530" y="298" font-size="12" fill="#4B5563">步骤规划</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="500" y="320" width="150" height="50" rx="10" fill="#FFFFFF"/>
      <circle cx="515" cy="345" r="6" fill="#16A34A"/>
      <text x="530" y="341" font-size="13" font-weight="600">行车记录仪</text>
      <text x="530" y="358" font-size="12" fill="#4B5563">可追溯</text>
    </g>

    <!-- 连接虚线 -->
    <line x1="170" y1="110" x2="260" y2="220" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="170" y1="110" x2="260" y2="300" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="490" y1="110" x2="500" y2="165" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="490" y1="110" x2="500" y2="225" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="490" y1="110" x2="500" y2="285" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>
    <line x1="490" y1="110" x2="500" y2="345" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- 注释文本 -->
    <text x="50" y="90" font-size="12" fill="#4B5563">不是包装层，而是治理层</text>
  </g>
</svg>