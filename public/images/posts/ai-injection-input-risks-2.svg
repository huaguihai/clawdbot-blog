<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400" role="img" aria-label="AI读取、判断、执行分离图">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">读取、判断、执行必须分离</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">内容可疑不等于动作可执行</text>

  <rect x="38" y="128" width="168" height="120" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="246" y="128" width="168" height="120" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="454" y="128" width="168" height="120" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <circle cx="72" cy="160" r="16" fill="#2563EB"/>
  <text x="72" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
  <text x="100" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">读取</text>
  <text x="100" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">只收集外部内容</text>
  <text x="100" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">不做任何动作</text>

  <circle cx="280" cy="160" r="16" fill="#EA580C"/>
  <text x="280" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
  <text x="308" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">判断</text>
  <text x="308" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">识别意图与风险</text>
  <text x="308" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">区分描述与指令</text>

  <circle cx="488" cy="160" r="16" fill="#16A34A"/>
  <text x="488" y="166" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
  <text x="516" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">执行</text>
  <text x="516" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">先过权限检查</text>
  <text x="516" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">必要时人工确认</text>

  <line x1="206" y1="188" x2="246" y2="188" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="414" y1="188" x2="454" y2="188" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <rect x="98" y="286" width="464" height="58" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="118" y="301" width="96" height="28" rx="8" fill="#9333EA"/>
  <text x="166" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">内容可信?</text>
  <line x1="214" y1="315" x2="300" y2="315" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <rect x="300" y="301" width="116" height="28" rx="8" fill="#D97706"/>
  <text x="358" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">能直接执行?</text>
  <line x1="416" y1="315" x2="500" y2="315" stroke="#94A3B8" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <rect x="500" y="301" width="44" height="28" rx="8" fill="#16A34A"/>
  <text x="522" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">否</text>
</svg>