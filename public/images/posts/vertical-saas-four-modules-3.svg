<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">用灾害四模块快速做行业 AI MVP</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先搭可演示闭环，再按行业调整字段、优先级与风险边界</text>

  <line x1="145" y1="165" x2="205" y2="165" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
  <line x1="300" y1="165" x2="360" y2="165" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
  <line x1="455" y1="165" x2="515" y2="165" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>

  <g filter="url(#shadow)">
    <rect x="50" y="105" width="95" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="62" y="118" width="28" height="28" rx="8" fill="#DBEAFE"/>
    <text x="76" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">1</text>
    <text x="97.5" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">信息汇总</text>
    <text x="97.5" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">把事实集中</text>
    <text x="97.5" y="201" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">清晰输入输出</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="205" y="105" width="95" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="217" y="118" width="28" height="28" rx="8" fill="#FFEDD5"/>
    <text x="231" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">2</text>
    <text x="252.5" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">需求分级</text>
    <text x="252.5" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">把请求排队</text>
    <text x="252.5" y="201" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">设优先级规则</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="360" y="105" width="95" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="372" y="118" width="28" height="28" rx="8" fill="#DCFCE7"/>
    <text x="386" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">3</text>
    <text x="407.5" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">对外通告</text>
    <text x="407.5" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">统一沟通口径</text>
    <text x="407.5" y="201" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">可控发布流程</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="515" y="105" width="95" height="120" rx="14" fill="#FFFFFF"/>
    <rect x="527" y="118" width="28" height="28" rx="8" fill="#F3E8FF"/>
    <text x="541" y="138" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">4</text>
    <text x="562.5" y="158" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">多语问答</text>
    <text x="562.5" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">收敛重复咨询</text>
    <text x="562.5" y="201" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">提高响应效率</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="135" y="265" width="390" height="90" rx="16" fill="#FFFFFF"/>
    <text x="330" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#111827">三天可演示，一周可试点</text>
    <text x="330" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">每个模块都要补齐：最小数据表、权限与审计、可量化指标</text>
    <line x1="180" y1="330" x2="480" y2="330" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="5 5"/>
    <text x="190" y="347" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#D97706">行业适配</text>
    <text x="255" y="347" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">医疗 / 金融 / 物流 / 园区 / 售后：框架相似，字段与优先级必须重配</text>
  </g>

  <line x1="330" y1="225" x2="330" y2="264" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 6" marker-end="url(#arrowBlue)"/>
</svg>