<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#111827" font-family="-apple-system, 'Segoe UI', sans-serif">AI 功能到底卖什么：入口判断框架</text>
  <text x="330" y="58" text-anchor="middle" font-size="12" fill="#6B7280" font-family="-apple-system, 'Segoe UI', sans-serif">从“给答案”走向“占住流程位置”</text>

  <rect x="36" y="84" width="268" height="118" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="84" width="268" height="8" rx="8" fill="#2563EB"/>
  <text x="54" y="112" font-size="16" font-weight="700" fill="#1E3A8A" font-family="-apple-system, 'Segoe UI', sans-serif">Step 1 画闭环链条</text>
  <text x="54" y="136" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">触发 → 收集 → 判断/审批 → 执行 → 回执 → 归档</text>
  <text x="54" y="158" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">先找你卡住的环节</text>
  <rect x="54" y="170" width="104" height="22" rx="11" fill="#DBEAFE"/>
  <text x="106" y="185" text-anchor="middle" font-size="11" fill="#1D4ED8" font-family="-apple-system, 'Segoe UI', sans-serif">只做建议 = 易替代</text>
  <rect x="166" y="170" width="120" height="22" rx="11" fill="#DCFCE7"/>
  <text x="226" y="185" text-anchor="middle" font-size="11" fill="#15803D" font-family="-apple-system, 'Segoe UI', sans-serif">做到回执/归档 = 更稳</text>

  <rect x="356" y="84" width="268" height="118" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="356" y="84" width="268" height="8" rx="8" fill="#9333EA"/>
  <text x="374" y="112" font-size="16" font-weight="700" fill="#6B21A8" font-family="-apple-system, 'Segoe UI', sans-serif">Step 2 找 system of record</text>
  <text x="374" y="136" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">用户现在“以谁为准”</text>
  <rect x="374" y="148" width="50" height="22" rx="11" fill="#F3E8FF"/>
  <text x="399" y="163" text-anchor="middle" font-size="11" fill="#7E22CE" font-family="-apple-system, 'Segoe UI', sans-serif">Jira</text>
  <rect x="432" y="148" width="92" height="22" rx="11" fill="#F3E8FF"/>
  <text x="478" y="163" text-anchor="middle" font-size="11" fill="#7E22CE" font-family="-apple-system, 'Segoe UI', sans-serif">ServiceNow</text>
  <rect x="532" y="148" width="76" height="22" rx="11" fill="#F3E8FF"/>
  <text x="570" y="163" text-anchor="middle" font-size="11" fill="#7E22CE" font-family="-apple-system, 'Segoe UI', sans-serif">飞书/表格</text>
  <text x="374" y="188" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">策略：接入它，或成为更窄的新记录源</text>

  <rect x="36" y="228" width="268" height="118" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="228" width="268" height="8" rx="8" fill="#EA580C"/>
  <text x="54" y="256" font-size="16" font-weight="700" fill="#9A3412" font-family="-apple-system, 'Segoe UI', sans-serif">Step 3 把输出变成状态变化</text>
  <text x="54" y="280" font-size="12" fill="#6B7280" font-family="-apple-system, 'Segoe UI', sans-serif">从能力型工具</text>
  <text x="168" y="280" font-size="12" font-weight="700" fill="#EA580C" font-family="-apple-system, 'Segoe UI', sans-serif">“建议 / 总结 / 脚本”</text>
  <text x="54" y="304" font-size="12" fill="#6B7280" font-family="-apple-system, 'Segoe UI', sans-serif">到入口型动作</text>
  <text x="144" y="304" font-size="12" font-weight="700" fill="#16A34A" font-family="-apple-system, 'Segoe UI', sans-serif">“创建记录 / 推进状态 / 留痕审计”</text>
  <text x="54" y="326" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">AI 价值不再是聪明，而是推动事情往前走</text>

  <rect x="356" y="228" width="268" height="118" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="356" y="228" width="268" height="8" rx="8" fill="#16A34A"/>
  <text x="374" y="256" font-size="16" font-weight="700" fill="#166534" font-family="-apple-system, 'Segoe UI', sans-serif">Step 4 用 Prompt 拷打自己</text>
  <text x="374" y="280" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">让 LLM 输出：</text>
  <text x="374" y="300" font-size="12" fill="#374151" font-family="-apple-system, 'Segoe UI', sans-serif">当前环节 / record / 替代风险 / 候选入口 / 6周 MVP</text>
  <rect x="374" y="314" width="171" height="20" rx="10" fill="#DCFCE7"/>
  <text x="459.5" y="328" text-anchor="middle" font-size="11" fill="#166534" font-family="-apple-system, 'Segoe UI', sans-serif">结论：卖答案，还是卖流程位置</text>

  <line x1="304" y1="143" x2="356" y2="143" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="490" y1="202" x2="490" y2="228" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="356" y1="287" x2="304" y2="287" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="142" y="356" width="376" height="28" rx="14" fill="#FEF3C7"/>
  <text x="330" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E" font-family="-apple-system, 'Segoe UI', sans-serif">独立开发者优先拿下“窄场景的审批 / 回执 / 分派节点”</text>
</svg>