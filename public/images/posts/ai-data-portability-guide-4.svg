<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><text x="330" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">聊天记录导入层级策略</text><text x="330" y="58" text-anchor="middle" font-size="12" fill="#64748B">先追求 80% 可用，再追求 100% 还原</text><rect x="40" y="80" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/><rect x="40" y="80" width="180" height="28" rx="10" fill="#2563EB"/><rect x="40" y="96" width="180" height="12" rx="0" fill="#2563EB"/><text x="130" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">L1 文本导入</text><text x="130" y="124" text-anchor="middle" font-size="11" fill="#475569">接收内容</text><text x="130" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">纯文本 / Markdown</text><text x="130" y="158" text-anchor="middle" font-size="11" fill="#475569">落地方式：新会话或知识库</text><rect x="130" y="170" width="60" height="14" rx="7" fill="#DBEAFE"/><text x="160" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#2563EB">最快上线</text><rect x="240" y="80" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#shadow)"/><rect x="240" y="80" width="180" height="28" rx="10" fill="#EA580C"/><rect x="240" y="96" width="180" height="12" rx="0" fill="#EA580C"/><text x="330" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">L2 结构化导入</text><text x="330" y="124" text-anchor="middle" font-size="11" fill="#475569">接收内容</text><text x="330" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">JSON 会话 / 角色 / 时间</text><text x="330" y="158" text-anchor="middle" font-size="11" fill="#475569">落地方式：历史会话线程</text><rect x="270" y="170" width="60" height="14" rx="7" fill="#FFEDD5"/><text x="300" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#EA580C">适合 chat 产品</text><rect x="440" y="80" width="180" height="110" rx="10" fill="#FFFFFF" stroke="#D1FAE5" stroke-width="1.5" filter="url(#shadow)"/><rect x="440" y="80" width="180" height="28" rx="10" fill="#16A34A"/><rect x="440" y="96" width="180" height="12" rx="0" fill="#16A34A"/><text x="530" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">L3 资产级导入</text><text x="530" y="124" text-anchor="middle" font-size="11" fill="#475569">接收内容</text><text x="530" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#1E293B">附件 / 标签 / 记忆 / 项目</text><text x="530" y="158" text-anchor="middle" font-size="11" fill="#475569">落地方式：完整工作区迁移</text><rect x="470" y="170" width="60" height="14" rx="7" fill="#DCFCE7"/><text x="500" y="181" text-anchor="middle" font-size="10" font-weight="600" fill="#16A34A">成熟阶段</text><line x1="220" y1="135" x2="240" y2="135" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/><line x1="420" y1="135" x2="440" y2="135" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="4,3"/><rect x="100" y="222" width="460" height="60" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/><text x="330" y="244" text-anchor="middle" font-size="12" font-weight="700" fill="#9333EA">AI 写作助手推荐路径</text><text x="330" y="263" text-anchor="middle" font-size="12" fill="#475569">优先实现 L1 + L2，用户最在意的是</text><text x="330" y="278" text-anchor="middle" font-size="12" font-weight="600" fill="#1E293B">历史内容能继续拿来用，而非 UI 像不像</text><rect x="60" y="308" width="180" height="62" rx="10" fill="#FEF9C3" stroke="#FDE68A" stroke-width="1.5"/><text x="150" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#D97706">用户会骂你的</text><text x="150" y="348" text-anchor="middle" font-size="11" fill="#78350F">内容散了 / 时间乱了</text><text x="150" y="363" text-anchor="middle" font-size="11" fill="#78350F">附件丢了没提醒</text><rect x="420" y="308" width="180" height="62" rx="10" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1.5"/><text x="510" y="330" text-anchor="middle" font-size="12" font-weight="700" fill="#16A34A">用户不在意的</text><text x="510" y="348" text-anchor="middle" font-size="11" fill="#166534">头像颜色没还原</text><text x="510" y="363" text-anchor="middle" font-size="11" fill="#166534">气泡 UI 不一样</text><line x1="240" y1="339" x2="420" y2="339" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="5,4"/><text x="330" y="335" text-anchor="middle" font-size="18" fill="#94A3B8">vs</text><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/></filter></defs></svg>