<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/></filter></defs><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">最小可行对话 SLA</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">先定 4 个指标，再写进对话编排与埋点</text><line x1="330" y1="75" x2="330" y2="95" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><line x1="330" y1="95" x2="175" y2="95" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><line x1="330" y1="95" x2="485" y2="95" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><line x1="175" y1="95" x2="175" y2="108" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><line x1="485" y1="95" x2="485" y2="108" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><rect x="40" y="110" width="270" height="105" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="74" cy="144" r="16" fill="#2563EB"/><text x="74" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text><text x="100" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">延迟</text><text x="100" y="163" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">首字延迟 + 单轮总耗时</text><text x="58" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">起步：文本先尽快见首句，语音更短</text><text x="58" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">动作：超标先发进度提示，再后台继续检索</text><rect x="350" y="110" width="270" height="105" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="384" cy="144" r="16" fill="#16A34A"/><text x="384" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text><text x="410" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">一次解决率 FCR</text><text x="410" y="163" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">同会话解决 / 24h 不复问</text><text x="368" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">采集：工单状态 + 会话回访</text><text x="368" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">动作：低于阈值就补兜底与转人工策略</text><line x1="175" y1="215" x2="175" y2="235" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><line x1="485" y1="215" x2="485" y2="235" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5 5"/><rect x="40" y="238" width="270" height="105" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="74" cy="272" r="16" fill="#EA580C"/><text x="74" y="277" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text><text x="100" y="270" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">澄清次数</text><text x="100" y="291" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">每个问题最多 1-2 次追问</text><text x="58" y="316" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">采集：记录 ask_clarify 次数</text><text x="58" y="333" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">动作：超过就改成给选项，或直接升级</text><rect x="350" y="238" width="270" height="105" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><circle cx="384" cy="272" r="16" fill="#9333EA"/><text x="384" y="277" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text><text x="410" y="270" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E293B">转人工阈值</text><text x="410" y="291" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">高风险 / 高金额 / 身份校验必转</text><text x="368" y="316" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">采集：escalation_reason 命中率</text><text x="368" y="333" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">动作：转接时必须打包上下文，避免重述</text><rect x="92" y="353" width="476" height="28" rx="14" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5" stroke-dasharray="6 5"/><text x="330" y="371" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9A3412">关键原则：对话 SLA 是执行标准，不是周报 KPI</text></svg>