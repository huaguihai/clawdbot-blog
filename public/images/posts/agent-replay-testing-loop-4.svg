<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>

    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#64748B"/>
    </marker>

    <style>
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 700; fill: #0F172A; }
      .subtitle { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #334155; }
      .h { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 700; fill: #0F172A; }
      .p { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #334155; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #475569; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; filter: url(#shadow); }
      .dash { stroke: #64748B; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
      .dash2 { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <!-- Header -->
  <text x="30" y="48" class="title">生产环境低风险试跑：影子模式 → 灰度 → 熔断</text>
  <text x="30" y="70" class="subtitle">目标：在失败成本可控条件下暴露问题，并随时能刹车</text>

  <!-- Left: Incoming request -->
  <rect x="30" y="105" width="170" height="70" rx="12" class="card"/>
  <text x="45" y="135" class="h">用户请求</text>
  <text x="45" y="156" class="p">真实流量与权限上下文</text>

  <!-- Step 1: Shadow Mode -->
  <rect x="230" y="95" width="400" height="95" rx="12" class="card"/>
  <text x="250" y="125" class="h" fill="#2563EB">1) 影子模式（Shadow）</text>
  <text x="250" y="148" class="p">旁路跑：复制请求给新 Agent，但不回写/不展示</text>
  <text x="250" y="170" class="small">关注：P0失败率、工具错误率、P95/P99延迟、成本分布</text>

  <!-- arrow: request to shadow -->
  <path d="M200 140 C215 140, 215 140, 230 140" class="dash"/>

  <!-- split line: copy request -->
  <path d="M200 140 C210 140, 210 230, 230 230" class="dash2"/>
  <text x="182" y="210" class="small" fill="#64748B">复制</text>

  <!-- Step 2: Canary -->
  <rect x="230" y="205" width="400" height="95" rx="12" class="card"/>
  <text x="250" y="235" class="h" fill="#16A34A">2) 灰度（Canary）</text>
  <text x="250" y="258" class="p">1% → 5% → 20%：每档有放量条件（过闸）</text>
  <text x="250" y="280" class="small">条件：回归分、P0低、错误率不升、P95不劣化、抽检通过</text>

  <!-- arrow: shadow to canary -->
  <path d="M430 190 C430 200, 430 200, 430 205" class="dash"/>

  <!-- Step 3: Circuit Breaker -->
  <rect x="30" y="300" width="600" height="70" rx="12" class="card"/>
  <text x="50" y="330" class="h" fill="#EA580C">3) 熔断（Circuit Breaker）</text>
  <text x="50" y="352" class="p">工具级降级｜高风险二次确认/转人工｜质量不达标走 fallback</text>

  <!-- arrows: canary to breaker -->
  <path d="M430 300 C430 310, 430 310, 430 315" class="dash"/>

  <!-- Side note: irreversible actions -->
  <rect x="475" y="314" width="145" height="42" rx="10" fill="#FFF7ED" stroke="#EA580C" stroke-width="1"/>
  <text x="488" y="338" class="small" fill="#9A3412">不可逆动作收回</text>
  <text x="488" y="354" class="small" fill="#9A3412">确认 + 审计</text>

  <!-- Labels: output paths -->
  <text x="35" y="292" class="small" fill="#64748B">一旦异常：立刻刹车与降级，避免“失败放大”</text>

  <!-- Small legend chips -->
  <rect x="30" y="85" width="90" height="16" rx="8" fill="#DBEAFE"/>
  <text x="40" y="97" class="small" fill="#1D4ED8">观测真实分布</text>

  <rect x="130" y="85" width="76" height="16" rx="8" fill="#DCFCE7"/>
  <text x="140" y="97" class="small" fill="#166534">逐步放量</text>

  <rect x="214" y="85" width="66" height="16" rx="8" fill="#FFEDD5"/>
  <text x="224" y="97" class="small" fill="#9A3412">随时刹车</text>
</svg>