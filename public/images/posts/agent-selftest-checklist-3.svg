<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 660 400'>
  <defs>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='2' stdDeviation='3' flood-color='#0F172A' flood-opacity='0.12'/>
    </filter>
    <marker id='arrow' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto-start-reverse'>
      <path d='M 0 0 L 10 5 L 0 10 z' fill='#94A3B8'/>
    </marker>
  </defs>

  <!-- background -->
  <rect x='10' y='10' width='640' height='380' rx='12' fill='#FAFAFA' stroke='#E5E7EB'/>

  <!-- Title card -->
  <g filter='url(#shadow)'>
    <rect x='20' y='20' width='620' height='70' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='20' y='20' width='620' height='10' rx='12' fill='#EA580C'/>
  </g>
  <text x='40' y='58' font-family='-apple-system, Segoe UI, sans-serif' font-size='18' font-weight='700' fill='#0F172A'>一份可复制的 Agent 自测 checklist</text>
  <text x='40' y='80' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#475569'>原则：别在生产环境跑（测试账号/假数据/沙箱工具）</text>

  <!-- Cards -->
  <!-- 0 Prepare -->
  <g filter='url(#shadow)'>
    <rect x='20' y='110' width='200' height='90' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='20' y='110' width='200' height='8' rx='12' fill='#EA580C'/>
  </g>
  <text x='36' y='140' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>0）测试前准备</text>
  <text x='36' y='162' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 资产清单（敏感数据）</text>
  <text x='36' y='180' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 工具清单（读/写/后果）</text>

  <!-- 1 Injection -->
  <g filter='url(#shadow)'>
    <rect x='240' y='110' width='200' height='90' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='240' y='110' width='200' height='8' rx='12' fill='#2563EB'/>
  </g>
  <text x='256' y='140' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>1）Prompt Injection</text>
  <text x='256' y='162' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 外部内容伪装成指令</text>
  <text x='256' y='180' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 重点看：工具是否被带跑</text>

  <!-- 2 Exfil -->
  <g filter='url(#shadow)'>
    <rect x='20' y='210' width='200' height='90' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='20' y='210' width='200' height='8' rx='12' fill='#9333EA'/>
  </g>
  <text x='36' y='240' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>2）数据外泄</text>
  <text x='36' y='262' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 用假数据“钓”泄露</text>
  <text x='36' y='280' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 关键：出栈拦截/脱敏</text>

  <!-- 3 AuthZ -->
  <g filter='url(#shadow)'>
    <rect x='240' y='210' width='200' height='90' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='240' y='210' width='200' height='8' rx='12' fill='#16A34A'/>
  </g>
  <text x='256' y='240' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>3）越权工具调用</text>
  <text x='256' y='262' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 换身份/换对象绕过</text>
  <text x='256' y='280' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 工具端必须硬校验</text>

  <!-- 4 Account integrity (tall) -->
  <g filter='url(#shadow)'>
    <rect x='460' y='110' width='180' height='190' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='460' y='110' width='180' height='8' rx='12' fill='#D97706'/>
  </g>
  <text x='476' y='140' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>4）账号完整性</text>
  <text x='476' y='162' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 高风险动作：</text>
  <text x='476' y='180' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>  改邮箱 / 关 MFA</text>
  <text x='476' y='198' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>  长期 token / 支付</text>
  <text x='476' y='220' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>• 需要：人类确认</text>
  <text x='476' y='238' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>  可回滚 + 审计留痕</text>

  <!-- Bottom evaluation card -->
  <g filter='url(#shadow)'>
    <rect x='20' y='320' width='620' height='60' rx='12' fill='#FFFFFF' stroke='#E5E7EB'/>
    <rect x='20' y='320' width='620' height='8' rx='12' fill='#2563EB'/>
  </g>
  <text x='36' y='350' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='700' fill='#0F172A'>观察信号 & 过/不过标准（统一验收）</text>
  <text x='36' y='370' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#334155'>审计日志 / 输出拦截脱敏 / 最小化数据 / 工具端校验 / 高风险动作变慢且可追责</text>

  <!-- Connections (dashed) -->
  <line x1='220' y1='155' x2='240' y2='155' stroke='#94A3B8' stroke-width='1.5' stroke-dasharray='5 5' marker-end='url(#arrow)'/>
  <line x1='120' y1='200' x2='120' y2='320' stroke='#94A3B8' stroke-width='1.5' stroke-dasharray='5 5' marker-end='url(#arrow)'/>
  <line x1='340' y1='200' x2='340' y2='320' stroke='#94A3B8' stroke-width='1.5' stroke-dasharray='5 5' marker-end='url(#arrow)'/>
  <line x1='550' y1='300' x2='550' y2='320' stroke='#94A3B8' stroke-width='1.5' stroke-dasharray='5 5' marker-end='url(#arrow)'/>
  <line x1='340' y1='200' x2='120' y2='210' stroke='#94A3B8' stroke-width='1.5' stroke-dasharray='5 5' marker-end='url(#arrow)' opacity='0.55'/>
</svg>