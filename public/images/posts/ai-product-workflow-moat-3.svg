<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect width="660" height="400" fill="#FAFAFA" rx="12"/>

  <!-- Title -->
  <text x="330" y="38" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">独立开发者的三类「窄场景」切入口</text>
  <text x="330" y="58" text-anchor="middle" font-size="12" fill="#64748B">不替代大系统，只在局部成为记录与闭环的默认入口</text>

  <!-- Card 1: 审批节点 -->
  <rect x="30" y="80" width="180" height="230" rx="12" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="30" y="80" width="180" height="44" rx="12" fill="#2563EB"/>
  <rect x="30" y="112" width="180" height="12" rx="0" fill="#2563EB"/>
  <text x="120" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">① 审批节点</text>
  <text x="120" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">最值钱，要谨慎</text>
  <line x1="50" y1="160" x2="190" y2="160" stroke="#E2E8F0" stroke-width="1"/>
  <text x="120" y="180" text-anchor="middle" font-size="11" fill="#475569">变更审批</text>
  <text x="120" y="198" text-anchor="middle" font-size="11" fill="#475569">权限开通审批</text>
  <text x="120" y="216" text-anchor="middle" font-size="11" fill="#475569">费用报销技术审查</text>
  <line x1="50" y1="228" x2="190" y2="228" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="120" y="248" text-anchor="middle" font-size="10" fill="#64748B">吃掉：材料准备</text>
  <text x="120" y="264" text-anchor="middle" font-size="10" fill="#64748B">风险检查 + 回执格式</text>
  <text x="120" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">无需替代 OA</text>

  <!-- Card 2: 回执闭环节点 -->
  <rect x="240" y="80" width="180" height="230" rx="12" fill="#FFFFFF" stroke="#BBF7D0" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="80" width="180" height="44" rx="12" fill="#16A34A"/>
  <rect x="240" y="112" width="180" height="12" rx="0" fill="#16A34A"/>
  <text x="330" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">② 回执闭环节点</text>
  <text x="330" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#16A34A">最被低估</text>
  <line x1="260" y1="160" x2="400" y2="160" stroke="#E2E8F0" stroke-width="1"/>
  <text x="330" y="180" text-anchor="middle" font-size="11" fill="#475569">自动生成结论</text>
  <text x="330" y="198" text-anchor="middle" font-size="11" fill="#475569">关联资产 + 贴标签</text>
  <text x="330" y="216" text-anchor="middle" font-size="11" fill="#475569">推送到知识库</text>
  <line x1="260" y1="228" x2="400" y2="228" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="330" y="248" text-anchor="middle" font-size="10" fill="#64748B">解决了没人知道？</text>
  <text x="330" y="264" text-anchor="middle" font-size="10" fill="#64748B">把对话变成可复用记录</text>
  <text x="330" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#16A34A">下次不再重复问</text>

  <!-- Card 3: 路由分派节点 -->
  <rect x="450" y="80" width="180" height="230" rx="12" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="450" y="80" width="180" height="44" rx="12" fill="#9333EA"/>
  <rect x="450" y="112" width="180" height="12" rx="0" fill="#9333EA"/>
  <text x="540" y="107" text-anchor="middle" font-size="13" font-weight="700" fill="#FFFFFF">③ 路由/分派节点</text>
  <text x="540" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#9333EA">最适合 AI</text>
  <line x1="470" y1="160" x2="610" y2="160" stroke="#E2E8F0" stroke-width="1"/>
  <text x="540" y="180" text-anchor="middle" font-size="11" fill="#475569">分对人</text>
  <text x="540" y="198" text-anchor="middle" font-size="11" fill="#475569">降低补问次数</text>
  <text x="540" y="216" text-anchor="middle" font-size="11" fill="#475569">保留上下文</text>
  <line x1="470" y1="228" x2="610" y2="228" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="540" y="248" text-anchor="middle" font-size="10" fill="#64748B">不是写答案</text>
  <text x="540" y="264" text-anchor="middle" font-size="10" fill="#64748B">而是找对处理人</text>
  <text x="540" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#9333EA">减少 ITSM 路由浪费</text>

  <!-- Bottom shared insight -->
  <rect x="80" y="330" width="500" height="48" rx="10" fill="#1E293B"/>
  <text x="330" y="350" text-anchor="middle" font-size="12" font-weight="600" fill="#F8FAFC">三类共同点：不是「说话」，而是「办事」</text>
  <text x="330" y="368" text-anchor="middle" font-size="11" fill="#94A3B8">能落痕 · 能记录 · 能闭环 = 用户把你当流程的一环</text>

  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
  </defs>
</svg>