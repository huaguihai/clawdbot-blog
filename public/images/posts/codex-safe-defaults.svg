<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">Codex 本地 / CI 安全运行默认方案</text>
  <text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心原则：默认最小权限，高风险动作必须人工审批</text>

  <line x1="330" y1="116" x2="180" y2="88" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="116" x2="330" y2="88" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="116" x2="480" y2="88" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="284" x2="180" y2="312" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="284" x2="330" y2="312" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="284" x2="480" y2="312" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="250" y="130" width="160" height="140" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="250" y="130" width="160" height="8" rx="8" fill="#2563EB"/>
  <text x="330" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#2563EB">Codex</text>
  <text x="330" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">本地或 CI 中运行</text>
  <text x="330" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">像“临时外包”一样受控</text>
  <text x="330" y="242" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">只给隔离环境、只读资料、短期权限</text>

  <rect x="70" y="70" width="220" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="98" cy="106" r="12" fill="#2563EB"/>
  <text x="98" y="111" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <text x="120" y="98" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">沙箱隔离</text>
  <text x="120" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">容器/虚拟机，默认禁网</text>
  <text x="120" y="134" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">限制可执行命令</text>

  <rect x="220" y="70" width="220" height="72" rx="14" fill="#FFFFFF" opacity="0"/>

  <rect x="370" y="70" width="220" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="398" cy="106" r="12" fill="#16A34A"/>
  <text x="398" y="111" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <text x="420" y="98" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">仓库只读</text>
  <text x="420" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">只读 checkout</text>
  <text x="420" y="134" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">通过 PR 输出修改</text>

  <rect x="70" y="300" width="220" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="98" cy="336" r="12" fill="#D97706"/>
  <text x="98" y="341" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <text x="120" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">短期密钥</text>
  <text x="120" y="348" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">最小权限，运行时注入</text>
  <text x="120" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">禁止写入磁盘</text>

  <rect x="220" y="300" width="220" height="72" rx="14" fill="#FFFFFF" opacity="0"/>

  <rect x="370" y="300" width="220" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="398" cy="336" r="12" fill="#EA580C"/>
  <text x="398" y="341" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <text x="420" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">人工审批</text>
  <text x="420" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">联网、推送、部署</text>
  <text x="420" y="356" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">删改资源等高风险动作</text>

  <rect x="220" y="312" width="220" height="60" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="248" cy="342" r="12" fill="#9333EA"/>
  <text x="248" y="347" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
  <text x="270" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#0F172A">审计与回滚</text>
  <text x="270" y="354" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">完整日志 + 一键回滚路径</text>

  <rect x="84" y="172" width="120" height="30" rx="15" fill="#EFF6FF"/>
  <text x="144" y="191" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">默认拒绝</text>

  <rect x="456" y="172" width="120" height="30" rx="15" fill="#FFF7ED"/>
  <text x="516" y="191" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">高危需点头</text>
</svg>