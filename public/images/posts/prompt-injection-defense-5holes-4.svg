<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Agent 工具白名单：按风险分级开放</text><text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不是想调什么就调什么，而是按场景、角色、步骤开放有限能力</text><rect x="36" y="88" width="180" height="220" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#BFDBFE"/><rect x="240" y="88" width="180" height="220" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><rect x="444" y="88" width="180" height="220" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#F3E8FF"/><rect x="76" y="102" width="100" height="28" rx="14" fill="#16A34A"/><text x="126" y="121" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">可放开</text><rect x="280" y="102" width="100" height="28" rx="14" fill="#D97706"/><text x="330" y="121" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">谨慎开放</text><rect x="484" y="102" width="100" height="28" rx="14" fill="#9333EA"/><text x="534" y="121" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">默认关闭</text><text x="56" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 搜索公开网页</text><text x="56" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 读取公开资料</text><text x="56" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 查询非敏感知识库</text><text x="56" y="246" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">适合只读场景，</text><text x="56" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">结果仍应视为不可信资料</text><text x="260" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 发消息、发邮件</text><text x="260" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 修改表格</text><text x="260" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 改工单状态</text><text x="260" y="246" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">会产生业务后果，</text><text x="260" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">建议增加人工确认</text><text x="464" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 删除数据</text><text x="464" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 导出数据</text><text x="464" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 支付</text><text x="464" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">• 执行命令</text><text x="464" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">高风险操作，</text><text x="464" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不应自动放行</text><line x1="216" y1="198" x2="240" y2="198" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="420" y1="198" x2="444" y2="198" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="118" y="328" width="424" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><circle cx="144" cy="350" r="10" fill="#2563EB"/><text x="144" y="354" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">!</text><text x="164" y="345" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">实用原则</text><text x="164" y="362" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">普通实习生第一天不能做的事，不要默认让 Agent 自动做</text></svg>