<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,'Segoe UI',sans-serif;}
      .title{font-size:18px;font-weight:700;fill:#0f172a;}
      .sub{font-size:12px;fill:#475569;}
      .hdr{font-size:13px;font-weight:700;fill:#0f172a;}
      .cellTitle{font-size:13px;font-weight:700;fill:#0f172a;}
      .cellText{font-size:12px;fill:#334155;}
      .muted{fill:#64748b;}
      .dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6;fill:none;}
      .card{fill:#ffffff;stroke:#e2e8f0;stroke-width:1;filter:url(#shadow);}
      .badge{font-size:11px;font-weight:700;}
    </style>
  </defs>

  <!-- background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- header -->
  <text x="30" y="42" class="font title">“AI 进步变得真实”= 可控 · 可测 · 可回滚</text>
  <text x="30" y="64" class="font sub">把 demo 能力变成生产可用：工程抓手与典型反例一眼对照</text>

  <!-- column headers -->
  <text x="48" y="102" class="font hdr">真实进步信号</text>
  <text x="255" y="102" class="font hdr">工程抓手（落地手段）</text>
  <text x="485" y="102" class="font hdr">典型反例（demo 很好看）</text>

  <!-- row 1 cards -->
  <rect x="30" y="120" width="190" height="80" rx="12" class="card"/>
  <rect x="240" y="120" width="210" height="80" rx="12" class="card"/>
  <rect x="470" y="120" width="160" height="80" rx="12" class="card"/>

  <rect x="42" y="132" width="64" height="22" rx="11" fill="#2563EB"/>
  <text x="74" y="148" text-anchor="middle" class="font badge" fill="#ffffff">可控</text>
  <text x="42" y="174" class="font cellText">控制输入/输出边界</text>
  <text x="42" y="192" class="font cellText muted">避免“想当然”的自由输出</text>

  <text x="252" y="146" class="font cellTitle">任务边界 · 约束 · 隔离</text>
  <text x="252" y="166" class="font cellText">输入约束、输出格式、权限隔离</text>
  <text x="252" y="184" class="font cellText muted">让能力可预测、可治理</text>

  <rect x="482" y="132" width="50" height="22" rx="11" fill="#EA580C"/>
  <text x="507" y="148" text-anchor="middle" class="font badge" fill="#ffffff">反例</text>
  <text x="482" y="174" class="font cellText">“随便问啥都行”</text>
  <text x="482" y="192" class="font cellText muted">只有一个聊天框</text>

  <!-- connectors row 1 -->
  <path d="M220 160 C230 160, 232 160, 240 160" class="dash"/>
  <path d="M450 160 C460 160, 462 160, 470 160" class="dash"/>

  <!-- row 2 cards -->
  <rect x="30" y="215" width="190" height="80" rx="12" class="card"/>
  <rect x="240" y="215" width="210" height="80" rx="12" class="card"/>
  <rect x="470" y="215" width="160" height="80" rx="12" class="card"/>

  <rect x="42" y="227" width="64" height="22" rx="11" fill="#16A34A"/>
  <text x="74" y="243" text-anchor="middle" class="font badge" fill="#ffffff">可测</text>
  <text x="42" y="269" class="font cellText">知道好坏、能复现</text>
  <text x="42" y="287" class="font cellText muted">评测与监控闭环</text>

  <text x="252" y="241" class="font cellTitle">样本集 · 离线评测 · 监控</text>
  <text x="252" y="261" class="font cellText">失败样本集、离线指标、线上监控</text>
  <text x="252" y="279" class="font cellText muted">用数据说“变好/变坏”</text>

  <rect x="482" y="227" width="50" height="22" rx="11" fill="#EA580C"/>
  <text x="507" y="243" text-anchor="middle" class="font badge" fill="#ffffff">反例</text>
  <text x="482" y="269" class="font cellText">“用户说还行”</text>
  <text x="482" y="287" class="font cellText muted">没有可复现证据</text>

  <!-- connectors row 2 -->
  <path d="M220 255 C230 255, 232 255, 240 255" class="dash"/>
  <path d="M450 255 C460 255, 462 255, 470 255" class="dash"/>

  <!-- row 3 cards -->
  <rect x="30" y="310" width="190" height="70" rx="12" class="card"/>
  <rect x="240" y="310" width="210" height="70" rx="12" class="card"/>
  <rect x="470" y="310" width="160" height="70" rx="12" class="card"/>

  <rect x="42" y="322" width="64" height="22" rx="11" fill="#9333EA"/>
  <text x="74" y="338" text-anchor="middle" class="font badge" fill="#ffffff">可回滚</text>
  <text x="42" y="362" class="font cellText">出事能止血</text>
  <text x="42" y="378" class="font cellText muted">降低爆炸半径</text>

  <text x="252" y="336" class="font cellTitle">开关 · 降级 · 熔断 · 接管</text>
  <text x="252" y="356" class="font cellText">Feature flag、降级策略、限流、人工接管</text>

  <rect x="482" y="322" width="50" height="22" rx="11" fill="#EA580C"/>
  <text x="507" y="338" text-anchor="middle" class="font badge" fill="#ffffff">反例</text>
  <text x="482" y="362" class="font cellText">只能全站回滚</text>
  <text x="482" y="378" class="font cellText muted">无法快速止血</text>

  <!-- connectors row 3 -->
  <path d="M220 345 C230 345, 232 345, 240 345" class="dash"/>
  <path d="M450 345 C460 345, 462 345, 470 345" class="dash"/>
</svg>