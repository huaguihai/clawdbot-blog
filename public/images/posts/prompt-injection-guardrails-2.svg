<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/></filter><marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker><marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/></marker><marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/></marker><marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#9333EA"/></marker></defs><text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">Prompt Injection 不是只关乎安全</text><text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">当系统规则、用户目标、外部内容混进同一决策锅里，风险会从体验问题升级为动作风险</text><rect x="40" y="96" width="150" height="78" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="255" y="96" width="150" height="78" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="470" y="96" width="150" height="78" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="115" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">系统规则</text><text x="115" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">边界、权限、约束</text><text x="330" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">用户目标</text><text x="330" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">用户真正想完成的事</text><text x="545" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">外部内容</text><text x="545" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">网页、邮件、文档文本</text><rect x="180" y="214" width="300" height="92" rx="14" fill="#FFFFFF" stroke="#9333EA" stroke-width="2" filter="url(#shadow)"/><text x="330" y="242" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">Agent 决策层</text><text x="330" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">若三类输入未隔离，模型可能错误提升</text><text x="330" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">外部文本的优先级，把内容当命令</text><line x1="115" y1="174" x2="245" y2="214" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="330" y1="174" x2="330" y2="214" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><line x1="545" y1="174" x2="415" y2="214" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="58" y="330" width="240" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="362" y="330" width="240" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="178" y="348" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#D97706">先打到产品体验</text><text x="178" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">答歪、误导、偏离用户目标</text><text x="482" y="348" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#EA580C">再打到风险边界</text><text x="482" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">错误调用工具、接触数据、执行外部动作</text><line x1="280" y1="306" x2="210" y2="330" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><line x1="380" y1="306" x2="450" y2="330" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowPurple)"/><text x="330" y="389" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">核心结论：防护重点不是“提醒模型成熟一点”，而是从架构上限制外部内容影响权限与动作</text></svg>