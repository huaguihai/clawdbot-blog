<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/></marker></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">输入分层比混合拼接更安全</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">将系统规则、用户目标、外部内容分层，避免外部文本抢占指令权</text><rect x="60" y="102" width="540" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="76" y="118" width="10" height="32" rx="5" fill="#9333EA"/><text x="102" y="128" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">1. 系统规则</text><text x="102" y="149" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">高优先级、不可覆盖：隐私边界、外发限制、白名单工具</text><rect x="60" y="188" width="540" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="76" y="204" width="10" height="32" rx="5" fill="#2563EB"/><text x="102" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">2. 用户目标</text><text x="102" y="235" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">当前任务与输出要求：总结邮件、提取待办、按模板起草回复</text><rect x="60" y="274" width="540" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="76" y="290" width="10" height="32" rx="5" fill="#EA580C"/><text x="102" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">3. 外部内容</text><text x="102" y="321" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">仅供参考，不可当命令：网页、邮件正文、PDF、搜索结果、数据库备注</text><line x1="330" y1="166" x2="330" y2="188" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/><line x1="330" y1="252" x2="330" y2="274" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/><line x1="330" y1="338" x2="330" y2="356" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/><rect x="215" y="356" width="230" height="28" rx="10" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/><text x="330" y="374" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">工具调用决策：只由系统规则 + 用户请求决定</text><rect x="446" y="282" width="136" height="44" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.2"/><text x="514" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#9A3412">关键约束</text><text x="514" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#7C2D12">外部文本默认不可信</text></svg>