<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 700; fill: #111827; }
      .sub { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #6B7280; }
      .hdr { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 700; fill: #111827; }
      .txt { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #111827; }
      .pillText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; font-weight: 700; fill: #FFFFFF; }
      .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Title -->
  <text class="title" x="28" y="44">MTP 到底加速了什么？代价是什么？</text>
  <text class="sub" x="28" y="66">核心：用显存/算力换稳定输出阶段吞吐（tok/s），TTFT 未必变好</text>

  <!-- Column headers -->
  <g>
    <rect x="28" y="86" width="190" height="34" rx="10" fill="#2563EB"/>
    <text class="pillText" x="123" y="108" text-anchor="middle">你得到的（收益）</text>

    <rect x="235" y="86" width="190" height="34" rx="10" fill="#EA580C"/>
    <text class="pillText" x="330" y="108" text-anchor="middle">你付出的（代价）</text>

    <rect x="442" y="86" width="190" height="34" rx="10" fill="#16A34A"/>
    <text class="pillText" x="537" y="108" text-anchor="middle">怎么判断值不值（验证）</text>
  </g>

  <!-- Row cards: 1 -->
  <g>
    <rect class="card" x="28" y="136" width="190" height="74" rx="12"/>
    <text class="hdr" x="40" y="160">tok/s 上去</text>
    <text class="txt" x="40" y="180">长回答更顺畅</text>

    <rect class="card" x="235" y="136" width="190" height="74" rx="12"/>
    <text class="hdr" x="247" y="160">显存占用上升</text>
    <text class="txt" x="247" y="180">可能触发换页掉速</text>

    <rect class="card" x="442" y="136" width="190" height="74" rx="12"/>
    <text class="hdr" x="454" y="160">看是否开始换页</text>
    <text class="txt" x="454" y="180">以及吞吐是否反降</text>

    <!-- dashed connectors -->
    <path class="dash" d="M218 173 L235 173"/>
    <path class="dash" d="M425 173 L442 173"/>
  </g>

  <!-- Row cards: 2 -->
  <g>
    <rect class="card" x="28" y="226" width="190" height="74" rx="12"/>
    <text class="hdr" x="40" y="250">平均吞吐提高</text>
    <text class="txt" x="40" y="270">稳定输出阶段更快</text>

    <rect class="card" x="235" y="226" width="190" height="74" rx="12"/>
    <text class="hdr" x="247" y="250">质量轻微波动</text>
    <text class="txt" x="247" y="270">事实性/格式稳定性</text>

    <rect class="card" x="442" y="226" width="190" height="74" rx="12"/>
    <text class="hdr" x="454" y="250">固定 prompt 对比</text>
    <text class="txt" x="454" y="270">看事实与格式是否变差</text>

    <path class="dash" d="M218 263 L235 263"/>
    <path class="dash" d="M425 263 L442 263"/>
  </g>

  <!-- Row cards: 3 -->
  <g>
    <rect class="card" x="28" y="316" width="190" height="64" rx="12"/>
    <text class="hdr" x="40" y="342">更接近“可用”</text>
    <text class="txt" x="40" y="360">体验提升更明显</text>

    <rect class="card" x="235" y="316" width="190" height="64" rx="12"/>
    <text class="hdr" x="247" y="342">后端/版本不稳</text>
    <text class="txt" x="247" y="360">NaN、卡死、重试</text>

    <rect class="card" x="442" y="316" width="190" height="64" rx="12"/>
    <text class="hdr" x="454" y="342">盯日志与复现性</text>
    <text class="txt" x="454" y="360">异常重试与偶发事故</text>

    <path class="dash" d="M218 348 L235 348"/>
    <path class="dash" d="M425 348 L442 348"/>
  </g>

  <!-- Callout warning -->
  <g>
    <rect x="28" y="118" width="604" height="2" fill="#E5E7EB"/>
    <rect x="28" y="382" width="604" height="0" fill="#E5E7EB"/>
    <rect x="480" y="18" width="152" height="42" rx="12" fill="#D97706"/>
    <text class="pillText" x="556" y="42" text-anchor="middle">先稳定复现，再谈提速</text>
  </g>
</svg>