<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="36" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">医疗问答三层风险分流</text>
  <text x="36" y="66" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">先判断风险层级，再决定回答、追问、转人工</text>

  <rect x="36" y="92" width="438" height="84" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="92" width="10" height="84" rx="10" fill="#16A34A"/>
  <text x="58" y="118" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">低风险</text>
  <text x="58" y="141" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">常识解释、公开健康知识、就诊流程、术语释义</text>
  <text x="58" y="161" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">AI可做：通用信息、科普、就医准备清单</text>
  <text x="58" y="181" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">必须加：来源范围说明、非诊断提醒</text>

  <rect x="36" y="192" width="438" height="92" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="192" width="10" height="92" rx="10" fill="#D97706"/>
  <text x="58" y="218" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#D97706">中风险</text>
  <text x="58" y="241" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">轻症自我判断、观察建议、非处方药、症状持续时间</text>
  <text x="58" y="261" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">AI可做：一般性建议、提醒观察指标、建议咨询专业人士</text>
  <text x="58" y="281" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">必须加：明显提醒、追问关键信息、必要时引导人工</text>

  <rect x="36" y="300" width="438" height="84" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="300" width="10" height="84" rx="10" fill="#EA580C"/>
  <text x="58" y="326" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">高风险</text>
  <text x="58" y="349" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">处方药、剂量、孕妇儿童老人、慢病并发、急症征象</text>
  <text x="58" y="369" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">AI可做：仅风险识别与转介；必须强制转人工或建议立即就医</text>

  <rect x="506" y="108" width="118" height="52" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="565" y="129" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">允许直接回答</text>
  <text x="565" y="147" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">附非诊断提醒</text>

  <rect x="506" y="212" width="118" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="565" y="233" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">谨慎允许</text>
  <text x="565" y="251" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先追问再决定</text>

  <rect x="506" y="316" width="118" height="52" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="565" y="337" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">不允许</text>
  <text x="565" y="355" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">转人工/立即就医</text>

  <line x1="474" y1="134" x2="506" y2="134" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="474" y1="238" x2="506" y2="240" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="474" y1="342" x2="506" y2="342" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="410" y="24" width="214" height="44" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-dasharray="5 5"/>
  <text x="517" y="43" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">核心：把能力问题改成路由规则</text>
  <text x="517" y="59" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#475569">分类、拦截、转人工 比“更强模型”更关键</text>

  <rect x="382" y="352" width="242" height="30" rx="10" fill="#FEF2F2" stroke="#EA580C" stroke-dasharray="5 5"/>
  <text x="503" y="372" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">免责声明不是刹车，前置风控才是</text>
</svg>