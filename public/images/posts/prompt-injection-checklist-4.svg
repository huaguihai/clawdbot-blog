<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">个人开发者先补的 5 个低成本防线</text><text x="330" y="66" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">核心顺序：先控制上下文，再控制权限，最后保留复盘入口</text><line x1="85" y1="210" x2="575" y2="210" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/><rect x="35" y="120" width="110" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="47" y="132" width="38" height="8" rx="4" fill="#2563EB" opacity="0.18"/><circle cx="63" cy="160" r="14" fill="#DBEAFE"/><text x="63" y="165" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">1</text><text x="95" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">输入分层</text><text x="55" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">区分系统/工具/用户</text><line x1="145" y1="163" x2="175" y2="163" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="175" y="120" width="110" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="187" y="132" width="38" height="8" rx="4" fill="#16A34A" opacity="0.18"/><circle cx="203" cy="160" r="14" fill="#DCFCE7"/><text x="203" y="165" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">2</text><text x="235" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">工具白名单</text><text x="195" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">默认拒绝高风险能力</text><line x1="285" y1="163" x2="315" y2="163" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="315" y="120" width="110" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="327" y="132" width="38" height="8" rx="4" fill="#EA580C" opacity="0.18"/><circle cx="343" cy="160" r="14" fill="#FFEDD5"/><text x="343" y="165" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">3</text><text x="375" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">二次确认</text><text x="335" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">删除/转账/发信前确认</text><line x1="425" y1="163" x2="455" y2="163" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="455" y="120" width="110" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="467" y="132" width="38" height="8" rx="4" fill="#D97706" opacity="0.18"/><circle cx="483" cy="160" r="14" fill="#FEF3C7"/><text x="483" y="165" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">4</text><text x="515" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">外部内容降权</text><text x="475" y="184" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">网页/邮件/文档不直信</text><line x1="565" y1="163" x2="595" y2="163" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="275" y="250" width="110" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><rect x="287" y="262" width="38" height="8" rx="4" fill="#9333EA" opacity="0.18"/><circle cx="303" cy="290" r="14" fill="#F3E8FF"/><text x="303" y="295" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">5</text><text x="335" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#111827">日志回放</text><text x="295" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">保留排查与复盘入口</text><line x1="330" y1="210" x2="330" y2="250" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">策略摘要：上下文治理 → 权限收口 → 事后可追溯</text></svg>