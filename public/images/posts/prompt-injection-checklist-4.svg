<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.12"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">输入分层：把命令来源和资料来源拆开</text><rect x="36" y="72" width="180" height="66" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="126" y="100" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">系统规则</text><text x="126" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可信命令源</text><rect x="36" y="160" width="180" height="66" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="126" y="188" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">用户请求</text><text x="126" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">当前明确需求</text><rect x="36" y="248" width="180" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="126" y="276" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">外部资料与工具结果</text><text x="126" y="298" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 邮件 / 检索结果</text><text x="126" y="318" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">知识库 / 文档 / 工具返回</text><text x="126" y="340" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#EA580C">统一标记：不可信</text><rect x="266" y="120" width="158" height="190" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="345" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#9333EA">结构化输入层</text><line x1="292" y1="170" x2="398" y2="170" stroke="#E5E7EB" stroke-width="1"/><text x="345" y="195" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">rule</text><text x="345" y="220" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">user_request</text><text x="345" y="245" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">untrusted_context</text><text x="345" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">tool_output</text><text x="345" y="294" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">不要混成一个字符串</text><rect x="474" y="120" width="150" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="549" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">可执行命令</text><text x="549" y="175" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">只来自系统规则</text><text x="549" y="194" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">和用户明确请求</text><rect x="474" y="230" width="150" height="88" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="549" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#D97706">资料用途</text><text x="549" y="283" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">只能作为证据</text><text x="549" y="302" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不能反向改规则</text><line x1="216" y1="105" x2="266" y2="155" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="216" y1="193" x2="266" y2="205" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="216" y1="303" x2="266" y2="255" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="424" y1="185" x2="474" y2="164" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="424" y1="245" x2="474" y2="274" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 6"/><text x="330" y="372" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#4B5563">核心原则：先做输入分层，再谈 Prompt 防护</text></svg>