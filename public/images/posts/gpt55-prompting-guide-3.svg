<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; filter: url(#shadow); }
      .stroke { stroke: #E5E7EB; stroke-width: 1; }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .h { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 700; }
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #374151; }
      .small { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 11px; fill: #4B5563; }
      .dash { stroke: #9CA3AF; stroke-width: 1.5; stroke-dasharray: 6 6; fill: none; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="636" height="376" rx="12" class="bg"/>

  <!-- Title -->
  <text x="36" y="48" class="title">旧提示词为什么会突然“不稳定”？</text>
  <text x="36" y="70" class="small">本质：过去被模型脑补掩盖的问题，在更“照单执行”时被放大</text>

  <!-- Left column: Past -->
  <rect x="36" y="96" width="280" height="140" rx="12" class="card"/>
  <rect x="36" y="96" width="280" height="32" rx="12" fill="#2563EB" opacity="0.12"/>
  <text x="52" y="118" class="h" fill="#2563EB">过去：模型帮你脑补</text>

  <rect x="52" y="140" width="248" height="36" rx="10" fill="#FFFFFF" class="stroke"/>
  <text x="64" y="162" class="t">提示词写得糙 / 需求表达虚</text>

  <rect x="52" y="186" width="248" height="36" rx="10" fill="#FFFFFF" class="stroke"/>
  <text x="64" y="208" class="t">模型用经验补齐缺口</text>

  <!-- Right column: Now -->
  <rect x="344" y="96" width="280" height="140" rx="12" class="card"/>
  <rect x="344" y="96" width="280" height="32" rx="12" fill="#9333EA" opacity="0.12"/>
  <text x="360" y="118" class="h" fill="#9333EA">现在：执行更稳更字面</text>

  <rect x="360" y="140" width="248" height="36" rx="10" fill="#FFFFFF" class="stroke"/>
  <text x="372" y="162" class="t">提示词仍模糊 / 边界不清</text>

  <rect x="360" y="186" width="248" height="36" rx="10" fill="#FFFFFF" class="stroke"/>
  <text x="372" y="208" class="t">缺口被照单放大 → “不稳定”</text>

  <!-- Arrows between top cards -->
  <path d="M 176 176 C 240 176, 280 176, 332 176" class="dash"/>
  <polygon points="332,176 322,171 322,181" fill="#9CA3AF"/>
  <text x="240" y="168" class="small" text-anchor="middle">同一提示词</text>

  <!-- Bottom: Solution -->
  <rect x="36" y="258" width="588" height="110" rx="12" class="card"/>
  <rect x="36" y="258" width="588" height="32" rx="12" fill="#16A34A" opacity="0.12"/>
  <text x="52" y="280" class="h" fill="#16A34A">改进路径：把优化 prompt 当作需求管理</text>

  <rect x="52" y="302" width="172" height="48" rx="12" fill="#FFFFFF" class="stroke"/>
  <text x="66" y="322" class="t">把话说清楚</text>
  <text x="66" y="340" class="small">目标、输入、约束</text>

  <rect x="242" y="302" width="172" height="48" rx="12" fill="#FFFFFF" class="stroke"/>
  <text x="256" y="322" class="t">划责任边界</text>
  <text x="256" y="340" class="small">你提供什么，模型做什么</text>

  <rect x="432" y="302" width="192" height="48" rx="12" fill="#FFFFFF" class="stroke"/>
  <text x="446" y="322" class="t">写可验收格式（三层）</text>
  <text x="446" y="340" class="small">输出结构、检查点、示例</text>

  <!-- Down arrows from columns to solution -->
  <path d="M 176 236 C 176 246, 176 248, 176 258" class="dash"/>
  <polygon points="176,258 171,248 181,248" fill="#9CA3AF"/>

  <path d="M 484 236 C 484 246, 484 248, 484 258" class="dash"/>
  <polygon points="484,258 479,248 489,248" fill="#9CA3AF"/>

  <!-- Outcome tag -->
  <rect x="540" y="330" width="84" height="28" rx="14" fill="#EA580C" opacity="0.14"/>
  <text x="582" y="349" class="h" fill="#EA580C" text-anchor="middle">少返工</text>
</svg>