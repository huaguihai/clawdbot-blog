<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; fill:#374151; }
      .small { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11.5px; fill:#4B5563; }
      .dash { stroke:#9CA3AF; stroke-width:1.5; stroke-dasharray:5 5; fill:none; }
      .pill { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; font-weight:700; fill:#FFFFFF; }
    </style>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- center card -->
  <rect class="card" x="210" y="135" width="240" height="130" rx="12"/>
  <text class="title" x="330" y="165" text-anchor="middle">连接器使用清单</text>
  <text class="text" x="330" y="190" text-anchor="middle">把连接器当作“配置问题”</text>
  <text class="small" x="330" y="212" text-anchor="middle">说得清：权限 / 范围 / 问法</text>
  <rect x="258" y="230" width="144" height="26" rx="13" fill="#EA580C"/>
  <text class="pill" x="330" y="247" text-anchor="middle">核心提醒：上下文会变</text>

  <!-- nodes -->
  <!-- 1 minimal permission -->
  <rect class="card" x="30" y="40" width="190" height="62" rx="12"/>
  <rect x="30" y="40" width="8" height="62" rx="12" fill="#2563EB"/>
  <text class="text" x="48" y="65">权限最小化</text>
  <text class="small" x="48" y="85">优先只读，只连必要空间</text>

  <!-- 2 sensitive isolation -->
  <rect class="card" x="30" y="118" width="190" height="62" rx="12"/>
  <rect x="30" y="118" width="8" height="62" rx="12" fill="#9333EA"/>
  <text class="text" x="48" y="143">敏感库隔离</text>
  <text class="small" x="48" y="163">工资/密钥/隐私默认不连</text>

  <!-- 3 traceable citations -->
  <rect class="card" x="30" y="196" width="190" height="62" rx="12"/>
  <rect x="30" y="196" width="8" height="62" rx="12" fill="#16A34A"/>
  <text class="text" x="48" y="221">引用可追溯</text>
  <text class="small" x="48" y="241">文档名/链接/时间/频道</text>

  <!-- 4 time range -->
  <rect class="card" x="440" y="40" width="190" height="62" rx="12"/>
  <rect x="622" y="40" width="8" height="62" rx="12" fill="#D97706"/>
  <text class="text" x="458" y="65">时间范围明确</text>
  <text class="small" x="458" y="85">本周/上周/指定区间</text>

  <!-- 5 facts then advice -->
  <rect class="card" x="440" y="118" width="190" height="62" rx="12"/>
  <rect x="622" y="118" width="8" height="62" rx="12" fill="#16A34A"/>
  <text class="text" x="458" y="143">先事实，再建议</text>
  <text class="small" x="458" y="163">先列证据，再给行动项</text>

  <!-- 6 error feedback loop -->
  <rect class="card" x="440" y="196" width="190" height="62" rx="12"/>
  <rect x="622" y="196" width="8" height="62" rx="12" fill="#2563EB"/>
  <text class="text" x="458" y="221">建立错误回报动作</text>
  <text class="small" x="458" y="241">问题→来源→修正问法</text>

  <!-- 7 second confirmation -->
  <rect class="card" x="235" y="300" width="190" height="70" rx="12"/>
  <rect x="235" y="300" width="8" height="70" rx="12" fill="#EA580C"/>
  <text class="text" x="253" y="327">共享前二次确认</text>
  <text class="small" x="253" y="347">点开1-2个引用核对关键句</text>

  <!-- dashed connectors to center -->
  <path class="dash" d="M 220 71 C 250 90, 250 120, 260 145"/>
  <path class="dash" d="M 220 149 C 255 155, 255 165, 260 175"/>
  <path class="dash" d="M 220 227 C 250 220, 250 205, 260 195"/>

  <path class="dash" d="M 440 71 C 410 90, 410 120, 400 145"/>
  <path class="dash" d="M 440 149 C 405 155, 405 165, 400 175"/>
  <path class="dash" d="M 440 227 C 410 220, 410 205, 400 195"/>

  <path class="dash" d="M 330 300 C 330 285, 330 275, 330 265"/>

  <!-- warning callout mini -->
  <rect x="210" y="18" width="240" height="34" rx="10" fill="#FEF3C7" stroke="#F59E0B"/>
  <text class="small" x="330" y="40" text-anchor="middle" fill="#92400E">权限/空间变化 ⇒ 答案上下文可能已不同</text>
</svg>