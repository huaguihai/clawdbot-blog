<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><text x="330" y="36" text-anchor="middle" font-size="15" font-weight="700" fill="#1E293B">微调 Embedding vs Reranker 选型指南</text><rect x="30" y="60" width="180" height="100" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#s)"/><text x="120" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#2563EB">微调 Embedding</text><text x="120" y="108" text-anchor="middle" font-size="11" fill="#475569">适合「召回难」场景</text><text x="120" y="126" text-anchor="middle" font-size="10" fill="#64748B">行业黑话 / 同义词多</text><text x="120" y="142" text-anchor="middle" font-size="10" fill="#64748B">短文本字段（标题/标签）</text><rect x="450" y="60" width="180" height="100" rx="10" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#s)"/><text x="540" y="88" text-anchor="middle" font-size="12" font-weight="700" fill="#EA580C">强 Reranker</text><text x="540" y="108" text-anchor="middle" font-size="11" fill="#475569">适合「排序烂」场景</text><text x="540" y="126" text-anchor="middle" font-size="10" fill="#64748B">召回已足够</text><text x="540" y="142" text-anchor="middle" font-size="10" fill="#64748B">但结果排序不理想</text><line x1="210" y1="110" x2="450" y2="110" stroke="#CBD5E1" stroke-width="1.5" stroke-dasharray="6 4"/><text x="330" y="106" text-anchor="middle" font-size="11" fill="#94A3B8">vs</text><rect x="130" y="210" width="400" height="140" rx="12" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5" filter="url(#s)"/><text x="330" y="236" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">最稳妥工程组合</text><rect x="155" y="252" width="140" height="52" rx="8" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/><text x="225" y="274" text-anchor="middle" font-size="11" font-weight="600" fill="#2563EB">轻量微调 Embedding</text><text x="225" y="292" text-anchor="middle" font-size="10" fill="#64748B">召回阶段 — 