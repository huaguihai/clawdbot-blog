<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill: #FAFAFA; }
      .card { fill: #FFFFFF; filter: url(#shadow); }
      .title { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 16px; font-weight: 700; fill: #111827; }
      .text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; fill: #374151; }
      .muted { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #6B7280; }
      .line { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .badgeText { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; fill: #FFFFFF; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text class="title" x="34" y="52">别再吐 0.x 老骨架：用提示词强制 Starlette 1.0</text>
  <text class="muted" x="34" y="74">核心：先写清“合同”，再用检查清单验收输出</text>

  <!-- Left flow cards -->
  <!-- Card 1: Prompt -->
  <rect class="card" x="34" y="105" width="330" height="70" rx="12"/>
  <circle cx="58" cy="140" r="16" fill="#2563EB"/>
  <text class="badgeText" x="54" y="144">1</text>
  <text class="text" x="86" y="132">贴入提示词（版本约束写死）</text>
  <text class="muted" x="86" y="152">强调：Starlette 1.0、单文件、lifespan、路由</text>

  <!-- Card 2: Generate -->
  <rect class="card" x="34" y="195" width="330" height="70" rx="12"/>
  <circle cx="58" cy="230" r="16" fill="#9333EA"/>
  <text class="badgeText" x="54" y="234">2</text>
  <text class="text" x="86" y="222">模型生成可运行 app.py</text>
  <text class="muted" x="86" y="242">并附 uvicorn 启动命令</text>

  <!-- Card 3: Verify -->
  <rect class="card" x="34" y="285" width="330" height="70" rx="12"/>
  <circle cx="58" cy="320" r="16" fill="#16A34A"/>
  <text class="badgeText" x="54" y="324">3</text>
  <text class="text" x="86" y="312">生成后验收（扫一眼）</text>
  <text class="muted" x="86" y="332">防止“口头 1.0，手上混 0.x”</text>

  <!-- Dashed arrows between left cards -->
  <path class="line" d="M 199 175 L 199 195"/>
  <path class="line" d="M 199 265 L 199 285"/>

  <!-- Right checklist card -->
  <rect class="card" x="392" y="105" width="224" height="250" rx="12"/>
  <text class="text" x="412" y="136" style="font-weight:700; fill:#111827;">验收清单（关键点）</text>

  <!-- Checklist items with colored bullets -->
  <circle cx="412" cy="162" r="6" fill="#EA580C"/>
  <text class="text" x="426" y="166">没有 on_startup / on_shutdown</text>

  <circle cx="412" cy="190" r="6" fill="#2563EB"/>
  <text class="text" x="426" y="194">必须使用 lifespan（async + yield）</text>

  <circle cx="412" cy="218" r="6" fill="#16A34A"/>
  <text class="text" x="426" y="222">资源放 app.state，清理在 finally</text>

  <circle cx="412" cy="246" r="6" fill="#9333EA"/>
  <text class="text" x="426" y="250">路由齐全：/health(GET)、/webhook(POST)</text>

  <circle cx="412" cy="274" r="6" fill="#D97706"/>
  <text class="text" x="426" y="278">单文件 app.py + 启动命令</text>

  <!-- Connector from verify card to checklist -->
  <path class="line" d="M 364 320 C 388 320, 372 230, 392 230"/>

  <!-- Footer hint -->
  <text class="muted" x="34" y="372">提示：不同模型服从版本约束的程度不同，验收是“最后一道保险”</text>
</svg>