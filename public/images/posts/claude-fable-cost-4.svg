<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">什么时候用便宜模型，什么时候上强模型</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心判断：任务复杂度、上下文长度、返工代价、工具回合数</text><rect x="40" y="90" width="170" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="125" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">低复杂度</text><text x="125" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">短上下文</text><text x="125" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">便宜模型优先</text><text x="125" y="184" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">错了补一句就能修</text><rect x="245" y="90" width="170" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><text x="330" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">低复杂度</text><text x="330" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">长上下文</text><text x="330" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#D97706">先小样本测试</text><text x="330" y="184" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">警惕返工放大成本</text><rect x="450" y="90" width="170" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="535" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">高复杂度</text><text x="535" y="144" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">短上下文</text><text x="535" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333EA">强模型 low effort</text><text x="535" y="184" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">看能否一轮命中</text><rect x="140" y="225" width="170" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="225" y="253" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">高复杂度</text><text x="225" y="279" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">长上下文</text><text x="225" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333EA">强模型起步</text><text x="225" y="319" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">首次质量更重要</text><rect x="350" y="225" width="220" height="110" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#BBF7D0"/><text x="460" y="253" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">多工具 Agent</text><text x="460" y="279" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">多轮调用 / 多错误分支</text><text x="460" y="299" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">强模型优先</text><text x="460" y="319" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">必要时再提升 effort</text><line x1="125" y1="200" x2="330" y2="225" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="200" x2="330" y2="225" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="535" y1="200" x2="460" y2="225" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="70" y="348" width="520" height="34" rx="10" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/><text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">真正影响总成本的关键：不是单次价格，而是错误是否引发第2、3、4次调用</text></svg>