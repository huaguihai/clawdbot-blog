<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#94A3B8"/>
    </marker>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">代理权限默认值：三道闸</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心思路：不是给不给权限，而是分三次给权限</text>

  <line x1="210" y1="205" x2="235" y2="205" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="425" y1="205" x2="450" y2="205" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="30" y="95" width="180" height="220" rx="16" fill="#FFFFFF"/>
    <rect x="30" y="95" width="180" height="44" rx="16" fill="#DBEAFE"/>
    <circle cx="58" cy="117" r="14" fill="#2563EB"/>
    <text x="58" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text>
    <text x="82" y="122" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">沙箱隔离</text>

    <text x="48" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">文件</text>
    <text x="48" y="183" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">仅挂载工作目录</text>
    <text x="48" y="201" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">禁 SSH、凭证目录</text>

    <text x="48" y="233" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">网络</text>
    <text x="48" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">默认禁网</text>
    <text x="48" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">放行仅限允许域名</text>

    <text x="48" y="304" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">进程</text>
    <text x="48" y="325" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">限制可执行命令类型</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="95" width="180" height="220" rx="16" fill="#FFFFFF"/>
    <rect x="240" y="95" width="180" height="44" rx="16" fill="#FEE2E2"/>
    <circle cx="268" cy="117" r="14" fill="#EA580C"/>
    <text x="268" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text>
    <text x="292" y="122" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9A3412">分级权限</text>

    <rect x="258" y="155" width="144" height="36" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.2"/>
    <text x="330" y="177" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">低风险：自动允许</text>

    <rect x="258" y="203" width="144" height="40" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.2"/>
    <text x="330" y="220" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9A3412">中风险：允许但留痕</text>
    <text x="330" y="236" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#9A3412">如 PR、固定来源下载</text>

    <rect x="258" y="255" width="144" height="42" rx="10" fill="#FAE8FF" stroke="#9333EA" stroke-width="1.2"/>
    <text x="330" y="272" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B21A8">高风险：人工审批</text>
    <text x="330" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B21A8">推 main、发版、部署、迁库</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="450" y="95" width="180" height="220" rx="16" fill="#FFFFFF"/>
    <rect x="450" y="95" width="180" height="44" rx="16" fill="#DCFCE7"/>
    <circle cx="478" cy="117" r="14" fill="#16A34A"/>
    <text x="478" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text>
    <text x="502" y="122" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#166534">密钥最小暴露</text>

    <text x="468" y="166" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">短期</text>
    <text x="468" y="186" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">临时令牌，分钟到小时级过期</text>

    <text x="468" y="220" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">最小权限</text>
    <text x="468" y="240" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">只给任务所需那部分能力</text>

    <text x="468" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">不落盘</text>
    <text x="468" y="294" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">仅运行时注入，禁写日志和产物</text>
  </g>

  <rect x="120" y="336" width="420" height="40" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="330" y="361" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">结果：低风险自动化，高风险需签字，密钥始终短期且最小暴露</text>
</svg>