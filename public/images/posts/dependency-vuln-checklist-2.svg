<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 660 400'>
  <defs>
    <filter id='shadow' x='-20%' y='-20%' width='140%' height='140%'>
      <feDropShadow dx='0' dy='1' stdDeviation='1.5' flood-color='#000000' flood-opacity='0.15'/>
    </filter>
    <marker id='arrowBlue' markerWidth='10' markerHeight='10' refX='10' refY='5' orient='auto'>
      <path d='M0,0 L10,5 L0,10 z' fill='#2563EB'/>
    </marker>
    <marker id='arrowGreen' markerWidth='10' markerHeight='10' refX='10' refY='5' orient='auto'>
      <path d='M0,0 L10,5 L0,10 z' fill='#16A34A'/>
    </marker>
    <marker id='arrowOrange' markerWidth='10' markerHeight='10' refX='10' refY='5' orient='auto'>
      <path d='M0,0 L10,5 L0,10 z' fill='#EA580C'/>
    </marker>
    <style>
      text { font-family: -apple-system, 'Segoe UI', sans-serif; }
    </style>
  </defs>

  <rect x='0' y='0' width='660' height='400' rx='12' fill='#FAFAFA'/>

  <!-- Title -->
  <text x='330' y='36' text-anchor='middle' font-size='20' font-weight='700' fill='#2563EB'>OSV.dev：发版前的体检单</text>
  <text x='330' y='58' text-anchor='middle' font-size='12' fill='#6B7280'>输入依赖 → 查询漏洞 → 输出影响与修复 → 团队决策</text>

  <!-- Input cards -->
  <g filter='url(#shadow)'>
    <rect x='30' y='90' width='180' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='50' cy='118' r='8' fill='#9333EA'/>
  <text x='66' y='114' font-size='14' font-weight='600' fill='#111827'>包名</text>
  <text x='66' y='132' font-size='12' fill='#6B7280'>例如：lodash</text>

  <g filter='url(#shadow)'>
    <rect x='30' y='160' width='180' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='50' cy='188' r='8' fill='#9333EA'/>
  <text x='66' y='184' font-size='14' font-weight='600' fill='#111827'>版本</text>
  <text x='66' y='202' font-size='12' fill='#6B7280'>例如：4.17.21</text>

  <g filter='url(#shadow)'>
    <rect x='30' y='230' width='180' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='50' cy='258' r='8' fill='#9333EA'/>
  <text x='66' y='254' font-size='14' font-weight='600' fill='#111827'>依赖清单</text>
  <text x='66' y='272' font-size='12' fill='#6B7280'>package-lock.json 等</text>

  <!-- Center: OSV.dev card -->
  <g filter='url(#shadow)'>
    <rect x='245' y='120' width='170' height='120' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='260' cy='145' r='10' fill='#2563EB'/>
  <text x='278' y='150' font-size='14' font-weight='700' fill='#111827'>OSV.dev 查询</text>
  <text x='260' y='176' font-size='12' fill='#6B7280'>匹配已知漏洞数据库</text>
  <text x='260' y='196' font-size='12' fill='#6B7280'>输出受影响范围与修复建议</text>

  <!-- Output cards -->
  <g filter='url(#shadow)'>
    <rect x='470' y='90' width='160' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='486' cy='118' r='8' fill='#16A34A'/>
  <text x='502' y='114' font-size='14' font-weight='600' fill='#111827'>已知漏洞列表</text>
  <text x='502' y='132' font-size='12' fill='#6B7280'>CVE/OSV-ID 等</text>

  <g filter='url(#shadow)'>
    <rect x='470' y='160' width='160' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='486' cy='188' r='8' fill='#16A34A'/>
  <text x='502' y='184' font-size='14' font-weight='600' fill='#111827'>受影响版本范围</text>
  <text x='502' y='202' font-size='12' fill='#6B7280'><, <=, >= 规则</text>

  <g filter='url(#shadow)'>
    <rect x='470' y='230' width='160' height='56' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='486' cy='258' r='8' fill='#16A34A'/>
  <text x='502' y='254' font-size='14' font-weight='600' fill='#111827'>修复版本/建议</text>
  <text x='502' y='272' font-size='12' fill='#6B7280'>可升级到的版本</text>

  <!-- Decision card (not a judge) -->
  <g filter='url(#shadow)'>
    <rect x='180' y='300' width='300' height='70' rx='12' fill='#FFFFFF'/>
  </g>
  <circle cx='200' cy='320' r='9' fill='#EA580C'/>
  <text x='216' y='325' font-size='14' font-weight='700' fill='#111827'>不是最终裁判：团队需决策</text>
  <text x='200' y='345' font-size='12' fill='#6B7280'>结合场景、部位与风险评估是否立刻处理</text>

  <!-- Dashed connectors -->
  <line x1='210' y1='118' x2='245' y2='150' stroke='#2563EB' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowBlue)'/>
  <line x1='210' y1='188' x2='245' y2='180' stroke='#2563EB' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowBlue)'/>
  <line x1='210' y1='258' x2='245' y2='210' stroke='#2563EB' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowBlue)'/>

  <line x1='415' y1='160' x2='470' y2='118' stroke='#16A34A' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowGreen)'/>
  <line x1='415' y1='180' x2='470' y2='188' stroke='#16A34A' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowGreen)'/>
  <line x1='415' y1='200' x2='470' y2='258' stroke='#16A34A' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowGreen)'/>

  <line x1='330' y1='240' x2='330' y2='300' stroke='#EA580C' stroke-width='2' stroke-dasharray='6,6' marker-end='url(#arrowOrange)'/>

  <!-- Legend note -->
  <text x='30' y='380' font-size='11' fill='#6B7280'>提示：把 OSV.dev 当作“体检单”而非“裁判”，先发现问题，再理性决策。</text>
</svg>