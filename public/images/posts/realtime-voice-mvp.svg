<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">这波语音 API，值不值得现在动手？</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">核心判断：别贪大，把语音塞进已有流程，替掉最烦、最慢的一步</text>

  <rect x="230" y="82" width="200" height="54" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="104" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">先看场景，再选能力</text>
  <text x="330" y="124" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不是做“会聊天的 AI”，而是做“更快完成任务”</text>

  <line x1="330" y1="136" x2="140" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="136" x2="330" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="136" x2="520" y2="170" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="170" width="200" height="138" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="56" y="186" width="92" height="28" rx="14" fill="#DBEAFE"/>
  <text x="102" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#2563EB">实时语音</text>
  <text x="56" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">适合：</text>
  <text x="56" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">边说边反馈、强交互产品</text>
  <text x="56" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">如陪练、口语助手、实时客服</text>
  <text x="56" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">开发复杂度较高</text>

  <rect x="230" y="170" width="200" height="138" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="246" y="186" width="104" height="28" rx="14" fill="#DCFCE7"/>
  <text x="298" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#16A34A">语音转文字</text>
  <text x="246" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">适合：</text>
  <text x="246" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">先记录，再整理的产品</text>
  <text x="246" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">如会议纪要、灵感采集、访谈整理</text>
  <text x="246" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">更容易两周做出 MVP</text>

  <rect x="420" y="170" width="200" height="138" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="436" y="186" width="92" height="28" rx="14" fill="#F3E8FF"/>
  <text x="482" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">语音翻译</text>
  <text x="436" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">适合：</text>
  <text x="436" y="255" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">双方都想完成任务，不必闲聊</text>
  <text x="436" y="278" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">如跨语种服务、旅行、接待场景</text>
  <text x="436" y="298" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">目标更窄，验收更清楚</text>

  <rect x="72" y="330" width="516" height="46" rx="14" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <circle cx="96" cy="353" r="10" fill="#D97706"/>
  <text x="96" y="357" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">!</text>
  <text x="116" y="348" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9A3412">MVP 建议</text>
  <text x="116" y="366" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">优先从“语音转文字”或“语音翻译”切入，实时语音通常更适合第二阶段再做。</text>
</svg>