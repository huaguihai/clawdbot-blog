<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#FAFAFA;}
      .card{fill:#FFFFFF;filter:url(#shadow);}
      .t{font-family:-apple-system,'Segoe UI',sans-serif;fill:#111827;}
      .muted{fill:#6B7280;}
      .line{stroke:#9CA3AF;stroke-width:2;stroke-dasharray:6 6;fill:none;}
      .badgeText{font-family:-apple-system,'Segoe UI',sans-serif;fill:#FFFFFF;font-weight:700;}
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" class="bg"/>

  <!-- Title -->
  <text x="330" y="44" text-anchor="middle" class="t" font-size="18" font-weight="700">先把三类能力分清：你到底在买什么？</text>
  <text x="330" y="68" text-anchor="middle" class="t muted" font-size="12">同样是语音相关，但购买的“能力”不同</text>

  <!-- Cards -->
  <!-- Card 1: Realtime -->
  <rect x="36" y="98" width="188" height="230" rx="14" class="card"/>
  <rect x="52" y="116" width="156" height="28" rx="14" fill="#2563EB"/>
  <text x="130" y="135" text-anchor="middle" class="badgeText" font-size="12">GPT-Realtime</text>
  <text x="52" y="168" class="t" font-size="13" font-weight="700">你买的是：</text>
  <text x="52" y="190" class="t" font-size="12">边听边想边回</text>
  <text x="52" y="220" class="t" font-size="13" font-weight="700">适合：</text>
  <text x="52" y="242" class="t" font-size="12">实时对话 / 流式理解</text>
  <text x="52" y="262" class="t" font-size="12">人机交互即时反馈</text>
  <text x="52" y="296" class="t muted" font-size="11">关键词：低延迟、互动</text>

  <!-- Card 2: Whisper -->
  <rect x="236" y="98" width="188" height="230" rx="14" class="card"/>
  <rect x="252" y="116" width="156" height="28" rx="14" fill="#16A34A"/>
  <text x="330" y="135" text-anchor="middle" class="badgeText" font-size="12">Whisper</text>
  <text x="252" y="168" class="t" font-size="13" font-weight="700">你买的是：</text>
  <text x="252" y="190" class="t" font-size="12">把一段音频尽量转对</text>
  <text x="252" y="220" class="t" font-size="13" font-weight="700">适合：</text>
  <text x="252" y="242" class="t" font-size="12">离线转写 / 异步转写</text>
  <text x="252" y="262" class="t" font-size="12">批量、事后处理</text>
  <text x="252" y="296" class="t muted" font-size="11">关键词：准确率、吞吐</text>

  <!-- Card 3: Translate -->
  <rect x="436" y="98" width="188" height="230" rx="14" class="card"/>
  <rect x="452" y="116" width="156" height="28" rx="14" fill="#EA580C"/>
  <text x="530" y="135" text-anchor="middle" class="badgeText" font-size="12">Translate</text>
  <text x="452" y="168" class="t" font-size="13" font-weight="700">你买的是：</text>
  <text x="452" y="190" class="t" font-size="12">跨语种可读 / 可用</text>
  <text x="452" y="220" class="t" font-size="13" font-weight="700">不等于：</text>
  <text x="452" y="242" class="t" font-size="12">转写（speech-to-text）</text>
  <text x="452" y="262" class="t" font-size="12">实时互动（realtime）</text>
  <text x="452" y="296" class="t muted" font-size="11">关键词：语种迁移</text>

  <!-- Separators / relation hints -->
  <path d="M 224 214 C 240 214, 220 214, 236 214" class="line"/>
  <path d="M 424 214 C 440 214, 420 214, 436 214" class="line"/>

  <!-- Bottom hint -->
  <rect x="36" y="342" width="588" height="40" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="52" y="366" class="t" font-size="12">
    选择原则：先定“实时互动 / 离线转写 / 跨语种翻译”，再选对应指南与 API
  </text>
</svg>