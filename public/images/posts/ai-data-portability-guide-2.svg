<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">数据可迁移不只是导出按钮</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">真正建立用户信任，需要四块能力一起成立</text>

  <rect x="240" y="145" width="180" height="110" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/>
  <text x="330" y="178" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">数据可迁移</text>
  <text x="330" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">不只是“能导出”</text>
  <text x="330" y="226" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">更是可理解、可导入、可删除</text>

  <line x1="330" y1="145" x2="330" y2="108" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="420" y1="200" x2="480" y2="200" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="255" x2="330" y2="300" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="240" y1="200" x2="180" y2="200" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="225" y="84" width="210" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/>
  <circle cx="249" cy="106" r="8" fill="#2563EB"/>
  <text x="267" y="102" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1F2937">导出格式</text>
  <text x="267" y="119" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">导得出，结构清晰可读</text>

  <rect x="468" y="178" width="146" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FCD7AA"/>
  <circle cx="490" cy="200" r="8" fill="#EA580C"/>
  <text x="508" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1F2937">导入映射</text>
  <text x="508" y="213" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">搬过去不变形</text>

  <rect x="222" y="300" width="216" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/>
  <circle cx="246" cy="322" r="8" fill="#16A34A"/>
  <text x="264" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1F2937">删除流程</text>
  <text x="264" y="335" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">反悔后能清掉，删得干净</text>

  <rect x="50" y="178" width="146" height="44" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/>
  <circle cx="72" cy="200" r="8" fill="#9333EA"/>
  <text x="90" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1F2937">隐私告知</text>
  <text x="90" y="213" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">你会拿我的东西做什么</text>

  <rect x="120" y="352" width="420" height="28" rx="10" fill="#FEF3C7"/>
  <text x="330" y="371" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#D97706">少一块，用户都难以真正信任产品</text>
</svg>