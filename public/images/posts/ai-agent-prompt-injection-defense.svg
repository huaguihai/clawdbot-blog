<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' fill='#FAFAFA' rx='12'/><text x='330' y='40' font-family='-apple-system, Segoe UI, sans-serif' font-size='20' font-weight='bold' fill='#1F2937' text-anchor='middle'>提示词注入 vs. 越狱：核心差异对比</text><rect x='40' y='70' width='270' height='300' rx='10' fill='#FFFFFF' stroke='#EA580C' stroke-width='1' style='filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05))'/><path d='M175 100c-15 0-20 10-20 10v15h40v-15s-5-10-20-10zM145 125h60v40h-60z' fill='none' stroke='#EA580C' stroke-width='2'/><circle cx='175' cy='145' r='3' fill='#EA580C'/><text x='175' y='195' font-family='-apple-system, Segoe UI, sans-serif' font-size='18' font-weight='bold' fill='#EA580C' text-anchor='middle'>越狱 (Jailbreak)</text><line x1='70' y1='215' x2='280' y2='215' stroke='#F3F4F6' stroke-width='1'/><text x='60' y='245' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>目标：突破道德与内容安全护栏</text><text x='60' y='275' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>手段：角色扮演、情感诱导</text><text x='60' y='305' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>后果：输出有害/违规文本内容</text><text x='60' y='335' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>重点：针对模型“价值观”的攻击</text><rect x='350' y='70' width='270' height='300' rx='10' fill='#FFFFFF' stroke='#2563EB' stroke-width='1' style='filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05))'/><path d='M485 100l-20 30h15v30h10v-30h15z' fill='#2563EB'/><text x='485' y='195' font-family='-apple-system, Segoe UI, sans-serif' font-size='18' font-weight='bold' fill='#2563EB' text-anchor='middle'>注入 (Injection)</text><line x1='380' y1='215' x2='590' y2='215' stroke='#F3F4F6' stroke-width='1'/><text x='370' y='245' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>目标：篡改原始指令，夺取控制权</text><text x='370' y='275' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>手段：伪装指令、覆盖系统上下文</text><text x='370' y='305' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>后果：泄露隐私、非法调用外部工具</text><text x='370' y='335' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563'>重点：针对 Agent “执行逻辑”的攻击</text><path d='M310 220l40 0' stroke='#94A3B8' stroke-width='2' stroke-dasharray='4' fill='none'/><text x='330' y='210' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#94A3B8' text-anchor='middle'>VS</text></svg>