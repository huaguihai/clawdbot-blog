<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <text x="330" y="26" text-anchor="middle" font-size="18" font-weight="600" fill="#111827" font-family="-apple-system, 'Segoe UI', sans-serif">OSV.dev 漏洞初筛流程</text>

  <!-- Card 1: OSV 搜索 -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="180" height="70" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="40" y="60" width="6" height="70" rx="10" fill="#2563EB"/>
  </g>
  <text x="56" y="82" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">在 OSV.dev 搜索</text>
  <text x="56" y="104" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">输入包名/生态/版本</text>

  <!-- Connector 1 -->
  <line x1="220" y1="95" x2="240" y2="95" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Card 2: 三个字段 -->
  <g filter="url(#shadow)">
    <rect x="240" y="50" width="190" height="110" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="240" y="50" width="6" height="110" rx="10" fill="#D97706"/>
  </g>
  <text x="256" y="74" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#D97706">重点看 3 个字段</text>
  <text x="256" y="96" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#111827">
    <tspan x="256" dy="0">- 影响版本范围</tspan>
    <tspan x="256" dy="18">- 修复版本</tspan>
    <tspan x="256" dy="18">- 触发条件</tspan>
  </text>

  <!-- Connector 2 -->
  <line x1="430" y1="105" x2="450" y2="105" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- Card 3: 关键问题 -->
  <g filter="url(#shadow)">
    <rect x="450" y="50" width="170" height="110" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="450" y="50" width="6" height="110" rx="10" fill="#9333EA"/>
  </g>
  <text x="466" y="74" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333EA">关键问题</text>
  <text x="466" y="98" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#111827">
    <tspan x="466" dy="0">你的项目会走到</tspan>
    <tspan x="466" dy="18">触发路径吗？</tspan>
  </text>

  <!-- Section label for tips -->
  <text x="330" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#111827">常见误区 → 正确动作</text>

  <!-- Tips Card 1 -->
  <g filter="url(#shadow)">
    <rect x="40" y="180" width="280" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="40" y="180" width="6" height="80" rx="10" fill="#EA580C"/>
  </g>
  <text x="56" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#EA580C">“高危” ≠ 项目一定中招</text>
  <text x="56" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">动作：核对是否使用相关功能</text>

  <!-- Tips Card 2 -->
  <g filter="url(#shadow)">
    <rect x="340" y="180" width="280" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="340" y="180" width="6" height="80" rx="10" fill="#EA580C"/>
  </g>
  <text x="356" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#EA580C">有修复版本 ≠ 直接无脑升级</text>
  <text x="356" y="226" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">动作：先评估破坏性变更</text>

  <!-- Tips Card 3 -->
  <g filter="url(#shadow)">
    <rect x="40" y="280" width="280" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="40" y="280" width="6" height="80" rx="10" fill="#EA580C"/>
  </g>
  <text x="56" y="304" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#EA580C">没有修复版本 ≠ 必须停发</text>
  <text x="56" y="326" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">动作：配置/禁用入口/替换库规避</text>

  <!-- Tips Card 4 -->
  <g filter="url(#shadow)">
    <rect x="340" y="280" width="280" height="80" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="340" y="280" width="6" height="80" rx="10" fill="#EA580C"/>
  </g>
  <text x="356" y="304" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#EA580C">漏洞描述抽象 ≠ 风险小</text>
  <text x="356" y="326" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">动作：查官方公告与受影响条件</text>
</svg>