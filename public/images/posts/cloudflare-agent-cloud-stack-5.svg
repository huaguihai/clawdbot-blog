<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="36" y="40" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Cloudflare 起步：先做单租户最小闭环</text>
  <text x="36" y="64" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先跑通“接请求 → 执行任务 → 存证据 → 可回放”，再逐步增强多租户与治理能力</text>

  <rect x="34" y="90" width="470" height="222" rx="16" fill="#F8FAFC" stroke="#E5E7EB"/>
  <text x="52" y="116" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">第一阶段：最小可运营闭环</text>

  <rect x="54" y="140" width="120" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="54" y="140" width="120" height="8" rx="14" fill="#2563EB"/>
  <text x="114" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">Workers</text>
  <text x="114" y="190" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">接请求</text>
  <text x="114" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">下发 jobId</text>

  <rect x="198" y="140" width="120" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="198" y="140" width="120" height="8" rx="14" fill="#9333EA"/>
  <text x="258" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">Durable Objects</text>
  <text x="258" y="190" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">任务状态</text>
  <text x="258" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">步骤进度</text>

  <rect x="342" y="140" width="120" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="342" y="140" width="120" height="8" rx="14" fill="#EA580C"/>
  <text x="402" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">Queues</text>
  <text x="402" y="190" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">异步执行</text>
  <text x="402" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">长任务</text>

  <rect x="126" y="234" width="120" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="126" y="234" width="120" height="8" rx="14" fill="#16A34A"/>
  <text x="186" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">R2</text>
  <text x="186" y="284" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">artifacts</text>
  <text x="186" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">证据链存储</text>

  <rect x="270" y="234" width="160" height="74" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="270" y="234" width="160" height="8" rx="14" fill="#D97706"/>
  <text x="350" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">日志 + 任务详情页</text>
  <text x="350" y="284" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">查 job / 看每步</text>
  <text x="350" y="300" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">点重放 / 可回放</text>

  <line x1="174" y1="177" x2="198" y2="177" stroke="#2563EB" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="318" y1="177" x2="342" y2="177" stroke="#2563EB" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="402" y1="214" x2="402" y2="234" stroke="#EA580C" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <line x1="342" y1="271" x2="246" y2="271" stroke="#16A34A" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
  <line x1="258" y1="214" x2="258" y2="271" stroke="#9333EA" stroke-width="2.2" stroke-dasharray="6 6"/>
  <line x1="258" y1="271" x2="270" y2="271" stroke="#9333EA" stroke-width="2.2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="524" y="90" width="102" height="222" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="575" y="116" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">第二阶段再加</text>

  <circle cx="544" cy="144" r="5" fill="#2563EB"/>
  <text x="556" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">多租户隔离</text>

  <circle cx="544" cy="176" r="5" fill="#9333EA"/>
  <text x="556" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">细粒度权限</text>

  <circle cx="544" cy="208" r="5" fill="#EA580C"/>
  <text x="556" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">预算系统</text>

  <circle cx="544" cy="240" r="5" fill="#16A34A"/>
  <text x="556" y="244" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">灰度发布</text>

  <circle cx="544" cy="272" r="5" fill="#D97706"/>
  <text x="556" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">回放评估</text>

  <line x1="504" y1="201" x2="524" y2="201" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="34" y="330" width="592" height="42" rx="12" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="52" y="356" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1E3A8A">建议的第一小步：把一个常见任务拆成 3–5 个 step，并记录每步输入、工具参数 hash、产物引用、成本。</text>
</svg>