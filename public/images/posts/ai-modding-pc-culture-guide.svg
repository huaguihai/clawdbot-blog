<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' font-family='-apple-system, Segoe UI, sans-serif' font-size='20' font-weight='bold' fill='#1F2937' text-anchor='middle'>AI Modding：从“订阅用户”到“硬件玩家”</text><rect x='40' y='70' width='280' height='40' rx='6' fill='#DBEAFE'/><text x='180' y='96' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#1E40AF' text-anchor='middle'>传统 AI 思路 (原厂模式)</text><rect x='340' y='70' width='280' height='40' rx='6' fill='#FFEDD5'/><text x='480' y='96' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#9A3412' text-anchor='middle'>AI Modding 思路 (魔改模式)</text><g transform='translate(0, 130)'><rect x='40' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><text x='55' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#2563EB'>算力：付费订阅</text><text x='55' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>依赖官方 Token 计费，成本不可控</text><rect x='340' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#EA580C' stroke-width='2'/><text x='355' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#EA580C'>算力：本地集群</text><text x='355' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>多卡并联 / 闲置算力，极致压低成本</text></g><g transform='translate(0, 215)'><rect x='40' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><text x='55' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#2563EB'>通信：官方插件</text><text x='55' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>功能受限，等待官方生态更新</text><rect x='340' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#EA580C' stroke-width='2'/><text x='355' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#EA580C'>通信：MCP 协议魔改</text><text x='355' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>打破孤岛，实现跨软件自由自动化</text></g><g transform='translate(0, 300)'><rect x='40' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#E5E7EB' stroke-width='1'/><text x='55' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#2563EB'>存储：暴力上下文</text><text x='55' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>往对话框塞文档，容易爆显存/遗忘</text><rect x='340' y='0' width='280' height='70' rx='8' fill='#FFFFFF' stroke='#EA580C' stroke-width='2'/><text x='355' y='25' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' font-weight='bold' fill='#EA580C'>存储：物理外挂/压缩</text><text x='355' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280'>向量库 + 显存压缩，处理海量私有数据</text></g><path d='M330 130 L330 370' stroke='#E5E7EB' stroke-dasharray='4'/></svg>