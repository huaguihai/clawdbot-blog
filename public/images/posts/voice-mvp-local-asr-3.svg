<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><defs><filter id="cardShadow" x="-10%" y="-10%" width="120%" height="130%"><feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/><feOffset in="blur" dx="0" dy="2" result="offsetBlur"/><feFlood flood-color="#000000" flood-opacity="0.12" result="color"/><feComposite in2="offsetBlur" operator="in" result="shadow"/><feMerge><feMergeNode in="shadow"/><feMergeNode in="SourceGraphic"/></feMerge></filter><marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/></marker></defs><rect width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="46" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="18" font-weight="700" fill="#1E293B">从 API 账单到产品能力：三步走</text><text x="330" y="70" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="13" fill="#64748B">本地语音识别引擎集成路径</text><rect x="60" y="100" width="160" height="175" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/><rect x="60" y="100" width="160" height="6" rx="3" fill="#2563EB"/><text x="140" y="134" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#2563EB">① 选模型</text><text x="140" y="152" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#64748B">按场景挑选，不贪多</text><line x1="75" y1="162" x2="205" y2="162" stroke="#E2E8F0" stroke-width="1"/><text x="75" y="178" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 离线/隐私 → Whisper</text><text x="75" y="196" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 多语言混合支持</text><text x="75" y="214" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 确认 Streaming 能力</text><path d="M 220 187 L 245 187" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowHead)"/><rect x="250" y="100" width="160" height="175" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/><rect x="250" y="100" width="160" height="6" rx="3" fill="#9333EA"/><text x="330" y="134" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#9333EA">② 接语言绑定</text><text x="330" y="152" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#64748B">本地调用，替代云端</text><line x1="265" y1="162" x2="395" y2="162" stroke="#E2E8F0" stroke-width="1"/><text x="265" y="178" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• JS / TS / Rust 绑定</text><text x="265" y="196" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 加载模型 → 传入音频</text><text x="265" y="214" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 返回本地转录结果</text><path d="M 410 187 L 435 187" stroke="#94A3B8" stroke-width="2" stroke-dasharray="5,4" marker-end="url(#arrowHead)"/><rect x="440" y="100" width="160" height="175" rx="12" fill="#FFFFFF" filter="url(#cardShadow)"/><rect x="440" y="100" width="160" height="6" rx="3" fill="#16A34A"/><text x="520" y="134" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="15" font-weight="600" fill="#16A34A">③ 嵌入产品原型</text><text x="520" y="152" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#64748B">半天跑通商用 Demo</text><line x1="455" y1="162" x2="585" y2="162" stroke="#E2E8F0" stroke-width="1"/><text x="455" y="178" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 初始化项目 &amp; 安装依赖</text><text x="455" y="196" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• GPU 优先，CPU 回退</text><text x="455" y="214" font-family="-apple-system, Segoe UI, sans-serif" font-size="11" fill="#334155">• 边界测试 &amp; 交付</text><rect x="170" y="325" width="320" height="44" rx="22" fill="#1E293B"/><text x="330" y="352" text-anchor="middle" font-family="-apple-system, Segoe UI, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">最终产出：离线语音转文字能力</text></svg>