<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">Claude Fable 5 low effort 适合怎么用</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">核心策略：复杂任务先上强模型 + low effort，再按结果决定是否加档</text>

  <rect x="42" y="110" width="170" height="112" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="42" y="110" width="170" height="8" rx="16" fill="#9333EA"/>
  <text x="127" y="143" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">复杂任务</text>
  <text x="127" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">代码、分析、长上下文</text>
  <text x="127" y="191" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">先别急着开最高推理档</text>

  <rect x="245" y="110" width="170" height="112" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="245" y="110" width="170" height="8" rx="16" fill="#2563EB"/>
  <text x="330" y="143" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">强模型 + low effort</text>
  <text x="330" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">先打第一枪</text>
  <text x="330" y="191" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">兼顾能力、速度与成本</text>

  <rect x="448" y="110" width="170" height="112" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="448" y="110" width="170" height="8" rx="16" fill="#16A34A"/>
  <text x="533" y="143" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">首次结果评估</text>
  <text x="533" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">是否已足够好？</text>
  <text x="533" y="191" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">看稳定性与完整性</text>

  <line x1="212" y1="166" x2="245" y2="166" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="415" y1="166" x2="448" y2="166" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="120" y="274" width="180" height="86" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="120" y="274" width="180" height="8" rx="16" fill="#16A34A"/>
  <text x="210" y="306" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">够好就停</text>
  <text x="210" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">省钱、省时</text>
  <text x="210" y="349" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">避免默认全开最高档</text>

  <rect x="360" y="274" width="180" height="86" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="360" y="274" width="180" height="8" rx="16" fill="#EA580C"/>
  <text x="450" y="306" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">不稳再加 effort</text>
  <text x="450" y="330" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">结果不完整、漏信息</text>
  <text x="450" y="349" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">再逐级提高推理开销</text>

  <line x1="500" y1="222" x2="460" y2="274" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
  <line x1="566" y1="222" x2="420" y2="274" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>

  <rect x="205" y="232" width="250" height="34" rx="17" fill="#FEF3C7" stroke="#D97706" stroke-width="1.2"/>
  <text x="330" y="254" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#92400E">把“高能力”和“高推理开销”拆开</text>
</svg>