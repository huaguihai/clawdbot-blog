<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">为什么很多 custom GPT 最后没人再开？</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心判断：能活下来的 GPT，不替你拍板，而是稳定地产出可审核首稿</text><rect x="220" y="150" width="220" height="100" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">可长期使用的</text><text x="330" y="210" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">custom GPT</text><text x="330" y="232" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">进入日常工位，而非停留在演示阶段</text><rect x="56" y="96" width="150" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><text x="131" y="123" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">任务高频</text><text x="131" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">每天都会遇到</text><line x1="206" y1="168" x2="220" y2="182" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6"/><rect x="454" y="96" width="150" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><text x="529" y="123" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">输入相对固定</text><text x="529" y="146" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">上下文不太漂移</text><line x1="454" y1="168" x2="440" y2="182" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/><rect x="56" y="266" width="150" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><text x="131" y="293" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">输出可快审</text><text x="131" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">人能迅速把关</text><line x1="206" y1="266" x2="220" y2="218" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/><rect x="454" y="266" width="150" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><text x="529" y="293" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#D97706">省的是首稿时间</text><text x="529" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">不是最终判断</text><line x1="454" y1="266" x2="440" y2="218" stroke="#D97706" stroke-width="2" stroke-dasharray="6 6"/><rect x="178" y="346" width="304" height="32" rx="10" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="367" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#0F172A">缺两项以上 ＝ 更像 demo；四项都满足 ＝ 更可能成为生产工具</text></svg>