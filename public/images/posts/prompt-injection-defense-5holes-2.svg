<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Prompt Injection 在攻击什么？</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">核心：攻击“文本到动作”的通道，而非单纯生成质量</text><rect x="40" y="95" width="120" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="100" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">不可信内容</text><text x="100" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">用户输入 / 外部文本</text><rect x="200" y="95" width="120" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="260" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#9333EA">进入上下文</text><text x="260" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">模型读取并解释</text><rect x="360" y="95" width="120" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="420" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#EA580C">影响工具调用</text><text x="420" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">错误时机 / 错误动作</text><rect x="520" y="95" width="100" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="570" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">执行层</text><text x="570" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">资源被访问</text><line x1="160" y1="127" x2="200" y2="127" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="320" y1="127" x2="360" y2="127" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><line x1="480" y1="127" x2="520" y2="127" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/><rect x="30" y="200" width="600" height="150" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><text x="50" y="228" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">上线前 5 个判断问题</text><rect x="50" y="245" width="102" height="82" rx="12" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/><text x="101" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#2563EB">1 进入上下文</text><text x="101" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">不可信内容</text><text x="101" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">是否被读入</text><rect x="164" y="245" width="102" height="82" rx="12" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5"/><text x="215" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">2 影响调用</text><text x="215" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">上下文能否改变</text><text x="215" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">工具决策</text><rect x="278" y="245" width="102" height="82" rx="12" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/><text x="329" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#16A34A">3 触达资源</text><text x="329" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">调用之后能否碰到</text><text x="329" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">敏感对象</text><rect x="392" y="245" width="102" height="82" rx="12" fill="#FFF7ED" stroke="#EA580C" stroke-width="1.5"/><text x="443" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#EA580C">4 额外拦截</text><text x="443" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">高风险动作是否</text><text x="443" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">二次确认</text><rect x="506" y="245" width="102" height="82" rx="12" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5"/><text x="557" y="268" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#D97706">5 可追溯性</text><text x="557" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">出事后能否定位</text><text x="557" y="305" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">触发原因</text><text x="330" y="374" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#B91C1C">若 5 项里有 2 项以上答不上来，Agent 暂不适合上线</text></svg>