<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="40" y="28" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#111827">上线前：4类安全自测 + 最低要求</text>

  <!-- Center card -->
  <rect x="220" y="44" width="220" height="74" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="74" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#111827">Agent 上线前安全自测</text>
  <text x="330" y="96" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">手工构造攻击输入，观察阻断与留痕</text>

  <!-- Connectors (dashed) -->
  <line x1="330" y1="118" x2="175" y2="140" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="118" x2="485" y2="140" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="118" x2="175" y2="235" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="118" x2="485" y2="235" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Category cards -->
  <!-- TL: Prompt injection -->
  <rect x="40" y="140" width="270" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="62" cy="166" r="8" fill="#2563EB"/>
  <text x="78" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">第三方 Prompt Injection</text>
  <text x="62" y="193" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">外部内容夹带指令</text>
  <text x="62" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">测试：是否会被诱导执行动作</text>

  <!-- TR: Data exfiltration -->
  <rect x="350" y="140" width="270" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="372" cy="166" r="8" fill="#16A34A"/>
  <text x="388" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">数据外泄</text>
  <text x="372" y="193" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">敏感信息被输出或外发</text>
  <text x="372" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">测试：是否能识别并拦截</text>

  <!-- BL: Privilege escalation -->
  <rect x="40" y="235" width="270" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="62" cy="261" r="8" fill="#EA580C"/>
  <text x="78" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">越权操作</text>
  <text x="62" y="288" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">未授权工具调用 / 危险动作</text>
  <text x="62" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">测试：是否触发权限校验与审计</text>

  <!-- BR: Account integrity -->
  <rect x="350" y="235" width="270" height="82" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="372" cy="261" r="8" fill="#9333EA"/>
  <text x="388" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">账户完整性</text>
  <text x="372" y="288" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">账号 / 会话 / 回调被劫持</text>
  <text x="372" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">测试：回调校验、重放与伪造</text>

  <!-- Bottom: minimum requirements -->
  <rect x="40" y="330" width="580" height="56" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="62" cy="358" r="8" fill="#D97706"/>
  <text x="78" y="362" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#111827">最低要求（上线门槛）</text>

  <!-- Pills -->
  <rect x="250" y="345" width="86" height="26" rx="13" fill="#EFF6FF" stroke="#2563EB"/>
  <text x="293" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1D4ED8">最小权限</text>

  <rect x="346" y="345" width="110" height="26" rx="13" fill="#ECFDF5" stroke="#16A34A"/>
  <text x="401" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#166534">白名单外发</text>

  <rect x="466" y="345" width="144" height="26" rx="13" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="538" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9A3412">危险动作二次确认</text>

  <rect x="250" y="372" width="220" height="26" rx="13" fill="#F5F3FF" stroke="#9333EA"/>
  <text x="360" y="389" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6D28D9">回调与Webhook强校验</text>

  <rect x="478" y="372" width="132" height="26" rx="13" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="544" y="389" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">阻断并留痕</text>
</svg>