<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">一项工作值不值得交给 Agent？</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">用四个维度快速判断：值得做、能管住、能提效、够安全</text><rect x="250" y="88" width="160" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E5E7EB"/><text x="330" y="114" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">Agent 适配判断</text><text x="330" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先看任务，再决定是否交给 Agent</text><line x1="330" y1="152" x2="170" y2="196" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="152" x2="490" y2="196" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="152" x2="170" y2="304" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="152" x2="490" y2="304" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="60" y="176" width="220" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><rect x="76" y="192" width="44" height="28" rx="8" fill="#2563EB"/><text x="98" y="211" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">1</text><text x="136" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1E3A8A">足够重复</text><text x="76" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 最近一个月出现 3 次以上</text><text x="76" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 步骤反复相似，可写成说明</text><rect x="380" y="176" width="220" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FDE68A"/><rect x="396" y="192" width="44" height="28" rx="8" fill="#D97706"/><text x="418" y="211" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">2</text><text x="456" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#92400E">产出可验收</text><text x="396" y="236" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 输入输出有基本格式</text><text x="396" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 能写出验收清单</text><rect x="60" y="284" width="220" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/><rect x="76" y="300" width="44" height="28" rx="8" fill="#16A34A"/><text x="98" y="319" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">3</text><text x="136" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#166534">需要跨工具搬运</text><text x="76" y="344" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 在多个系统之间读写</text><text x="76" y="362" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 减少复制粘贴和漏步骤</text><rect x="380" y="284" width="220" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><rect x="396" y="300" width="44" height="28" rx="8" fill="#9333EA"/><text x="418" y="319" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">4</text><text x="456" y="318" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#6B21A8">最终动作可审批</text><text x="396" y="344" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 高风险动作先草稿再确认</text><text x="396" y="362" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 安全上线，避免直接闭环</text><rect x="190" y="332" width="280" height="38" rx="10" fill="#FFF7ED" stroke="#FDBA74"/><text x="330" y="356" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9A3412">四项都满足：优先做 Agent；审批缺失：仅做辅助，不做闭环</text></svg>