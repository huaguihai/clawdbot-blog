<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:16px; fill:#111827; font-weight:700; }
      .text { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12.5px; fill:#111827; }
      .muted { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12px; fill:#6B7280; }
      .chipText { font-family:-apple-system, 'Segoe UI', sans-serif; font-size:12px; fill:#111827; font-weight:600; }
      .dash { stroke:#9CA3AF; stroke-width:1.5; stroke-dasharray:6 6; fill:none; }
      .ok { fill:#16A34A; }
      .warn { fill:#EA580C; }
      .blue { fill:#2563EB; }
      .purple { fill:#9333EA; }
      .yellow { fill:#D97706; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="28" y="42">AI 越权更常见原因：太听话 + 没有服务端门锁</text>
  <text class="muted" x="28" y="64">用同一批任务，跨角色测试；最终以服务端权限校验决定允许/拒绝</text>

  <!-- Column labels -->
  <text class="muted" x="52" y="104">角色（Role）</text>
  <text class="muted" x="260" y="104">同一批任务（Tasks）</text>
  <text class="muted" x="470" y="104">服务端校验（门锁）</text>

  <!-- Roles cards -->
  <rect class="card" x="28" y="120" width="180" height="74" rx="12"/>
  <circle cx="50" cy="147" r="7" class="blue"/>
  <text class="text" x="66" y="150">普通用户</text>
  <text class="muted" x="66" y="170">应做：查自己数据</text>

  <rect class="card" x="28" y="206" width="180" height="74" rx="12"/>
  <circle cx="50" cy="233" r="7" class="purple"/>
  <text class="text" x="66" y="236">运营 / 客服</text>
  <text class="muted" x="66" y="256">应做：处理工单</text>

  <rect class="card" x="28" y="292" width="180" height="74" rx="12"/>
  <circle cx="50" cy="319" r="7" class="yellow"/>
  <text class="text" x="66" y="322">管理员</text>
  <text class="muted" x="66" y="342">应做：审批高风险</text>

  <!-- Tasks card -->
  <rect class="card" x="230" y="120" width="210" height="246" rx="12"/>
  <text class="text" x="250" y="150">测试任务（发布前必测）</text>

  <!-- Task chips -->
  <rect x="250" y="166" width="170" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="264" cy="180" r="5" class="warn"/>
  <text class="chipText" x="276" y="184">读别人数据</text>

  <rect x="250" y="202" width="170" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="264" cy="216" r="5" class="warn"/>
  <text class="chipText" x="276" y="220">写不该写字段</text>

  <rect x="250" y="238" width="170" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="264" cy="252" r="5" class="warn"/>
  <text class="chipText" x="276" y="256">触发高风险工具</text>

  <rect x="250" y="274" width="170" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="264" cy="288" r="5" class="warn"/>
  <text class="chipText" x="276" y="292">跨租户访问</text>

  <rect x="250" y="310" width="170" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="264" cy="324" r="5" class="warn"/>
  <text class="chipText" x="276" y="328">自然语言绕过</text>

  <!-- Server lock card -->
  <rect class="card" x="460" y="120" width="172" height="246" rx="12"/>
  <text class="text" x="478" y="150">服务端权限校验</text>
  <text class="muted" x="478" y="170">身份 + 资源归属</text>
  <text class="muted" x="478" y="188">审计 + 二次确认</text>

  <!-- Allow / Deny indicators -->
  <rect x="478" y="210" width="136" height="38" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="494" cy="229" r="7" class="ok"/>
  <text class="text" x="510" y="233">允许（合法操作）</text>

  <rect x="478" y="258" width="136" height="38" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="494" cy="277" r="7" class="warn"/>
  <text class="text" x="510" y="281">拒绝（越权）</text>

  <!-- Prompt note -->
  <rect x="478" y="310" width="136" height="42" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text class="muted" x="490" y="330">提示词像“告示牌”</text>
  <text class="muted" x="490" y="346">门锁在服务端</text>

  <!-- Dashed connections from roles to tasks -->
  <path class="dash" d="M 208 157 C 225 157, 220 180, 230 180"/>
  <path class="dash" d="M 208 243 C 225 243, 220 252, 230 252"/>
  <path class="dash" d="M 208 329 C 225 329, 220 324, 230 324"/>

  <!-- Dashed connection from tasks to server check -->
  <path class="dash" d="M 440 243 C 452 243, 448 243, 460 243"/>

  <!-- Bottom takeaway -->
  <rect class="card" x="28" y="372" width="604" height="0" rx="12"/>
  <text class="muted" x="28" y="392">核心：同任务跨角色验证差异；最终以服务端验权结果为准，而不是“我不应该这么做”的提示词</text>
</svg>