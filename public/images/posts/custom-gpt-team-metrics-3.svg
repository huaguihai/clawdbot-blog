<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">先看这 3 个指标，才知道 AI 真有用</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">比“调用次数”更接近业务结果，适合一周内试点复盘</text>

  <line x1="220" y1="220" x2="330" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="440" y1="220" x2="330" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="255" x2="330" y2="295" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <g filter="url(#shadow)">
    <rect x="40" y="95" width="180" height="155" rx="16" fill="#FFFFFF"/>
    <rect x="40" y="95" width="180" height="8" rx="8" fill="#2563EB"/>
    <circle cx="78" cy="134" r="18" fill="#DBEAFE"/>
    <path d="M78 121 L78 135 L88 141" fill="none" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="106" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1F2937">首稿时间</text>
    <text x="58" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">从拿到输入到得到</text>
    <text x="58" y="189" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">可编辑初稿的时间</text>
    <text x="58" y="218" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">及格线：比人工明显更快</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="240" y="95" width="180" height="155" rx="16" fill="#FFFFFF"/>
    <rect x="240" y="95" width="180" height="8" rx="8" fill="#16A34A"/>
    <circle cx="278" cy="134" r="18" fill="#DCFCE7"/>
    <path d="M268 135 L275 142 L289 126" fill="none" stroke="#16A34A" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="306" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1F2937">采纳率</text>
    <text x="258" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">AI 初稿中被保留</text>
    <text x="258" y="189" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">下来的内容比例</text>
    <text x="258" y="218" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">及格线：过半才值得继续优化</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="440" y="95" width="180" height="155" rx="16" fill="#FFFFFF"/>
    <rect x="440" y="95" width="180" height="8" rx="8" fill="#EA580C"/>
    <circle cx="478" cy="134" r="18" fill="#FFEDD5"/>
    <path d="M469 125 L487 143 M487 125 L469 143" fill="none" stroke="#EA580C" stroke-width="3" stroke-linecap="round"/>
    <text x="506" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1F2937">返工次数</text>
    <text x="458" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">人类需要大改几轮</text>
    <text x="458" y="189" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">才能最终交付</text>
    <text x="458" y="218" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">及格线：越少越好，持续下降</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="295" width="300" height="68" rx="16" fill="#FFFFFF"/>
    <rect x="180" y="295" width="300" height="8" rx="8" fill="#9333EA"/>
    <text x="330" y="325" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1F2937">共同指向：是否真的节省业务成本</text>
    <text x="330" y="348" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">别只看“模型聪明”或“调用次数”，要看快不快、能不能用、要不要重做</text>
  </g>

  <text x="42" y="382" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9CA3AF">试点复盘优先级：先看首稿时间 → 再看采纳率 → 最后盯返工次数是否下降</text>
</svg>