<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg{fill:#FAFAFA;}
      .title{font-family:-apple-system,'Segoe UI',sans-serif;font-size:18px;fill:#111827;font-weight:700;}
      .subtitle{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12px;fill:#6B7280;}
      .card{fill:#FFFFFF;stroke:#E5E7EB;stroke-width:1;rx:12;filter:url(#shadow);} 
      .h{font-family:-apple-system,'Segoe UI',sans-serif;font-size:14px;fill:#111827;font-weight:700;}
      .p{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12px;fill:#374151;}
      .pillText{font-family:-apple-system,'Segoe UI',sans-serif;font-size:11px;fill:#FFFFFF;font-weight:700;}
      .dash{stroke:#9CA3AF;stroke-width:2;stroke-dasharray:6 6;fill:none;}
      .arrow{fill:#9CA3AF;}
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Title -->
  <text class="title" x="28" y="38">一周搭出可持续回归管线（最小闭环）</text>
  <text class="subtitle" x="28" y="60">按天推进：回放集 → 规则闸门 → LLM 评分回归 → 影子与灰度放量</text>

  <!-- Timeline baseline -->
  <path class="dash" d="M 60 110 H 600"/>
  <polygon class="arrow" points="600,110 590,104 590,116"/>

  <!-- Day markers -->
  <text class="subtitle" x="58" y="98">Day 1</text>
  <text class="subtitle" x="183" y="98">Day 3</text>
  <text class="subtitle" x="308" y="98">Day 5</text>
  <text class="subtitle" x="508" y="98">Day 7</text>

  <circle cx="60" cy="110" r="6" fill="#2563EB"/>
  <circle cx="210" cy="110" r="6" fill="#EA580C"/>
  <circle cx="360" cy="110" r="6" fill="#9333EA"/>
  <circle cx="560" cy="110" r="6" fill="#16A34A"/>

  <!-- Card 1: Day 1-2 -->
  <rect class="card" x="28" y="135" width="290" height="150" rx="12"/>
  <rect x="44" y="149" width="92" height="22" rx="11" fill="#2563EB"/>
  <text class="pillText" x="90" y="165" text-anchor="middle">第 1-2 天</text>
  <text class="h" x="44" y="193">把回放跑起来</text>
  <text class="p" x="44" y="215">• 选高频场景（总结/邮件/查订单）</text>
  <text class="p" x="44" y="234">• 打点：run_id、输入、tool 调用、输出、权限</text>
  <text class="p" x="44" y="253">• 抽 30-100 条真实请求做回放集</text>
  <text class="subtitle" x="44" y="275">反馈：CI/本地可完整重放并拿到轨迹</text>

  <!-- Card 2: Day 3-4 -->
  <rect class="card" x="342" y="135" width="290" height="150" rx="12"/>
  <rect x="358" y="149" width="92" height="22" rx="11" fill="#EA580C"/>
  <text class="pillText" x="404" y="165" text-anchor="middle">第 3-4 天</text>
  <text class="h" x="358" y="193">规则评分先落地</text>
  <text class="p" x="358" y="215">• 输出结构：JSON / schema</text>
  <text class="p" x="358" y="234">• 工具 allowlist + 参数校验</text>
  <text class="p" x="358" y="253">• 步数/调用次数阈值 + 失败 case 入库</text>
  <text class="subtitle" x="358" y="275">反馈：拦住结构错、越权、乱调用、死循环</text>

  <!-- Card 3: Day 5-6 -->
  <rect class="card" x="28" y="300" width="290" height="84" rx="12"/>
  <rect x="44" y="314" width="92" height="22" rx="11" fill="#9333EA"/>
  <text class="pillText" x="90" y="330" text-anchor="middle">第 5-6 天</text>
  <text class="h" x="44" y="358">LLM-as-judge 做质量回归</text>
  <text class="subtitle" x="44" y="378">rubric 打分 + must_fix + 阈值触发 CI 失败</text>

  <!-- Card 4: Day 7 -->
  <rect class="card" x="342" y="300" width="290" height="84" rx="12"/>
  <rect x="358" y="314" width="70" height="22" rx="11" fill="#16A34A"/>
  <text class="pillText" x="393" y="330" text-anchor="middle">第 7 天</text>
  <text class="h" x="358" y="358">影子模式 + 1% 灰度</text>
  <text class="subtitle" x="358" y="378">看 24h 指标（失败率/延迟/成本）+ 熔断回滚</text>

  <!-- Connectors from timeline to cards -->
  <path class="dash" d="M 60 110 V 130"/>
  <path class="dash" d="M 210 110 V 130"/>
  <path class="dash" d="M 360 110 V 295"/>
  <path class="dash" d="M 560 110 V 295"/>

  <!-- Bottom note -->
  <text class="subtitle" x="28" y="395">核心：每天可跑的最小闭环，用“数据和闸门”替代主观感觉</text>
</svg>