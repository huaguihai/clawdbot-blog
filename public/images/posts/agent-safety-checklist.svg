<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .title{font-size:18px;font-weight:700;fill:#0F172A}
      .subtitle{font-size:12px;fill:#475569}
      .cardTitle{font-size:14px;font-weight:700;fill:#0F172A}
      .cardText{font-size:12px;fill:#475569}
      .pill{font-size:11px;font-weight:700;fill:#FFFFFF}
      .dash{stroke:#94A3B8;stroke-width:2;stroke-dasharray:6 6;fill:none}
      .stroke{stroke:#E2E8F0;stroke-width:1;fill:#FFFFFF}
    </style>
  </defs>

  <!-- Header -->
  <text x="330" y="40" text-anchor="middle" class="title">AI 助手上线前：别只测回答准不准</text>
  <text x="330" y="62" text-anchor="middle" class="subtitle">优先覆盖最易变事故的 4 条风险路径（面向能读邮件/调 API/写数据库的 Agent）</text>

  <!-- Center card -->
  <rect x="210" y="142" width="240" height="120" rx="12" class="stroke" filter="url(#shadow)"/>
  <circle cx="250" cy="202" r="20" fill="#2563EB" opacity="0.12"/>
  <path d="M242 208 L258 208 M246 198 L254 198 M244 203 L256 203" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
  <text x="330" y="185" text-anchor="middle" class="cardTitle">工作流 Agent（会动手）</text>
  <text x="330" y="206" text-anchor="middle" class="cardText">读邮件 · 调 API · 写数据库</text>
  <text x="330" y="229" text-anchor="middle" class="cardText">核心问题：动作是否安全可控？</text>

  <!-- Dashed connectors -->
  <path class="dash" d="M330 142 L330 108"/>
  <path class="dash" d="M210 202 L140 202"/>
  <path class="dash" d="M450 202 L520 202"/>
  <path class="dash" d="M330 262 L330 320"/>

  <!-- Top card: Prompt Injection -->
  <rect x="170" y="82" width="320" height="70" rx="12" class="stroke" filter="url(#shadow)"/>
  <rect x="186" y="96" width="110" height="22" rx="11" fill="#9333EA"/>
  <text x="241" y="112" text-anchor="middle" class="pill">Prompt Injection</text>
  <text x="330" y="124" text-anchor="middle" class="cardText">第三方内容夹带指令，诱导越界执行</text>
  <text x="330" y="142" text-anchor="middle" class="cardText">体检：邮件/网页/附件输入链路</text>

  <!-- Left card: Data Leakage -->
  <rect x="40" y="168" width="200" height="90" rx="12" class="stroke" filter="url(#shadow)"/>
  <rect x="56" y="182" width="86" height="22" rx="11" fill="#EA580C"/>
  <text x="99" y="198" text-anchor="middle" class="pill">数据外泄</text>
  <text x="140" y="222" text-anchor="middle" class="cardText">敏感信息被输出/写入日志/外传</text>
  <text x="140" y="242" text-anchor="middle" class="cardText">体检：脱敏、最小化、审计</text>

  <!-- Right card: Unauthorized Actions -->
  <rect x="420" y="168" width="200" height="90" rx="12" class="stroke" filter="url(#shadow)"/>
  <rect x="436" y="182" width="86" height="22" rx="11" fill="#16A34A"/>
  <text x="479" y="198" text-anchor="middle" class="pill">越权操作</text>
  <text x="520" y="222" text-anchor="middle" class="cardText">超出权限执行读/写/转账等动作</text>
  <text x="520" y="242" text-anchor="middle" class="cardText">体检：权限边界与工具白名单</text>

  <!-- Bottom card: Account Integrity -->
  <rect x="170" y="300" width="320" height="78" rx="12" class="stroke" filter="url(#shadow)"/>
  <rect x="186" y="314" width="110" height="22" rx="11" fill="#D97706"/>
  <text x="241" y="330" text-anchor="middle" class="pill">账户完整性</text>
  <text x="330" y="348" text-anchor="middle" class="cardText">账号被接管 / 会话被劫持导致代执行</text>
  <text x="330" y="366" text-anchor="middle" class="cardText">体检：鉴权、会话绑定、异常检测</text>

  <!-- Footer note -->
  <text x="330" y="392" text-anchor="middle" class="subtitle">要证明的不是“能跑”，而是“不会在高速上突然锁死方向盘”</text>
</svg>