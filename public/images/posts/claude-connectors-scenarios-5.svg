<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">待办推进：做项目催化剂，不做项目经理</text><rect x="40" y="80" width="260" height="250" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="170" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">推荐：低风险动作</text><rect x="60" y="130" width="220" height="48" rx="12" fill="#F0FDF4" stroke="#BBF7D0"/><text x="170" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#166534">找出长期卡住任务</text><rect x="60" y="192" width="220" height="48" rx="12" fill="#EFF6FF" stroke="#BFDBFE"/><text x="170" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1D4ED8">汇总本周项目推进</text><rect x="60" y="254" width="220" height="48" rx="12" fill="#F5F3FF" stroke="#DDD6FE"/><text x="170" y="284" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#6D28D9">基于上下文给下一步建议</text><rect x="360" y="80" width="260" height="250" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><text x="490" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">谨慎：高风险越界</text><rect x="380" y="130" width="220" height="48" rx="12" fill="#FFF7ED" stroke="#FED7AA"/><text x="490" y="160" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#9A3412">自动排优先级</text><rect x="380" y="192" width="220" height="48" rx="12" fill="#FFF7ED" stroke="#FED7AA"/><text x="490" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#9A3412">自动催人和改状态</text><rect x="380" y="254" width="220" height="48" rx="12" fill="#FFF7ED" stroke="#FED7AA"/><text x="490" y="284" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#9A3412">替团队做判断与拍板</text><line x1="300" y1="205" x2="360" y2="205" stroke="#D97706" stroke-width="2.5" stroke-dasharray="7 7"/><polygon points="352,199 360,205 352,211" fill="#D97706"/><rect x="165" y="338" width="330" height="36" rx="10" fill="#FEF3C7" stroke="#FCD34D"/><text x="330" y="361" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#92400E">边界原则：只做分析和建议，不直接执行管理动作</text></svg>