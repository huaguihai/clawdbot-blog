<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:14px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#374151; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#6B7280; }
      .pillText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#FFFFFF; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Header -->
  <text x="40" y="48" class="title">“开源 base + 小样本微调 + 场景包装”落地路径</text>
  <text x="40" y="68" class="muted">用“开餐馆”类比：选菜品 → 备料 → 训练厨师 → 上菜单收钱</text>

  <!-- Step 1 -->
  <rect class="card" x="40" y="95" width="270" height="110" rx="12"/>
  <rect x="40" y="95" width="270" height="28" rx="12" fill="#2563EB"/>
  <text x="54" y="114" class="pillText">Step 1 选窄“招牌菜”</text>
  <text x="54" y="140" class="text">聚焦单一高价值任务</text>
  <text x="54" y="160" class="muted">可付费、可评测、失败代价可控</text>
  <text x="54" y="182" class="muted">先回答：卖给谁？卖多少钱？为何现在买？</text>

  <!-- Step 2 -->
  <rect class="card" x="350" y="95" width="270" height="110" rx="12"/>
  <rect x="350" y="95" width="270" height="28" rx="12" fill="#16A34A"/>
  <text x="364" y="114" class="pillText">Step 2 备料：干净高信号数据</text>
  <text x="364" y="140" class="text">先做 200 条单轮指令样本</text>
  <text x="364" y="160" class="muted">数据形态：Instruction / Chat / Preference(DPO)</text>
  <text x="364" y="182" class="muted">模型先出草稿，人工复核防“脏数据反噬”</text>

  <!-- Step 3 -->
  <rect class="card" x="40" y="235" width="270" height="110" rx="12"/>
  <rect x="40" y="235" width="270" height="28" rx="12" fill="#9333EA"/>
  <text x="54" y="254" class="pillText">Step 3 训练厨师：LoRA/QLoRA</text>
  <text x="54" y="280" class="text">最低可行训练路径（不追花活）</text>
  <text x="54" y="300" class="muted">PEFT / TRL / Axolotl / Unsloth</text>
  <text x="54" y="322" class="muted">SaaS并发：7B–14B 起步更稳</text>

  <!-- Step 4 -->
  <rect class="card" x="350" y="235" width="270" height="110" rx="12"/>
  <rect x="350" y="235" width="270" height="28" rx="12" fill="#EA580C"/>
  <text x="364" y="254" class="pillText">Step 4 上菜单收钱：场景包装</text>
  <text x="364" y="280" class="text">把能力变成“收费功能”</text>
  <text x="364" y="300" class="muted">A 交付物成品化：结构化、可复制、可追溯</text>
  <text x="364" y="322" class="muted">B 责任边界：做什么/不做什么 + 人工复核入口</text>

  <!-- Connectors -->
  <path class="dash" d="M 310 150 L 350 150"/>
  <path class="dash" d="M 485 205 L 485 235"/>
  <path class="dash" d="M 350 290 L 310 290"/>
  <path class="dash" d="M 175 205 L 175 235"/>

  <!-- Bottom note -->
  <rect x="40" y="360" width="580" height="18" rx="9" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="52" y="373" class="muted">核心：模型是厨师，产品是餐厅；用户付费的是“少返工/少背锅/更省心”的结果。</text>
</svg>