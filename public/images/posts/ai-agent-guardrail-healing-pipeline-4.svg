<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" fill="none">
  <defs>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00000015"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2 4 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2 4 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0 0 L10 4 L0 8 L2 4 Z" fill="#16A34A"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="660" height="400" rx="12" fill="#FAFAFA"/>

  <!-- 标题 -->
  <text x="330" y="32" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1E293B">自愈回路：自动迭代修复循环</text>

  <!-- ====== 顶部流程线：失败 → 提取 → 生成 → 拼接 ====== -->

  <!-- 节点1：渲染失败 -->
  <rect x="30" y="58" width="130" height="48" rx="10" fill="#FEF2F2" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="95" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#EA580C">❌ 渲染失败</text>
  <text x="95" y="96" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#9A3412">第 N 次尝试</text>

  <!-- 箭头 1→2 -->
  <line x1="160" y1="82" x2="198" y2="82" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 节点2：提取错误日志 -->
  <rect x="200" y="58" width="130" height="48" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="265" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#2563EB">📋 提取错误日志</text>
  <text x="265" y="96" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#1E40AF">从执行环境捕获</text>

  <!-- 箭头 2→3 -->
  <line x1="330" y1="82" x2="368" y2="82" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 节点3：生成修复 Prompt -->
  <rect x="370" y="58" width="140" height="48" rx="10" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="440" y="78" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">🛠 生成修复 Prompt</text>
  <text x="440" y="96" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B21A8">限定最小改动</text>

  <!-- 箭头 3→4 -->
  <line x1="510" y1="82" x2="548" y2="82" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 节点4：拼接上下文 -->
  <rect x="518" y="54" width="120" height="56" rx="10" fill="#FFFBEB" stroke="#D97706" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="578" y="74" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#D97706">📦 拼接上下文</text>
  <text x="578" y="90" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#92400E">Prompt + 代码</text>
  <text x="578" y="103" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="9" fill="#92400E">+ build_spec</text>

  <!-- ====== 下半部分：模型生成 + 再次渲染 + 门控判断 ====== -->

  <!-- 向下箭头 4→5 -->
  <line x1="578" y1="110" x2="578" y2="148" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 节点5：模型重新生成 -->
  <rect x="488" y="150" width="180" height="52" rx="10" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="578" y="170" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#9333EA">🤖 LLM 重新生成</text>
  <text x="578" y="190" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B21A8">草稿 → 实现 → 审查</text>

  <!-- 向下箭头 5→6 -->
  <line x1="578" y1="202" x2="578" y2="240" stroke="#2563EB" stroke-width="1.8" marker-end="url(#arrowBlue)"/>

  <!-- 节点6：门控判断（菱形用两个三角形近似）-->
  <rect x="498" y="242" width="160" height="44" rx="8" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="578" y="260" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16A34A">🚦 门控检查</text>
  <text x="578" y="278" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#166534">渲染是否通过？</text>

  <!-- ====== 两条分支 ====== -->

  <!-- 向左：再次失败，回到节点1（循环） -->
  <line x1="498" y1="264" x2="310" y2="264" stroke="#EA580C" stroke-width="1.8" stroke-dasharray="6 3"/>
  <line x1="310" y1="264" x2="310" y2="82" stroke="#EA580C" stroke-width="1.8" stroke-dasharray="6 3"/>
  <line x1="310" y1="82" x2="200" y2="82" stroke="#EA580C" stroke-width="1.8" marker-end="url(#arrowOrange)" stroke-dasharray="6 3"/>
  <text x="402" y="255" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#EA580C">❌ 未通过</text>

  <!-- 向右：通过，成功输出 -->
  <line x1="660" y1="264" x2="620" y2="264" stroke="#16A34A" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="640" y="255" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#16A34A">✅ 通过</text>

  <!-- 循环标注 -->
  <rect x="266" y="300" width="96" height="22" rx="6" fill="#FEF2F2" stroke="#EA580C" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="314" y="315" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="600" fill="#EA580C">N → N+1 次迭代</text>

  <!-- 底部说明 -->
  <text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#64748B">系统默认会错，自动走返工路径 — 第 1 次挂 import，第 2 次挂箭头，... 第 N 次自然通过全部门控</text>
</svg>