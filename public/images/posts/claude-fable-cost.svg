<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter><marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Fable 5 更可能省钱的三类场景</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心逻辑：单价更高，但因少返工、少轮次、少无效 token，总成本可能更低</text><rect x="36" y="95" width="176" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><rect x="242" y="95" width="176" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><rect x="448" y="95" width="176" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/><rect x="56" y="113" width="64" height="28" rx="14" fill="#DBEAFE"/><text x="88" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#2563EB">1 代码任务</text><rect x="262" y="113" width="64" height="28" rx="14" fill="#FEE2E2"/><text x="294" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#EA580C">2 Agent任务</text><rect x="468" y="113" width="88" height="28" rx="14" fill="#DCFCE7"/><text x="512" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#16A34A">3 长上下文</text><text x="56" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">风险点</text><text x="56" y="187" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 首次方案偏离可用结果</text><text x="56" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 误解需求、引入新 bug</text><text x="56" y="229" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 改一处牵连更多返修</text><text x="56" y="261" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">为什么更省</text><text x="56" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">少走弯路 = 少轮修复 +</text><text x="56" y="303" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">少消耗工程上下文</text><text x="262" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">风险点</text><text x="262" y="187" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 多查无用信息</text><text x="262" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 重复调用工具</text><text x="262" y="229" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 结论反复推翻</text><text x="262" y="250" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 被长上下文噪音带偏</text><text x="262" y="282" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">为什么更省</text><text x="262" y="305" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">少跑两轮 = 少 token +</text><text x="262" y="324" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">少工具执行成本</text><text x="468" y="164" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">风险点</text><text x="468" y="187" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 第一次抓偏重点</text><text x="468" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 每轮都要带回长历史</text><text x="468" y="229" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 重跑代价持续累积</text><text x="468" y="261" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">为什么更省</text><text x="468" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">高 token 效率 = 少生成</text><text x="468" y="303" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">“没必要的那些 token”</text><path d="M 124 328 C 124 350, 330 350, 330 350" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" fill="none" marker-end="url(#arrowBlue)"/><path d="M 330 328 C 330 350, 330 350, 330 350" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6" fill="none" marker-end="url(#arrowBlue)"/><path d="M 536 328 C 536 350, 330 350, 330 350" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6" fill="none" marker-end="url(#arrowBlue)"/><rect x="212" y="336" width="236" height="42" rx="14" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="354" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">结论</text><text x="330" y="370" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">复杂度越高、容错成本越高、上下文越长，越该看总成本而非单价</text></svg>