<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">我能立刻复制的三样东西</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">把提示、测试、回归清单直接落到你的 Agent 工作流</text><line x1="220" y1="116" x2="440" y2="116" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="220" y1="248" x2="440" y2="248" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><g filter="url(#shadow)"><rect x="40" y="92" width="180" height="156" rx="16" fill="#FFFFFF" stroke="#DBEAFE"/><rect x="56" y="108" width="44" height="44" rx="10" fill="#DBEAFE"/><text x="78" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">1</text><text x="56" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E3A8A">系统提示</text><text x="56" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">把 TDD 模板保存为</text><text x="56" y="219" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">你的 Agent 任务模板</text><rect x="56" y="226" width="110" height="8" rx="4" fill="#BFDBFE"/></g><g filter="url(#shadow)"><rect x="240" y="92" width="180" height="156" rx="16" fill="#FFFFFF" stroke="#FED7AA"/><rect x="256" y="108" width="44" height="44" rx="10" fill="#FFEDD5"/><text x="278" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#EA580C">2</text><text x="256" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9A3412">最小测试骨架</text><text x="256" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">pytest / vitest 任挑一个</text><text x="256" y="219" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">先写最怕回归的失败测试</text><rect x="256" y="226" width="126" height="8" rx="4" fill="#FDBA74"/></g><g filter="url(#shadow)"><rect x="440" y="92" width="180" height="156" rx="16" fill="#FFFFFF" stroke="#BBF7D0"/><rect x="456" y="108" width="44" height="44" rx="10" fill="#DCFCE7"/><text x="478" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#16A34A">3</text><text x="456" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#166534">回归清单模板</text><text x="456" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">命令、必过用例、通过标准</text><text x="456" y="219" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">组成最小回归门禁</text><rect x="456" y="226" width="118" height="8" rx="4" fill="#86EFAC"/></g><g filter="url(#shadow)"><rect x="90" y="284" width="480" height="82" rx="16" fill="#FFFFFF" stroke="#E9D5FF"/><text x="110" y="312" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#6B21A8">回归清单关键字段</text><text x="110" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">命令：</text><text x="152" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9333EA">pytest -q</text><text x="220" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">或</text><text x="244" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9333EA">npm run test -s</text><circle cx="378" cy="334" r="4" fill="#D97706"/><text x="390" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">必过用例：3-5 条业务关键路径</text><circle cx="110" cy="354" r="4" fill="#16A34A"/><text x="122" y="358" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">通过标准：退出码 = 0，日志无 skipped / xfail</text></g></svg>