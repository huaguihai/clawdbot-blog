<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><defs><filter id="s" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter><marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#9CA3AF"/></marker></defs><text x="330" y="42" font-family="-apple-system,'Segoe UI',sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#111827">Grok Automation 核心工作流</text><text x="330" y="62" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" text-anchor="middle" fill="#6B7280">配置 → 触发 → 执行 → 汇报 → 复盘（闭环）</text><g filter="url(#s)"><rect x="40" y="100" width="120" height="160" fill="#FFF" rx="10"/><circle cx="100" cy="130" r="14" fill="#2563EB"/><text x="100" y="135" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">1</text><text x="100" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">描述任务</text><text x="100" y="185" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">编写 Prompt</text><text x="100" y="202" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">挂载文件/技能</text></g><g filter="url(#s)"><rect x="180" y="100" width="120" height="160" fill="#FFF" rx="10"/><circle cx="240" cy="130" r="14" fill="#EA580C"/><text x="240" y="135" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">2</text><text x="240" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">配置触发</text><text x="240" y="185" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">定时 / 邮件</text><text x="240" y="202" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">设定过滤规则</text></g><g filter="url(#s)"><rect x="320" y="100" width="120" height="160" fill="#FFF" rx="10"/><circle cx="380" cy="130" r="14" fill="#16A34A"/><text x="380" y="135" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">3</text><text x="380" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">命名保存</text><text x="380" y="185" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">进入自动化</text><text x="380" y="202" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">列表统一管理</text></g><g filter="url(#s)"><rect x="460" y="100" width="120" height="160" fill="#FFF" rx="10"/><circle cx="520" cy="130" r="14" fill="#9333EA"/><text x="520" y="135" font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="bold" fill="#FFF" text-anchor="middle">4</text><text x="520" y="165" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="bold" fill="#111827" text-anchor="middle">汇报复盘</text><text x="520" y="185" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">多渠道通知</text><text x="520" y="202" font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">查看 Run 历史</text></g><path d="M 160 180 L 175 180" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#a)"/><path d="M 300 180 L 315 180" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#a)"/><path d="M 440 180 L 455 180" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#a)"/><path d="M 520 260 C 520 320 440 320 330 320 C 220 320 140 320 100 260" fill="none" stroke="#D97706" stroke-width="2" stroke-dasharray="4,4" marker-end="url(#a)"/><text x="330" y="340" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#D97706" font-weight="bold" text-anchor="middle">闭环优化：观察记录 → 调整参数 → 重新运行</text></svg>