<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Agent 权限拆仓：把“读”“草稿”“执行”“敏感”分开</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心原则：能读不等于能动，越不可逆的动作，权限越要收紧</text>

  <rect x="250" y="90" width="160" height="58" rx="14" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <text x="330" y="114" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#111827">通用 Agent</text>
  <text x="330" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">理解内容、调用工具、生成建议</text>

  <line x1="330" y1="148" x2="330" y2="176" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="40" y="190" width="130" height="118" rx="14" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/>
  <rect x="40" y="190" width="130" height="10" rx="14" fill="#2563EB"/>
  <text x="105" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">读取类</text>
  <text x="105" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">默认开放</text>
  <text x="105" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">但限定范围</text>
  <text x="105" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">总结 / 搜索 / 提取</text>

  <rect x="190" y="190" width="130" height="118" rx="14" fill="#FFFFFF" stroke="#FDE68A" filter="url(#shadow)"/>
  <rect x="190" y="190" width="130" height="10" rx="14" fill="#D97706"/>
  <text x="255" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#D97706">草稿类</text>
  <text x="255" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">可生成建议</text>
  <text x="255" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不自动发送</text>
  <text x="255" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">邮件 / 回复 / 工单</text>

  <rect x="340" y="190" width="130" height="118" rx="14" fill="#FFFFFF" stroke="#FED7AA" filter="url(#shadow)"/>
  <rect x="340" y="190" width="130" height="10" rx="14" fill="#EA580C"/>
  <text x="405" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">执行类</text>
  <text x="405" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">默认关闭</text>
  <text x="405" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">按动作授权</text>
  <text x="405" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">发信 / 改记录 / 删除</text>

  <rect x="490" y="190" width="130" height="118" rx="14" fill="#FFFFFF" stroke="#E9D5FF" filter="url(#shadow)"/>
  <rect x="490" y="190" width="130" height="10" rx="14" fill="#9333EA"/>
  <text x="555" y="222" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">敏感类</text>
  <text x="555" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">人工确认</text>
  <text x="555" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">留痕审计</text>
  <text x="555" y="288" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">导出 / 批量改 / 共享</text>

  <line x1="330" y1="176" x2="105" y2="190" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="176" x2="255" y2="190" stroke="#D97706" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="176" x2="405" y2="190" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="176" x2="555" y2="190" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="74" y="332" width="512" height="42" rx="12" fill="#FFFFFF" stroke="#DCFCE7" filter="url(#shadow)"/>
  <circle cx="100" cy="353" r="9" fill="#16A34A"/>
  <path d="M96 353 L99 356 L104 349" fill="none" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="120" y="358" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#166534">判断标准：一旦调用出错后果难以轻松补救，就不应属于默认权限</text>
</svg>