<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/></filter><marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/></marker><marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/></marker><marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/></marker></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">Prompt Injection 不是写得不严，而是上下文被污染</text><rect x="40" y="78" width="170" height="84" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="125" y="106" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">系统提示词</text><text x="125" y="130" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">你以为它是最高规则</text><text x="125" y="149" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">但它只是一部分上下文</text><rect x="40" y="196" width="170" height="126" rx="12" fill="#FFFFFF" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/><text x="125" y="224" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">外部文本输入</text><text x="125" y="248" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 邮件 / 文档</text><text x="125" y="267" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">知识库 / Issue / PR</text><text x="125" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可能夹带“伪指令”</text><rect x="252" y="110" width="156" height="180" rx="12" fill="#FFFFFF" stroke="#9333EA" stroke-width="2" filter="url(#shadow)"/><text x="330" y="140" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#9333EA">模型</text><text x="330" y="168" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不会“执行某一段提示词”</text><text x="330" y="188" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">而是在整个上下文中</text><text x="330" y="208" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">综合判断现在该听谁的</text><rect x="274" y="228" width="112" height="40" rx="10" fill="#F3E8FF" stroke="#9333EA" stroke-width="1.5"/><text x="330" y="252" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B21A8">话语权被争抢</text><rect x="450" y="78" width="170" height="244" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/><text x="535" y="106" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">真正的防御重点</text><rect x="470" y="128" width="130" height="46" rx="10" fill="#F0FDF4" stroke="#16A34A" stroke-width="1.5"/><text x="535" y="147" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">1. 识别不可信内容</text><text x="535" y="163" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">来源、格式、边界</text><rect x="470" y="186" width="130" height="46" rx="10" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/><text x="535" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1D4ED8">2. 限制影响层级</text><text x="535" y="221" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">检索层、推理层、执行层</text><rect x="470" y="244" width="130" height="46" rx="10" fill="#FFF7ED" stroke="#D97706" stroke-width="1.5"/><text x="535" y="263" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#B45309">3. 控制最大权限</text><text x="535" y="279" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">即使带偏也不能闯祸</text><line x1="210" y1="120" x2="252" y2="155" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="210" y1="248" x2="252" y2="228" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><line x1="408" y1="200" x2="450" y2="200" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><text x="330" y="354" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">核心结论：问题不在提示词是否更凶，而在上下文是否可控</text></svg>