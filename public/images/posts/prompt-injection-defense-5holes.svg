<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/></filter></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">Agent 一上线就翻车的核心原因</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">能力超过判断力，外部内容混入执行链路</text><rect x="230" y="86" width="200" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/><text x="330" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">统一上下文输入</text><text x="330" y="133" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">网页 / 邮件 / 用户输入 / 知识库</text><line x1="330" y1="150" x2="330" y2="178" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="230" y="178" width="200" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/><text x="330" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">模型自主判断</text><text x="330" y="225" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">听谁 / 信谁 / 要不要执行</text><line x1="330" y1="242" x2="330" y2="270" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="230" y="270" width="200" height="64" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FECACA"/><text x="330" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">执行链路被带偏</text><text x="330" y="317" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">越权查询 / 误操作 / 错误通知</text><rect x="40" y="108" width="150" height="84" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="115" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">客服/工单 Agent</text><text x="115" y="154" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">读输入后查订单</text><text x="115" y="172" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">风险：诱导越权操作</text><line x1="190" y1="150" x2="230" y2="118" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="470" y="108" width="150" height="84" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><text x="545" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#9333EA">研究/信息助手</text><text x="545" y="154" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">抓网页、读 PDF</text><text x="545" y="172" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">风险：资料伪装指令</text><line x1="470" y1="150" x2="430" y2="118" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="470" y="250" width="150" height="84" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/><text x="545" y="274" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">办公自动化 Agent</text><text x="545" y="296" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">读邮件、改表格</text><text x="545" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">风险：一步错步步错</text><line x1="470" y1="292" x2="430" y2="302" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="40" y="270" width="150" height="84" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#FDE68A"/><text x="115" y="294" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#D97706">真正该补的</text><text x="115" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">不是更强硬提示词</text><text x="115" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">而是系统边界</text><line x1="190" y1="312" x2="230" y2="302" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/></svg>