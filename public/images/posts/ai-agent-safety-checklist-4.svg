<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">数据外泄测试：上线前最低限度检查</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心不是背诵隐私，而是防止数据在系统中被多带、多传、多记、多吐</text><rect x="250" y="88" width="160" height="56" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="330" y="111" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">脏数据包</text><text x="330" y="130" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#374151">姓名 / 邮箱 / 手机 / Token / API Key</text><line x1="330" y1="144" x2="120" y2="182" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="144" x2="280" y2="182" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="144" x2="380" y2="182" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="144" x2="540" y2="182" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="40" y="182" width="160" height="118" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#shadow)"/><text x="120" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">模型上下文</text><text x="56" y="232" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">检查：是否只传必需字段</text><text x="56" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">危险：整份用户资料都塞入</text><text x="56" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">补法：字段白名单</text><rect x="220" y="182" width="160" height="118" rx="12" fill="#FFFFFF" stroke="#EA580C" stroke-width="2" filter="url(#shadow)"/><text x="300" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">工具调用参数</text><text x="236" y="232" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">检查：是否传给无关工具</text><text x="236" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">危险：邮箱电话原文全带走</text><text x="236" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">补法：每个工具限定字段</text><rect x="400" y="182" width="160" height="118" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="2" filter="url(#shadow)"/><text x="480" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">日志记录</text><text x="416" y="232" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">检查：是否记敏感原文密钥</text><text x="416" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">危险：日志可直接搜到 token</text><text x="416" y="276" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">补法：默认脱敏，关详细日志</text><rect x="220" y="318" width="220" height="58" rx="12" fill="#FFFFFF" stroke="#9333EA" stroke-width="2" filter="url(#shadow)"/><text x="330" y="341" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">错误处理</text><text x="330" y="362" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">检查异常是否回显内部路径、请求内容、Headers</text><line x1="540" y1="300" x2="440" y2="318" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="120" y1="300" x2="220" y2="347" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="300" y1="300" x2="300" y2="318" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="480" y1="300" x2="440" y2="337" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="514" y="86" width="110" height="46" rx="12" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/><text x="569" y="105" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#D97706">判断标准</text><text x="569" y="121" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#92400E">数据非必要不经过</text></svg>