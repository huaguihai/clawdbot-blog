<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="#FAFAFA" rx="8"/>

  <!-- Title -->
  <text x="330" y="36" text-anchor="middle" fill="#1C1917" font-size="16" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">单 Agent vs 对抗架构：同一个任务，两种结局</text>

  <!-- Left card: Solo -->
  <g filter="url(#shadow)">
    <rect x="24" y="56" width="296" height="310" rx="12" fill="#FFF"/>
    <!-- Header -->
    <rect x="24" y="56" width="296" height="44" rx="12" fill="#EF4444"/>
    <rect x="24" y="80" width="296" height="20" fill="#EF4444"/>
    <text x="172" y="84" text-anchor="middle" fill="#FFF" font-size="15" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">单 Agent</text>

    <!-- Metrics -->
    <g font-family="-apple-system,'Segoe UI',sans-serif">
      <text x="44" y="126" fill="#78716C" font-size="11">耗时</text>
      <text x="280" y="126" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">20 分钟</text>

      <line x1="44" y1="138" x2="300" y2="138" stroke="#E7E5E4"/>

      <text x="44" y="158" fill="#78716C" font-size="11">成本</text>
      <text x="280" y="158" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">$9</text>

      <line x1="44" y1="170" x2="300" y2="170" stroke="#E7E5E4"/>

      <text x="44" y="190" fill="#78716C" font-size="11">核心功能</text>
      <text x="280" y="190" text-anchor="end" fill="#EF4444" font-size="14" font-weight="700">❌ 坏的</text>

      <line x1="44" y1="202" x2="300" y2="202" stroke="#E7E5E4"/>

      <text x="44" y="222" fill="#78716C" font-size="11">迭代轮数</text>
      <text x="280" y="222" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">0 轮</text>

      <line x1="44" y1="234" x2="300" y2="234" stroke="#E7E5E4"/>

      <text x="44" y="254" fill="#78716C" font-size="11">功能数</text>
      <text x="280" y="254" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">基础骨架</text>
    </g>

    <!-- Verdict -->
    <rect x="44" y="278" width="256" height="72" rx="8" fill="#FEF2F2"/>
    <text x="172" y="304" text-anchor="middle" fill="#991B1B" font-size="12" font-weight="600" font-family="-apple-system,'Segoe UI',sans-serif">游戏引擎和运行时接线断裂</text>
    <text x="172" y="324" text-anchor="middle" fill="#991B1B" font-size="12" font-family="-apple-system,'Segoe UI',sans-serif">看起来像编辑器，但游戏跑不起来</text>
  </g>

  <!-- Right card: Adversarial -->
  <g filter="url(#shadow)">
    <rect x="340" y="56" width="296" height="310" rx="12" fill="#FFF"/>
    <!-- Header -->
    <rect x="340" y="56" width="296" height="44" rx="12" fill="#16A34A"/>
    <rect x="340" y="80" width="296" height="20" fill="#16A34A"/>
    <text x="488" y="84" text-anchor="middle" fill="#FFF" font-size="15" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">Generator + Evaluator</text>

    <!-- Metrics -->
    <g font-family="-apple-system,'Segoe UI',sans-serif">
      <text x="360" y="126" fill="#78716C" font-size="11">耗时</text>
      <text x="596" y="126" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">6 小时</text>

      <line x1="360" y1="138" x2="616" y2="138" stroke="#E7E5E4"/>

      <text x="360" y="158" fill="#78716C" font-size="11">成本</text>
      <text x="596" y="158" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">$200</text>

      <line x1="360" y1="170" x2="616" y2="170" stroke="#E7E5E4"/>

      <text x="360" y="190" fill="#78716C" font-size="11">核心功能</text>
      <text x="596" y="190" text-anchor="end" fill="#16A34A" font-size="14" font-weight="700">✅ 完整可用</text>

      <line x1="360" y1="202" x2="616" y2="202" stroke="#E7E5E4"/>

      <text x="360" y="222" fill="#78716C" font-size="11">迭代轮数</text>
      <text x="596" y="222" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">10 轮</text>

      <line x1="360" y1="234" x2="616" y2="234" stroke="#E7E5E4"/>

      <text x="360" y="254" fill="#78716C" font-size="11">功能数</text>
      <text x="596" y="254" text-anchor="end" fill="#1C1917" font-size="14" font-weight="700">16 个</text>
    </g>

    <!-- Verdict -->
    <rect x="360" y="278" width="256" height="72" rx="8" fill="#F0FDF4"/>
    <text x="488" y="304" text-anchor="middle" fill="#166534" font-size="12" font-weight="600" font-family="-apple-system,'Segoe UI',sans-serif">物理引擎 / 精灵动画 / 行为模板</text>
    <text x="488" y="324" text-anchor="middle" fill="#166534" font-size="12" font-family="-apple-system,'Segoe UI',sans-serif">AI 生成关卡和精灵，完整可玩</text>
  </g>

  <!-- Bottom note -->
  <text x="330" y="390" text-anchor="middle" fill="#78716C" font-size="11" font-family="-apple-system,'Segoe UI',sans-serif">数据来源：Anthropic Engineering Blog — Harness Design for Long-Running Apps (2026-03-24)</text>
</svg>
