<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 460">
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="8" markerHeight="8" orient="auto-start-auto">
      <path d="M 0 0 L 5 10 L 10 0" fill="none" stroke="#94A3B8" stroke-width="2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="330" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#374151">6 个 Agent 的文件协调机制</text>

  <!-- Monica - left sidebar -->
  <rect x="16" y="60" width="130" height="56" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="81" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">🎯 Monica</text>
  <text x="81" y="102" text-anchor="middle" font-size="10" fill="#C2410C">总管 · 派任务 · 周报</text>

  <!-- Ross - left sidebar -->
  <rect x="16" y="140" width="130" height="56" rx="10" fill="#FDF4FF" stroke="#C084FC" stroke-width="1.5"/>
  <text x="81" y="164" text-anchor="middle" font-size="13" font-weight="700" fill="#581C87">🔧 Ross</text>
  <text x="81" y="182" text-anchor="middle" font-size="10" fill="#9333EA">工程师 · 审代码 · 修 Bug</text>

  <!-- Dwight - top center -->
  <rect x="220" y="60" width="220" height="56" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="330" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A8A">🔍 Dwight（研究员）</text>
  <text x="330" y="102" text-anchor="middle" font-size="10" fill="#2563EB">每天 3 次扫描 X · HN · GitHub</text>

  <!-- Arrow: Dwight → file -->
  <line x1="330" y1="116" x2="330" y2="154" stroke="#60A5FA" stroke-width="2" marker-end="url(#arr)"/>
  <text x="348" y="140" font-size="9" fill="#94A3B8">写入 ↓</text>

  <!-- Central file hub -->
  <rect x="190" y="164" width="280" height="50" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="330" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">📄 intel / DAILY-INTEL.md</text>
  <text x="330" y="203" text-anchor="middle" font-size="9" fill="#94A3B8">结构化情报文件 — 所有内容岗从这里读取</text>

  <!-- Three arrows fanning out from file hub -->
  <line x1="260" y1="214" x2="170" y2="278" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="330" y1="214" x2="330" y2="278" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="400" y1="214" x2="490" y2="278" stroke="#94A3B8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Kelly -->
  <rect x="70" y="288" width="190" height="70" rx="10" fill="#EFF6FF" stroke="#60A5FA" stroke-width="1.5"/>
  <text x="165" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#1E3A8A">✍️ Kelly</text>
  <text x="165" y="330" text-anchor="middle" font-size="10" fill="#2563EB">Twitter / X 手</text>
  <text x="165" y="347" text-anchor="middle" font-size="9" fill="#94A3B8">读情报 → 写推文草稿</text>

  <!-- Rachel -->
  <rect x="280" y="288" width="190" height="70" rx="10" fill="#F0FDF4" stroke="#4ADE80" stroke-width="1.5"/>
  <text x="375" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#14532D">💼 Rachel</text>
  <text x="375" y="330" text-anchor="middle" font-size="10" fill="#16A34A">LinkedIn 手</text>
  <text x="375" y="347" text-anchor="middle" font-size="9" fill="#94A3B8">读情报 → 写职场内容</text>

  <!-- Pam -->
  <rect x="490" y="288" width="150" height="70" rx="10" fill="#FFF7ED" stroke="#FB923C" stroke-width="1.5"/>
  <text x="565" y="312" text-anchor="middle" font-size="13" font-weight="700" fill="#9A3412">📰 Pam</text>
  <text x="565" y="330" text-anchor="middle" font-size="10" fill="#C2410C">Newsletter 写手</text>
  <text x="565" y="347" text-anchor="middle" font-size="9" fill="#94A3B8">汇总 → 发 Newsletter</text>

  <!-- Bottom label -->
  <rect x="170" y="400" width="320" height="44" rx="8" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="1"/>
  <text x="330" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">协调方式：纯文件系统</text>
  <text x="330" y="436" text-anchor="middle" font-size="10" fill="#94A3B8">无 API · 无消息队列 · 无微服务 · 就是文件</text>

  <!-- Monica dotted oversight line -->
  <line x1="146" y1="88" x2="220" y2="88" stroke="#FB923C" stroke-width="1" stroke-dasharray="4,3"/>
</svg>
