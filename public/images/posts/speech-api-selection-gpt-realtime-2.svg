<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#0F172A">你该用实时还是异步？一句话判断</text>

  <!-- Start card -->
  <rect x="170" y="70" width="320" height="62" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="98" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">产品流程允许“稍后给结果”？</text>
  <text x="330" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">（用户不需要当场等你回话）</text>

  <!-- Decision node -->
  <rect x="170" y="154" width="320" height="74" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="183" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">是否需要“实时价值”？</text>
  <text x="330" y="203" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">同屏字幕 / 无障碍 / 会中提示行动项</text>

  <!-- Lines from start to decision -->
  <line x1="330" y1="132" x2="330" y2="154" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Left: Async -->
  <rect x="60" y="262" width="250" height="112" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="185" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#16A34A">优先选：异步</text>
  <text x="185" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">Whisper / 批处理</text>
  <text x="185" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">关注：最终可检索、可总结、可追责</text>
  <text x="185" y="358" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">适合：会议记录等“输入给机器，输出给人看”</text>

  <!-- Right: Real-time -->
  <rect x="350" y="262" width="250" height="112" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="475" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#2563EB">再考虑：实时</text>
  <text x="475" y="314" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">用户正在等你“回话”的那一刻</text>
  <text x="475" y="336" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">成本：网络抖动兜底 + 流式拼句 + 实时失败率</text>
  <text x="475" y="358" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">适合：字幕、无障碍、会中提醒</text>

  <!-- Connect decision to branches -->
  <line x1="250" y1="228" x2="185" y2="262" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="410" y1="228" x2="475" y2="262" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Branch labels -->
  <rect x="140" y="234" width="90" height="24" rx="12" fill="#16A34A"/>
  <text x="185" y="251" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#FFFFFF">不需要 / 允许稍后</text>

  <rect x="430" y="234" width="90" height="24" rx="12" fill="#2563EB"/>
  <text x="475" y="251" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#FFFFFF">需要 / 正在等</text>
</svg>