<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827">提示注入：把资料和命令分开</text><rect x="36" y="78" width="168" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="120" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#2563EB">用户指令</text><text x="120" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可信任务</text><rect x="246" y="78" width="168" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#16A34A">内部数据</text><text x="330" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">可信资料</text><rect x="456" y="78" width="168" height="86" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="540" y="110" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#EA580C">外部内容</text><text x="540" y="135" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不可信文本</text><line x1="204" y1="121" x2="246" y2="121" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="414" y1="121" x2="456" y2="121" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="130" y="206" width="400" height="118" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="238" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">Agent 判断层</text><text x="330" y="266" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">把资料、指令、待确认项分开处理</text><text x="330" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">外部文字只能作为资料，不自动升级为命令</text><text x="330" y="316" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">写库、发消息、支付等动作进入确认层</text><line x1="120" y1="164" x2="235" y2="206" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="330" y1="164" x2="330" y2="206" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="540" y1="164" x2="425" y2="206" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="488" y="254" width="126" height="54" rx="12" fill="#FFFFFF" stroke="#D97706" stroke-width="2" filter="url(#shadow)"/><text x="551" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#D97706">确认层</text></svg>