<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg"><defs><filter id="card-shadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000015"/></filter></defs><rect width="660" height="400" fill="#FAFAFA" rx="12"/><text x="330" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827" text-anchor="middle">传统单轮直出 vs 智绘流水线</text><text x="330" y="65" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">从不可控黑盒升级为分阶段状态机</text><g transform="translate(30, 85)"><rect width="220" height="210" fill="#FFFFFF" rx="10" filter="url(#card-shadow)"/><text x="110" y="25" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#EA580C" text-anchor="middle">传统模式痛点</text><line x1="20" y1="35" x2="200" y2="35" stroke="#FCA5A5" stroke-width="2"/><circle cx="25" cy="60" r="4" fill="#EF4444"/><text x="40" y="64" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">出错不可定位（逻辑/代码/渲染混杂）</text><circle cx="25" cy="85" r="4" fill="#EF4444"/><text x="40" y="89" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">不可局部返工（全量重算或重跑）</text><circle cx="25" cy="110" r="4" fill="#EF4444"/><text x="40" y="114" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">不可工程化审查（无中间产物/刷日志）</text><text x="110" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#9CA3AF" text-anchor="middle">模型抽风一次，人陪着熬夜一次</text></g><path d="M260 190 L275 190" stroke="#9CA3AF" stroke-width="2" marker-end="url(#arrowhead)"/><defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#9CA3AF"/></marker></defs><g transform="translate(290, 85)"><rect width="330" height="210" fill="#FFFFFF" rx="10" filter="url(#card-shadow)"/><text x="165" y="25" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB" text-anchor="middle">智绘流水线：5阶段状态机</text><line x1="20" y1="35" x2="310" y2="35" stroke="#BFDBFE" stroke-width="2"/><rect x="15" y="50" width="45" height="35" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/><text x="37" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">规划</text><text x="37" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">结构化大纲</text><circle cx="80" cy="67" r="9" fill="#16A34A"/><path d="M76 67 L79 70 L84 64" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="60" y1="67" x2="71" y2="67" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="3,3"/><rect x="95" y="50" width="45" height="35" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/><text x="117" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">草稿</text><text x="117" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">初版视频</text><circle cx="160" cy="67" r="9" fill="#16A34A"/><path d="M156 67 L159 70 L164 64" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="140" y1="67" x2="151" y2="67" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="3,3"/><rect x="175" y="50" width="45" height="35" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/><text x="197" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">实现</text><text x="197" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">渲染代码</text><circle cx="240" cy="67" r="9" fill="#16A34A"/><path d="M236 67 L239 70 L244 64" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="220" y1="67" x2="231" y2="67" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="3,3"/><rect x="255" y="50" width="45" height="35" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/><text x="277" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">审查</text><text x="277" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">自动校验</text><circle cx="320" cy="67" r="9" fill="#16A34A"/><path d="M316 67 L319 70 L324 64" stroke="#fff" stroke-width="1.5" fill="none"/><line x1="300" y1="67" x2="311" y2="67" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="3,3"/><rect x="335" y="50" width="45" height="35" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5" rx="6"/><text x="357" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#2563EB" text-anchor="middle">自愈</text><text x="357" y="100" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="10" fill="#6B7280" text-anchor="middle">定位修复</text><text x="165" y="135" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A" text-anchor="middle">任何一步失败均被拦截在本阶段，不污染下游</text></g></svg>