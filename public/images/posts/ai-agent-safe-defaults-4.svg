<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .small { font-size: 12px; fill: #334155; }
      .text { font-size: 13px; fill: #0f172a; }
      .title { font-size: 16px; font-weight: 700; fill: #0f172a; }
      .muted { font-size: 12px; fill: #475569; }
      .card { fill: #ffffff; rx: 12; filter: url(#shadow); }
      .arrow { stroke: #64748b; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
    </style>
    <marker id="arrowHead" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="30" y="45" class="font title">为什么高风险动作要先 dry-run：两段式执行（Plan → 审核 → Commit）</text>
  <text x="30" y="68" class="font muted">核心：先产出计划与变更预览，再放行执行；Commit 必须使用已冻结的计划数据</text>

  <!-- Cards layout -->
  <!-- Step 1 -->
  <rect x="30" y="110" width="145" height="150" class="card"/>
  <rect x="30" y="110" width="145" height="10" rx="12" fill="#2563EB"/>
  <text x="45" y="142" class="font text" font-weight="700" fill="#1d4ed8">1) Plan / dry-run</text>
  <text x="45" y="165" class="font small">生成执行计划</text>
  <text x="45" y="185" class="font small">参数预览</text>
  <text x="45" y="205" class="font small">影响范围评估</text>
  <text x="45" y="230" class="font small" fill="#2563EB">不做真实写入</text>

  <!-- Step 2 -->
  <rect x="200" y="110" width="145" height="150" class="card"/>
  <rect x="200" y="110" width="145" height="10" rx="12" fill="#EA580C"/>
  <text x="215" y="142" class="font text" font-weight="700" fill="#c2410c">2) Review</text>
  <text x="215" y="165" class="font small">人审或规则审</text>
  <text x="215" y="185" class="font small">收件人 / 金额阈值</text>
  <text x="215" y="205" class="font small">环境 / 租户边界</text>
  <text x="215" y="230" class="font small" fill="#EA580C">决定是否放行</text>

  <!-- Step 3 -->
  <rect x="370" y="110" width="145" height="150" class="card"/>
  <rect x="370" y="110" width="145" height="10" rx="12" fill="#16A34A"/>
  <text x="385" y="142" class="font text" font-weight="700" fill="#15803d">3) Commit</text>
  <text x="385" y="165" class="font small">仅允许高风险工具</text>
  <text x="385" y="185" class="font small">读取已批准 Plan ID</text>
  <text x="385" y="205" class="font small">执行写库 / 发邮件 / 调 API</text>

  <!-- Freeze note -->
  <rect x="355" y="270" width="175" height="70" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="355" y="270" width="175" height="6" rx="12" fill="#D97706"/>
  <text x="368" y="295" class="font small" font-weight="700" fill="#b45309">关键约束：参数冻结</text>
  <text x="368" y="315" class="font small">Commit 不能重新生成参数</text>
  <text x="368" y="334" class="font small">必须使用 dry-run 产出的计划</text>

  <!-- Step 4 -->
  <rect x="540" y="110" width="100" height="150" class="card"/>
  <rect x="540" y="110" width="100" height="10" rx="12" fill="#9333EA"/>
  <text x="553" y="142" class="font text" font-weight="700" fill="#7e22ce">4) Rollback</text>
  <text x="553" y="165" class="font small">补偿动作</text>
  <text x="553" y="185" class="font small">撤销队列</text>
  <text x="553" y="205" class="font small">恢复快照</text>
  <text x="553" y="230" class="font small" fill="#9333EA">尽量可逆</text>

  <!-- Arrows -->
  <path d="M 175 185 L 200 185" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 345 185 L 370 185" class="arrow" marker-end="url(#arrowHead)"/>
  <path d="M 515 185 L 540 185" class="arrow" marker-end="url(#arrowHead)"/>

  <!-- Bottom summary: safe defaults -->
  <rect x="30" y="320" width="300" height="55" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <text x="45" y="345" class="font small" font-weight="700" fill="#0f172a">安全默认（最小稳方案）</text>
  <text x="45" y="365" class="font small">白名单权限 + 结构化可追踪记录 + 两段式执行</text>

  <!-- Dashed connector to freeze note -->
  <path d="M 442 260 L 442 270" class="arrow" marker-end="url(#arrowHead)"/>
</svg>