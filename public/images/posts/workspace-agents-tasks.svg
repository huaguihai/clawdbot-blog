<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <style>
    text{font-family:-apple-system, 'Segoe UI', sans-serif; fill:#111827}
    .title{font-size:24px;font-weight:700}
    .subtitle{font-size:13px;fill:#6B7280}
    .head{font-size:18px;font-weight:700}
    .label{font-size:14px;font-weight:600}
    .body{font-size:13px;fill:#374151}
    .small{font-size:12px;fill:#6B7280}
  </style>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="330" y="38" text-anchor="middle" class="title">Workspace Agents 到底适合做什么</text>
  <text x="330" y="60" text-anchor="middle" class="subtitle">核心判断：重复、结构化、跨工具、可验收 → 更适合 Agent</text>

  <rect x="40" y="90" width="250" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="370" y="90" width="250" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="40" y="90" width="250" height="44" rx="12" fill="#2563EB"/>
  <rect x="370" y="90" width="250" height="44" rx="12" fill="#16A34A"/>

  <text x="165" y="118" text-anchor="middle" class="head" fill="#FFFFFF">更适合普通聊天</text>
  <text x="495" y="118" text-anchor="middle" class="head" fill="#FFFFFF">更适合 Workspace Agent</text>

  <circle cx="64" cy="156" r="6" fill="#9333EA"/>
  <text x="80" y="161" class="label">临时写一段文案</text>
  <circle cx="64" cy="192" r="6" fill="#9333EA"/>
  <text x="80" y="197" class="label">一次性头脑风暴</text>
  <circle cx="64" cy="228" r="6" fill="#9333EA"/>
  <text x="80" y="233" class="label">总结一份 PDF</text>
  <circle cx="64" cy="264" r="6" fill="#EA580C"/>
  <text x="80" y="269" class="label">开放式策略思考</text>
  <text x="80" y="293" class="small">特点：一次性、开放性高、</text>
  <text x="80" y="311" class="small">更像临时找聪明同事帮忙</text>

  <circle cx="394" cy="156" r="6" fill="#D97706"/>
  <text x="410" y="161" class="label">每周固定生成经营周报</text>
  <circle cx="394" cy="192" r="6" fill="#D97706"/>
  <text x="410" y="197" class="label">多渠道收集反馈并分流</text>
  <circle cx="394" cy="228" r="6" fill="#D97706"/>
  <text x="410" y="233" class="label">定时拉数据、出摘要、分发</text>
  <circle cx="394" cy="264" r="6" fill="#EA580C"/>
  <text x="410" y="269" class="label">高风险事项仅做草稿</text>
  <text x="410" y="293" class="small">特点：重复、结构化、跨工具、</text>
  <text x="410" y="311" class="small">有明确输入输出和验收标准</text>

  <line x1="290" y1="205" x2="370" y2="205" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6"/>
  <rect x="267" y="183" width="116" height="44" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="325" y="201" text-anchor="middle" class="body">判断关键</text>
  <text x="325" y="218" text-anchor="middle" class="small">是否持续做事</text>

  <rect x="86" y="338" width="488" height="38" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="362" text-anchor="middle" class="body">把 Agent 当成“有权限、有 SOP 的实习生”，而不是一次性聊天窗口</text>
</svg>