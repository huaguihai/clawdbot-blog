<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#EA580C"/></marker></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">为什么会用工具的 AI 更容易出事</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">问题不只是回答错误，而是外部内容会污染决策链并触发执行</text><rect x="50" y="120" width="150" height="88" rx="16" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/><text x="125" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">1 读取外部内容</text><text x="125" y="174" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">网页 / 知识库</text><text x="125" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">工具返回 / 用户输入</text><rect x="255" y="120" width="150" height="88" rx="16" fill="#FFFFFF" stroke="#FDE68A" filter="url(#shadow)"/><text x="330" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#D97706">2 模型判断下一步</text><text x="330" y="174" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">所有信息混在同一上下文</text><text x="330" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">难分谁是真正指令</text><rect x="460" y="120" width="150" height="88" rx="16" fill="#FFFFFF" stroke="#DCFCE7" filter="url(#shadow)"/><text x="535" y="150" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">3 调用工具执行</text><text x="535" y="174" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">读 / 写 / 发 / 改</text><text x="535" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">从“聊天”变成“做事”</text><line x1="200" y1="164" x2="255" y2="164" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/><line x1="405" y1="164" x2="460" y2="164" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/><rect x="206" y="255" width="248" height="94" rx="18" fill="#FFFFFF" stroke="#FECACA" filter="url(#shadow)"/><text x="330" y="285" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">Prompt Injection 污染决策链</text><text x="330" y="309" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">不是单纯让模型“说错话”</text><text x="330" y="328" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">而是让系统依据错误信号去执行动作</text><line x1="330" y1="208" x2="330" y2="255" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowOrange)"/><rect x="58" y="268" width="120" height="58" rx="14" fill="#FFFFFF" stroke="#E9D5FF" filter="url(#shadow)"/><text x="118" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333EA">错误根因</text><text x="118" y="312" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">多种来源共用上下文</text><line x1="178" y1="297" x2="206" y2="297" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="484" y="268" width="126" height="58" rx="14" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/><text x="547" y="292" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563EB">结果</text><text x="547" y="312" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">执行未授权操作</text><line x1="454" y1="297" x2="484" y2="297" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/></svg>