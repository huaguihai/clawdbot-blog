<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">多智能体提示词的稳固拆法</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">核心思路：拆成“任务契约 + 适配备注”</text>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <rect x="235" y="82" width="190" height="56" rx="14" fill="#2563EB" filter="url(#shadow)"/>
  <text x="330" y="106" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">提示词拆两层</text>
  <text x="330" y="126" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#DBEAFE">先钉住交付，再补充适配细节</text>

  <line x1="330" y1="138" x2="330" y2="162" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="60" y="162" width="320" height="200" rx="16" fill="#FFFFFF" stroke="#DBEAFE" filter="url(#shadow)"/>
  <rect x="80" y="178" width="132" height="34" rx="10" fill="#2563EB"/>
  <text x="146" y="200" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">第一层：任务契约</text>
  <text x="230" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">定义“你到底要交什么”</text>

  <rect x="82" y="224" width="276" height="24" rx="8" fill="#EFF6FF"/>
  <circle cx="96" cy="236" r="6" fill="#2563EB"/>
  <text x="110" y="240" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1F2937">目标产物</text>
  <text x="182" y="240" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">Markdown、JSON、周报等</text>

  <rect x="82" y="254" width="276" height="24" rx="8" fill="#FFF7ED"/>
  <circle cx="96" cy="266" r="6" fill="#EA580C"/>
  <text x="110" y="270" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1F2937">硬格式</text>
  <text x="162" y="270" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">标题、字段、结构、代码块</text>

  <rect x="82" y="284" width="276" height="24" rx="8" fill="#F0FDF4"/>
  <circle cx="96" cy="296" r="6" fill="#16A34A"/>
  <text x="110" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1F2937">允许能力</text>
  <text x="175" y="300" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">纯文本、工具、API 边界</text>

  <rect x="82" y="314" width="276" height="24" rx="8" fill="#FAF5FF"/>
  <circle cx="96" cy="326" r="6" fill="#9333EA"/>
  <text x="110" y="330" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1F2937">禁止事项</text>
  <text x="175" y="330" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">不编数据、不泄露思维链等</text>

  <rect x="82" y="344" width="276" height="24" rx="8" fill="#FFFBEB"/>
  <circle cx="96" cy="356" r="6" fill="#D97706"/>
  <text x="110" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1F2937">失败降级</text>
  <text x="175" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">缺信息也先交主体并标缺口</text>

  <rect x="410" y="162" width="190" height="200" rx="16" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <rect x="430" y="178" width="112" height="34" rx="10" fill="#16A34A"/>
  <text x="486" y="200" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">第二层：适配备注</text>
  <text x="505" y="236" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">面向具体编排环境</text>
  <text x="505" y="262" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">补充角色分工、上下文来源、</text>
  <text x="505" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">工具接线、平台限制等细节</text>

  <line x1="380" y1="262" x2="410" y2="262" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="395" y="252" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">再补</text>

  <rect x="426" y="308" width="158" height="38" rx="10" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="505" y="324" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#111827">关键收益</text>
  <text x="505" y="339" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#6B7280">先固定交付，减少返工和跑偏</text>
</svg>