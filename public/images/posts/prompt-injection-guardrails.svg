<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.12"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/></marker><marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/></marker></defs><text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">Prompt Injection 到底危险在哪</text><text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">当外部内容与系统指令混在同一上下文中，Agent 可能被带偏</text><rect x="46" y="100" width="170" height="88" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><rect x="58" y="114" width="34" height="34" rx="10" fill="#DBEAFE"/><text x="75" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">1</text><text x="105" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">系统原始目标</text><text x="58" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">读邮件 → 提取待办</text><text x="58" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">→ 生成草稿</text><rect x="246" y="100" width="170" height="88" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><rect x="258" y="114" width="34" height="34" rx="10" fill="#FFEDD5"/><text x="275" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">2</text><text x="306" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">外部内容输入</text><text x="258" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">邮件、网页、文档、</text><text x="258" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">README 中夹带指令</text><rect x="446" y="100" width="168" height="88" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/><rect x="458" y="114" width="34" height="34" rx="10" fill="#F3E8FF"/><text x="475" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333EA">3</text><text x="506" y="136" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#0F172A">上下文混合</text><text x="458" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">控制指令与内容</text><text x="458" y="180" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">未被清晰隔离</text><line x1="216" y1="144" x2="246" y2="144" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="416" y1="144" x2="446" y2="144" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="132" y="242" width="396" height="102" rx="18" fill="#FFFFFF" filter="url(#shadow)" stroke="#DCFCE7"/><rect x="148" y="258" width="42" height="42" rx="12" fill="#DCFCE7"/><path d="M159 279 L171 291 L181 267" fill="none" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="204" y="277" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">危险结果：Agent 执行了内容里的目标</text><text x="148" y="309" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">用户以为它在完成自己的任务，实际上它可能被“伪装成指令”的文本带偏</text><text x="148" y="330" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">而且问题往往藏在正常文案中，上线接入真实内容后才暴露</text><line x1="530" y1="188" x2="530" y2="214" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="530" y1="214" x2="330" y2="214" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="330" y1="214" x2="330" y2="242" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/><rect x="470" y="258" width="122" height="38" rx="12" fill="#FFF7ED" stroke="#FED7AA"/><text x="531" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#D97706">看似正常更难防</text></svg>