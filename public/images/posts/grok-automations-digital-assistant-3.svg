<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000020"/>
    </filter>
  </defs>
  <rect width="660" height="400" fill="#FAFAFA" rx="12"/>
  <style>text{font-family:-apple-system,'Segoe UI',sans-serif}</style>
  <text x="330" y="32" font-size="18" font-weight="600" fill="#111827" text-anchor="middle">高频重复场景 · 自动化试水指南</text>

  <!-- Card 1: Blue -->
  <g transform="translate(20, 50)">
    <rect width="180" height="290" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="180" height="4" rx="2" fill="#2563EB"/>
    <text x="90" y="30" font-size="15" font-weight="600" fill="#1E40AF" text-anchor="middle">每日晨间简报</text>
    <circle cx="30" cy="73" r="4" fill="#2563EB"/>
    <rect x="15" y="60" width="150" height="36" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1"/>
    <text x="90" y="83" font-size="13" fill="#1E3A8A" text-anchor="middle">定时触发 (8:00)</text>
    <line x1="90" y1="96" x2="90" y2="106" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="110" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="133" font-size="13" fill="#374151" text-anchor="middle">扫描日历/邮件/任务</text>
    <line x1="90" y1="146" x2="90" y2="156" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="160" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="183" font-size="13" fill="#374151" text-anchor="middle">输出结构化简报</text>
  </g>

  <!-- Card 2: Orange -->
  <g transform="translate(240, 50)">
    <rect width="180" height="290" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="180" height="4" rx="2" fill="#EA580C"/>
    <text x="90" y="30" font-size="15" font-weight="600" fill="#9A3412" text-anchor="middle">邮件自动秘书</text>
    <circle cx="30" cy="73" r="4" fill="#EA580C"/>
    <rect x="15" y="60" width="150" height="36" rx="8" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1"/>
    <text x="90" y="83" font-size="13" fill="#9A3412" text-anchor="middle">新邮件到达</text>
    <line x1="90" y1="96" x2="90" y2="106" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="110" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="133" font-size="13" fill="#374151" text-anchor="middle">解析内容并分级</text>
    <line x1="90" y1="146" x2="90" y2="156" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="160" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="183" font-size="13" fill="#374151" text-anchor="middle">生成处理建议/草稿</text>
  </g>

  <!-- Card 3: Green -->
  <g transform="translate(460, 50)">
    <rect width="180" height="290" rx="12" fill="#ffffff" filter="url(#shadow)" stroke="#E5E7EB" stroke-width="1"/>
    <rect width="180" height="4" rx="2" fill="#16A34A"/>
    <text x="90" y="30" font-size="15" font-weight="600" fill="#166534" text-anchor="middle">竞品情报监控</text>
    <circle cx="30" cy="73" r="4" fill="#16A34A"/>
    <rect x="15" y="60" width="150" height="36" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1"/>
    <text x="90" y="83" font-size="13" fill="#166534" text-anchor="middle">定时/按需触发</text>
    <line x1="90" y1="96" x2="90" y2="106" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="110" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="133" font-size="13" fill="#374151" text-anchor="middle">检索公开动态</text>
    <line x1="90" y1="146" x2="90" y2="156" stroke="#D1D5DB" stroke-width="2" stroke-dasharray="4 4"/>
    <rect x="15" y="160" width="150" height="36" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="90" y="183" font-size="13" fill="#374151" text-anchor="middle">输出变化与分析</text>
  </g>
</svg>