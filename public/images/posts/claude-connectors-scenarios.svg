<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.08"/></filter><marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/></marker><marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/></marker></defs><rect x="20" y="20" width="620" height="360" rx="12" fill="#FAFAFA" stroke="#E5E7EB"/><text x="330" y="52" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">Claude Connectors 到底值不值得开？</text><text x="330" y="80" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">核心判断：是减少切换、搜索、归纳，还是增加确认成本与噪音</text><rect x="245" y="108" width="170" height="58" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/><text x="330" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">连接器打开后</text><text x="330" y="152" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">先问一个问题</text><line x1="330" y1="166" x2="180" y2="204" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/><line x1="330" y1="166" x2="480" y2="204" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/><rect x="60" y="206" width="240" height="132" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#BBF7D0"/><rect x="360" y="206" width="240" height="132" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#FED7AA"/><circle cx="92" cy="238" r="14" fill="#16A34A"/><text x="92" y="243" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">✓</text><text x="180" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">值得开</text><text x="180" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">适合“取资料、整理信息”</text><text x="86" y="291" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 少切换页面</text><text x="86" y="313" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 少搜索来源</text><text x="86" y="335" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 少手动归纳</text><circle cx="392" cy="238" r="14" fill="#EA580C"/><text x="392" y="243" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">!</text><text x="480" y="240" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">谨慎开</text><text x="480" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">别把所有工作入口都塞给 AI</text><text x="386" y="291" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 更多可引用上下文</text><text x="386" y="313" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 更多可能跑偏来源</text><text x="386" y="335" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">• 更多权限暴露面</text><rect x="150" y="352" width="360" height="18" rx="9" fill="#EEF2FF"/><text x="330" y="365" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">判断公式：效率收益 &gt; 确认成本 = 开；反之不开</text></svg>