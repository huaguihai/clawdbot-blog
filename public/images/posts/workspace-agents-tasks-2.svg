<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">Agent 项目翻车的常见原因</text><text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">把“整理动作”和“决策动作”绑在一起</text><rect x="36" y="88" width="588" height="58" rx="14" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/><text x="330" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#1F2937">示例流程：销售线索跟进</text><text x="330" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">同一条业务链路里，既有稳定动作，也有高风险判断</text><line x1="120" y1="220" x2="190" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="260" y1="220" x2="330" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="400" y1="220" x2="470" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><line x1="540" y1="220" x2="610" y2="220" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/><rect x="50" y="180" width="140" height="80" rx="14" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/><rect x="62" y="192" width="34" height="20" rx="10" fill="#DBEAFE"/><text x="79" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">适合Agent</text><text x="120" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">信息拉取</text><text x="120" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">表单 / CRM / 公开资料</text><rect x="190" y="180" width="140" height="80" rx="14" fill="#FFFFFF" stroke="#BFDBFE" filter="url(#shadow)"/><rect x="202" y="192" width="34" height="20" rx="10" fill="#DBEAFE"/><text x="219" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#2563EB">适合Agent</text><text x="260" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">规则评分</text><text x="260" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">按条件做基础判断</text><rect x="330" y="180" width="140" height="80" rx="14" fill="#FFFFFF" stroke="#C4B5FD" filter="url(#shadow)"/><rect x="342" y="192" width="34" height="20" rx="10" fill="#F3E8FF"/><text x="359" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#9333EA">适合Agent</text><text x="400" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">邮件起草</text><text x="400" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">生成首封跟进内容</text><rect x="470" y="180" width="140" height="80" rx="14" fill="#FFFFFF" stroke="#FDBA74" filter="url(#shadow)"/><rect x="482" y="192" width="34" height="20" rx="10" fill="#FFEDD5"/><text x="499" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#EA580C">高风险</text><text x="540" y="228" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#1F2937">业务判断</text><text x="540" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">意向 / 折扣 / 交付承诺</text><line x1="470" y1="155" x2="470" y2="285" stroke="#EA580C" stroke-width="3" stroke-dasharray="8 6"/><rect x="206" y="300" width="248" height="56" rx="14" fill="#FFFFFF" stroke="#BBF7D0" filter="url(#shadow)"/><text x="330" y="323" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">正确切分方式</text><text x="330" y="344" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">让 Agent 处理稳定动作，把关键决策留给人</text></svg>