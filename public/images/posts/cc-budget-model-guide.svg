<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="#FAFAFA"/>

  <!-- Title -->
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#1C1917" x="330" y="35" text-anchor="middle">CC 三槽位调度架构</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#78716C" x="330" y="52" text-anchor="middle">每个槽位可独立替换为第三方模型</text>

  <!-- Central dispatcher box -->
  <rect x="230" y="68" width="200" height="36" rx="8" fill="#1C1917" filter="url(#shadow)"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="600" fill="#FAFAF9" x="330" y="91" text-anchor="middle">Claude Code 调度引擎</text>

  <!-- Arrows from dispatcher to three slots -->
  <line x1="270" y1="104" x2="130" y2="140" stroke="#E7E5E4" stroke-width="1.5"/>
  <line x1="330" y1="104" x2="330" y2="140" stroke="#E7E5E4" stroke-width="1.5"/>
  <line x1="390" y1="104" x2="530" y2="140" stroke="#E7E5E4" stroke-width="1.5"/>

  <!-- Slot 1: haiku -->
  <rect x="40" y="140" width="180" height="100" rx="10" fill="white" stroke="#16A34A" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="40" y="140" width="180" height="28" rx="10" fill="#16A34A" opacity="0.1"/>
  <rect x="40" y="157" width="180" height="1" fill="#16A34A" opacity="0.2"/>
  <circle cx="58" cy="154" r="5" fill="#16A34A" opacity="0.8"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#16A34A" x="70" y="158">haiku 槽位</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="55" y="182">文件摘要</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="55" y="198">上下文压缩</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="55" y="214">格式化处理</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#78716C" x="55" y="232">💡 最轻的活，不挑模型</text>

  <!-- Slot 2: sonnet -->
  <rect x="240" y="140" width="180" height="100" rx="10" fill="white" stroke="#2563EB" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="240" y="140" width="180" height="28" rx="10" fill="#2563EB" opacity="0.1"/>
  <rect x="240" y="157" width="180" height="1" fill="#2563EB" opacity="0.2"/>
  <circle cx="258" cy="154" r="5" fill="#2563EB" opacity="0.8"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#2563EB" x="270" y="158">sonnet 槽位</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="255" y="182">日常编码交互</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="255" y="198">Bug 修复</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="255" y="214">文件编辑</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#78716C" x="255" y="232">⚡ 主力位，消耗最多</text>

  <!-- Slot 3: opus -->
  <rect x="440" y="140" width="180" height="100" rx="10" fill="white" stroke="#EA580C" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="440" y="140" width="180" height="28" rx="10" fill="#EA580C" opacity="0.1"/>
  <rect x="440" y="157" width="180" height="1" fill="#EA580C" opacity="0.2"/>
  <circle cx="458" cy="154" r="5" fill="#EA580C" opacity="0.8"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="13" font-weight="700" fill="#EA580C" x="470" y="158">opus 槽位</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="455" y="182">复杂架构决策</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="455" y="198">多文件重构</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="11" fill="#44403C" x="455" y="214">SubAgent 深度推理</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#78716C" x="455" y="232">🔥 最难的活，不能省</text>

  <!-- Swap arrows -->
  <g opacity="0.6">
    <!-- haiku swap -->
    <line x1="130" y1="248" x2="130" y2="272" stroke="#16A34A" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="125,272 135,272 130,280" fill="#16A34A"/>

    <!-- sonnet swap -->
    <line x1="330" y1="248" x2="330" y2="272" stroke="#2563EB" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="325,272 335,272 330,280" fill="#2563EB"/>

    <!-- opus swap (X mark - don't swap) -->
    <line x1="530" y1="248" x2="530" y2="272" stroke="#EA580C" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="525,272 535,272 530,280" fill="#EA580C"/>
  </g>

  <!-- Replacement models -->
  <rect x="55" y="285" width="150" height="32" rx="8" fill="#16A34A" opacity="0.12" stroke="#16A34A" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#16A34A" x="130" y="305" text-anchor="middle">→ DeepSeek V3</text>

  <rect x="255" y="285" width="150" height="32" rx="8" fill="#2563EB" opacity="0.12" stroke="#2563EB" stroke-width="1" stroke-dasharray="4 3"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#2563EB" x="330" y="305" text-anchor="middle">→ DeepSeek / Qwen</text>

  <rect x="455" y="285" width="150" height="32" rx="8" fill="#EA580C" opacity="0.12" stroke="#EA580C" stroke-width="1"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#EA580C" x="530" y="305" text-anchor="middle">✦ 保留 Claude</text>

  <!-- Bottom summary -->
  <rect x="80" y="340" width="500" height="40" rx="10" fill="#1C1917" opacity="0.05"/>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#44403C" x="330" y="358" text-anchor="middle">推荐搭配：haiku + sonnet 换便宜模型 ｜ opus 保留 Claude = 省钱不掉质量</text>
  <text font-family="-apple-system,'Segoe UI',sans-serif" font-size="10" fill="#78716C" x="330" y="374" text-anchor="middle">虚线框 = 可替换 ｜ 实线框 = 建议保留</text>
</svg>