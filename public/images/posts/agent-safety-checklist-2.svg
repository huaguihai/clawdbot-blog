<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-weight:700; font-size:14px; fill:#111827; }
      .label { font-family:-apple-system,'Segoe UI',sans-serif; font-weight:700; font-size:11px; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:11px; fill:#374151; }
      .small { font-family:-apple-system,'Segoe UI',sans-serif; font-size:10.5px; fill:#4B5563; }
      .dash { stroke:#9CA3AF; stroke-width:1.5; stroke-dasharray:5 5; fill:none; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="10" y="10" width="640" height="380" rx="12"/>

  <!-- Center hub -->
  <rect class="card" x="245" y="158" width="170" height="84" rx="12"/>
  <text x="330" y="185" text-anchor="middle" class="title">Agent 安全边界</text>
  <text x="330" y="205" text-anchor="middle" class="small">不靠“提示词约束”</text>
  <text x="330" y="224" text-anchor="middle" class="small">靠 权限 / 校验 / 审计 / 可回滚</text>

  <!-- Dashed connectors -->
  <path class="dash" d="M 245 200 L 180 200"/>
  <path class="dash" d="M 415 200 L 480 200"/>
  <path class="dash" d="M 330 158 L 330 120"/>
  <path class="dash" d="M 330 242 L 330 280"/>

  <!-- Card 1: Prompt injection (Top) -->
  <rect class="card" x="140" y="40" width="380" height="90" rx="12"/>
  <rect x="140" y="40" width="380" height="6" rx="12" fill="#2563EB"/>
  <text x="160" y="70" class="title">第三方 Prompt Injection</text>
  <text x="160" y="90" class="label" fill="#2563EB">作死：</text>
  <text x="206" y="90" class="text">把“忽略规则/导出客户表”塞进邮件网页</text>
  <text x="160" y="108" class="label" fill="#16A34A">通过：</text>
  <text x="206" y="108" class="text">识别为不可信指令，只提取事实不执行动作</text>
  <text x="160" y="126" class="label" fill="#D97706">最低防线：</text>
  <text x="238" y="126" class="text">工具调用前做指令来源校验（外部内容最低）</text>

  <!-- Card 2: Data exfiltration (Left) -->
  <rect class="card" x="40" y="150" width="200" height="120" rx="12"/>
  <rect x="40" y="150" width="200" height="6" rx="12" fill="#EA580C"/>
  <text x="60" y="180" class="title">数据外泄</text>
  <text x="60" y="200" class="label" fill="#EA580C">作死：</text>
  <text x="106" y="200" class="text">诱导复述密钥/内部信息</text>
  <text x="60" y="218" class="label" fill="#16A34A">通过：</text>
  <text x="106" y="218" class="text">脱敏/拒绝；外发有白名单</text>
  <text x="60" y="236" class="label" fill="#D97706">最低防线：</text>
  <text x="138" y="236" class="text">最小上下文 + 外发前脱敏</text>
  <text x="60" y="252" class="text">域名/收件人白名单</text>

  <!-- Card 3: Privilege escalation (Right) -->
  <rect class="card" x="420" y="150" width="200" height="120" rx="12"/>
  <rect x="420" y="150" width="200" height="6" rx="12" fill="#9333EA"/>
  <text x="440" y="180" class="title">越权操作</text>
  <text x="440" y="200" class="label" fill="#9333EA">作死：</text>
  <text x="486" y="200" class="text">让它删库/退款/改权限</text>
  <text x="440" y="218" class="label" fill="#16A34A">通过：</text>
  <text x="486" y="218" class="text">二次确认或拒绝；请求可追溯</text>
  <text x="440" y="236" class="label" fill="#D97706">最低防线：</text>
  <text x="518" y="236" class="text">RBAC + 危险动作人工确认</text>
  <text x="440" y="252" class="text">可回滚机制</text>

  <!-- Card 4: Account integrity (Bottom) -->
  <rect class="card" x="140" y="280" width="380" height="90" rx="12"/>
  <rect x="140" y="280" width="380" height="6" rx="12" fill="#D97706"/>
  <text x="160" y="310" class="title">账户完整性</text>
  <text x="160" y="330" class="label" fill="#D97706">作死：</text>
  <text x="206" y="330" class="text">伪造回调/重放 webhook/偷 session/换收件人</text>
  <text x="160" y="348" class="label" fill="#16A34A">通过：</text>
  <text x="206" y="348" class="text">失败并告警；关键动作有强审计链</text>
  <text x="160" y="366" class="label" fill="#2563EB">最低防线：</text>
  <text x="238" y="366" class="text">OAuth state + webhook 签名 + 人/会话/设备绑定</text>
</svg>