<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#2563EB">Agent 发布前安全检查清单</text><rect x="38" y="72" width="584" height="282" rx="12" fill="#FFFFFF" stroke="#E5E7EB"/><rect x="52" y="92" width="556" height="34" rx="8" fill="#EFF6FF"/><circle cx="72" cy="109" r="7" fill="none" stroke="#2563EB" stroke-width="2"/><text x="90" y="114" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">物理隔离：系统提示词与用户输入使用不同 Message 类型</text><rect x="52" y="132" width="556" height="34" rx="8" fill="#FFF7ED"/><circle cx="72" cy="149" r="7" fill="none" stroke="#EA580C" stroke-width="2"/><text x="90" y="154" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">最小权限：工具白名单移除不必要写权限</text><rect x="52" y="172" width="556" height="34" rx="8" fill="#F0FDF4"/><circle cx="72" cy="189" r="7" fill="none" stroke="#16A34A" stroke-width="2"/><text x="90" y="194" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">人工确认：发邮件、删数据等敏感操作二次确认</text><rect x="52" y="212" width="556" height="34" rx="8" fill="#FAF5FF"/><circle cx="72" cy="229" r="7" fill="none" stroke="#9333EA" stroke-width="2"/><text x="90" y="234" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">输入截断：限制用户输入长度，防超长文本绕过</text><rect x="52" y="252" width="556" height="34" rx="8" fill="#FFFBEB"/><circle cx="72" cy="269" r="7" fill="none" stroke="#D97706" stroke-width="2"/><text x="90" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">审计记录：保留 Agent 调用工具的完整链路</text><rect x="52" y="292" width="556" height="34" rx="8" fill="#F9FAFB"/><circle cx="72" cy="309" r="7" fill="none" stroke="#2563EB" stroke-width="2"/><text x="90" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">敏感词过滤：输出增加一层敏感信息检测</text><line x1="330" y1="54" x2="330" y2="72" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4 4"/><line x1="330" y1="354" x2="330" y2="376" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="4 4"/><text x="330" y="388" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">权限越大，风险越高：上线前逐项自检</text></svg>