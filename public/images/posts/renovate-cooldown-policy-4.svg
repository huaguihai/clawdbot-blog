<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">Renovate vs Dependabot 冷却期策略</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">同样能控更新频率，但 Renovate 更适合按风险分级处理</text>

  <rect x="44" y="92" width="268" height="242" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="348" y="92" width="268" height="242" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="64" y="110" width="124" height="34" rx="10" fill="#DBEAFE"/>
  <text x="126" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">Renovate</text>
  <text x="202" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">分级策略更强</text>

  <rect x="368" y="110" width="146" height="34" rx="10" fill="#FFEDD5"/>
  <text x="441" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">Dependabot</text>
  <text x="528" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">轻量方案够用</text>

  <line x1="178" y1="162" x2="178" y2="304" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>
  <line x1="482" y1="162" x2="482" y2="304" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="5 5"/>

  <text x="82" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">策略</text>
  <text x="196" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">按更新类型细分</text>
  <text x="386" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">策略</text>
  <text x="500" y="175" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">按频率与分组控制</text>

  <text x="82" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">冷却期</text>
  <text x="196" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">patch 3天 / minor 7天 / major 14天</text>
  <text x="386" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">冷却期</text>
  <text x="500" y="205" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">无细粒度等待，靠 weekly/daily</text>

  <text x="82" y="235" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">自动合并</text>
  <text x="196" y="235" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">patch 可自动，minor/major 收紧</text>
  <text x="386" y="235" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">自动合并</text>
  <text x="500" y="235" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">可配基础规则，但联动较弱</text>

  <text x="82" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">特殊处理</text>
  <text x="196" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">安全更新、基础库、Actions 可单独规则</text>
  <text x="386" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">特殊处理</text>
  <text x="500" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">靠分组拆开核心库与开发工具</text>

  <text x="82" y="295" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">适用场景</text>
  <text x="196" y="295" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">多仓库、需风险分流、CI/CD 较复杂</text>
  <text x="386" y="295" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#334155">适用场景</text>
  <text x="500" y="295" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">想减少 PR 频率，快速上手即可</text>

  <line x1="312" y1="213" x2="348" y2="213" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <polygon points="348,213 340,208 340,218" fill="#94A3B8"/>

  <rect x="72" y="344" width="236" height="34" rx="10" fill="#DCFCE7"/>
  <circle cx="90" cy="361" r="6" fill="#16A34A"/>
  <text x="104" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">建议：patch 自动，minor 半自动，major 人工</text>

  <rect x="352" y="344" width="236" height="34" rx="10" fill="#F3E8FF"/>
  <circle cx="370" cy="361" r="6" fill="#9333EA"/>
  <text x="384" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B21A8">结论：简单控频率选 Dependabot，分级控风险选 Renovate</text>
</svg>