<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#1F2937">模型选型提示词决策流程</text><text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">先评估任务成本结构，再决定模型档位</text><rect x="50" y="92" width="160" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="130" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">1. 评估任务</text><text x="70" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 任务复杂度</text><text x="70" y="166" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 上下文长度</text><text x="70" y="186" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 容错成本</text><rect x="250" y="92" width="160" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#9333EA">2. 套用规则</text><text x="270" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 高复杂/高容错 → 强模型</text><text x="270" y="166" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 长上下文/返工贵 → 首中优先</text><text x="270" y="186" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 简单可纠正 → 便宜模型</text><rect x="450" y="92" width="160" height="96" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="530" y="120" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">3. 输出建议</text><text x="470" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 建议模型策略</text><text x="470" y="166" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 原因说明</text><text x="470" y="186" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#374151">• 预算紧时降配方案</text><line x1="210" y1="140" x2="250" y2="140" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6"/><polygon points="250,140 240,135 240,145" fill="#EA580C"/><line x1="410" y1="140" x2="450" y2="140" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6"/><polygon points="450,140 440,135 440,145" fill="#EA580C"/><rect x="90" y="248" width="480" height="92" rx="12" fill="#FFFFFF" filter="url(#shadow)"/><text x="330" y="276" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#D97706">核心原则</text><text x="120" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">不要只看价格页，而要先判断</text><text x="343" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">任务成本结构</text><text x="120" y="326" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#374151">只有当 low effort 明显不足时，才升级到更高 effort。</text><line x1="330" y1="188" x2="330" y2="248" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6"/><polygon points="330,248 325,238 335,238" fill="#2563EB"/></svg>