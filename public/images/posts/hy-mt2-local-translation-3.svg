<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">Hy-MT2 能替掉翻译 API 吗？</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心结论：可替代标准化翻译任务，但高要求场景仍需评测或云服务</text>

  <rect x="250" y="88" width="160" height="64" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="250" y="88" width="160" height="64" rx="14" fill="none" stroke="#2563EB" stroke-width="2"/>
  <text x="330" y="116" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">Hy-MT2 本地翻译</text>
  <text x="330" y="136" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#4B5563">不是全替代，而是先吃下可标准化部分</text>

  <line x1="330" y1="152" x2="180" y2="185" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="152" x2="480" y2="185" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="40" y="190" width="260" height="168" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="190" width="260" height="168" rx="16" fill="none" stroke="#16A34A" stroke-width="2"/>
  <rect x="58" y="206" width="112" height="28" rx="14" fill="#DCFCE7"/>
  <text x="114" y="225" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#166534">适合本地处理</text>

  <circle cx="68" cy="252" r="5" fill="#16A34A"/>
  <text x="82" y="256" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">标准化、重复性高的文本</text>

  <circle cx="68" cy="284" r="5" fill="#16A34A"/>
  <text x="82" y="288" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">隐私敏感内容</text>

  <circle cx="68" cy="316" r="5" fill="#16A34A"/>
  <text x="82" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">延迟要求不极端的批量任务</text>

  <circle cx="68" cy="348" r="5" fill="#16A34A"/>
  <text x="82" y="352" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">目标：云调用成本转为部署维护成本</text>

  <rect x="360" y="190" width="260" height="168" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="360" y="190" width="260" height="168" rx="16" fill="none" stroke="#EA580C" stroke-width="2"/>
  <rect x="378" y="206" width="122" height="28" rx="14" fill="#FFEDD5"/>
  <text x="439" y="225" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9A3412">仍需重点评测</text>

  <circle cx="388" cy="252" r="5" fill="#EA580C"/>
  <text x="402" y="256" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">核心语对是否翻歪</text>

  <circle cx="388" cy="284" r="5" fill="#EA580C"/>
  <text x="402" y="288" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">术语统一与跨页面一致性</text>

  <circle cx="388" cy="316" r="5" fill="#EA580C"/>
  <text x="402" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">UI 文案长度与布局风险</text>

  <circle cx="388" cy="348" r="5" fill="#EA580C"/>
  <text x="402" y="352" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#1F2937">法务/医疗/金融等高风险文本</text>

  <line x1="300" y1="274" x2="360" y2="274" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/>
  <rect x="268" y="258" width="124" height="32" rx="16" fill="#F3E8FF"/>
  <text x="330" y="279" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B21A8">边界判断很关键</text>

  <rect x="170" y="366" width="320" height="20" rx="10" fill="#EFF6FF"/>
  <text x="330" y="380" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1D4ED8">结论：Hy-MT2 的现实价值，是先替掉“最常用且最容易标准化”的那部分翻译工作</text>
</svg>