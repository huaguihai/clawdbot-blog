<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <style>
      .bg{fill:#FAFAFA}
      .card{fill:#FFFFFF;stroke:#E5E7EB;stroke-width:1}
      .title{font-family:-apple-system,'Segoe UI',sans-serif;font-size:18px;fill:#111827;font-weight:700}
      .h{font-family:-apple-system,'Segoe UI',sans-serif;font-size:13px;fill:#374151;font-weight:700}
      .t{font-family:-apple-system,'Segoe UI',sans-serif;font-size:12px;fill:#374151}
      .muted{fill:#6B7280}
      .dash{stroke:#9CA3AF;stroke-width:2;stroke-dasharray:6 6;fill:none}
      .chipText{font-family:-apple-system,'Segoe UI',sans-serif;font-size:11px;fill:#111827}
      .chipTextW{font-family:-apple-system,'Segoe UI',sans-serif;font-size:11px;fill:#FFFFFF}
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#111827" flood-opacity="0.10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="30" y="42">“工牌式角色设定” vs “员工手册式 Model Spec”</text>
  <text class="t muted" x="30" y="64">核心：一句 prompt 只能说明你是谁；规则框架才能定义边界与冲突处理</text>

  <!-- Left card: Role prompt -->
  <g filter="url(#shadow)">
    <rect class="card" x="30" y="90" width="280" height="250" rx="12"/>
  </g>
  <circle cx="54" cy="118" r="8" fill="#EA580C"/>
  <text class="h" x="70" y="123">角色设定 / 一句 prompt（像工牌）</text>

  <!-- Left content -->
  <text class="t" x="54" y="150">只回答：你是谁</text>
  <text class="t muted" x="54" y="172">例：I am Claude... / 高级工程师</text>

  <!-- Left chips -->
  <rect x="54" y="198" width="230" height="28" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text class="chipText" x="66" y="216">缺：能做什么 / 不能做什么</text>

  <rect x="54" y="234" width="230" height="28" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text class="chipText" x="66" y="252">缺：冲突时听谁的</text>

  <rect x="54" y="270" width="230" height="28" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text class="chipText" x="66" y="288">缺：出错如何收手</text>

  <rect x="54" y="306" width="230" height="28" rx="10" fill="#FEF2F2" stroke="#FECACA"/>
  <text class="chipText" x="66" y="324">结果：靠人盯着才正常</text>

  <!-- Right card: Model Spec -->
  <g filter="url(#shadow)">
    <rect class="card" x="350" y="90" width="280" height="250" rx="12"/>
  </g>
  <circle cx="374" cy="118" r="8" fill="#2563EB"/>
  <text class="h" x="390" y="123">Model Spec（像员工手册/制度）</text>

  <!-- Right content -->
  <text class="t" x="374" y="150">提供：可讨论、可评估、可迭代的规则框架</text>

  <!-- Right chips -->
  <rect x="374" y="186" width="232" height="28" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text class="chipText" x="386" y="204">边界：允许与禁止</text>

  <rect x="374" y="222" width="232" height="28" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text class="chipText" x="386" y="240">冲突：指令优先级与仲裁</text>

  <rect x="374" y="258" width="232" height="28" rx="10" fill="#ECFDF5" stroke="#BBF7D0"/>
  <text class="chipText" x="386" y="276">安全：风险处置与拒绝策略</text>

  <rect x="374" y="294" width="232" height="28" rx="10" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text class="chipText" x="386" y="312">自由：兼顾用户目标与约束</text>

  <!-- Connector -->
  <path class="dash" d="M310 215 C 330 215, 330 215, 350 215"/>
  <polygon points="348,210 358,215 348,220" fill="#9CA3AF"/>

  <!-- Bottom conclusion -->
  <g filter="url(#shadow)">
    <rect class="card" x="30" y="354" width="600" height="34" rx="12"/>
  </g>
  <rect x="44" y="362" width="160" height="18" rx="9" fill="#D97706"/>
  <text class="chipTextW" x="56" y="375">产品稳定性的分水岭</text>
  <text class="t" x="214" y="375">若只能在你盯着时表现正常，那不是产品，只是偶尔灵的演示</text>
</svg>