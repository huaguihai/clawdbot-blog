<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">Prompt Injection 是什么</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">本质：把不可信内容误当成高优先级指令</text>

  <rect x="40" y="95" width="180" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="130" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">输入混在一起</text>
  <rect x="58" y="140" width="144" height="34" rx="10" fill="#DBEAFE"/>
  <text x="130" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1E3A8A">系统规则</text>
  <rect x="58" y="182" width="144" height="34" rx="10" fill="#F3E8FF"/>
  <text x="130" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B21A8">用户输入</text>
  <rect x="58" y="224" width="144" height="34" rx="10" fill="#DCFCE7"/>
  <text x="130" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#166534">网页/工具返回</text>
  <text x="130" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">未分区、直接拼接</text>

  <rect x="250" y="120" width="160" height="160" rx="80" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="330" cy="200" r="58" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="330" y="192" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#EA580C">模型/Agent</text>
  <text x="330" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">无法分清</text>
  <text x="330" y="230" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">规则 vs 材料</text>

  <rect x="440" y="95" width="180" height="210" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="530" y="122" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">执行跑偏</text>
  <rect x="458" y="140" width="144" height="34" rx="10" fill="#FFEDD5"/>
  <text x="530" y="162" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9A3412">输出被诱导</text>
  <rect x="458" y="182" width="144" height="34" rx="10" fill="#FEF3C7"/>
  <text x="530" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#92400E">调用错误工具</text>
  <rect x="458" y="224" width="144" height="34" rx="10" fill="#FEE2E2"/>
  <text x="530" y="246" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#991B1B">读库/发消息/点按钮</text>
  <text x="530" y="286" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">从聊天偏航到动作偏航</text>

  <line x1="220" y1="200" x2="250" y2="200" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="410" y1="200" x2="440" y2="200" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>

  <rect x="110" y="330" width="440" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="356" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16A34A">关键原因：没有明确告诉模型哪些是规则，哪些只是材料</text>
</svg>