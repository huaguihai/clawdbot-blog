<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="32" y="38" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">用 5 个问题，判断 API 该选实时还是异步</text>
  <text x="32" y="60" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心原则：只有在“等不及、要交互”时，才为实时链路的复杂度买单</text>

  <line x1="330" y1="84" x2="330" y2="352" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="28" y="86" width="278" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="49" cy="107" r="12" fill="#2563EB"/>
  <text x="49" y="111" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">1</text>
  <text x="68" y="104" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">容忍延迟是多少？</text>
  <text x="68" y="120" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">等不及 → 实时；几秒到会后 → 短窗或异步</text>

  <rect x="28" y="136" width="278" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="49" cy="157" r="12" fill="#16A34A"/>
  <text x="49" y="161" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">2</text>
  <text x="68" y="154" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">要“交互”还是“文本资产”？</text>
  <text x="68" y="170" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">立刻反问引导 → 实时；可引用逐字稿 → 先转写</text>

  <rect x="28" y="186" width="278" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="49" cy="207" r="12" fill="#9333EA"/>
  <text x="49" y="211" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">3</text>
  <text x="68" y="204" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">是否有跨语言硬需求？</text>
  <text x="68" y="220" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">只求看懂可激进；涉及执行写库必须保守确认</text>

  <rect x="28" y="236" width="278" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="49" cy="257" r="12" fill="#EA580C"/>
  <text x="49" y="261" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">4</text>
  <text x="68" y="254" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">错了谁兜底？代价多大？</text>
  <text x="68" y="270" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">只影响体验可放宽；涉及投诉扣费要可追溯</text>

  <rect x="28" y="286" width="278" height="42" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <circle cx="49" cy="307" r="12" fill="#D97706"/>
  <text x="49" y="311" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">5</text>
  <text x="68" y="304" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#111827">工程预算投向哪里？</text>
  <text x="68" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">实时连线问题，还是队列批处理与重试问题</text>

  <line x1="306" y1="107" x2="352" y2="107" stroke="#2563EB" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="306" y1="157" x2="352" y2="157" stroke="#16A34A" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="306" y1="207" x2="352" y2="207" stroke="#9333EA" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="306" y1="257" x2="352" y2="257" stroke="#EA580C" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="306" y1="307" x2="352" y2="307" stroke="#D97706" stroke-width="2" stroke-dasharray="5 5"/>

  <rect x="356" y="96" width="274" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="372" y="112" width="84" height="22" rx="11" fill="#DBEAFE"/>
  <text x="414" y="127" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#2563EB">优先 GPT-Realtime</text>
  <text x="372" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">满足：低延迟 + 强交互 + 错误可控</text>
  <text x="372" y="163" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">典型：语音交互、实时陪练、同传助手</text>

  <rect x="356" y="186" width="274" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="372" y="202" width="96" height="22" rx="11" fill="#DCFCE7"/>
  <text x="420" y="217" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#16A34A">优先 Whisper 异步</text>
  <text x="372" y="238" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">满足：要逐字稿 + 会后产出 + 可审计</text>
  <text x="372" y="253" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">典型：会议纪要、质检、语音表单入库</text>

  <rect x="356" y="276" width="274" height="72" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="372" y="292" width="114" height="22" rx="11" fill="#F3E8FF"/>
  <text x="429" y="307" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#9333EA">Translate + 确认环节</text>
  <text x="372" y="328" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">满足：跨语言且高风险，不能直接写库</text>
  <text x="372" y="343" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">原则：先翻译，再校验，再进入业务流程</text>

  <rect x="28" y="344" width="602" height="34" rx="10" fill="#FFF7ED" stroke="#FDBA74" stroke-width="1"/>
  <text x="42" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#EA580C">避免白烧 API 费：</text>
  <text x="152" y="365" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9A3412">不要把“转写 + 摘要 + 翻译 + 结构化入库”全部塞进实时链路</text>
</svg>