<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
    <marker id="arrowPurple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#9333EA"/>
    </marker>
  </defs>

  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">你真正需要的是可审计的操作链</text>
  <text x="330" y="60" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">不是把模型放本地，而是让每一步可控、可查、可撤销</text>

  <rect x="235" y="110" width="190" height="84" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#DBEAFE"/>
  <text x="330" y="140" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563EB">AI 执行代理</text>
  <text x="330" y="164" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">检索文档 · 修改代码 · 创建 PR</text>
  <text x="330" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">危险动作不能直接放行</text>

  <rect x="36" y="92" width="170" height="94" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E0E7FF"/>
  <text x="121" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#2563EB">1. 密钥隔离</text>
  <text x="52" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 每类资源独立令牌</text>
  <text x="52" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 短周期轮换，可按任务吊销</text>

  <rect x="454" y="92" width="170" height="94" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#FDE68A"/>
  <text x="539" y="118" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#D97706">2. 审计日志</text>
  <text x="470" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 记录谁发起、调用了什么</text>
  <text x="470" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 读写资源、PR、人工合并结果</text>

  <rect x="58" y="252" width="180" height="100" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#D1FAE5"/>
  <text x="148" y="278" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#16A34A">3. 回滚能力</text>
  <text x="74" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 代码变更必须落分支</text>
  <text x="74" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 自动 diff 摘要，一键撤销</text>
  <text x="74" y="338" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 回滚动作也入日志</text>

  <rect x="422" y="252" width="190" height="100" rx="14" fill="#FFFFFF" filter="url(#shadow)" stroke="#E9D5FF"/>
  <text x="517" y="278" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="17" font-weight="700" fill="#9333EA">4. 审批闸门</text>
  <text x="438" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 检索可自动，改代码可半自动</text>
  <text x="438" y="320" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#334155">• 合并主干必须人工，生产默认禁止</text>

  <line x1="206" y1="140" x2="235" y2="140" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="454" y1="140" x2="425" y2="140" stroke="#D97706" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <line x1="238" y1="286" x2="283" y2="194" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
  <line x1="422" y1="286" x2="377" y2="194" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowPurple)"/>

  <rect x="218" y="282" width="224" height="58" rx="12" fill="#FFFFFF" filter="url(#shadow)" stroke="#E2E8F0"/>
  <text x="330" y="304" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#0F172A">目标状态</text>
  <text x="330" y="324" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">AI 像勤快的初级同事：能做事，但危险动作必须有人点头</text>
</svg>