<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.06"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="660" height="400" fill="#FAFAFA" rx="8"/>

  <!-- 标题 -->
  <text x="330" y="35" text-anchor="middle" fill="#1C1917" font-size="16" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">
    Claude Code 三层记忆架构
  </text>
  <text x="330" y="55" text-anchor="middle" fill="#78716C" font-size="11" font-family="-apple-system,'Segoe UI',sans-serif">
    不同生命周期的信息，存在不同的地方
  </text>

  <!-- 第一层：会话记忆 -->
  <rect x="60" y="75" width="540" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="60" y="75" width="6" height="80" rx="3" fill="#2563EB"/>
  <text x="85" y="100" fill="#2563EB" font-size="12" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">
    Layer 1 · 会话记忆（Ephemeral）
  </text>
  <text x="85" y="118" fill="#44403C" font-size="11" font-family="-apple-system,'Segoe UI',sans-serif">
    当前对话的完整上下文 — 接近窗口极限时自动压缩
  </text>
  <text x="85" y="138" fill="#78716C" font-size="10" font-family="-apple-system,'Segoe UI',sans-serif">
    生命周期：单次会话 ｜ 存储：内存 ｜ 压缩策略：锚点保护 + 冗余删除
  </text>

  <!-- 箭头 1→2 -->
  <line x1="330" y1="155" x2="330" y2="175" stroke="#E7E5E4" stroke-width="2"/>
  <polygon points="325,173 330,183 335,173" fill="#E7E5E4"/>

  <!-- 第二层：项目记忆 -->
  <rect x="60" y="185" width="540" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="60" y="185" width="6" height="80" rx="3" fill="#EA580C"/>
  <text x="85" y="210" fill="#EA580C" font-size="12" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">
    Layer 2 · 项目记忆（Project-level）
  </text>
  <text x="85" y="228" fill="#44403C" font-size="11" font-family="-apple-system,'Segoe UI',sans-serif">
    CLAUDE.md — 项目规范、架构决策、常用命令、已知的坑
  </text>
  <text x="85" y="248" fill="#78716C" font-size="10" font-family="-apple-system,'Segoe UI',sans-serif">
    生命周期：跟项目走 ｜ 存储：项目根目录文件 ｜ 可手动编辑 + Agent 自动追加
  </text>

  <!-- 箭头 2→3 -->
  <line x1="330" y1="265" x2="330" y2="285" stroke="#E7E5E4" stroke-width="2"/>
  <polygon points="325,283 330,293 335,283" fill="#E7E5E4"/>

  <!-- 第三层：用户记忆 -->
  <rect x="60" y="295" width="540" height="80" rx="10" fill="#FFF" filter="url(#shadow)"/>
  <rect x="60" y="295" width="6" height="80" rx="3" fill="#16A34A"/>
  <text x="85" y="320" fill="#16A34A" font-size="12" font-weight="700" font-family="-apple-system,'Segoe UI',sans-serif">
    Layer 3 · 用户记忆（User-level）
  </text>
  <text x="85" y="338" fill="#44403C" font-size="11" font-family="-apple-system,'Segoe UI',sans-serif">
    跨项目偏好 — A 项目设的偏好，B 项目也记得
  </text>
  <text x="85" y="358" fill="#78716C" font-size="10" font-family="-apple-system,'Segoe UI',sans-serif">
    生命周期：跟用户走 ｜ 存储：~/.claude/ 目录 ｜ 纯文本，可审计
  </text>

  <!-- 右侧核心洞察标注 -->
  <rect x="460" y="75" width="130" height="24" rx="12" fill="#2563EB" opacity="0.1"/>
  <text x="525" y="91" text-anchor="middle" fill="#2563EB" font-size="9" font-weight="600" font-family="-apple-system,'Segoe UI',sans-serif">用完就丢</text>

  <rect x="460" y="185" width="130" height="24" rx="12" fill="#EA580C" opacity="0.1"/>
  <text x="525" y="201" text-anchor="middle" fill="#EA580C" font-size="9" font-weight="600" font-family="-apple-system,'Segoe UI',sans-serif">跟着代码走</text>

  <rect x="460" y="295" width="130" height="24" rx="12" fill="#16A34A" opacity="0.1"/>
  <text x="525" y="311" text-anchor="middle" fill="#16A34A" font-size="9" font-weight="600" font-family="-apple-system,'Segoe UI',sans-serif">跟着人走</text>
</svg>