<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>

  <text x="330" y="38" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0F172A">为什么不该先问你用哪套 Agent 框架</text>
  <text x="330" y="62" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">核心判断：多数内容生成任务，先看交付与能力，不是先看框架名</text>

  <rect x="36" y="92" width="250" height="256" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="374" y="92" width="250" height="256" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="56" y="110" width="210" height="38" rx="10" fill="#EFF6FF"/>
  <text x="161" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">AI 常先问</text>

  <rect x="394" y="110" width="210" height="38" rx="10" fill="#F0FDF4"/>
  <text x="499" y="134" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">其实更该先确认</text>

  <rect x="56" y="162" width="210" height="44" rx="10" fill="#FFF7ED"/>
  <circle cx="76" cy="184" r="6" fill="#EA580C"/>
  <text x="92" y="189" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#7C2D12">LangChain 还是 CrewAI？</text>

  <rect x="56" y="216" width="210" height="44" rx="10" fill="#FAF5FF"/>
  <circle cx="76" cy="238" r="6" fill="#9333EA"/>
  <text x="92" y="243" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#581C87">消息、工具、状态怎么编排？</text>

  <rect x="56" y="270" width="210" height="56" rx="10" fill="#FEFCE8"/>
  <circle cx="76" cy="292" r="6" fill="#D97706"/>
  <text x="92" y="289" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#713F12">把“框架差异”</text>
  <text x="92" y="309" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#713F12">误当成“任务前提”</text>

  <rect x="394" y="162" width="210" height="44" rx="10" fill="#EFF6FF"/>
  <circle cx="414" cy="184" r="6" fill="#2563EB"/>
  <text x="430" y="189" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#1E3A8A">最终要输出什么格式？</text>

  <rect x="394" y="216" width="210" height="44" rx="10" fill="#F0FDF4"/>
  <circle cx="414" cy="238" r="6" fill="#16A34A"/>
  <text x="430" y="243" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#14532D">能不能调用工具？</text>

  <rect x="394" y="270" width="210" height="56" rx="10" fill="#FFF7ED"/>
  <circle cx="414" cy="292" r="6" fill="#EA580C"/>
  <text x="430" y="289" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#7C2D12">失败时如何兜底收尾？</text>
  <text x="430" y="309" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#9A3412">比选框架更接近任务本质</text>

  <line x1="286" y1="184" x2="374" y2="184" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="286" y1="238" x2="374" y2="238" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="286" y1="298" x2="374" y2="298" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <circle cx="330" cy="184" r="16" fill="#2563EB"/>
  <text x="330" y="189" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">→</text>

  <circle cx="330" cy="238" r="16" fill="#16A34A"/>
  <text x="330" y="243" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">→</text>

  <circle cx="330" cy="298" r="16" fill="#EA580C"/>
  <text x="330" y="303" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">→</text>

  <rect x="142" y="354" width="376" height="28" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="372" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#334155">适用于：Markdown 文章、JSON、PR 说明、研究摘要、客服话术等内容生成任务</text>
</svg>