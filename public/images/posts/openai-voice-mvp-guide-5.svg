<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; fill:#111827; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6B7280; }
      .pillText { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; font-weight:700; fill:#0B1220; }
      .dash { stroke:#9CA3AF; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .solid { stroke:#9CA3AF; stroke-width:2; fill:none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#9CA3AF" />
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" class="bg"/>

  <!-- Header -->
  <text x="28" y="42" class="title">把“实时对话能力”和“归档分析能力”拆成两条链路</text>
  <text x="28" y="64" class="muted">核心：高配只用在高价值节点；其余降配 + 只保存必要产物</text>

  <!-- Lane labels -->
  <rect x="28" y="92" width="140" height="26" rx="13" fill="#2563EB" opacity="0.14"/>
  <text x="44" y="110" class="pillText" fill="#2563EB">实时链路（快）</text>

  <rect x="28" y="238" width="140" height="26" rx="13" fill="#9333EA" opacity="0.14"/>
  <text x="44" y="256" class="pillText" fill="#9333EA">事后链路（慢）</text>

  <!-- Realtime cards -->
  <rect x="28" y="130" width="288" height="90" rx="12" class="card"/>
  <text x="46" y="156" class="text" font-weight="700">实时语音交互</text>
  <text x="46" y="178" class="muted">高配：首轮欢迎 / 关键问答 / 转人工确认</text>
  <text x="46" y="198" class="muted">降配：闲聊 / 重复追问</text>
  <text x="46" y="218" class="muted">保存：事件日志、关键文本</text>

  <rect x="344" y="130" width="288" height="90" rx="12" class="card"/>
  <text x="362" y="156" class="text" font-weight="700">实时兜底策略</text>
  <text x="362" y="178" class="muted">失败优先回退：转文字继续</text>
  <text x="362" y="198" class="muted">避免：整段通话直接失败</text>

  <!-- Offline cards -->
  <rect x="28" y="276" width="196" height="96" rx="12" class="card"/>
  <text x="46" y="302" class="text" font-weight="700">转写（可检索）</text>
  <text x="46" y="324" class="muted">高配：归档/回放/申诉</text>
  <text x="46" y="344" class="muted">保存：文本、时间戳</text>

  <rect x="242" y="276" width="196" height="96" rx="12" class="card"/>
  <text x="260" y="302" class="text" font-weight="700">结构化提取</text>
  <text x="260" y="324" class="muted">高配：进 CRM / 工单 / 知识库</text>
  <text x="260" y="344" class="muted">保存：字段、置信度</text>

  <rect x="456" y="276" width="176" height="96" rx="12" class="card"/>
  <text x="474" y="302" class="text" font-weight="700">质检 / 复盘</text>
  <text x="474" y="324" class="muted">先抽样，再全量</text>
  <text x="474" y="344" class="muted">保存：样本片段、错误标签</text>

  <!-- Connectors -->
  <!-- Realtime flow -->
  <path d="M316 175 L344 175" class="dash" marker-end="url(#arrow)"/>

  <!-- Split to offline -->
  <path d="M172 220 C172 242, 172 246, 126 276" class="dash" marker-end="url(#arrow)"/>
  <path d="M172 220 C220 248, 262 252, 340 276" class="dash" marker-end="url(#arrow)"/>
  <path d="M488 220 C518 244, 540 252, 544 276" class="dash" marker-end="url(#arrow)"/>

  <!-- Offline sequence -->
  <path d="M224 324 L242 324" class="dash" marker-end="url(#arrow)"/>
  <path d="M438 324 L456 324" class="dash" marker-end="url(#arrow)"/>

  <!-- Legend -->
  <rect x="28" y="78" width="604" height="2" fill="#E5E7EB" opacity="0.9"/>
  <rect x="28" y="380" width="604" height="1" fill="#E5E7EB" opacity="0.9"/>

  <circle cx="520" cy="104" r="6" fill="#16A34A" opacity="0.9"/>
  <text x="534" y="108" class="muted">高价值节点用高配</text>

  <circle cx="640" cy="104" r="6" fill="#EA580C" opacity="0.9"/>
  <text x="28" y="396" class="muted">提示：默认只保留文本；录音按需保留，避免“全程最高配”</text>
</svg>