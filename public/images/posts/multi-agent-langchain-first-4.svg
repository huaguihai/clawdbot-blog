<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <!-- background -->
  <rect x="0" y="0" width="660" height="400" fill="#FAFAFA" rx="12"/>

  <!-- title -->
  <text x="40" y="48" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#111827">可复制模板：先“任务契约”后“框架适配”</text>
  <text x="40" y="72" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">把稳定规则与运行环境拆开，便于迁移与复用</text>

  <!-- defs for shadow -->
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Step 1 card -->
  <rect x="40" y="110" width="280" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="40" y="110" width="280" height="46" rx="12" fill="#2563EB"/>
  <text x="56" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">第一层：任务契约（必填）</text>

  <circle cx="62" cy="178" r="6" fill="#2563EB"/>
  <text x="76" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">输出格式（Markdown/JSON/纯文本）</text>

  <circle cx="62" cy="208" r="6" fill="#16A34A"/>
  <text x="76" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">必含结构（标题/小节/字段）</text>

  <circle cx="62" cy="238" r="6" fill="#EA580C"/>
  <text x="76" y="242" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">禁止输出（工具标签/反问/思维链）</text>

  <circle cx="62" cy="268" r="6" fill="#D97706"/>
  <text x="76" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">信息不足：先写主体，标注“待确认”</text>

  <circle cx="62" cy="298" r="6" fill="#9333EA"/>
  <text x="76" y="302" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">不要求框架时：不问实现细节</text>

  <!-- Step 2 card -->
  <rect x="340" y="110" width="280" height="230" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="340" y="110" width="280" height="46" rx="12" fill="#9333EA"/>
  <text x="356" y="140" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">第二层：运行环境备注（可选）</text>

  <circle cx="362" cy="178" r="6" fill="#2563EB"/>
  <text x="376" y="182" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">编排系统（LangChain/AutoGen/CrewAI/自研）</text>

  <circle cx="362" cy="208" r="6" fill="#16A34A"/>
  <text x="376" y="212" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">工具调用：上层执行，模型只返结构化文本</text>

  <circle cx="362" cy="238" r="6" fill="#D97706"/>
  <text x="376" y="242" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">输出校验：解析器检查 JSON/Markdown</text>

  <circle cx="362" cy="268" r="6" fill="#EA580C"/>
  <text x="376" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#111827">失败策略：超时返回部分结果，不中断主任务</text>

  <!-- dashed connector -->
  <line x1="320" y1="225" x2="340" y2="225" stroke="#6B7280" stroke-width="2" stroke-dasharray="6 6"/>
  <polygon points="340,225 332,220 332,230" fill="#6B7280"/>

  <!-- bottom note -->
  <rect x="40" y="354" width="580" height="26" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="56" y="372" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">核心收益：契约稳定复用；框架随时替换，迁移成本更低</text>
</svg>