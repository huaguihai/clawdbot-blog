<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400"><rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/><defs><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/></filter></defs><text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">“能演示” vs “能交付” 的核心区别</text><text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">关键判断：外部文本是否可能直接影响工具调用，且缺少结构化隔离与人工拦截</text><rect x="50" y="100" width="250" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#F1F5F9"/><rect x="360" y="100" width="250" height="240" rx="16" fill="#FFFFFF" filter="url(#shadow)" stroke="#F1F5F9"/><rect x="75" y="120" width="200" height="34" rx="10" fill="#EA580C"/><text x="175" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">能演示</text><rect x="385" y="120" width="200" height="34" rx="10" fill="#16A34A"/><text x="485" y="142" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">能交付</text><circle cx="90" cy="178" r="6" fill="#EA580C"/><text x="106" y="183" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">成功路径顺，体验丝滑</text><circle cx="90" cy="218" r="6" fill="#EA580C"/><text x="106" y="223" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">外部输入可贴近执行链路</text><circle cx="90" cy="258" r="6" fill="#EA580C"/><text x="106" y="263" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">资料、规则、恶意指令易混淆</text><circle cx="90" cy="298" r="6" fill="#EA580C"/><text x="106" y="303" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">边界弱，风险在复杂输入下暴露</text><circle cx="400" cy="178" r="6" fill="#16A34A"/><text x="416" y="183" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">默认输入不可信</text><circle cx="400" cy="218" r="6" fill="#16A34A"/><text x="416" y="223" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">先结构化隔离，再开放能力</text><circle cx="400" cy="258" r="6" fill="#16A34A"/><text x="416" y="263" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">关键动作前增加人工拦截</text><circle cx="400" cy="298" r="6" fill="#16A34A"/><text x="416" y="303" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#111827">宁可多问一句，也避免误操作</text><line x1="300" y1="220" x2="360" y2="220" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 6"/><polygon points="360,220 350,214 350,226" fill="#9333EA"/><rect x="255" y="196" width="150" height="48" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/><text x="330" y="214" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9333EA">核心分界线</text><text x="330" y="231" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">是否隔离外部文本对工具的直接影响</text><rect x="142" y="350" width="376" height="28" rx="10" fill="#DBEAFE"/><text x="330" y="368" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#1D4ED8">Demo 优化丝滑感，交付优先边界设计与稳健性</text></svg>