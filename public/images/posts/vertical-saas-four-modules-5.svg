<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#16A34A"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#9333EA"/>
    </marker>
  </defs>

  <text x="36" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">需求分级：把请求排出可审计队列</text>
  <text x="36" y="66" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">核心概念：模型给建议与理由，人保留最终决定权</text>

  <rect x="36" y="102" width="150" height="116" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="102" width="150" height="8" rx="12" fill="#2563EB"/>
  <text x="56" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">输入请求</text>
  <text x="56" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">客户 / 内部 / 监管</text>
  <text x="56" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">系统告警</text>
  <text x="56" y="200" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#2563EB">POST /requests</text>

  <rect x="255" y="92" width="160" height="136" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="255" y="92" width="160" height="8" rx="12" fill="#EA580C"/>
  <text x="281" y="124" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">模型分级建议</text>
  <text x="281" y="148" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">产出 priority</text>
  <text x="281" y="168" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">附带 rationale</text>
  <text x="281" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">POST /requests/{id}:triage</text>
  <text x="281" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#EA580C">可落库、可追踪</text>

  <rect x="484" y="102" width="140" height="116" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="484" y="102" width="140" height="8" rx="12" fill="#16A34A"/>
  <text x="507" y="132" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">输出结果</text>
  <text x="507" y="156" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">优先级</text>
  <text x="507" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">理由</text>
  <text x="507" y="196" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">建议处理路径</text>

  <rect x="255" y="260" width="160" height="94" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="255" y="260" width="160" height="8" rx="12" fill="#9333EA"/>
  <text x="281" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">规则约束</text>
  <text x="281" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">policies 当前版本</text>
  <text x="281" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#9333EA">GET /policies/current</text>

  <rect x="484" y="260" width="140" height="94" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="484" y="260" width="140" height="8" rx="12" fill="#D97706"/>
  <text x="506" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">人工确认</text>
  <text x="506" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">高权限角色最终决策</text>
  <text x="506" y="334" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">确保可审计、可对齐</text>

  <line x1="186" y1="160" x2="255" y2="160" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <line x1="415" y1="160" x2="484" y2="160" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>
  <line x1="335" y1="260" x2="335" y2="228" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowPurple)"/>
  <line x1="554" y1="218" x2="554" y2="260" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>

  <rect x="36" y="260" width="150" height="94" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="260" width="150" height="8" rx="12" fill="#2563EB"/>
  <text x="57" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">最小数据表</text>
  <text x="57" y="314" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">requests</text>
  <text x="57" y="332" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">triage</text>
  <text x="57" y="350" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#4B5563">policies</text>

  <line x1="186" y1="307" x2="255" y2="307" stroke="#2563EB" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>

  <rect x="36" y="84" width="588" height="286" rx="16" fill="none" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="8 8"/>

  <text x="38" y="390" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">指标示例：人工改动比例、从创建到处理的中位时长</text>
</svg>