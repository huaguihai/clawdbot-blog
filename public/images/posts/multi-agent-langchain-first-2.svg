<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
  </defs>

  <text x="36" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#0F172A">多智能体编排：先定契约，再做适配</text>
  <text x="36" y="68" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#475569">核心顺序：任务层 → 适配层 → 运行层，框架更像“插座型号”</text>

  <rect x="36" y="92" width="588" height="88" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="36" y="92" width="10" height="88" rx="10" fill="#16A34A"/>
  <text x="60" y="122" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#16A34A">1 任务层</text>
  <text x="150" y="122" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#0F172A">先确认：输出契约</text>
  <text x="60" y="150" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">交付什么格式、能否调用工具、失败如何降级、谁负责最终验收</text>
  <g>
    <rect x="60" y="160" width="86" height="24" rx="12" fill="#DCFCE7"/>
    <text x="103" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#166534">Markdown</text>
    <rect x="154" y="160" width="62" height="24" rx="12" fill="#DBEAFE"/>
    <text x="185" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1D4ED8">JSON</text>
    <rect x="224" y="160" width="62" height="24" rx="12" fill="#FEF3C7"/>
    <text x="255" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#B45309">摘要</text>
    <rect x="294" y="160" width="62" height="24" rx="12" fill="#F3E8FF"/>
    <text x="325" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7E22CE">清单</text>
    <rect x="364" y="160" width="52" height="24" rx="12" fill="#FFEDD5"/>
    <text x="390" y="176" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#C2410C">FAQ</text>
  </g>

  <line x1="330" y1="180" x2="330" y2="212" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>

  <rect x="86" y="222" width="488" height="72" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="86" y="222" width="10" height="72" rx="10" fill="#2563EB"/>
  <text x="110" y="249" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="19" font-weight="700" fill="#2563EB">2 适配层</text>
  <text x="198" y="249" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#0F172A">后确认：接到哪里</text>
  <text x="110" y="275" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">LangChain / AutoGen / CrewAI / 自研工作流</text>
  <text x="420" y="275" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#64748B">本质是消息路由、工具注册、状态管理</text>

  <line x1="330" y1="294" x2="330" y2="326" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>

  <rect x="136" y="336" width="388" height="44" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="136" y="336" width="10" height="44" rx="10" fill="#EA580C"/>
  <text x="160" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">3 运行层</text>
  <text x="244" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#334155">最后补充：工具权限、超时、重试、日志、密钥</text>

  <g>
    <rect x="470" y="96" width="140" height="46" rx="12" fill="#2563EB"/>
    <text x="540" y="116" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#DBEAFE">关键原则</text>
    <text x="540" y="132" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#FFFFFF">先定契约，框架后置</text>
  </g>

  <text x="36" y="390" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#64748B">先钉死任务层，换框架只是“换插座”；先写死框架，迁移就会牵动业务逻辑。</text>
</svg>