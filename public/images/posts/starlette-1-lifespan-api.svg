<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <text x="330" y="42" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">Starlette 0.x vs 1.0 生命周期管理</text>
  <text x="330" y="68" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心变化：从分散钩子切换为统一的 lifespan 上下文</text>

  <rect x="40" y="95" width="255" height="250" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="365" y="95" width="255" height="250" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>

  <rect x="60" y="110" width="215" height="36" rx="10" fill="#EA580C"/>
  <text x="167.5" y="133" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Starlette 0.x</text>

  <rect x="385" y="110" width="215" height="36" rx="10" fill="#2563EB"/>
  <text x="492.5" y="133" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Starlette 1.0</text>

  <rect x="78" y="165" width="180" height="46" rx="12" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="168" y="184" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9A3412">on_startup</text>
  <text x="168" y="202" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">启动逻辑分开写</text>

  <rect x="78" y="245" width="180" height="46" rx="12" fill="#FFF7ED" stroke="#EA580C"/>
  <text x="168" y="264" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9A3412">on_shutdown</text>
  <text x="168" y="282" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">关闭逻辑分开写</text>

  <line x1="168" y1="211" x2="168" y2="245" stroke="#EA580C" stroke-width="2" stroke-dasharray="6 6"/>
  <text x="168" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">资源常散落在全局或函数外</text>

  <rect x="410" y="160" width="165" height="130" rx="16" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="492.5" y="186" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#1D4ED8">lifespan</text>
  <text x="492.5" y="206" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#1E3A8A">async context manager</text>

  <rect x="430" y="220" width="125" height="26" rx="8" fill="#DCFCE7" stroke="#16A34A"/>
  <text x="492.5" y="238" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#166534">yield 之前：启动</text>

  <rect x="430" y="252" width="125" height="26" rx="8" fill="#FEF3C7" stroke="#D97706"/>
  <text x="492.5" y="270" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#92400E">finally：关闭</text>

  <text x="492.5" y="318" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">资源统一挂在 app.state</text>

  <line x1="295" y1="220" x2="365" y2="220" stroke="#9333EA" stroke-width="2.5" stroke-dasharray="7 7"/>
  <polygon points="365,220 355,214 355,226" fill="#9333EA"/>
  <text x="330" y="205" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">推荐迁移</text>
  <text x="330" y="241" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">从两个钩子</text>
  <text x="330" y="258" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">到一个完整上下文</text>

  <rect x="120" y="355" width="420" height="28" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <circle cx="138" cy="369" r="6" fill="#EA580C"/>
  <text x="152" y="373" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">易错点：继续写旧参数</text>
  <circle cx="332" cy="369" r="6" fill="#2563EB"/>
  <text x="346" y="373" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">正确姿势：使用 lifespan</text>
</svg>