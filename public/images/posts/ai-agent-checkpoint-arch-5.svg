<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748B"/>
    </marker>
  </defs>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" fill="#0F172A">最小不断点：可恢复长任务 Agent（7 步）</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">session 为真相源 · harness 可重启 · sandbox 可重建 · 写操作幂等</text>

  <!-- Central spine -->
  <line x1="330" y1="80" x2="330" y2="368" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Left cards: 1,3,5,7 -->
  <rect x="40" y="90" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="52" y="104" width="28" height="28" rx="8" fill="#2563EB"/>
  <text x="66" y="124" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">1</text>
  <text x="90" y="112" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">定义 session 存储</text>
  <text x="90" y="130" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">进程重启后仍可读回</text>

  <rect x="40" y="170" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="52" y="184" width="28" height="28" rx="8" fill="#EA580C"/>
  <text x="66" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">3</text>
  <text x="90" y="192" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">加 checkpoint（恢复点）</text>
  <text x="90" y="210" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">从最近阶段继续跑</text>

  <rect x="40" y="250" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="52" y="264" width="28" height="28" rx="8" fill="#16A34A"/>
  <text x="66" y="284" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">5</text>
  <text x="90" y="272" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">写操作幂等（key）</text>
  <text x="90" y="290" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">重试多次只生效一次</text>

  <rect x="40" y="330" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="52" y="344" width="28" height="28" rx="8" fill="#D97706"/>
  <text x="66" y="364" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">7</text>
  <text x="90" y="352" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">补上可追踪性</text>
  <text x="90" y="370" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">耗时/错误/工具名可分析</text>

  <!-- Right cards: 2,4,6 -->
  <rect x="370" y="120" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="382" y="134" width="28" height="28" rx="8" fill="#9333EA"/>
  <text x="396" y="154" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">2</text>
  <text x="420" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">关键动作事件化</text>
  <text x="420" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">输出/工具/错误/重试 emit</text>

  <rect x="370" y="210" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="382" y="224" width="28" height="28" rx="8" fill="#2563EB"/>
  <text x="396" y="244" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">4</text>
  <text x="420" y="232" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">工具调用可失败返回</text>
  <text x="420" y="250" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">tool_error 交回模型决策</text>

  <rect x="370" y="300" width="250" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="382" y="314" width="28" height="28" rx="8" fill="#16A34A"/>
  <text x="396" y="334" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" fill="#FFFFFF" font-weight="700">6</text>
  <text x="420" y="322" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#0F172A" font-weight="700">sandbox 可重建</text>
  <text x="420" y="340" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#475569">新容器 + snapshot 恢复</text>

  <!-- Connectors from spine to cards -->
  <line x1="330" y1="117" x2="290" y2="117" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="147" x2="370" y2="147" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>

  <line x1="330" y1="197" x2="290" y2="197" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="237" x2="370" y2="237" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>

  <line x1="330" y1="277" x2="290" y2="277" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="330" y1="327" x2="370" y2="327" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>

  <line x1="330" y1="357" x2="290" y2="357" stroke="#64748B" stroke-width="2" stroke-dasharray="6 6"/>

  <!-- Bottom note -->
  <rect x="160" y="368" width="340" height="26" rx="10" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="386" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#0F172A">偷懒优先：事件日志 + 幂等键（最先救命）</text>
</svg>