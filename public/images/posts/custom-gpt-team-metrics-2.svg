<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="36" y="42" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#111827">什么工作最适合先做成 AI 工作流？</text>
  <text x="36" y="68" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6B7280">优先选择：高频、低风险、能快速验收的文字类任务</text>

  <rect x="36" y="94" width="188" height="238" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="56" y="126" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563EB">筛选标准</text>

  <rect x="52" y="144" width="156" height="38" rx="10" fill="#EFF6FF"/>
  <circle cx="70" cy="163" r="6" fill="#2563EB"/>
  <text x="84" y="168" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">高频重复</text>

  <rect x="52" y="192" width="156" height="38" rx="10" fill="#F0FDF4"/>
  <circle cx="70" cy="211" r="6" fill="#16A34A"/>
  <text x="84" y="216" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">输出边界清楚</text>

  <rect x="52" y="240" width="156" height="38" rx="10" fill="#FFF7ED"/>
  <circle cx="70" cy="259" r="6" fill="#EA580C"/>
  <text x="84" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1F2937">审核难度低</text>

  <rect x="52" y="288" width="156" height="28" rx="8" fill="#FEF3C7"/>
  <text x="64" y="306" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#92400E">30 秒能判断好不好</text>

  <line x1="224" y1="180" x2="270" y2="140" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>
  <line x1="224" y1="246" x2="270" y2="276" stroke="#94A3B8" stroke-width="2" stroke-dasharray="6 6"/>

  <rect x="270" y="94" width="354" height="118" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="292" y="126" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16A34A">适合首批试点</text>
  <text x="292" y="146" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">高频 + 清楚 + 低风险，先做文字类工位</text>

  <rect x="292" y="162" width="94" height="34" rx="10" fill="#DBEAFE"/>
  <text x="339" y="183" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1E3A8A">客户邮件初稿</text>

  <rect x="400" y="162" width="94" height="34" rx="10" fill="#DCFCE7"/>
  <text x="447" y="183" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#166534">会议纪要整理</text>

  <rect x="508" y="162" width="94" height="34" rx="10" fill="#EDE9FE"/>
  <text x="555" y="183" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#6B21A8">双语翻译润色</text>

  <rect x="270" y="232" width="354" height="120" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="292" y="264" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#EA580C">暂不建议试点</text>
  <text x="292" y="284" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">边界模糊、敏感度高、需要多人讨论的任务</text>

  <rect x="292" y="300" width="86" height="32" rx="10" fill="#FFF7ED"/>
  <text x="335" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#9A3412">需求优先级</text>

  <rect x="388" y="300" width="86" height="32" rx="10" fill="#FEF2F2"/>
  <text x="431" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#991B1B">绩效评价</text>

  <rect x="484" y="300" width="86" height="32" rx="10" fill="#F5F3FF"/>
  <text x="527" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#6B21A8">商业战略分析</text>

  <rect x="580" y="300" width="32" height="32" rx="10" fill="#FEF3C7"/>
  <text x="596" y="320" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#92400E">面试</text>

  <text x="36" y="372" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">经验法则：先做“已有人工版本、只是重复执行”的任务，不要指望 AI 先替你标准化流程</text>
</svg>