<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400"><defs><filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.06"/></filter></defs><rect width="660" height="400" rx="12" fill="#FAFAFA"/><text x="330" y="35" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="600" text-anchor="middle" fill="#111827">为何拆分为「草稿 → 实现」两阶段？</text><rect x="30" y="110" width="140" height="90" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#cardShadow)"/><text x="100" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2563EB">Phase 1：草稿</text><text x="100" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#4B5563">只写代码，不跑渲染</text><text x="100" y="178" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">解决策划与节奏问题</text><path d="M170 155 L195 155" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4"/><rect x="200" y="110" width="120" height="90" rx="10" fill="#FFFBEB" stroke="#EA580C" stroke-width="2" filter="url(#cardShadow)"/><text x="260" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="600" text-anchor="middle" fill="#EA580C">⏱ 时序门控</text><text x="260" y="160" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#92400E">单 Beat ≥ 80%</text><text x="260" y="176" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#92400E">总时长 ≥ 60%</text><path d="M320 155 L345 155" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4"/><rect x="350" y="110" width="140" height="90" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="2" filter="url(#cardShadow)"/><text x="420" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="600" text-anchor="middle" fill="#2563EB">Phase 2：实现</text><text x="420" y="162" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" text-anchor="middle" fill="#4B5563">真跑代码 + 多层硬门控</text><text x="420" y="178" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" text-anchor="middle" fill="#9CA3AF">确保渲染质量</text><path d="M490 155 L515 155" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 4"/><rect x="520" y="90" width="130" height="130" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="1" stroke-dasharray="4 4"/><text x="585" y="112" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="middle" fill="#4B5563">三层门控验证</text><rect x="530" y="125" width="110" height="26" rx="6" fill="#EFF6FF" stroke="#2563EB" stroke-width="1.5"/><text x="585" y="142" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#1E40AF">1. 执行门（渲染）</text><rect x="530" y="157" width="110" height="26" rx="6" fill="#ECFDF5" stroke="#16A34A" stroke-width="1.5"/><text x="585" y="174" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#166534">2. 几何审计（防重叠）</text><rect x="530" y="189" width="110" height="26" rx="6" fill="#F5F3FF" stroke="#9333EA" stroke-width="1.5"/><text x="585" y="206" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" font-weight="500" text-anchor="middle" fill="#6B21A8">3. 视觉审查（大模型）</text><path d="M585 215 L585 250 L605 270 L625 270" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 4"/><text x="635" y="265" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="600" text-anchor="start" fill="#16A34A">[通过] → 合成</text><path d="M520 155 L480 155 L480 290 Q480 310 460 310 L120 310 Q100 310 100 290 L100 200" stroke="#9333EA" stroke-width="2" stroke-dasharray="6 4" fill="none"/><text x="350" y="330" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" text-anchor="middle" fill="#9333EA">[未达标] 触发自愈回路，退回修正</text></svg>