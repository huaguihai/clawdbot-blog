<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .bg { fill:#FAFAFA; }
      .card { fill:#FFFFFF; stroke:#E5E7EB; stroke-width:1; rx:12; filter:url(#shadow); }
      .title { font-family:-apple-system,'Segoe UI',sans-serif; font-size:16px; font-weight:700; fill:#111827; }
      .text { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12.5px; fill:#374151; }
      .muted { font-family:-apple-system,'Segoe UI',sans-serif; font-size:12px; fill:#6B7280; }
      .pill { stroke-width:1; rx:10; }
      .line { stroke:#9CA3AF; stroke-width:1.5; stroke-dasharray:6 5; fill:none; }
      .arrow { fill:#9CA3AF; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" x="0" y="0" width="660" height="400" rx="12"/>

  <!-- Header -->
  <text class="title" x="28" y="44">方法论：把“发送前体检”接进浏览器 / CLI / IDE</text>
  <text class="muted" x="28" y="66">核心：先定红线字段 → 本地扫描 → 按 L0/L1/L2 决策（L2 直接拦截）</text>

  <!-- Left: Integration points -->
  <rect class="card" x="28" y="92" width="190" height="260" rx="12"/>
  <text class="title" x="48" y="122">接入点</text>

  <!-- pills -->
  <rect class="pill" x="48" y="140" width="150" height="32" fill="#EFF6FF" stroke="#2563EB"/>
  <text class="text" x="63" y="160" fill="#1D4ED8">CLI：粘贴前扫文件</text>

  <rect class="pill" x="48" y="184" width="150" height="32" fill="#F5F3FF" stroke="#9333EA"/>
  <text class="text" x="63" y="204" fill="#6D28D9">IDE：保存/提交前扫描</text>

  <rect class="pill" x="48" y="228" width="150" height="32" fill="#FFF7ED" stroke="#EA580C"/>
  <text class="text" x="63" y="248" fill="#C2410C">浏览器：paste 拦截器</text>

  <rect class="pill" x="48" y="272" width="150" height="56" fill="#F0FDF4" stroke="#16A34A"/>
  <text class="text" x="63" y="295" fill="#166534">本地扫描器</text>
  <text class="muted" x="63" y="315">如 Gitleaks / 自定义规则</text>

  <!-- Center: Flow -->
  <rect class="card" x="246" y="92" width="386" height="260" rx="12"/>
  <text class="title" x="266" y="122">发送前体检流水线</text>

  <!-- Step 1 -->
  <rect class="pill" x="266" y="140" width="346" height="44" fill="#FFFBEB" stroke="#D97706"/>
  <text class="text" x="284" y="158" fill="#92400E">第 1 步：定红线字段（先把 L2 做强）</text>
  <text class="muted" x="284" y="176">Token / 私钥 / cookie / Authorization / 连接串 / 强 PII</text>

  <!-- Step 2 -->
  <rect class="pill" x="266" y="196" width="346" height="44" fill="#EFF6FF" stroke="#2563EB"/>
  <text class="text" x="284" y="214" fill="#1D4ED8">第 2 步：扫描待发送文本（本地执行）</text>
  <text class="muted" x="284" y="232">命中规则名、位置、疑似片段（report 勿外发）</text>

  <!-- Decision: Levels -->
  <rect class="pill" x="266" y="252" width="346" height="84" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text class="text" x="284" y="272">第 3 步：分级决策</text>

  <!-- L0 L1 L2 boxes inside -->
  <rect x="284" y="282" width="98" height="42" rx="10" fill="#F0FDF4" stroke="#16A34A"/>
  <text class="text" x="305" y="300" fill="#166534">L0 可发</text>
  <text class="muted" x="302" y="316">直接发送</text>

  <rect x="397" y="282" width="98" height="42" rx="10" fill="#FFF7ED" stroke="#EA580C"/>
  <text class="text" x="418" y="300" fill="#C2410C">L1 脱敏</text>
  <text class="muted" x="412" y="316">替换后发</text>

  <rect x="510" y="282" width="98" height="42" rx="10" fill="#FEF2F2" stroke="#EF4444"/>
  <text class="text" x="530" y="300" fill="#B91C1C">L2 禁止</text>
  <text class="muted" x="526" y="316">弹窗拦截</text>

  <!-- Connecting dashed lines from left pills to pipeline -->
  <path class="line" d="M 198 156 C 220 156, 228 156, 246 156"/>
  <polygon class="arrow" points="246,156 238,151 238,161"/>

  <path class="line" d="M 198 200 C 220 200, 228 200, 246 206"/>
  <polygon class="arrow" points="246,206 238,201 238,211"/>

  <path class="line" d="M 198 244 C 220 244, 228 244, 246 236"/>
  <polygon class="arrow" points="246,236 238,231 238,241"/>

  <path class="line" d="M 198 300 C 220 300, 228 300, 246 222"/>
  <polygon class="arrow" points="246,222 238,217 238,227"/>

  <!-- Bottom note -->
  <text class="muted" x="28" y="380">验收标准：最慌时也能被拦住；L2 不讨论，先拦截；L1 以提示+一键脱敏为主</text>
</svg>