<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <text x="330" y="34" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">AI 功能怎么选，才能让用户反复打开</text>
  <text x="330" y="56" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">优先选择：嵌进流程、减少步骤、结果可验证</text>

  <rect x="34" y="76" width="180" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="34" y="76" width="180" height="54" rx="12" fill="none" stroke="#2563EB" stroke-width="1.5"/>
  <text x="124" y="99" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563EB">嵌进现有流程</text>
  <text x="124" y="117" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">在原本会打开的页面顺手可用</text>

  <rect x="240" y="76" width="180" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="240" y="76" width="180" height="54" rx="12" fill="none" stroke="#EA580C" stroke-width="1.5"/>
  <text x="330" y="99" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#EA580C">减少步骤</text>
  <text x="330" y="117" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">少点击、少填写、少复制粘贴</text>

  <rect x="446" y="76" width="180" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="446" y="76" width="180" height="54" rx="12" fill="none" stroke="#16A34A" stroke-width="1.5"/>
  <text x="536" y="99" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#16A34A">结果可验证</text>
  <text x="536" y="117" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">有对照、有规则、可回滚</text>

  <rect x="190" y="154" width="280" height="70" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="190" y="154" width="280" height="70" rx="14" fill="none" stroke="#9333EA" stroke-width="2"/>
  <text x="330" y="183" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#111827">评审打分框架</text>
  <text x="330" y="204" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">6 个维度快速判断一个 AI 功能值不值得做</text>

  <line x1="130" y1="130" x2="260" y2="154" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="330" y1="130" x2="330" y2="154" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="530" y1="130" x2="400" y2="154" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>

  <rect x="34" y="252" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="50" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">嵌入度</text>
  <text x="50" y="292" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：列表/详情/编辑器里顺手能点</text>
  <text x="50" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：必须跳去独立聊天页</text>

  <rect x="238" y="252" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="254" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">减步数</text>
  <text x="254" y="292" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：少点几次、少填几项</text>
  <text x="254" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：只是换一种输入输出</text>

  <rect x="442" y="252" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="458" y="274" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#16A34A">可验证</text>
  <text x="458" y="292" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：有对照、有规则、能回滚</text>
  <text x="458" y="307" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：只能通读全文靠感觉</text>

  <rect x="34" y="320" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="50" y="342" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333EA">可失败性</text>
  <text x="50" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：错了最多不采用</text>
  <text x="50" y="375" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：会污染数据或误发通知</text>

  <rect x="238" y="320" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="254" y="342" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#D97706">数据依赖</text>
  <text x="254" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：依赖已有字段与事件</text>
  <text x="254" y="375" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：需要新增大量埋点字段</text>

  <rect x="442" y="320" width="182" height="54" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="458" y="342" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#2563EB">复用频率</text>
  <text x="458" y="360" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#16A34A">高：每周都会遇到的高频动作</text>
  <text x="458" y="375" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#EA580C">低：偶尔才做一次的大任务</text>

  <line x1="330" y1="224" x2="125" y2="252" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="330" y1="224" x2="329" y2="252" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="330" y1="224" x2="533" y2="252" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="125" y1="306" x2="125" y2="320" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="329" y1="306" x2="329" y2="320" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
  <line x1="533" y1="306" x2="533" y2="320" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>

  <rect x="480" y="156" width="146" height="68" rx="12" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="480" y="156" width="146" height="68" rx="12" fill="none" stroke="#EA580C" stroke-width="1.5"/>
  <text x="553" y="182" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#EA580C">万能助手常见低分项</text>
  <text x="553" y="201" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">嵌入度低</text>
  <text x="553" y="216" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#4B5563">减步数不稳定，验证困难</text>
  <line x1="470" y1="189" x2="480" y2="189" stroke="#CBD5E1" stroke-width="2" stroke-dasharray="5 5"/>
</svg>