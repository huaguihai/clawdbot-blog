<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; fill:#0f172a; }
      .muted { fill:#475569; }
      .card { fill:#ffffff; stroke:#e5e7eb; stroke-width:1; filter:url(#shadow); }
      .dash { stroke:#94a3b8; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .label { font-size:14px; font-weight:700; }
      .small { font-size:12px; }
      .pillText { font-size:12px; font-weight:700; fill:#0f172a; }
    </style>
  </defs>

  <!-- Title -->
  <text class="t" x="28" y="36" font-size="18" font-weight="800">日志与回放：让每次风险都能复现</text>
  <text class="t muted" x="28" y="58" font-size="12">核心：记录关键字段 → 发版前回放高风险对话 → 对比权限结果</text>

  <!-- Left: Record -->
  <rect class="card" x="28" y="92" width="260" height="268" rx="12"/>
  <text class="t label" x="48" y="122">1) 记录（落库/日志即可）</text>

  <!-- Field list inside -->
  <rect x="44" y="138" width="228" height="36" rx="10" fill="#DBEAFE"/>
  <text class="t pillText" x="56" y="160">input_messages</text>
  <text class="t muted small" x="168" y="160">完整输入（脱敏/引用）</text>

  <rect x="44" y="182" width="228" height="36" rx="10" fill="#FFEDD5"/>
  <text class="t pillText" x="56" y="204">tool_calls[]</text>
  <text class="t muted small" x="164" y="204">工具/参数/调用者/摘要</text>

  <rect x="44" y="226" width="228" height="36" rx="10" fill="#DCFCE7"/>
  <text class="t pillText" x="56" y="248">policy_checks[]</text>
  <text class="t muted small" x="170" y="248">权限校验：通过/拒绝</text>

  <rect x="44" y="270" width="228" height="36" rx="10" fill="#EDE9FE"/>
  <text class="t pillText" x="56" y="292">final_output</text>
  <text class="t muted small" x="160" y="292">用于检查回显泄漏</text>

  <rect x="44" y="314" width="228" height="36" rx="10" fill="#FEF3C7"/>
  <text class="t pillText" x="56" y="336">user_context</text>
  <text class="t muted small" x="162" y="336">租户/角色/开关/额度</text>

  <!-- Middle/Right flow cards -->
  <rect class="card" x="330" y="92" width="302" height="76" rx="12"/>
  <rect x="346" y="108" width="10" height="44" rx="5" fill="#2563EB"/>
  <text class="t label" x="364" y="124">2) 聚合成“高风险用例包”</text>
  <text class="t muted small" x="364" y="146">对话 + 工具轨迹 + 权限检查记录</text>

  <rect class="card" x="330" y="188" width="302" height="76" rx="12"/>
  <rect x="346" y="204" width="10" height="44" rx="5" fill="#EA580C"/>
  <text class="t label" x="364" y="220">3) 发版前回放（Replay）</text>
  <text class="t muted small" x="364" y="242">在新版本重跑同一批用例</text>

  <rect class="card" x="330" y="284" width="302" height="76" rx="12"/>
  <rect x="346" y="300" width="10" height="44" rx="5" fill="#16A34A"/>
  <text class="t label" x="364" y="316">4) 对比结果并回归修复</text>
  <text class="t muted small" x="364" y="338">从“感觉没问题”变成可验证差异</text>

  <!-- Dashed connectors -->
  <path class="dash" d="M288 226 C310 226, 308 130, 330 130"/>
  <path class="dash" d="M481 168 C481 176, 481 180, 481 188"/>
  <path class="dash" d="M481 264 C481 272, 481 276, 481 284"/>

  <!-- Annotation bubble (comparison) -->
  <rect class="card" x="354" y="28" width="278" height="48" rx="12"/>
  <text class="t" x="372" y="50" font-size="12" font-weight="700">示例：同一 case 跨版本对比</text>
  <text class="t muted" x="372" y="68" font-size="12">v1.3 触发写操作 → v1.4 被拒绝（权限校验变化）</text>
</svg>