<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
    <style>
      .txt { font-family: -apple-system, 'Segoe UI', sans-serif; fill: #0F172A; }
      .muted { fill: #475569; }
      .card { fill: #FFFFFF; stroke: #E2E8F0; stroke-width: 1; filter: url(#shadow); }
      .dash { stroke: #94A3B8; stroke-width: 2; stroke-dasharray: 6 6; fill: none; marker-end: url(#arrow); }
      .pilltxt { font-size: 12px; font-weight: 700; fill: #FFFFFF; }
      .title { font-size: 16px; font-weight: 800; }
      .body { font-size: 12.5px; }
    </style>
  </defs>

  <!-- Header -->
  <text x="32" y="44" class="txt" font-size="18" font-weight="800">预发布页面：别像“还没做完的 PPT”</text>
  <text x="32" y="68" class="txt muted" font-size="12.5">一页只做一件事：让用户看见交付物，并自然进入排队 CTA</text>

  <!-- Left: core formula -->
  <rect x="32" y="92" width="238" height="282" rx="12" class="card"/>
  <text x="52" y="122" class="txt" font-size="14" font-weight="800">推荐结构（4 段）</text>

  <rect x="52" y="140" width="198" height="30" rx="15" fill="#2563EB"/>
  <text x="64" y="160" class="pilltxt">一句话结果</text>
  <text x="150" y="160" class="txt" font-size="12" fill="#DBEAFE">（输入 → 可交付物）</text>

  <rect x="52" y="182" width="198" height="30" rx="15" fill="#16A34A"/>
  <text x="64" y="202" class="pilltxt">适用人群</text>
  <text x="150" y="202" class="txt" font-size="12" fill="#DCFCE7">（岗位 / 场景）</text>

  <rect x="52" y="224" width="198" height="30" rx="15" fill="#9333EA"/>
  <text x="64" y="244" class="pilltxt">证据（样例）</text>
  <text x="150" y="244" class="txt" font-size="12" fill="#F3E8FF">（截图 / 链接）</text>

  <rect x="52" y="266" width="198" height="30" rx="15" fill="#EA580C"/>
  <text x="64" y="286" class="pilltxt">排队 CTA</text>
  <text x="150" y="286" class="txt" font-size="12" fill="#FFEDD5">（加入等待名单）</text>

  <text x="52" y="322" class="txt muted" font-size="12">关键点：少讲概念，多展示交付物</text>
  <text x="52" y="344" class="txt muted" font-size="12">“为什么要排队”= 节奏控制 + 质量承诺</text>

  <!-- Right: page blocks -->
  <rect x="300" y="92" width="328" height="282" rx="12" class="card"/>
  <text x="320" y="122" class="txt" font-size="14" font-weight="800">可复制落地页模块</text>

  <!-- Cards stacked -->
  <rect x="320" y="140" width="288" height="44" rx="10" class="card"/>
  <rect x="320" y="140" width="6" height="44" rx="3" fill="#2563EB"/>
  <text x="336" y="162" class="txt title">主标题</text>
  <text x="336" y="178" class="txt muted body">在 X 场景，把输入变成交付物</text>

  <rect x="320" y="196" width="288" height="44" rx="10" class="card"/>
  <rect x="320" y="196" width="6" height="44" rx="3" fill="#16A34A"/>
  <text x="336" y="218" class="txt title">副标题</text>
  <text x="336" y="234" class="txt muted body">适合谁 + 你提供什么 + 我交付什么</text>

  <rect x="320" y="252" width="288" height="44" rx="10" class="card"/>
  <rect x="320" y="252" width="6" height="44" rx="3" fill="#D97706"/>
  <text x="336" y="274" class="txt title">你会拿到什么</text>
  <text x="336" y="290" class="txt muted body">3 条清单：格式 / 数量 / 范例</text>

  <rect x="320" y="308" width="288" height="44" rx="10" class="card"/>
  <rect x="320" y="308" width="6" height="44" rx="3" fill="#9333EA"/>
  <text x="336" y="330" class="txt title">示例</text>
  <text x="336" y="346" class="txt muted body">1–3 张截图或链接（真实可读）</text>

  <rect x="320" y="364" width="288" height="0" rx="10" fill="none"/>

  <!-- Dashed flow arrows on right -->
  <path d="M 464 186 L 464 196" class="dash"/>
  <path d="M 464 242 L 464 252" class="dash"/>
  <path d="M 464 298 L 464 308" class="dash"/>

  <!-- CTA highlight bubble -->
  <rect x="468" y="332" width="140" height="34" rx="10" fill="#EA580C" opacity="0.10"/>
  <text x="476" y="354" class="txt" font-size="12.5" font-weight="700" fill="#9A3412">落点：排队 CTA</text>

  <!-- Connector between formula and modules -->
  <path d="M 270 232 C 290 232, 290 232, 310 232" class="dash"/>
  <text x="286" y="222" class="txt muted" font-size="11">映射到页面模块</text>
</svg>