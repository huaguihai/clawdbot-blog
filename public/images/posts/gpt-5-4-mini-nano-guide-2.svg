<svg viewBox="0 0 660 400" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Segoe UI', sans-serif"><rect width="660" height="400" fill="#FAFAFA" rx="12"/><text x="330" y="36" text-anchor="middle" font-size="16" font-weight="700" fill="#1E293B">小模型适用场景</text><rect x="32" y="58" width="284" height="130" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5" filter="url(#s)"/><rect x="344" y="58" width="284" height="130" rx="10" fill="#FFFFFF" stroke="#FED7AA" stroke-width="1.5" filter="url(#s)"/><rect x="32" y="206" width="284" height="130" rx="10" fill="#FFFFFF" stroke="#D9F99D" stroke-width="1.5" filter="url(#s)"/><rect x="344" y="206" width="284" height="130" rx="10" fill="#FFFFFF" stroke="#E9D5FF" stroke-width="1.5" filter="url(#s)"/><defs><filter id="s" x="-5%" y="-5%" width="110%" height="110%"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#00000018"/></filter></defs><text x="174" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#2563EB">场景 1 · 编程助手快速迭代</text><text x="174" y="102" text-anchor="middle" font-size="11" fill="#475569">模型：GPT-5.4 mini</text><text x="174" y="122" text-anchor="middle" font-size="11" fill="#64748B">改函数 / 调逻辑 / 生成前端代码</text><text x="174" y="140" text-anchor="middle" font-size="11" fill="#64748B">低延迟，性价比高</text><text x="174" y="162" text-anchor="middle" font-size="11" fill="#94A3B8">pass rate 接近大模型，速度快得多</text><text x="486" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#EA580C">场景 2 · Subagent 执行层</text><text x="486" y="102" text-anchor="middle" font-size="11" fill="#475569">模型：GPT-5.4 mini</text><text x="486" y="122" text-anchor="middle" font-size="11" fill="#64748B">搜索代码库 / 审查文件 / 处理文档</text><text x="486" y="140" text-anchor="middle" font-size="11" fill="#64748B">并行多任务，仅消耗 30% 大模型配额</text><text x="486" y="162" text-anchor="middle" font-size="11" fill="#94A3B8">大模型负责规划，mini 负责执行</text><text x="174" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">场景 3 · Computer Use</text><text x="174" y="250" text-anchor="middle" font-size="11" fill="#475569">模型：GPT-5.4 mini</text><text x="174" y="270" text-anchor="middle" font-size="11" fill="#64748B">快速解读截图 / 识别界面元素</text><text x="174" y="288" text-anchor="middle" font-size="11" fill="#64748B">UI 自动化 / 自动化测试</text><text x="174" y="310" text-anchor="middle" font-size="11" fill="#94A3B8">OSWorld 得分 72.1%，接近大模型 75%</text><text x="486" y="230" text-anchor="middle" font-size="13" font-weight="700" fill="#9333EA">场景 4 · 分类提取排序</text><text x="486" y="250" text-anchor="middle" font-size="11" fill="#475569">模型：GPT-5.4 nano</text><text x="486" y="270" text-anchor="middle" font-size="11" fill="#64748B">邮件分类 / 结构化提取 / 排序</text><text x="486" y="288" text-anchor="middle" font-size="11" fill="#64748B">输入输出短，需高频调用</text><text x="486" y="310" text-anchor="middle" font-size="11" fill="#94A3B8">nano 价格优势最明显</text><rect x="32" y="354" width="16" height="10" rx="3" fill="#2563EB"/><text x="54" y="363" font-size="11" fill="#475569">mini 适用</text><rect x="140" y="354" width="16" height="10" rx="3" fill="#9333EA"/><text x="162" y="363" font-size="11" fill="#475569">nano 适用</text><text x="330" y="363" text-anchor="middle" font-size="11" fill="#94A3B8">任务复杂度低 · 速度优先 · 成本敏感 → 选小模型</text></svg>