<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><line x1='80' y1='320' x2='580' y2='320' stroke='#6B7280' stroke-width='2' marker-end='url(#arrow)'/><line x1='80' y1='320' x2='80' y2='60' stroke='#6B7280' stroke-width='2' marker-end='url(#arrow)'/><defs><marker id='arrow' viewBox='0 0 10 10' refX='5' refY='5' markerWidth='6' markerHeight='6' orient='auto-start-reverse'><path d='M 0 0 L 10 5 L 0 10 z' fill='#6B7280'/></marker></defs><text x='580' y='345' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563' text-anchor='end'>反馈明确度 (Digital Feedback)</text><text x='70' y='50' font-family='-apple-system, Segoe UI, sans-serif' font-size='14' fill='#4B5563' transform='rotate(-90 70,50)' text-anchor='end'>任务独立性 (Independence)</text><rect x='330' y='80' width='230' height='110' rx='8' fill='#DCFCE7' stroke='#16A34A' stroke-width='1' stroke-dasharray='4'/><text x='445' y='130' font-family='-apple-system, Segoe UI, sans-serif' font-size='18' font-weight='bold' fill='#16A34A' text-anchor='middle'>最佳落地区</text><text x='445' y='155' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#16A34A' text-anchor='middle'>高反馈 + 高独立 (e.g. 代码/SQL)</text><rect x='100' y='80' width='230' height='110' rx='8' fill='#FEE2E2' stroke='#DC2626' stroke-width='1'/><text x='215' y='130' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#DC2626' text-anchor='middle'>风险监控区</text><text x='215' y='155' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#DC2626' text-anchor='middle'>黑盒任务，需人工审计</text><rect x='330' y='190' width='230' height='110' rx='8' fill='#DBEAFE' stroke='#2563EB' stroke-width='1'/><text x='445' y='240' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#2563EB' text-anchor='middle'>辅助工具区</text><text x='445' y='265' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#2563EB' text-anchor='middle'>Copilot 模式，频繁交互</text><rect x='100' y='190' width='230' height='110' rx='8' fill='#F3F4F6' stroke='#9CA3AF' stroke-width='1'/><text x='215' y='240' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#6B7280' text-anchor='middle'>暂不建议</text><text x='215' y='265' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280' text-anchor='middle'>低价值/高模糊度</text><circle cx='445' cy='130' r='40' fill='none' stroke='#16A34A' stroke-width='2'><animate attributeName='r' values='35;45;35' dur='3s' repeatCount='indefinite'/><animate attributeName='opacity' values='1;0.3;1' dur='3s' repeatCount='indefinite'/></circle></svg>