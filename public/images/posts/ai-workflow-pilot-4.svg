<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font{font-family:-apple-system,'Segoe UI',sans-serif;}
      .title{font-size:18px;font-weight:700;fill:#0f172a;}
      .sub{font-size:12px;fill:#475569;}
      .h{font-size:13px;font-weight:700;fill:#0f172a;}
      .t{font-size:12px;fill:#0f172a;}
      .muted{font-size:12px;fill:#64748b;}
      .chip{font-size:11px;fill:#0f172a;}
      .dash{stroke:#94a3b8;stroke-width:2;stroke-dasharray:6 6;fill:none;}
    </style>
  </defs>

  <!-- background -->
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>

  <!-- header -->
  <text x="30" y="48" class="font title">工作流二：纪要不止摘要，直接产出行动表</text>
  <text x="30" y="70" class="font sub">把会议输入 → 可追踪任务面板，并用指标衡量“遗漏项”</text>

  <!-- Left: Inputs card -->
  <rect x="30" y="95" width="190" height="190" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="95" width="190" height="34" rx="12" fill="#2563EB"/>
  <text x="44" y="118" class="font h" fill="#ffffff">输入（最低 3 项）</text>

  <circle cx="48" cy="152" r="6" fill="#2563EB"/>
  <text x="62" y="156" class="font t">录音转写文本</text>

  <circle cx="48" cy="182" r="6" fill="#2563EB"/>
  <text x="62" y="186" class="font t">会议议程/目标</text>

  <circle cx="48" cy="212" r="6" fill="#2563EB"/>
  <text x="62" y="216" class="font t">参会人名单</text>

  <rect x="44" y="235" width="162" height="38" rx="10" fill="#EFF6FF"/>
  <text x="54" y="257" class="font muted">转写质量不稳 → 下游一定乱</text>

  <!-- Middle: GPT outputs card -->
  <rect x="235" y="95" width="220" height="190" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="235" y="95" width="220" height="34" rx="12" fill="#16A34A"/>
  <text x="249" y="118" class="font h" fill="#ffffff">会议纪要 GPT 输出</text>

  <!-- output items -->
  <rect x="249" y="140" width="192" height="20" rx="8" fill="#ECFDF5"/>
  <text x="259" y="154" class="font chip">1) 会议目标（1-2句）</text>

  <rect x="249" y="165" width="192" height="20" rx="8" fill="#ECFDF5"/>
  <text x="259" y="179" class="font chip">2) 已达成结论</text>

  <rect x="249" y="190" width="192" height="20" rx="8" fill="#ECFDF5"/>
  <text x="259" y="204" class="font chip">3) 未解决问题</text>

  <rect x="249" y="215" width="192" height="20" rx="8" fill="#FEF3C7"/>
  <text x="259" y="229" class="font chip">4) 待办表：事项/Owner/DDL/依赖</text>

  <rect x="249" y="240" width="192" height="20" rx="8" fill="#FEE2E2"/>
  <text x="259" y="254" class="font chip">5-6) 风险提醒 + 待确认（不编造）</text>

  <!-- Right: Action board card -->
  <rect x="470" y="95" width="160" height="190" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="470" y="95" width="160" height="34" rx="12" fill="#EA580C"/>
  <text x="484" y="118" class="font h" fill="#ffffff">可追踪任务面板</text>

  <!-- mini table header -->
  <rect x="484" y="140" width="132" height="22" rx="8" fill="#FFF7ED"/>
  <text x="492" y="155" class="font chip">事项</text>
  <text x="538" y="155" class="font chip">Owner</text>
  <text x="586" y="155" class="font chip">DDL</text>

  <!-- rows -->
  <rect x="484" y="168" width="132" height="22" rx="8" fill="#ffffff" stroke="#FED7AA"/>
  <rect x="484" y="196" width="132" height="22" rx="8" fill="#ffffff" stroke="#FED7AA"/>
  <rect x="484" y="224" width="132" height="22" rx="8" fill="#ffffff" stroke="#FED7AA"/>

  <text x="492" y="183" class="font muted">任务 A</text>
  <text x="538" y="183" class="font muted">张三</text>
  <text x="586" y="183" class="font muted">周五</text>

  <text x="492" y="211" class="font muted">任务 B</text>
  <text x="538" y="211" class="font muted">待确认</text>
  <text x="586" y="211" class="font muted">—</text>

  <text x="492" y="239" class="font muted">任务 C</text>
  <text x="538" y="239" class="font muted">李四</text>
  <text x="586" y="239" class="font muted">下周</text>

  <!-- dashed connectors -->
  <path d="M220 190 C 235 190, 235 190, 235 190" class="dash"/>
  <path d="M455 190 C 470 190, 470 190, 470 190" class="dash"/>

  <!-- Bottom: Metrics card -->
  <rect x="30" y="300" width="600" height="74" rx="12" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="30" y="300" width="600" height="30" rx="12" fill="#9333EA"/>
  <text x="44" y="321" class="font h" fill="#ffffff">衡量是否“有用”：3 个指标</text>

  <!-- metric chips -->
  <rect x="44" y="342" width="180" height="24" rx="10" fill="#F3E8FF"/>
  <text x="54" y="358" class="font chip">遗漏项数量：越少越好</text>

  <rect x="238" y="342" width="180" height="24" rx="10" fill="#F3E8FF"/>
  <text x="248" y="358" class="font chip">整理时间：明显缩短</text>

  <rect x="432" y="342" width="184" height="24" rx="10" fill="#F3E8FF"/>
  <text x="442" y="358" class="font chip">责任人确认率：越高越好</text>

  <!-- link from action board to metrics -->
  <path d="M550 285 C 550 295, 330 295, 330 300" class="dash"/>

  <!-- small caution note -->
  <rect x="470" y="285" width="160" height="22" rx="10" fill="#FEF3C7"/>
  <text x="480" y="300" class="font chip">没人愿意认 Owner → AI 也救不了</text>
</svg>