<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" fill="#FAFAFA" rx="12"/>
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 14px; fill: #111827; }
    .title { font-size: 20px; font-weight: 600; }
    .subtitle { font-size: 13px; fill: #4B5563; }
  </style>

  <!-- 标题 -->
  <text x="330" y="40" text-anchor="middle" class="title">把代码推上去：push + migrate 两步搞定</text>
  <text x="330" y="62" text-anchor="middle" class="subtitle">本地项目 → Telegram Serverless → 托管 SQLite</text>

  <!-- 步骤 1 卡片：push -->
  <rect x="60" y="100" width="230" height="190" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="175" y="130" text-anchor="middle" style="font-size:16px; font-weight:600; fill:#2563EB;">第一步：tgcloud push</text>

  <rect x="80" y="150" width="190" height="26" rx="6" fill="#EFF6FF"/>
  <text x="175" y="168" text-anchor="middle" style="font-family: 'SFMono-Regular', ui-monospace; font-size:12px; fill:#1E3A8A;">npx tgcloud push</text>

  <text x="90" y="196">• 打包当前项目 JS 模块</text>
  <text x="90" y="218">• 上传到 Telegram Serverless</text>
  <text x="90" y="240">• 原子替换 Bot 模块版本</text>

  <rect x="80" y="260" width="190" height="30" rx="6" fill="#F9FAFB" stroke="#E5E7EB" stroke-width="1"/>
  <text x="175" y="279" text-anchor="middle" style="font-size:11px; fill:#4B5563;">可封装为 npm script: npm run deploy</text>

  <!-- 步骤 2 卡片：migrate -->
  <rect x="370" y="100" width="230" height="190" rx="12" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" style="font-size:16px; font-weight:600; fill:#16A34A;">第二步：tgcloud migrate</text>

  <rect x="390" y="150" width="190" height="26" rx="6" fill="#ECFDF3"/>
  <text x="485" y="168" text-anchor="middle" style="font-family: 'SFMono-Regular', ui-monospace; font-size:12px; fill:#14532D;">npx tgcloud migrate</text>

  <text x="400" y="196">• 对比远端 schema 和本地 schema.js</text>
  <text x="400" y="218">• 生成 SQL 迁移</text>
  <text x="400" y="240">• 在托管 SQLite 上执行迁移</text>

  <rect x="390" y="260" width="190" height="40" rx="6" fill="#FFFBEB" stroke="#FBBF24" stroke-width="1"/>
  <text x="485" y="278" text-anchor="middle" style="font-size:11px; fill:#92400E;">修改 schema.js 后重复执行 migrate</text>

  <!-- 中间主流程箭头：push → migrate -->
  <line x1="290" y1="195" x2="370" y2="195" stroke="#9CA3AF" stroke-width="2" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- 底部架构关系：代码 / Serverless / SQLite -->
  <rect x="60" y="320" width="140" height="50" rx="10" fill="#FFFFFF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="130" y="340" text-anchor="middle" style="font-weight:600; fill:#2563EB;">本地项目</text>
  <text x="130" y="358" text-anchor="middle" style="font-size:12px; fill:#4B5563;">代码 + schema.js</text>

  <rect x="260" y="320" width="140" height="50" rx="10" fill="#FFFFFF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="330" y="340" text-anchor="middle" style="font-weight:600; fill:#9333EA;">Telegram Serverless</text>
  <text x="330" y="358" text-anchor="middle" style="font-size:12px; fill:#4B5563;">Bot 运行环境</text>

  <rect x="460" y="320" width="140" height="50" rx="10" fill="#FFFFFF" stroke="#A7F3D0" stroke-width="1.5"/>
  <text x="530" y="340" text-anchor="middle" style="font-weight:600; fill:#16A34A;">托管 SQLite</text>
  <text x="530" y="358" text-anchor="middle" style="font-size:12px; fill:#4B5563;">持久数据库</text>

  <!-- 底部连线：代码 → Serverless → SQLite -->
  <line x1="200" y1="345" x2="260" y2="345" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow-small)"/>
  <line x1="400" y1="345" x2="460" y2="345" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 5" marker-end="url(#arrow-small)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrow-small" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <!-- 旁注：Serverless 持久化说明 -->
  <rect x="410" y="72" width="220" height="24" rx="6" fill="#F3F4F6"/>
  <text x="520" y="89" text-anchor="middle" style="font-size:11px; fill:#4B5563;">Telegram 负责文件存储与备份，多次调用持久</text>
</svg>