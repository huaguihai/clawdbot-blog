<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; }
  </style>

  <!-- Step 1: Brain -->
  <rect x="15" y="35" width="155" height="150" rx="16" fill="#FFF7ED" stroke="#EA580C" stroke-width="2"/>
  <text x="92" y="75" text-anchor="middle" font-size="28">🧠</text>
  <text x="92" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#9A3412">隐性知识</text>
  <text x="92" y="128" text-anchor="middle" font-size="11" fill="#C2410C">决策过程</text>
  <text x="92" y="146" text-anchor="middle" font-size="11" fill="#C2410C">分析框架</text>
  <text x="92" y="164" text-anchor="middle" font-size="11" fill="#C2410C">判断标准</text>

  <!-- Arrow 1 -->
  <polygon points="185,110 205,100 205,105 230,105 230,115 205,115 205,120" fill="#D97706"/>
  <text x="207" y="98" font-size="10" fill="#92400E">写下来</text>

  <!-- Step 2: Skill File -->
  <rect x="245" y="35" width="155" height="150" rx="16" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="322" y="75" text-anchor="middle" font-size="28">📄</text>
  <text x="322" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#92400E">Skill 指令</text>
  <text x="322" y="128" text-anchor="middle" font-size="11" fill="#B45309">分析维度</text>
  <text x="322" y="146" text-anchor="middle" font-size="11" fill="#B45309">优先级规则</text>
  <text x="322" y="164" text-anchor="middle" font-size="11" fill="#B45309">输出格式</text>

  <!-- Arrow 2 -->
  <polygon points="415,110 435,100 435,105 460,105 460,115 435,115 435,120" fill="#16A34A"/>
  <text x="437" y="98" font-size="10" fill="#166534">喂给 AI</text>

  <!-- Step 3: Output -->
  <rect x="475" y="35" width="155" height="150" rx="16" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="552" y="75" text-anchor="middle" font-size="28">⚡</text>
  <text x="552" y="105" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">专业级输出</text>
  <text x="552" y="128" text-anchor="middle" font-size="11" fill="#15803D">你 70-80% 的水平</text>
  <text x="552" y="146" text-anchor="middle" font-size="11" fill="#15803D">几分钟完成</text>
  <text x="552" y="164" text-anchor="middle" font-size="11" fill="#15803D">可迭代优化</text>

  <!-- Bottom note -->
  <text x="360" y="210" text-anchor="middle" font-size="11" fill="#78716C">剩下 20-30% = 你的最终判断（不自动化）</text>
</svg>
