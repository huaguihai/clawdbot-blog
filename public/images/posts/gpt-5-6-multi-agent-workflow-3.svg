<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA"/>
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; fill: #111827; }
    .title { font-size: 18px; font-weight: 600; }
    .label { font-size: 12px; fill: #4B5563; }
  </style>

  <!-- 标题 -->
  <text x="330" y="40" text-anchor="middle" class="title">多 Agent 工作流四层骨架</text>
  <text x="330" y="62" text-anchor="middle" class="label">从一次性聊天到可调度小团队</text>

  <!-- 总控 Agent -->
  <rect x="230" y="80" width="200" height="70" rx="12" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.5"/>
  <text x="330" y="105" text-anchor="middle" font-weight="600" fill="#2563EB">总控 Agent</text>
  <text x="240" y="125" class="label">· 理解最终目标</text>
  <text x="240" y="142" class="label">· 拆任务 / 排优先级 / 跟踪状态</text>

  <!-- 子 Agent 池 -->
  <rect x="60" y="190" width="200" height="140" rx="12" fill="#FFFFFF" stroke="#16A34A" stroke-width="1.5"/>
  <text x="160" y="210" text-anchor="middle" font-weight="600" fill="#16A34A">子 Agent 池</text>
  <text x="75" y="230" class="label">固定工种：</text>
  <text x="75" y="247" class="label">· 写作 / 代码</text>
  <text x="75" y="264" class="label">· 检索 / 分析</text>
  <text x="75" y="281" class="label">· 客服等</text>

  <!-- 工单队列 -->
  <rect x="250" y="210" width="160" height="120" rx="12" fill="#FFFFFF" stroke="#EA580C" stroke-width="1.5"/>
  <text x="330" y="230" text-anchor="middle" font-weight="600" fill="#EA580C">工单队列</text>
  <text x="262" y="250" class="label">统一格式：</text>
  <text x="262" y="267" class="label">· 标题 / 输入</text>
  <text x="262" y="284" class="label">· 输出格式</text>
  <text x="262" y="301" class="label">· 依赖关系</text>

  <!-- 汇总与复盘 -->
  <rect x="440" y="190" width="170" height="140" rx="12" fill="#FFFFFF" stroke="#9333EA" stroke-width="1.5"/>
  <text x="525" y="210" text-anchor="middle" font-weight="600" fill="#9333EA">汇总与复盘</text>
  <text x="452" y="230" class="label">· 周期性收集输出</text>
  <text x="452" y="247" class="label">· 形成当前版本</text>
  <text x="452" y="264" class="label">· 给出下一步建议</text>

  <!-- 谁是负责人 / 工种 / 接任务 / 合并结果 提示 -->
  <rect x="40" y="320" width="580" height="60" rx="10" fill="#FFFFFF" stroke="#D97706" stroke-width="1"/>
  <text x="50" y="340" class="label">思考四个关键问题：</text>
  <text x="50" y="357" class="label">1. 谁是负责人？ 2. 有哪些工种？ 3. 每个工种接受什么任务？ 4. 何时合并大家的结果？</text>

  <!-- 连接线 -->
  <!-- 总控 -> 子 Agent 池 -->
  <line x1="260" y1="150" x2="160" y2="190" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <!-- 总控 -> 工单队列 -->
  <line x1="330" y1="150" x2="330" y2="210" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <!-- 子 Agent 池 -> 工单队列 -->
  <line x1="260" y1="260" x2="250" y2="260" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <!-- 工单队列 -> 汇总与复盘 -->
  <line x1="410" y1="260" x2="440" y2="260" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
  <!-- 汇总与复盘 -> 总控（反馈） -->
  <line x1="470" y1="190" x2="360" y2="150" stroke="#6B7280" stroke-width="1.2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>

  <!-- 箭头定义 -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6,3 L0,6" fill="#6B7280" />
    </marker>
  </defs>
</svg>