<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" width="660" height="400">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563EB"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#EA580C"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16A34A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>
  <text x="330" y="36" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#111827">邮件首稿工位：先拿下“从空白到初稿”</text>
  <text x="330" y="58" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#6B7280">核心思路：固定材料 + 固定提示词 + 人工审核，不直接自动发送</text>

  <rect x="34" y="86" width="170" height="228" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="119" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563EB">准备 4 类材料</text>

  <rect x="48" y="126" width="142" height="34" rx="10" fill="#EFF6FF" stroke="#BFDBFE"/>
  <text x="119" y="147" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">常见邮件场景分类</text>

  <rect x="48" y="168" width="142" height="34" rx="10" fill="#F5F3FF" stroke="#DDD6FE"/>
  <text x="119" y="189" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">团队语气规范</text>

  <rect x="48" y="210" width="142" height="34" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
  <text x="119" y="231" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">禁止承诺清单</text>

  <rect x="48" y="252" width="142" height="46" rx="10" fill="#F0FDF4" stroke="#BBF7D0"/>
  <text x="119" y="273" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">历史高质量样本</text>
  <text x="119" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#16A34A">10–20 封</text>

  <rect x="248" y="102" width="164" height="196" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="330" y="128" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#EA580C">GPT 首稿助手</text>

  <rect x="268" y="142" width="124" height="30" rx="8" fill="#FFF7ED"/>
  <text x="330" y="161" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7C2D12">固定输入格式</text>

  <text x="270" y="188" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 邮件场景 / 对方身份</text>
  <text x="270" y="208" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 我方目标 / 必提信息</text>
  <text x="270" y="228" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 禁止说的信息</text>
  <text x="270" y="248" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">• 参考历史样本</text>

  <rect x="268" y="260" width="124" height="22" rx="8" fill="#FEF3C7"/>
  <text x="330" y="275" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="11" fill="#92400E">未知内容标注“待确认”</text>

  <rect x="456" y="86" width="170" height="228" rx="16" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="541" y="112" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16A34A">输出可编辑初稿</text>

  <rect x="472" y="128" width="138" height="116" rx="10" fill="#F9FAFB" stroke="#D1D5DB"/>
  <text x="490" y="151" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#111827">固定输出结构</text>
  <text x="490" y="174" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">1. 邮件主题</text>
  <text x="490" y="194" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">2. 正文初稿</text>
  <text x="490" y="214" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#374151">3. 人工确认点</text>

  <rect x="472" y="256" width="138" height="42" rx="10" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="541" y="273" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#B91C1C">边界</text>
  <text x="541" y="289" text-anchor="middle" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#7F1D1D">不自动发送，必须审核</text>

  <path d="M 204 200 C 220 200, 228 200, 248 200" fill="none" stroke="#2563EB" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowBlue)"/>
  <path d="M 412 200 C 430 200, 438 200, 456 200" fill="none" stroke="#EA580C" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowOrange)"/>

  <rect x="98" y="336" width="464" height="46" rx="14" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="128" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#9333EA">做对后的结果：</text>
  <text x="240" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">首稿启动更快</text>
  <circle cx="357" cy="359" r="4" fill="#D1D5DB"/>
  <text x="372" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">同事愿意继续改</text>
  <circle cx="500" cy="359" r="4" fill="#D1D5DB"/>
  <text x="515" y="364" font-family="-apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#1F2937">整封重写变少</text>

  <path d="M 541 314 C 541 326, 541 330, 541 336" fill="none" stroke="#16A34A" stroke-width="2.5" stroke-dasharray="6 6" marker-end="url(#arrowGreen)"/>
</svg>