<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400" font-family="-apple-system, 'Segoe UI', sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#94A3B8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <!-- Title -->
  <text x="30" y="40" font-size="20" font-weight="700" fill="#111827">战情室：灾害响应四模块</text>
  <text x="30" y="64" font-size="12" fill="#6B7280">四条从输入到输出的最短闭环：看清局面 → 分级处理 → 统一口径 → 多语答疑</text>

  <!-- Cards layout constants: width=140, height=160, y=120, x=[30,190,350,510] -->
  
  <!-- 信息汇总 -->
  <g filter="url(#shadow)">
    <rect x="30" y="120" width="140" height="160" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="30" y="120" width="140" height="32" rx="10" fill="#2563EB"/>
    <text x="100" y="141" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">信息汇总</text>
    <text x="40" y="170" font-size="12" fill="#374151">输入：多源信息</text>
    <text x="40" y="190" font-size="12" fill="#374151">处理：去重整合</text>
    <text x="40" y="210" font-size="12" fill="#374151">输出：事件卡片·时间线</text>
    <text x="40" y="230" font-size="12" fill="#374151">+ 引用来源</text>
  </g>

  <!-- 需求分级 -->
  <g filter="url(#shadow)">
    <rect x="190" y="120" width="140" height="160" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="190" y="120" width="140" height="32" rx="10" fill="#EA580C"/>
    <text x="260" y="141" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">需求分级</text>
    <text x="200" y="170" font-size="12" fill="#374151">输入：请求/告警</text>
    <text x="200" y="190" font-size="12" fill="#374151">处理：队列·优先级</text>
    <text x="200" y="210" font-size="12" fill="#374151">+ SLA 建议</text>
    <text x="200" y="230" font-size="12" fill="#374151">输出：已排序队列/解释</text>
  </g>

  <!-- 对外通告 -->
  <g filter="url(#shadow)">
    <rect x="350" y="120" width="140" height="160" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="350" y="120" width="140" height="32" rx="10" fill="#16A34A"/>
    <text x="420" y="141" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">对外通告</text>
    <text x="360" y="170" font-size="12" fill="#374151">输入：状态/变更</text>
    <text x="360" y="190" font-size="12" fill="#374151">处理：公告生成</text>
    <text x="360" y="210" font-size="12" fill="#374151">+ 渠道发布</text>
    <text x="360" y="230" font-size="12" fill="#374151">输出：版本留痕/口径统一</text>
  </g>

  <!-- 多语问答 -->
  <g filter="url(#shadow)">
    <rect x="510" y="120" width="140" height="160" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
    <rect x="510" y="120" width="140" height="32" rx="10" fill="#9333EA"/>
    <text x="580" y="141" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">多语问答</text>
    <text x="520" y="170" font-size="12" fill="#374151">输入：高频咨询</text>
    <text x="520" y="190" font-size="12" fill="#374151">处理：FAQ·RAG 检索</text>
    <text x="520" y="210" font-size="12" fill="#374151">+ 引用</text>
    <text x="520" y="230" font-size="12" fill="#374151">输出：一致答案/可追溯</text>
  </g>

  <!-- Flow connectors (dashed) -->
  <line x1="170" y1="200" x2="190" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="330" y1="200" x2="350" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>
  <line x1="490" y1="200" x2="510" y2="200" stroke="#94A3B8" stroke-width="1.5" stroke-dasharray="6 6" marker-end="url(#arrow)"/>

  <!-- Footer note -->
  <text x="30" y="360" font-size="12" fill="#6B7280">每个模块可独立闭环，也可串联形成端到端试点</text>
</svg>