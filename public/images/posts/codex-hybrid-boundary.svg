<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .font { font-family: -apple-system, 'Segoe UI', sans-serif; }
      .t1 { font-size: 18px; font-weight: 700; fill: #111827; }
      .t2 { font-size: 12px; fill: #374151; }
      .t3 { font-size: 12px; font-weight: 700; fill: #111827; }
      .small { font-size: 11px; fill: #4B5563; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .dash { stroke-dasharray: 6 6; }
    </style>
  </defs>

  <!-- Title -->
  <text class="font t1" x="30" y="44">什么时候必须内网/本地：用“决策矩阵”拆分争论</text>
  <text class="font t2" x="30" y="66">按 数据敏感度 × 任务影响范围 划分，默认拒绝，满足可证明条件才放行</text>

  <!-- Axis labels -->
  <text class="font t3" x="78" y="112">数据敏感度</text>
  <text class="font small" x="52" y="134" fill="#16A34A">低</text>
  <text class="font small" x="52" y="310" fill="#EA580C">高</text>

  <text class="font t3" x="240" y="372">任务影响范围（改动/关联面）</text>
  <text class="font small" x="188" y="352" fill="#16A34A">小</text>
  <text class="font small" x="540" y="352" fill="#EA580C">大</text>

  <!-- Matrix frame -->
  <rect x="120" y="110" width="510" height="240" rx="12" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>

  <!-- Grid lines -->
  <line x1="375" y1="110" x2="375" y2="350" stroke="#D1D5DB" class="dash"/>
  <line x1="120" y1="230" x2="630" y2="230" stroke="#D1D5DB" class="dash"/>

  <!-- Quadrant: Low sens + Small scope -->
  <rect class="card" x="140" y="130" width="215" height="85" rx="12"/>
  <circle cx="160" cy="154" r="6" fill="#16A34A"/>
  <text class="font t3" x="174" y="158">云端优先</text>
  <text class="font small" x="160" y="178">通用工程代码 / 公开文档</text>
  <text class="font small" x="160" y="196">模板生成、补测试、改写文档</text>

  <!-- Quadrant: Low sens + Large scope -->
  <rect class="card" x="395" y="130" width="215" height="85" rx="12"/>
  <circle cx="415" cy="154" r="6" fill="#2563EB"/>
  <text class="font t3" x="429" y="158">云端试点 + 审计</text>
  <text class="font small" x="415" y="178">范围大但不敏感</text>
  <text class="font small" x="415" y="196">先跑 ROI，再逐步固化流程</text>

  <!-- Quadrant: High sens + Small scope -->
  <rect class="card" x="140" y="245" width="215" height="85" rx="12"/>
  <circle cx="160" cy="269" r="6" fill="#D97706"/>
  <text class="font t3" x="174" y="273">先脱敏再云端</text>
  <text class="font small" x="160" y="293">脱敏日志 / 可验证去标识数据</text>
  <text class="font small" x="160" y="311">关键：脱敏证明 + 可追溯审计</text>

  <!-- Quadrant: High sens + Large scope -->
  <rect class="card" x="395" y="245" width="215" height="85" rx="12"/>
  <circle cx="415" cy="269" r="6" fill="#EA580C"/>
  <text class="font t3" x="429" y="273">必须内网/本地</text>
  <text class="font small" x="415" y="293">密钥 / 客户数据 / 受监管 / 核心代码</text>
  <text class="font small" x="415" y="311">默认拒绝，除非满足放行条件</text>

  <!-- Callout bar -->
  <rect x="30" y="86" width="600" height="18" rx="9" fill="#F5F3FF" stroke="#E9D5FF"/>
  <circle cx="44" cy="95" r="5" fill="#9333EA"/>
  <text class="font small" x="56" y="99" fill="#4B5563">核心原则：不要整体争论“上云/不上云”，拆成矩阵做默认策略</text>

  <!-- Dashed connector hint to hybrid idea -->
  <path d="M 300 222 C 330 200, 420 200, 450 222" fill="none" stroke="#2563EB" stroke-width="2" class="dash"/>
  <text class="font small" x="300" y="218" fill="#2563EB">混合部署：低风险先云端，高风险留内网</text>
</svg>