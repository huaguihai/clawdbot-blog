<svg viewBox='0 0 660 400' xmlns='http://www.w3.org/2000/svg'><rect width='660' height='400' rx='12' fill='#FAFAFA'/><text x='330' y='40' font-family='-apple-system, Segoe UI, sans-serif' font-size='20' font-weight='bold' fill='#1F2937' text-anchor='middle'>防御 Agent 被“洗脑”的三层纵深防御体系</text><path d='M50 210 L610 210' stroke='#E5E7EB' stroke-width='2' stroke-dasharray='8 4' /><polygon points='615,210 605,205 605,215' fill='#E5E7EB' /><rect x='40' y='80' width='180' height='260' rx='8' fill='#FFFFFF' stroke='#2563EB' stroke-width='1' /><rect x='40' y='80' width='180' height='40' rx='8 8 0 0' fill='#2563EB' /><text x='130' y='106' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#FFFFFF' text-anchor='middle'>第一层：输入沙箱</text><text x='60' y='150' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 关键词动态拦截</text><text x='60' y='185' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 强制结构化数据</text><text x='60' y='220' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 输入长度截断</text><text x='60' y='255' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 字符转义处理</text><rect x='240' y='80' width='180' height='260' rx='8' fill='#FFFFFF' stroke='#9333EA' stroke-width='1' /><rect x='240' y='80' width='180' height='40' rx='8 8 0 0' fill='#9333EA' /><text x='330' y='106' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#FFFFFF' text-anchor='middle'>第二层：权限最小化</text><text x='260' y='150' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 工具权限隔离</text><text x='260' y='185' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 高危动作人工审核</text><text x='260' y='220' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 只读模式优先</text><text x='260' y='255' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 数据库行级管控</text><rect x='440' y='80' width='180' height='260' rx='8' fill='#FFFFFF' stroke='#16A34A' stroke-width='1' /><rect x='440' y='80' width='180' height='40' rx='8 8 0 0' fill='#16A34A' /><text x='530' y='106' font-family='-apple-system, Segoe UI, sans-serif' font-size='16' font-weight='bold' fill='#FFFFFF' text-anchor='middle'>第三层：输出安全网</text><text x='460' y='150' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 敏感信息(PII)过滤</text><text x='460' y='185' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• Shell/命令检测</text><text x='460' y='220' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 辅助模型二次校验</text><text x='460' y='255' font-family='-apple-system, Segoe UI, sans-serif' font-size='13' fill='#374151'>• 响应内容合规审计</text><text x='130' y='370' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280' text-anchor='middle'>拦截恶意意图</text><text x='330' y='370' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280' text-anchor='middle'>限制破坏范围</text><text x='530' y='370' font-family='-apple-system, Segoe UI, sans-serif' font-size='12' fill='#6B7280' text-anchor='middle'>防止数据泄露</text></svg>