<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="0" y="0" width="660" height="400" rx="12" fill="#FAFAFA"/>

  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
    <style>
      .t { font-family: -apple-system, 'Segoe UI', sans-serif; fill: #111827; }
      .muted { fill: #6B7280; }
      .card { fill: #FFFFFF; stroke: #E5E7EB; stroke-width: 1; filter: url(#shadow); }
      .dash { stroke: #9CA3AF; stroke-width: 2; stroke-dasharray: 6 6; fill: none; }
      .chip { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 12px; fill: #FFFFFF; }
      .h { font-size: 18px; font-weight: 700; }
      .b { font-size: 13px; }
    </style>
  </defs>

  <!-- Title -->
  <text x="330" y="38" text-anchor="middle" class="t h">AI 工具时代：先做产品再找用户更易翻车</text>
  <text x="330" y="60" text-anchor="middle" class="t muted b">失败从“做不出来”变为“做得出来但没人持续用”</text>

  <!-- Center principle card -->
  <rect x="170" y="86" width="320" height="84" rx="12" class="card"/>
  <rect x="182" y="102" width="110" height="22" rx="11" fill="#2563EB"/>
  <text x="237" y="118" text-anchor="middle" class="chip">核心策略</text>
  <text x="330" y="140" text-anchor="middle" class="t" style="font-size:16px;font-weight:700;">功能完成前，先卖“承诺”</text>
  <text x="330" y="160" text-anchor="middle" class="t muted b">先验证：用户愿不愿把问题交给你</text>

  <!-- Three reason cards -->
  <!-- Left: substitution cost -->
  <rect x="40" y="210" width="190" height="140" rx="12" class="card"/>
  <rect x="52" y="224" width="78" height="22" rx="11" fill="#EA580C"/>
  <text x="91" y="240" text-anchor="middle" class="chip">原因 1</text>
  <text x="135" y="268" text-anchor="middle" class="t" style="font-size:14px;font-weight:700;">替代成本几乎为零</text>
  <text x="55" y="292" class="t muted b">同类太多</text>
  <text x="55" y="312" class="t muted b">无明确承诺 → 无粘性</text>

  <!-- Middle: deliverable value -->
  <rect x="235" y="210" width="190" height="140" rx="12" class="card"/>
  <rect x="247" y="224" width="78" height="22" rx="11" fill="#16A34A"/>
  <text x="286" y="240" text-anchor="middle" class="chip">原因 2</text>
  <text x="330" y="268" text-anchor="middle" class="t" style="font-size:14px;font-weight:700;">价值在可用交付物</text>
  <text x="250" y="292" class="t muted b">“能写文案”太虚</text>
  <text x="250" y="312" class="t muted b">“可投放套件”才硬</text>

  <!-- Right: pay intent -->
  <rect x="430" y="210" width="190" height="140" rx="12" class="card"/>
  <rect x="442" y="224" width="78" height="22" rx="11" fill="#9333EA"/>
  <text x="481" y="240" text-anchor="middle" class="chip">原因 3</text>
  <text x="525" y="268" text-anchor="middle" class="t" style="font-size:14px;font-weight:700;">更快验证付费意愿</text>
  <text x="445" y="292" class="t muted b">不只要点赞</text>
  <text x="445" y="312" class="t muted b">要邮箱 / 场景 / 期待</text>

  <!-- Connectors -->
  <path d="M 260 170 C 210 188, 170 196, 135 210" class="dash"/>
  <path d="M 330 170 C 330 188, 330 196, 330 210" class="dash"/>
  <path d="M 400 170 C 450 188, 490 196, 525 210" class="dash"/>

  <!-- Bottom summary bar -->
  <rect x="40" y="362" width="580" height="26" rx="10" fill="#FFFFFF" stroke="#E5E7EB" filter="url(#shadow)"/>
  <circle cx="58" cy="375" r="6" fill="#D97706"/>
  <text x="74" y="379" class="t" style="font-size:13px;">适用：单人/小团队 AI 小工具，先砍掉“闷头做完才发现没人要”的风险</text>
</svg>