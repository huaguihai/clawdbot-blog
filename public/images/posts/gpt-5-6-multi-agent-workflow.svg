<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 400">
  <rect x="10" y="10" width="640" height="380" rx="12" fill="#FAFAFA" />
  <style>
    text { font-family: -apple-system, 'Segoe UI', sans-serif; font-size: 13px; }
  </style>

  <!-- 总控 Agent 卡片 -->
  <rect x="230" y="30" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#2563EB" stroke-width="1" />
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#CBD5F5" flood-opacity="0.8" />
  </filter>
  <rect x="230" y="30" width="200" height="80" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <text x="330" y="55" text-anchor="middle" font-size="15" font-weight="bold" fill="#2563EB">总控 Agent（项目经理）</text>
  <text x="240" y="78" fill="#4B5563">理解目标、拆任务</text>
  <text x="240" y="98" fill="#4B5563">分配给子 Agent 并定节奏</text>

  <!-- 子 Agent 分层区域标题 -->
  <text x="330" y="135" text-anchor="middle" font-size="14" font-weight="bold" fill="#374151">64 个子 Agent 的角色分层</text>

  <!-- 四类子 Agent 区块背景 -->
  <rect x="40" y="150" width="260" height="90" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <rect x="360" y="150" width="260" height="90" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <rect x="40" y="250" width="260" height="90" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <rect x="360" y="250" width="260" height="90" rx="10" fill="#FFFFFF" filter="url(#shadow)" />

  <!-- 子 Agent 类型文字 -->
  <!-- 代数类 -->
  <circle cx="70" cy="175" r="12" fill="#2563EB" />
  <text x="70" y="179" text-anchor="middle" font-size="11" fill="#FFFFFF">A</text>
  <text x="95" y="173" fill="#1F2937" font-weight="bold">代数推理组</text>
  <text x="95" y="193" fill="#6B7280">符号运算、公式变形</text>
  <text x="95" y="213" fill="#6B7280">负责复杂代数证明</text>

  <!-- 数值实验类 -->
  <circle cx="390" cy="175" r="12" fill="#EA580C" />
  <text x="390" y="179" text-anchor="middle" font-size="11" fill="#FFFFFF">N</text>
  <text x="415" y="173" fill="#1F2937" font-weight="bold">数值实验组</text>
  <text x="415" y="193" fill="#6B7280">构造样例、数值试探</text>
  <text x="415" y="213" fill="#6B7280">验证直觉与边界</text>

  <!-- 结构化推理类 -->
  <circle cx="70" cy="275" r="12" fill="#16A34A" />
  <text x="70" y="279" text-anchor="middle" font-size="11" fill="#FFFFFF">S</text>
  <text x="95" y="273" fill="#1F2937" font-weight="bold">结构化推理组</text>
  <text x="95" y="293" fill="#6B7280">拆分子问题、搭证明骨架</text>
  <text x="95" y="313" fill="#6B7280">维护整体逻辑结构</text>

  <!-- 反例检查类 -->
  <circle cx="390" cy="275" r="12" fill="#9333EA" />
  <text x="390" y="279" text-anchor="middle" font-size="11" fill="#FFFFFF">C</text>
  <text x="415" y="273" fill="#1F2937" font-weight="bold">反例与校验组</text>
  <text x="415" y="293" fill="#6B7280">寻找反例、边界情况</text>
  <text x="415" y="313" fill="#6B7280">验证阶段性结论</text>

  <!-- 汇总/决策卡片 -->
  <rect x="230" y="320" width="200" height="60" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <text x="330" y="345" text-anchor="middle" font-size="14" font-weight="bold" fill="#D97706">周期性结果整合与决策</text>
  <text x="330" y="365" text-anchor="middle" fill="#6B7280">拉取阶段结果 → 合并/对比 → 下一步</text>

  <!-- 虚线连接：总控到四组 -->
  <line x1="330" y1="110" x2="170" y2="150" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />
  <line x1="330" y1="110" x2="490" y2="150" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />
  <line x1="330" y1="110" x2="170" y2="250" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />
  <line x1="330" y1="110" x2="490" y2="250" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />

  <!-- 虚线连接：四组到汇总决策 -->
  <line x1="170" y1="240" x2="330" y2="320" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />
  <line x1="490" y1="240" x2="330" y2="320" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" />

  <!-- 右上角小注释：可复制的三点 -->
  <rect x="440" y="40" width="190" height="80" rx="10" fill="#FFFFFF" filter="url(#shadow)" />
  <text x="450" y="60" font-size="12" font-weight="bold" fill="#374151">普通用户可复用的骨架</text>
  <text x="450" y="78" font-size="12" fill="#2563EB">1. 总控角色人设清晰</text>
  <text x="450" y="96" font-size="12" fill="#16A34A">2. 子 Agent 任务拆分</text>
  <text x="450" y="114" font-size="12" fill="#D97706">3. 统一汇报与决策节奏</text>
</svg>